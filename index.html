<style>
  :root {
    --dex-red: #C8302A; --dex-red-dark: #9A211C; --dex-shell: #D63B33;
    --screen-bg: #0E1A14; --screen-glow: #8FD96A; --screen-dim: #4C7A3F;
    --lens-blue: #6CC4E8; --lens-blue-dark: #2C7FA8;
    --cream: #F3EFE3; --key: #EDE7D8; --key-press: #D8CFB8;
    --ink: #1A1612; --amber: #F2C14E;
    --kana-font: "Hiragino Kaku Gothic Pro","Yu Gothic","Meiryo","Noto Sans CJK JP","MS PGothic",sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  button { touch-action: manipulation; }
  
  body {
    font-family: 'Outfit', sans-serif;
    background: radial-gradient(circle at 20% 8%, #E85A52 0%, transparent 45%),
      radial-gradient(circle at 85% 92%, #7A1814 0%, transparent 50%), #A8231E;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 22px; color: var(--ink);
  }
  .dex {
    width: 100%; max-width: 460px;
    background: linear-gradient(160deg, var(--dex-shell), var(--dex-red-dark));
    border-radius: 22px 22px 22px 40px; padding: 22px;
    box-shadow: inset 0 2px 6px rgba(255,255,255,0.25), inset 0 -8px 18px rgba(0,0,0,0.35), 0 22px 50px rgba(0,0,0,0.45);
    border: 3px solid var(--dex-red-dark);
  }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .lens {
    width: 50px; height: 50px; border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, #BfeCff 0%, var(--lens-blue) 38%, var(--lens-blue-dark) 100%);
    border: 4px solid var(--cream); box-shadow: 0 0 0 2px var(--dex-red-dark), inset 0 2px 6px rgba(255,255,255,0.6);
    flex-shrink: 0; position: relative;
  }
  .lens::after { content:""; position:absolute; top:9px; left:11px; width:11px; height:7px; border-radius:50%; background:rgba(255,255,255,0.7); transform:rotate(-20deg); }
  .lights { display: flex; gap: 8px; }
  .light { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.25); }
  .light.r { background:#E0524C; box-shadow: inset 0 1px 2px rgba(255,255,255,0.5); }
  .light.y { background: var(--amber); }
  .light.g { background: var(--screen-glow); }
  .title { margin-left:auto; font-family:'Press Start 2P',monospace; font-size:9px; color:var(--cream); text-shadow:1px 1px 0 var(--dex-red-dark); letter-spacing:1px; text-align:right; line-height:1.6; }

  /* language bar */
  .langbar { display:flex; gap:5px; margin-bottom:14px; }
  .lang { flex:1; border:none; border-radius:7px; padding:7px 0; font-family:'Outfit',sans-serif; font-weight:800; font-size:12px; cursor:pointer; background:rgba(0,0,0,0.18); color:var(--cream); transition:background .12s,color .12s; }
  .lang.active { background:var(--cream); color:var(--dex-red-dark); box-shadow:0 2px 0 rgba(0,0,0,0.25); }

  .screen-frame { background:#E9E4D6; border-radius:10px; padding:13px; box-shadow: inset 0 3px 8px rgba(0,0,0,0.3); }
  .screen-dots { display:flex; gap:6px; margin-bottom:9px; padding-left:4px; }
  .screen-dots span { width:7px; height:7px; border-radius:50%; background:#B91C1C; opacity:.85; }
  .screen-dots span:nth-child(2){ background:#1D4ED8; }
  .screen { background:var(--screen-bg); border-radius:6px; min-height:150px; padding:15px 18px; font-family:'VT323',monospace; color:var(--screen-glow); box-shadow: inset 0 0 22px rgba(0,0,0,0.7), inset 0 0 4px var(--screen-dim); position:relative; overflow:hidden; }
  .screen::before { content:""; position:absolute; inset:0; background:repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,0.12) 2px 4px); pointer-events:none; }
  .screen .placeholder { font-size:21px; line-height:1.5; color:var(--screen-dim); }
  .blink { animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .result-name { font-family:'Outfit',sans-serif; font-weight:800; font-size:30px; color:#DFF5C8; letter-spacing:.5px; text-shadow:0 0 8px rgba(143,217,106,.5); line-height:1.1; }
  .result-num { font-size:22px; color:var(--amber); }
  .result-line { font-size:22px; line-height:1.45; margin-top:4px; }
  .result-line b { color:#DFF5C8; }
  .result-orig { font-size:30px; color:#DFF5C8; margin:2px 0 6px; font-family:var(--kana-font); }
  .result-note { font-size:19px; color:var(--screen-dim); margin-top:8px; line-height:1.4; }
  .err { color:#F2A0A0; font-size:21px; line-height:1.4; }
  .result-wrap { display:flex; gap:14px; align-items:flex-start; justify-content:space-between; }
  .result-text { flex:1 1 auto; min-width:0; }
  .result-cat { font-size:19px; color:var(--screen-glow); opacity:.9; margin:2px 0 4px; }
  .result-sprite {
    flex:0 0 auto; width:150px; height:150px; image-rendering:pixelated;
    align-self:center; filter:drop-shadow(0 0 8px rgba(143,217,106,.5));
  }
  .result-desc {
    font-size:19px; line-height:1.5; color:#CFE9B6; margin-top:10px;
    padding-top:9px; border-top:1px dashed rgba(143,217,106,.35);
  }
  @media (max-width:380px){ .result-sprite{ width:110px; height:110px; } .result-desc{ font-size:18px; } }

  .controls { margin-top:16px; }
  .inputbox { width:100%; min-height:50px; border-radius:10px; padding:11px 14px; font-size:24px; font-family:var(--kana-font); background:var(--cream); color:var(--ink); box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); cursor:text; display:flex; align-items:center; word-break:break-all; }
  .inputbox .ph { color:#9C9384; font-family:'Outfit',sans-serif; font-size:17px; }
  .caret { display:inline-block; width:2px; height:26px; background:var(--ink); margin-left:1px; animation: blink 1.1s steps(1) infinite; vertical-align:middle; }

  .tabs { display:flex; gap:8px; margin:12px 0 8px; }
  .tab { flex:1; border:none; border-radius:8px; padding:9px; font-family:var(--kana-font); font-weight:700; font-size:15px; cursor:pointer; background:rgba(0,0,0,0.18); color:var(--cream); }
  .tab.active { background:var(--cream); color:var(--dex-red-dark); box-shadow:0 2px 0 rgba(0,0,0,0.25); }

  .kbd { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
  .key { border:none; border-radius:7px; padding:0; height:40px; font-family:var(--kana-font); font-size:20px; cursor:pointer; background:var(--key); color:var(--ink); box-shadow:0 3px 0 rgba(0,0,0,0.28); transition:transform .05s, background .1s; display:flex; align-items:center; justify-content:center; }
  .key:active { transform:translateY(3px); box-shadow:0 0 0 rgba(0,0,0,0.28); background:var(--key-press); }
  .key.empty { visibility:hidden; }
  .key.mod { background:var(--lens-blue); color:#08313F; font-size:16px; font-weight:700; }
  .key.del { background:#E0524C; color:#fff; font-size:18px; }
  .row2 { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:6px; }

  .actions { display:flex; gap:10px; margin-top:12px; }
  button.act { flex:1; border:none; border-radius:10px; padding:14px; font-family:'Outfit',sans-serif; font-weight:800; font-size:16px; cursor:pointer; transition:transform .08s, filter .15s; box-shadow:0 4px 0 rgba(0,0,0,0.3); }
  button.act:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.3); }
  .btn-go { background:var(--lens-blue); color:#08313F; }
  .btn-go:hover { filter:brightness(1.06); }
  .btn-clear { flex:0 0 92px; background:var(--cream); color:var(--ink); }
  button.act:disabled { filter:grayscale(0.6) brightness(0.85); cursor:not-allowed; }
  .hint { margin-top:11px; font-size:12.5px; color:rgba(255,255,255,0.85); text-align:center; line-height:1.5; }
  /* ---- Desktop / wide screens: short & wide two-column layout that fits the viewport ---- */
  @media (min-width:760px){
    body { padding:16px; align-items:center; }
    .dex { max-width:1040px; border-radius:22px 22px 22px 36px; padding:14px 18px; }
    .topbar { margin-bottom:8px; gap:10px; }
    .lens { width:38px; height:38px; border-width:3px; }
    .lens::after { top:7px; left:9px; width:8px; height:5px; }
    .langbar { margin-bottom:8px; }
    .lang { padding:5px 0; font-size:11px; }

    .dex-body { display:flex; gap:18px; align-items:stretch; }
    .dex-body > .screen-frame { flex:1.05 1 0; min-width:0; display:flex; flex-direction:column; padding:10px; }
    .dex-body > .screen-frame .screen { flex:1 1 auto; min-height:0; overflow-y:auto; }
    .dex-body > .controls { flex:1 1 0; min-width:0; margin-top:0; display:flex; flex-direction:column; }

    /* compact, wide keyboard so the whole panel is short */
    .dex-body .inputbox { min-height:0; padding:7px 13px; font-size:20px; }
    .dex-body .caret { height:22px; }
    .dex-body .tabs { margin:7px 0 5px; gap:6px; }
    .dex-body .tab { padding:6px; font-size:13px; }
    .dex-body .kbd { gap:clamp(3px,0.5vh,5px); }
    .dex-body .row2 { gap:clamp(3px,0.5vh,5px); margin-top:clamp(3px,0.5vh,5px); }
    .dex-body .key { height:clamp(22px,3.5vh,34px); font-size:clamp(14px,2.1vh,19px); border-radius:6px; box-shadow:0 2px 0 rgba(0,0,0,0.28); }
    .dex-body .key.mod { font-size:clamp(12px,1.8vh,15px); }
    .dex-body .key.del { font-size:clamp(13px,1.9vh,17px); }
    .dex-body .actions { margin-top:clamp(5px,0.9vh,10px); gap:8px; }
    .dex-body .actions button.act { padding:clamp(8px,1.3vh,12px); font-size:14px; }
    .dex-body .controls .hint { margin-top:clamp(5px,0.9vh,9px); font-size:11.5px; line-height:1.4; }
  }

  @media (max-width:380px){ .key{ height:36px; font-size:18px; } .lang{ font-size:11px; } }
  .disclaimer {
    max-width: 1040px;
    margin: 14px auto 0;
    padding: 0 8px;
    text-align: center;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: rgba(255,255,255,0.55);
  }
  .disclaimer a { color: rgba(255,255,255,0.75); }
</style>
</head>

 <div class="controls">

      <div class="row2" id="kbd-mods"></div>

<script>
/* ---------- translations ---------- */
const T = {
  en: { titleWord:"TRANSLATOR", scr1:"Type the card's name", scr2:"with the keyboard below.",
        inputPh:"Tap the symbols on the card…", go:"Identify ▸", clear:"Clear",
        hint:"No need to match the symbol size: it identifies even if you mix up ツ/ッ or a ゛/゜. The correct spelling shows on screen.",
        loading:"Searching the Pokédex", errRead:"ERROR: couldn't read.<br>Try again.",
        noMatch:"No match.", fixed:"✓ correct spelling above", langName:"English" },
  es: { titleWord:"TRADUCTOR", scr1:"Escribe el nombre de la carta", scr2:"con el teclado de abajo.",
        inputPh:"Toca los símbolos de la carta…", go:"Identificar ▸", clear:"Borrar",
        hint:"No hace falta acertar el tamaño del símbolo: identifica aunque confundas ツ/ッ o un ゛/゜. La grafía correcta aparece en pantalla.",
        loading:"Consultando la Pokédex", errRead:"ERROR: no se pudo leer.<br>Inténtalo de nuevo.",
        noMatch:"Sin coincidencia.", fixed:"✓ grafía correcta arriba", langName:"Spanish (Español)" },
  pt: { titleWord:"TRADUTOR", scr1:"Escreve o nome da carta", scr2:"com o teclado abaixo.",
        inputPh:"Toca nos símbolos da carta…", go:"Identificar ▸", clear:"Limpar",
        hint:"Não precisas de acertar no tamanho do símbolo: identifica mesmo que troques ツ/ッ ou um ゛/゜. A grafia correta aparece no ecrã.",
        loading:"A consultar a Pokédex", errRead:"ERRO: não foi possível ler.<br>Tenta novamente.",
        noMatch:"Sem correspondência.", fixed:"✓ grafia correta acima", langName:"Portuguese (Português)" },
  fr: { titleWord:"TRADUCTEUR", scr1:"Écris le nom de la carte", scr2:"avec le clavier ci-dessous.",
        inputPh:"Touche les symboles de la carte…", go:"Identifier ▸", clear:"Effacer",
        hint:"Pas besoin de respecter la taille du symbole : il identifie même si tu confonds ツ/ッ ou un ゛/゜. L'orthographe correcte s'affiche à l'écran.",
        loading:"Consultation du Pokédex", errRead:"ERREUR : lecture impossible.<br>Réessaie.",
        noMatch:"Aucune correspondance.", fixed:"✓ orthographe correcte ci-dessus", langName:"French (Français)" },
  it: { titleWord:"TRADUTTORE", scr1:"Scrivi il nome della carta", scr2:"con la tastiera qui sotto.",
        inputPh:"Tocca i simboli della carta…", go:"Identifica ▸", clear:"Cancella",
        hint:"Non devi indovinare la dimensione del simbolo: identifica anche se confondi ツ/ッ o un ゛/゜. La grafia corretta appare sullo schermo.",
        loading:"Consulto del Pokédex", errRead:"ERRORE: lettura impossibile.<br>Riprova.",
        noMatch:"Nessuna corrispondenza.", fixed:"✓ grafia corretta sopra", langName:"Italian (Italiano)" },
  jp: { titleWord:"翻訳", scr1:"下のキーボードで", scr2:"カードの名前を入力。",
        inputPh:"カードの文字をタップ…", go:"識別 ▸", clear:"クリア",
        hint:"文字の大小は気にしなくてOK。ツ/ッ や ゛/゜ を間違えても識別します。正しい表記は画面に表示されます。",
        loading:"ポケモン図鑑を検索中", errRead:"エラー：読み取れません。<br>もう一度お試しください。",
        noMatch:"一致なし。", fixed:"✓ 上が正しい表記", langName:"Japanese (日本語)" }
};
const LANGS = [['en','EN'],['es','ESP'],['pt','PT'],['fr','FR'],['it','IT'],['jp','JP']];
let lang = 'en';

/* ---------- kana data ---------- */
const GRID = [
  'ア','イ','ウ','エ','オ','カ','キ','ク','ケ','コ','サ','シ','ス','セ','ソ',
  'タ','チ','ツ','テ','ト','ナ','ニ','ヌ','ネ','ノ','ハ','ヒ','フ','ヘ','ホ',
  'マ','ミ','ム','メ','モ','ヤ',null,'ユ',null,'ヨ','ラ','リ','ル','レ','ロ',
  'ワ',null,'ヲ',null,'ン'
];
const DAKUTEN={カ:'ガ',キ:'ギ',ク:'グ',ケ:'ゲ',コ:'ゴ',サ:'ザ',シ:'ジ',ス:'ズ',セ:'ゼ',ソ:'ゾ',タ:'ダ',チ:'ヂ',ツ:'ヅ',テ:'デ',ト:'ド',ハ:'バ',ヒ:'ビ',フ:'ブ',ヘ:'ベ',ホ:'ボ',ウ:'ヴ'};
const HANDAKU={ハ:'パ',ヒ:'ピ',フ:'プ',ヘ:'ペ',ホ:'ポ'};
const SMALL={ア:'ァ',イ:'ィ',ウ:'ゥ',エ:'ェ',オ:'ォ',ヤ:'ャ',ユ:'ュ',ヨ:'ョ',ツ:'ッ',ワ:'ヮ'};

let mode='kata', buffer='', showingPlaceholder=true;

const screen=document.getElementById('screen'), inputbox=document.getElementById('inputbox');
const kbd=document.getElementById('kbd'), mods=document.getElementById('kbd-mods');
const go=document.getElementById('go'), langbar=document.getElementById('langbar');

function toHira(s){ return s.replace(/[\u30A1-\u30F6]/g, ch=>String.fromCharCode(ch.charCodeAt(0)-0x60)); }
function display(s){ return mode==='hira'?toHira(s):s; }

function renderInput(){
  if(!buffer){ inputbox.innerHTML='<span class="ph">'+T[lang].inputPh+'</span><span class="caret"></span>'; }
  else { inputbox.innerHTML=display(buffer)+'<span class="caret"></span>'; }
}
function insert(ch){ buffer+=ch; renderInput(); }
function applyMod(map){ if(!buffer)return; const last=buffer.slice(-1); if(map[last]) buffer=buffer.slice(0,-1)+map[last]; renderInput(); }
function backspace(){ buffer=buffer.slice(0,-1); renderInput(); }
function esc(s){ return String(s ?? '').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

function showPlaceholder(){
  showingPlaceholder=true; const t=T[lang];
  screen.innerHTML='<div class="placeholder">'+t.scr1+'<br>'+t.scr2+'<br><span class="blink">▋</span></div>';
}

/* keyboard build */
GRID.forEach(ch=>{ const b=document.createElement('button'); b.className='key'+(ch?'':' empty'); if(ch){ b.textContent=ch; b.onclick=()=>insert(ch);} kbd.appendChild(b); });
const modDefs=[
  {label:'゛',cls:'mod',fn:()=>applyMod(DAKUTEN)},
  {label:'゜',cls:'mod',fn:()=>applyMod(HANDAKU)},
  {label:'ー',cls:'',fn:()=>insert('ー')},
  {label:'⌫',cls:'del',fn:backspace},
];
modDefs.forEach(m=>{ const b=document.createElement('button'); b.className='key '+m.cls; b.textContent=m.label; b.onclick=m.fn; mods.appendChild(b); });

/* mode tabs */
document.querySelectorAll('.tab').forEach(t=>{ t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
  mode=t.dataset.mode;
  [...kbd.children].forEach((b,i)=>{ if(GRID[i]) b.textContent=display(GRID[i]); });
  renderInput();
};});

/* language bar build */
LANGS.forEach(([code,label])=>{
  const b=document.createElement('button'); b.className='lang'+(code===lang?' active':''); b.textContent=label;
  b.onclick=()=>{ lang=code; document.querySelectorAll('.lang').forEach(x=>x.classList.remove('active')); b.classList.add('active'); applyLang(); };
  langbar.appendChild(b);
});

function applyLang(){
  const t=T[lang];
  document.getElementById('title').innerHTML='POKéDEX<br>'+t.titleWord;
  go.textContent=t.go;
  document.getElementById('clear').textContent=t.clear;
  document.getElementById('hint').innerHTML=t.hint;
  renderInput();
  if(showingPlaceholder) showPlaceholder();
}

document.getElementById('clear').onclick=()=>{ buffer=''; renderInput(); showPlaceholder(); };
go.onclick=identify;

s to shatter them and then carries on digging.","es":"Excava madrigueras profundas en las que vive. Parte con sus afiladas garras cualquier roca, por dura que sea, que le entorpezca el camino.","fr":"Il creuse le sol pour construire sa tanière. Rien n’arrête ses griffes acérées, pas même la roche la plus solide.","it":"Scava nel terreno per costruire la sua tana, frantumando anche le rocce più dure con i suoi artigli affilati.","ja":"じめんを ほって すあなを つくる。 ちちゅうの かたい いわも するどい ツメで くだいて ほりすすむぞ。"},"h":6,"w":120},{"n":28,"ja":"サンドパン","r":"Sandpan","en":"Sandslash","es":"Sandslash","fr":"Sablaireau","it":"Sandslash","pt":"","g":1,"t":[5],"cat":{"en":"Mouse Pokémon","es":"Pokémon Ratón","fr":"Pokémon Souris","it":"Pokémon Topo","ja":"ねずみポケモン"},"desc":{"en":"It climbs trees by hooking on with its sharp claws. Sandslash shares the berries it gathers, dropping them down to Sandshrew waiting below the tree.","es":"Trepa a los árboles con sus afiladas garras y deja caer bayas para los Sandshrew que esperan debajo.","fr":"Il grimpe aux arbres grâce à ses griffes acérées et fait tomber des Baies pour les Sabelette qui attendent au sol.","it":"Si arrampica sugli alberi utilizzando i suoi artigli affilati per poi condividere le bacche che trova con i Sandshrew, che aspettano sotto.","ja":"するどい ツメを ひっかけて きを のぼる。 したで まつ サンドたちに きのみを おとし わけあたえるのだ。"},"h":10,"w":295},{"n":29,"ja":"ニドラン♀","r":"Nidoran♀","en":"Nidoran♀","es":"Nidoran♀","fr":"Nidoran♀","it":"Nidoran♀","pt":"","g":1,"t":[4],"cat":{"en":"Poison Pin Pokémon","es":"Pokémon Pin Veneno","fr":"Pokémon Vénépic","it":"Pokémon Velenago","ja":"どくばりポケモン"},"desc":{"en":"It uses its hard incisor teeth to crush and eat berries. The tip of a female Nidoran’s horn is a bit more rounded than the tip of a male’s horn.","es":"Parte las bayas con sus duros incisivos para comérselas. La punta del cuerno de las hembras es más redondeada que la de los machos.","fr":"Ce Pokémon se nourrit de Baies en les ouvrant avec ses incisives. Le bout de sa corne attle, making use of its thick tail and diamond-crushing horn.","es":"Presume de su hercúlea fuerza y combate vigorosamente con su robusta cola y su cuerno, con el que hasta puede pulverizar diamantes.","fr":"Très fier de sa force, il se bat vigoureusement à l’aide de sa queue robuste et de sa corne capable de briser le diamant.","it":"Si dà vanto della propria forza e lotta con vigore sfruttando la coda robusta e il corno in grado di frantumare il diamante.","ja":"ちからじまんの ポケモン。 ふとい しっぽと ダイヤをも くだく ツノを くしして ごうかいに たたかう。"},"h":14,"w":620},{"n":35,"ja":"ピッピ","r":"Pippi","en":"Clefairy","es":"Clefairy","fr":"Mélofée","it":"Clefairy","pt":"","g":1,"t":[18],"cat":{"en":"Fairy Pokémon","es":"Pokémon Hada","fr":"Pokémon Fée","it":"Pokémon Fata","ja":"ようせいポケモン"},"desc":{"en":"It can be found in quiet mountain areas on a full moon's night. Its dancing and its tiny, faintly glowing wings confer upon it a lovely fairylike quality.","es":"Su adorable grito y comportamiento lo hacen muy popular. Sin embargo, raramente se avista.","fr":"Son comportement et son cri adorables font de lui un Pokémon très populaire. Malheureusement, il est difficile d’en croiser un spécimen.","it":"Il suo verso e le sue movenze graziose rendono questo adorabile Pokémon molto popolare. Sfortunatamente, però, è molto raro.","ja":"あいくるしい しぐさと なきごえで かわいいと だいにんきの ポケモン。 だが めったに みつからない。"},"h":6,"w":75},{"n":36,"ja":"ピクシー","r":"Pixy","en":"Clefable","es":"Clefable","fr":"Mélodelfe","it":"Clefable","pt":"","g":1,"t":[18],"cat":{"en":"Fairy Pokémon","es":"Pokémon Hada","fr":"Pokémon Fée","it":"Pokémon Fata","ja":"ようせいポケモン"},"desc":{"en":"Legend says that on clear, quiet nights, it listens for the voices of its kin living on the moon. I, too, often think of my homeland, so far away.","es":"Su oído es tan fino que puede percibir cómo cae una aguja a 1 km de distancia. Por eso suele habitar en lugares tranquilos.","fr":"Capable d’entendre une aiguille tomber à plus d’un kilomètre, ce Pokémon préfère les endroits calmes et isolés.","it":"Il loro udito è così acuto che sentono un ago cadere a 1 km di distanza. Per questo di solito vivono in luoghi molto silenziosi.","ja":"１キロさきに おちた はりの おとも きこえるほど みみが いいので ふだんは しずかな ところに いる。"},"h":13,"w":400},{"n":37,"ja":"ロコン","r":"Rokon","en":"Vulpix","es":"Vulpix","fr":"Goupix","it":"Vulpix","pt":"","g":1,"t":[10],"cat":{"en":"Fox Pokémon","es":"Pokémon Zorro","fr":"Pokémon Renard","it":"Pokémon Volpe","ja":"きつねポケモン"},"desc":{"en":"In its belly burns a fire, which Vulpix spits out in the form of fireballs. When young, this Pokémon has but one white tail. As the Pokémon matures, this single tail splits into six.","es":"Su pelaje se va volviendo más suave, lustroso y bello a medida que le crecen las seis colas. Al abrazarlo, emana una ligera calidez.","fr":"Avec l’âge, la fourrure de ses six queues devient de plus en plus belle et soyeuse. Elle est chaude au toucher.","it":"Man mano che cresce, le sue sei code diventano sempre più belle. La pelliccia di cui sono ricoperte è calda al tatto.","ja":"６ぽんの しっぽは そだつごとに けなみが よくなり うつくしくなる。 だきしめると ほんのり あたたかい。"},"h":6,"w":99},{"n":38,"ja":"キュウコン","r":"Kyukon","en":"Ninetales","es":"Ninetales","fr":"Feunard","it":"Ninetales","pt":"","g":1,"t":[10],"cat":{"en":"Fox Pokémon","es":"Pokémon Zorro","fr":"Pokémon Renard","it":"Pokémon Volpe","ja":"きつねポケモン"},"desc":{"en":"The coat of gleaming golden fur is quite magnificent. This species is said to store sacred power in its nine long tails and to live for a millennium.","es":"Muy inteligente y vengativo. Agarrar una de sus colas podría traer 1000 años de mala suerte.","fr":"Il est très intelligent et rancunier. Quiconque attrape une de ses queues se fera maudire pour 1 000 ans.","it":"Molto intelligente e vendicativo. Chi gli afferra una coda rischia una maledizione millenaria.","ja":"あたまがよくて しゅうねんぶかい。 ふざけて しっぽを つかむと １０００ねん たたられるという。"},"h":11,"w":199},{"n":39,"ja":"プリン","r":"Purin","en":"Jigglypuff","es":"Jigglypuff","fr":"Rondoudou","it":"Jigglypuff","pt":""," mits from its mouth as it flies.","es":"Habitan en cuevas donde no llegan los rayos del sol. De día, se acurrucan unos junto a otros para entrar en calor mientras duermen.","fr":"Ils vivent dans les grottes où la lumière du jour ne perce jamais. Le matin, ils se blottissent les uns contre les autres pour se réchauffer et dormir.","it":"Vive in grotte mai rischiarate dalla luce del sole. Quando si fa giorno, si raggruppa con i suoi simili per scaldarsi mentre dorme.","ja":"ひの あたらない どうくつに すむ。 あさになると なかまで あつまり からだを あたためあいながら ねる。"},"h":8,"w":75},{"n":42,"ja":"ゴルバット","r":"Golbat","en":"Golbat","es":"Golbat","fr":"Nosferalto","it":"Golbat","pt":"","g":1,"t":[4,3],"cat":{"en":"Bat Pokémon","es":"Pokémon Murciélago","fr":"Pokémon Chovsouris","it":"Pokémon Pipistrello","ja":"こうもりポケモン"},"desc":{"en":"It sinks its sharp fangs into other creatures and slurps up their blood. A closer look at the fangs reveals that they are hollow and akin to straws.","es":"Camina con soltura sobre sus pequeñas patas. Se acerca con sigilo a su presa mientras esta duerme y le clava los colmillos para chuparle la sangre.","fr":"Il se déplace habilement sur ses petites pattes, s’approche silencieusement de sa proie endormie, et lui suce le sang à l’aide de ses crocs.","it":"Cammina agilmente con i piccoli piedi. Si avvicina di soppiatto alle prede addormentate per azzannarle e berne il sangue.","ja":"ちいさな あしで きように あるく。 ねている エモノに しのびより キバを つきたて ちを すするのだ。"},"h":16,"w":550},{"n":43,"ja":"ナゾノクサ","r":"Nazonokusa","en":"Oddish","es":"Oddish","fr":"Mystherbe","it":"Oddish","pt":"","g":1,"t":[12,4],"cat":{"en":"Weed Pokémon","es":"Pokémon Hierbajo","fr":"Pokémon Racine","it":"Pokémon Malerba","ja":"ざっそうポケモン"},"desc":{"en":"During the day, it stays in the cold underground to avoid the sun. It grows by bathing in moonlight.","es":"Durante el día, se agazapa en el frío subsuelo huyendo del sol. La luz de la luna le hace crecer.","fr":"Pendant la journée, il reste en sous-sol et évite le soleil. Il grandit en se baignant au clair de lune.","it":"Di giorno vive nel freddo sottosuolo per evitare la luce del sole. Cresce assorbendo la luce lunare.","ja":"ひるまは たいようを さけるため つめたい じめんに もぐっている。 つきのひかりを あびて そだつ。"},"h":5,"w":54},{"n":44,"ja":"クサイハナ","r":"Kusaihana","en":"Gloom","es":"Gloom","fr":"Ortide","it":"Gloom","pt":"","g":1,"t":[12,4],"cat":{"en":"Weed Pokémon","es":"Pokémon Hierbajo","fr":"Pokémon Racine","it":"Pokémon Malerba","ja":"ざっそうポケモン"},"desc":{"en":"What appears to be drool is actually sweet honey. It is very sticky and clings stubbornly if touched.","es":"Lo que parece baba es realmente un néctar muy pegajoso que se adhiere sin remisión al tocarlo.","fr":"Ce qui semble être sa bave est en fait du nectar très collant. Si on le touche, il est très difficile de s’en dépêtrer.","it":"Ciò che sembra bava è in realtà dolce nettare. È molto viscoso: si appiccica appena lo si sfiora.","ja":"よだれのように みえる あまいミツ。 とても ねばねば しており ふれると いつまでも まとわりつく。"},"h":8,"w":86},{"n":45,"ja":"ラフレシア","r":"Ruffresia","en":"Vileplume","es":"Vileplume","fr":"Rafflesia","it":"Vileplume","pt":"","g":1,"t":[12,4],"cat":{"en":"Flower Pokémon","es":"Pokémon Flor","fr":"Pokémon Fleur","it":"Pokémon Fiore","ja":"フラワーポケモン"},"desc":{"en":"The larger its petals, the more toxic pollen it contains. Its big head is heavy and hard to hold up.","es":"Cuanto mayores son sus pétalos, más tóxico es su polen. Le pesa la cabeza y le cuesta mantenerla erguida.","fr":"Plus ses pétales sont grands, plus il produit de pollen toxique. Toutefois, le poids de sa tête le fatigue.","it":"Più grandi sono i petali, maggiore è la quantità di polline tossico che contengono. La testa, però, diventa molto pesante e fa fatica a sostenerla.","ja":"はなびらが おおきいほど たくさん かふんを だすが あたまが おもたくて つかれてしまうという。"},"h":12,"w":186},{"n":46,"ja":"パラス","r":"Paras","en":"Paras","es":"Paras","fr":"Paras","it":"Paras","pt":"","g":1,"t":[7,12],"cat":{"en":"Mushroom Pokémon","es":"Pokémon Hongo","fr":"Pokémon Champignon","it":"Pokémon Fungo","ja":"きのこポケモン"}," minutos.","fr":"Ses grands yeux lui servent de radar. En pleine lumière, on peut y distinguer des facettes.","it":"Gli occhi enormi fungono da radar. Alla luce si può notare che sono formati da molti occhi più piccoli.","ja":"レーダーになる おおきな めは あかるいところでは ちいさな めが あつまって できているのが わかる。"},"h":10,"w":300},{"n":49,"ja":"モルフォン","r":"Morphon","en":"Venomoth","es":"Venomoth","fr":"Aéromite","it":"Venomoth","pt":"","g":1,"t":[7,4],"cat":{"en":"Poison Moth Pokémon","es":"Pokémon Polilla Ven.","fr":"Pokémon Papipoison","it":"Pokémon Velentarma","ja":"どくがポケモン"},"desc":{"en":"The powdery scales on its wings are hard to remove from skin. They also contain poison that leaks out on contact.","es":"Las alas desprenden un polvillo de escamas impregnado de toxinas que se adhiere al contacto y resulta difícil de quitar.","fr":"Les écailles de ses ailes sont presque impossibles à retirer lorsqu’elles se collent à la peau, et elles libèrent un poison violent au contact.","it":"Se si attaccano alla pelle, le scaglie che ricoprono le sue ali sono difficili da togliere. Inoltre, rilasciano una sostanza velenosa.","ja":"ハネの りんぷんは からだにつくと なかなか とれない。しかも そこから どくの せいぶんが しみこんでくる。"},"h":15,"w":125},{"n":50,"ja":"ディグダ","r":"Digda","en":"Diglett","es":"Diglett","fr":"Taupiqueur","it":"Diglett","pt":"","g":1,"t":[5],"cat":{"en":"Mole Pokémon","es":"Pokémon Topo","fr":"Pokémon Taupe","it":"Pokémon Talpa","ja":"もぐらポケモン"},"desc":{"en":"It burrows through the ground at a shallow depth. It leaves raised earth in its wake, making it easy to spot.","es":"Este Pokémon avanza horadando la tierra a poca profundidad. Resulta fácil localizarlo por los montículos que deja como rastro.","fr":"Ce Pokémon creuse sous terre à faible profondeur. La terre qu’il laisse dans son sillage le rend facile à repérer.","it":"Scava buche a bassa profondità. La terra sollevata che lascia al suo passaggio lo rende facilmente individuabile.","ja":"ちちゅうの あさいところを いどう。 ほりすすんだあとは じめんが もりあがっているので すぐわかる。"},"h":2,"w":8},{"n":51,"ja":"ダグトリオ","r":"Dugtrio","en":"Dugtrio","es":"Dugtrio","fr":"Triopikeur","it":"Dugtrio","pt":"","g":1,"t":[5],"cat":{"en":"Mole Pokémon","es":"Pokémon Topo","fr":"Pokémon Taupe","it":"Pokémon Talpa","ja":"もぐらポケモン"},"desc":{"en":"These Diglett triplets dig over 60 miles below sea level. No one knows what it’s like underground.","es":"Estos trillizos cavan a una profundidad de hasta 100 km. Se desconoce el aspecto de la parte de sus cuerpos que se oculta bajo tierra.","fr":"Ce trio de Taupiqueur est capable de creuser jusqu’à 100 km sous terre, vers l’inconnu.","it":"Questo trio di Diglett può scavare fino a 100 km di profondità. Nessuno ha mai visto la parte nascosta sotto terra.","ja":"ちか１００キロまで ほりすすむ パワーをひめた みつごの ディグダ。 じめんのしたは だれも しらない。"},"h":7,"w":333},{"n":52,"ja":"ニャース","r":"Nyarth","en":"Meowth","es":"Meowth","fr":"Miaouss","it":"Meowth","pt":"","g":1,"t":[1],"cat":{"en":"Scratch Cat Pokémon","es":"Pokémon Gato Araña","fr":"Pokémon Chadégout","it":"Pokémon Graffimiao","ja":"ばけねこポケモン"},"desc":{"en":"It washes its face regularly to keep the coin on its forehead spotless. It doesn’t get along with Galarian Meowth.","es":"Se lava cuidadosamente la cara para que no se le ensucie la moneda de oro que tiene en la frente. No se lleva nada bien con los Meowth de Galar.","fr":"Tatillon sur la propreté de la pièce sur son front, il se lave la figure avec grand soin. Il ne s’entend pas avec les Miaouss de Galar.","it":"Si lava regolarmente il muso per tenere pulita la moneta sulla fronte. Non va d’accordo con il Meowth di Galar.","ja":"ひたいの こばんが よごれないよう まめに かおを あらう。 ガラルの ニャースとは なかが わるい。"},"h":4,"w":42},{"n":53,"ja":"ペルシアン","r":"Persian","en":"Persian","es":"Persian","fr":"Persian","it":"Persian","pt":"","g":1,"t":[1],"cat":{"en":"Classy Cat Pokémon","es":"Pokémon Gato Fino","fr":"Pokémon Chadeville","it":"Pokémon Nobilgatto","ja":"シャムネコポケモン"},"desc":{"en":"Its elegant and refined behavior clashes with that of the barbaric Perrserker. The relationship between the two is one of mutual disdain.","es":"Hace gala de un porte elegante y majestuoso. No congenia con los toscos Perrserker y ambos se profesan un mutuo desprecio.","fr":"Il se comporte avec grâce et élégance, et ne s’entend pas avec les rustres Berserkatt : les deux espèces se méprisent.","it":"Ha un portamento elegante e distinto. Non gli va a genio la rozzezza di Perrserker e i due Pokémon si disprezzano a vicenda.","ja":"ゆうがで じょうひんな みのこなし。 やばんな ニャイキングとは そりが あわず おたがいを みくだしている。"},"h":10,"w":320},{"n":54,"ja":"コダック","r":"Koduck","en":"Psyduck","es":"Psyduck","fr":"Psykokwak","it":"Psyduck","pt":"","g":1,"t":[11],"cat":{"en":"Duck Pokémon","es":"Pokémon Pato","fr":"Pokémon Canard","it":"Pokémon Papero","ja":"あひるポケモン"},"desc":{"en":"Suffers perpetual headaches. If the agony grows too great, Psyduck's latent power erupts, contrary to Psyduck's intent. Ergo, I am exploring ways to ease the pain.","es":"Sus dolores de cabeza empeoran a medida que aumenta su nivel de estrés. Su increíble poder psíquico puede causar estragos a su alrededor.","fr":"Sa migraine s’intensifie à mesure que son stress monte. Il libère une force psychique puissante qui terrasse tous ceux qui l’entourent.","it":"Più è stressato, più il suo mal di testa si fa intenso. Con i suoi incredibili poteri psicocinetici travolge chiunque nelle vicinanze.","ja":"ストレスが たまると ずつうが エスカレート。 きょうりょくな ねんりきで まわりを あっとうする。"},"h":8,"w":196},{"n":55,"ja":"ゴルダック","r":"Golduck","en":"Golduck","es":"Golduck","fr":"Akwakwak","it":"Golduck","pt":"","g":1,"t":[11],"cat":{"en":"Duck Pokémon","es":"Pokémon Pato","fr":"Pokémon Canard","it":"Pokémon Papero","ja":"あひるポケモン"},"desc":{"en":"Its body is strong, and it has webbing on its hands and feet. Golduck can swim easily through rough seas, clawing its way through the high waves.","es":"Cuenta una antigua leyenda que los Golduck arrastraban a quienes contaminaran sus ríos al fondo de las aguas.","fr":"D’après de vieilles légendes, ce Pokémon entraînait au fond de l’eau tous ceux qui osaient souiller sa rivière.","it":"Secondo antichi racconti, Golduck trascina in acqua gli esseri umani che inquinano il fiume portandoli via con sé.","ja":"かわを よごした にんげんを すいちゅうに ひきこみ つれさる むかしばなしが のこされている。"},"h":17,"w":766},{"n":56,"ja":"マンキー","r":"Mankey","en":"Mankey","es":"Mankey","fr":"Férosinge","it":"Mankey","pt":"","g":1,"t":[2],"cat":{"en":"Pig Monkey Pokémon","es":"Pokémon Mono Cerdo","fr":"Pokémon Porsinge","it":"Pokémon Suinpanzé","ja":"ぶたざるポケモン"},"desc":{"en":"An agile Pokémon that lives in trees. It angers easily and will not hesitate to attack anything.","es":"Este ágil Pokémon vive en los árboles. Se enfada con facilidad y, cuando lo hace, se abalanza contra todo lo que se encuentre a su alrededor.","fr":"Agile et rapide, ce Pokémon vit dans les arbres. Il s’énerve facilement et s’attaque à tout ce qui bouge quand il est en colère.","it":"Un Pokémon agile che vive sugli alberi. È molto irascibile e non esita ad attaccare chiunque gli capiti a tiro.","ja":"みがるで きのうえで せいかつする。 ふとしたことで きげんが わるくなり まわりに いるものに とびかかる。"},"h":5,"w":280},{"n":57,"ja":"オコリザル","r":"Okorizaru","en":"Primeape","es":"Primeape","fr":"Colossinge","it":"Primeape","pt":"","g":1,"t":[2],"cat":{"en":"Pig Monkey Pokémon","es":"Pokémon Mono Cerdo","fr":"Pokémon Porsinge","it":"Pokémon Suinpanzé","ja":"ぶたざるポケモン"},"desc":{"en":"It stops being angry only when nobody else is around. To view this moment is very difficult.","es":"Solo se calma cuando no hay nadie cerca, por lo que llegar a ver ese momento resulta verdaderamente difícil.","fr":"Sa fureur prend fin quand il n’a plus personne à frapper. Il est difficile d’en être témoin.","it":"È molto difficile vedere questo Pokémon calmo, dato che la sua furia si placa solamente quando si trova nella solitudine più assoluta.","ja":"まわりに だれも いないときだけは おこるのを やめている。しかし それをみるのは むずかしい。"},"h":10,"w":320},{"n":58,"ja":"ガーディ","r":"Gardie","en":"Growlithe","es":"Growlithe","fr":"Caninos","it":"Growlithe","pt":"","g":1,"t":[10],"cat":{"en":"Puppy Pokémon","es":"Pokémon Perrito","f ed mother. Sometimes Cubone’s dreams make it cry, but each tear Cubone sheds makes it stronger.","es":"Lleva puesto el cráneo de su difunta madre. A veces llora en sueños, pero cada lágrima vertida le hace más fuerte.","fr":"Il porte sur sa tête le crâne de sa défunte mère. Il lui arrive de rêver d’elle et de pleurer, mais chaque larme qu’il verse le rend plus fort.","it":"Indossa il teschio della madre defunta. A volte capita che pianga vedendola in sogno, ma a ogni lacrima versata diventa più forte.","ja":"しんだ ははおやの ホネを かぶる。 ゆめを みて なくことも あるけれど なみだを ながすたびに つよくなる。"},"h":4,"w":65},{"n":105,"ja":"ガラガラ","r":"Garagara","en":"Marowak","es":"Marowak","fr":"Ossatueur","it":"Marowak","pt":"","g":1,"t":[5],"cat":{"en":"Bone Keeper Pokémon","es":"Pokémon Apilahueso","fr":"Pokémon Gard’Os","it":"Pokémon Guardaossi","ja":"ほねずきポケモン"},"desc":{"en":"When this Pokémon evolved, the skull of its mother fused to it. Marowak’s temperament also turned vicious at the same time.","es":"Al evolucionar, se ha fusionado con el cráneo de su madre y, además, ha adquirido un carácter agresivo.","fr":"En évoluant, il est devenu violent, et le crâne de sa mère qu’il portait a fusionné avec sa tête.","it":"Evolvendosi è diventato tutt’uno con il teschio della madre che prima indossava e ha acquisito un temperamento violento.","ja":"しんかして かぶっていた ははおやの ホネが いったいかして そのうえ きょうぼうな せいかくに かわった。"},"h":10,"w":450},{"n":106,"ja":"サワムラー","r":"Sawamular","en":"Hitmonlee","es":"Hitmonlee","fr":"Kicklee","it":"Hitmonlee","pt":"","g":1,"t":[2],"cat":{"en":"Kicking Pokémon","es":"Pokémon Patada","fr":"Pokémon Latteur","it":"Pokémon Tiracalci","ja":"キックポケモン"},"desc":{"en":"The legs freely contract and stretch. The stretchy legs allow it to hit a distant foe with a rising kick.","es":"Encoge y estira las piernas a su antojo. De hecho, hasta puede propinar una patada a un rival que se encuentre lejos.","fr":"Kicklee peut rétracter et étendre ses jambes à sa guise. La formidable allonge dont il dispose lui permet de frapper des adversaires éloignés.","it":"Può accorciare o allungare le gambe a piacere. In questo modo riesce a colpire con i calci anche gli avversari distanti.","ja":"あしが じゆうに のびちぢみして とおく はなれている ばあいでも あいてを けりあげることが できる。"},"h":15,"w":498},{"n":107,"ja":"エビワラー","r":"Ebiwalar","en":"Hitmonchan","es":"Hitmonchan","fr":"Tygnon","it":"Hitmonchan","pt":"","g":1,"t":[2],"cat":{"en":"Punching Pokémon","es":"Pokémon Puñetazo","fr":"Pokémon Puncheur","it":"Pokémon Tirapugni","ja":"パンチポケモン"},"desc":{"en":"Its punches slice the air. However, it seems to need a short break after fighting for three minutes.","es":"Sus puñetazos son capaces incluso de cortar el aire, aunque parece necesitar un descanso tras estar luchando durante 3 min.","fr":"Ses poings fendent l’air, mais il se fatigue au bout de trois minutes à enchaîner les coups.","it":"Fende l’aria con i suoi pugni. Tuttavia, dopo tre minuti di lotta deve riprendere fiato.","ja":"くうきをも きりさく パンチ。 だが ３ぷんかん こうげきすると ひとやすみ したくなるらしい。"},"h":14,"w":502},{"n":108,"ja":"ベロリンガ","r":"Beroringa","en":"Lickitung","es":"Lickitung","fr":"Excelangue","it":"Lickitung","pt":"","g":1,"t":[1],"cat":{"en":"Licking Pokémon","es":"Pokémon Lametazo","fr":"Pokémon Lécheur","it":"Pokémon Linguaccia","ja":"なめまわしポケモン"},"desc":{"en":"Wields its long tongue deftly, as though it were an arm. The Pokémon's viscous saliva, once it has been collected and boiled down, yields a strong and highly useful adhesive.","es":"Se nutre principalmente de Pokémon insecto, a los que paraliza primero lamiéndolos con su larga lengua y luego engulle de un bocado.","fr":"Excelangue se nourrit essentiellement de Pokémon Insecte. Il lèche ses ennemis avec sa longue langue pour les paralyser, puis les avale tout rond.","it":"Si nutre principalmente di Pokémon Coleottero. Paralizza le prede leccandole con la lunga lingua e le inghiotte in un boccone.","ja":"むしポケモンが おもな エサ。 ながい したで あいてを なめて しびれた ところを まるのみにする。"},"h":12,"w":655},{"n":109,"ja":"ドガース","r":"Dogars","en":"Koffing","es":"Koffing","fr":"Smogo","it":"Koffing","pt":"","g":1,"t":[4],"cat":{"en":"Poison Gas Pokémon","es":"Pokémon Gas Venenoso","fr":"Pokémon Gaz Mortel","it":"Pokémon Velenuvola","ja":"どくガスポケモン"},"desc":{"en":"It adores polluted air. Some claim that Koffing used to be more plentiful in the Galar region than they are now.","es":"Se nutre de aire contaminado. Al parecer, antaño eran mucho más numerosos en Galar.","fr":"On raconte qu’il y a longtemps, ces Pokémon amateurs d’air pollué étaient beaucoup plus nombreux à Galar.","it":"È ghiotto di aria inquinata. Si dice che in passato a Galar ci fossero molti più Koffing rispetto a ora.","ja":"きたない くうきが ごちそう。 むかしの ガラルちほうには いまより たくさんの ドガースが いたという。"},"h":6,"w":10},{"n":110,"ja":"マタドガス","r":"Matadogas","en":"Weezing","es":"Weezing","fr":"Smogogo","it":"Weezing","pt":"","g":1,"t":[4],"cat":{"en":"Poison Gas Pokémon","es":"Pokémon Gas Venenoso","fr":"Pokémon Gaz Mortel","it":"Pokémon Velenuvola","ja":"どくガスポケモン"},"desc":{"en":"It can’t suck in air quite as well as a Galarian Weezing, but the toxins it creates are more potent than those of its counterpart.","es":"Posee una capacidad de succión inferior a la del Weezing de Galar, pero las toxinas que genera son más potentes.","fr":"Il ne peut pas aspirer autant d’air que le Smogogo de Galar, mais le poison qu’il produit est plus puissant.","it":"La sua capacità di aspirare l’aria è leggermente inferiore rispetto al Weezing di Galar, ma è in grado di produrre tossine molto potenti.","ja":"ガラルの マタドガスよりも くうきを すいこむ ちからは すこし よわいが つくりだす どくそは きょうりょく。"},"h":12,"w":95},{"n":111,"ja":"サイホーン","r":"Sihorn","en":"Rhyhorn","es":"Rhyhorn","fr":"Rhinocorne","it":"Rhyhorn","pt":"","g":1,"t":[5,6],"cat":{"en":"Spikes Pokémon","es":"Pokémon Clavos","fr":"Pokémon Piquant","it":"Pokémon Punzoni","ja":"とげとげポケモン"},"desc":{"en":"Ludicrously strong—when it butts heads with a mountain, it is the mountain that shatters. But its short legs struggle with turns, and it is incapable of stopping unless it collides with something.","es":"La cabeza no le da para retener más de una cosa. Si se pone a correr, se le olvida al instante por qué empezó a hacerlo.","fr":"Il ne peut se souvenir que d’une chose à la fois. S’il se met à courir, il en oublie tout de suite la raison.","it":"Non è in grado di ricordare più di una cosa alla volta. Quando parte alla carica ne dimentica subito il motivo.","ja":"ひとつの ことしか おぼえられない。 とっしんを はじめると りゆうは どうでもよくなり すぐに わすれる。"},"h":10,"w":1150},{"n":112,"ja":"サイドン","r":"Sidon","en":"Rhydon","es":"Rhydon","fr":"Rhinoféros","it":"Rhydon","pt":"","g":1,"t":[5,6],"cat":{"en":"Drill Pokémon","es":"Pokémon Taladro","fr":"Pokémon Perceur","it":"Pokémon Trapano","ja":"ドリルポケモン"},"desc":{"en":"Rapidly rotates its horn to bore through bedrock. It swaggers around volcanic regions, protected from the lava's heat by its tough, armorlike hide.","es":"La piel le sirve de escudo protector. Puede vivir en lava líquida a 2000 °C.","fr":"Son épiderme est si épais qu’il lui permet même de survivre dans du magma d’une température de 2 000 °C.","it":"La sua pelle, simile a un’armatura, lo protegge consentendogli di vivere nel magma a 2.000 ºC.","ja":"ぜんしんを よろいのような ひふで まもっている。 ２０００どの マグマの なかでも いきられる。"},"h":19,"w":1200},{"n":113,"ja":"ラッキー","r":"Lucky","en":"Chansey","es":"Chansey","fr":"Leveinard","it":"Chansey","pt":"","g":1,"t":[1],"cat":{"en":"Egg Pokémon","es":"Pokémon Huevo","fr":"Pokémon Œuf","it":"Pokémon Uovo","ja":"たまごポケモン"},"desc":{"en":"This purehearted Pokémon shares its eggs with the injured.","es":"Este Pokémon solía ser lento de reflejos, pero ha desarrollado una gran velocidad para evitar que le roben sus preciados huevos.","fr":"Ce Pokémon lent à l’origine a appris à fuir plus vite pour protéger ses œufs des voleurs.","it":"Sarebbe lento per natura, ma è diventato svelto nella fuga per difendersi da chi vuole rubare il suo uovo.","ja":"もともとは うごきが にぶかった。 タマゴを ねらうものから まもるため にげあしが はやくなった。"},"h":11,"w":346},{"n":114,"ja":"モンジャラ","r":"Monjara","en":"Tangela","es":"Tangela","fr":"Saquedeneu","it":"Tangela","pt":"","g":1,"t":[12],"cat":{"en":"Vine Pokémon","es":"Pokémon Enredadera","fr":"Pokémon Vigne","it":"Pokémon Liana","ja":"ツルじょうポケモン"},"desc":{"en":"It is cloaked entirely in blue vines, preventing any glimpse of its true identity. The vines impart a refreshing sensation when chewed—they're useful as a spice.","es":"Sus lianas despiden una fragancia peculiar. En cierta zona de Galar se usan como aderezo.","fr":"Ses lianes ont une odeur particulière. Elles servent d’herbes aromatiques dans une certaine zone de Galar.","it":"Le sue liane emanano un odore peculiare. In alcune zone di Galar vengono usate come erbe aromatiche.","ja":"ツルは どくとくの かおりがする。 ガラルの いちぶの ちいきでは ハーブとして つかわれている。"},"h":10,"w":350},{"n":115,"ja":"ガルーラ","r":"Garura","en":"Kangaskhan","es":"Kangaskhan","fr":"Kangourex","it":"Kangaskhan","pt":"","g":1,"t":[1],"cat":{"en":"Parent Pokémon","es":"Pokémon Maternal","fr":"Pokémon Maternel","it":"Pokémon Genitore","ja":"おやこポケモン"},"desc":{"en":"There are records of a lost human child being raised by a childless Kangaskhan.","es":"Se han documentado casos de Kangaskhan sin crías que han adoptado bebés humanos cuyos padres habían sido víctimas de accidentes.","fr":"Certains documents certifient que les Kangourex sans progéniture élevaient des enfants humains en détresse.","it":"Alcuni documenti parlano di Kangaskhan senza cuccioli che hanno allevato bambini umani dispersi.","ja":"こどもの いない ガルーラが そうなんした にんげんの こを そだてていたという きろくがある。"},"h":22,"w":800},{"n":116,"ja":"タッツー","r":"Tattu","en":"Horsea","es":"Horsea","fr":"Hypotrempe","it":"Horsea","pt":"","g":1,"t":[11],"cat":{"en":"Dragon Pokémon","es":"Pokémon Dragón","fr":"Pokémon Dragon","it":"Pokémon Drago","ja":"ドラゴンポケモン"},"desc":{"en":"They swim with dance-like motions and cause whirlpools to form. Horsea compete to see which of them can generate the biggest whirlpool.","es":"Nada con la gracilidad de un bailarín, creando remolinos a su paso, y juega con sus congéneres a ver quién forma el más grande.","fr":"Hypotrempe crée des tourbillons en dansant sous l’eau. Il s’amuse à comparer la taille des remous qu’il fait avec ceux de ses congénères.","it":"Nuota come se danzasse nell’acqua creando mulinelli. Gioca con i suoi simili facendo a gara a chi ne crea di più grandi.","ja":"すいちゅうを おどるように およいで うずを つくる。 なかまと うずの おおきさを きそって あそぶ。"},"h":4,"w":80},{"n":117,"ja":"シードラ","r":"Seadra","en":"Seadra","es":"Seadra","fr":"Hypocéan","it":"Seadra","pt":"","g":1,"t":[11],"cat":{"en":"Dragon Pokémon","es":"Pokémon Dragón","fr":"Pokémon Dragon","it":"Pokémon Drago","ja":"ドラゴンポケモン"},"desc":{"en":"Seadra’s mouth is slender, but its suction power is strong. In an instant, Seadra can suck in food that’s larger than the opening of its mouth.","es":"Su estrecho morro posee tal fuerza de succión que es capaz de aspirar presas de mayor tamaño y engullirlas enteras.","fr":"Sa puissance de succion est si forte qu’il peut aspirer en un instant ses proies pour les manger, même si elles sont plus grosses que sa bouche.","it":"Nonostante la misura ridotta, la sua bocca ha un potere aspirante tale da permettergli di risucchiare e inghiottire grosse prede all’istante.","ja":"ほそい くちだが きゅういんりょくは つよい。 くちより おおきな エサも いっしゅんで すいこみ たべるぞ。"},"h":12,"w":250},{"n":118,"ja":"トサキント","r":"Tosakinto","en":"Goldeen","es":"Goldeen","fr":"Poissirène","it":"Goldeen","pt":"","g":1,"t":[11],"cat":{"en":"Goldfish Pokémon","es":"Pokémon Pez Color","fr":"Pokémon Poisson","it":"Pokémon Pescerosso","ja":"きんぎょポケモン"},"desc":{"en":"Its dorsal and pectoral fins are strongly developed like muscles. It can swim at a speed of five knots.","es":"La aleta dorsal y las aletas pectorales están tan desarrolladas que actúan como músculos. Puede nadar a una velocidad de cinco nudos.","fr":"Ses nageoires dorsales et pectorales sont très développées. Elles lui permettent de nager à une vitesse de cinq nœuds.","it":"Le pinne dorsali e pettorali sono sviluppate come potenti muscoli. Può raggiungere la velocità di 5 n he nel mezzo di un violento temporale.","ja":"いちど あばれだした ギャラドスは あらしが ふきすさんでいようとも どんなものでも やきつくしてしまう。"},"h":65,"w":2350},{"n":131,"ja":"ラプラス","r":"Laplace","en":"Lapras","es":"Lapras","fr":"Lokhlass","it":"Lapras","pt":"","g":1,"t":[11,15],"cat":{"en":"Transport Pokémon","es":"Pokémon Transporte","fr":"Pokémon Transport","it":"Pokémon Trasporto","ja":"のりものポケモン"},"desc":{"en":"Crossing icy seas is no issue for this cold-resistant Pokémon. Its smooth skin is a little cool to the touch.","es":"Nada sin problema en aguas heladas gracias a la soberbia resistencia al frío que posee. Su tersa piel es ligeramente fría al tacto.","fr":"Il résiste bien aux très basses températures et peut nager dans des mers glaciales. Sa peau est lisse et légèrement froide au toucher.","it":"Resiste molto bene al freddo e si trova a suo agio anche nei mari ghiacciati. La sua pelle è liscia e fresca.","ja":"さむさに つよく こおりの うみも へいき。 ひふは スベスベで すこしだけ ひんやり しているよ。"},"h":25,"w":2200},{"n":132,"ja":"メタモン","r":"Metamon","en":"Ditto","es":"Ditto","fr":"Métamorph","it":"Ditto","pt":"","g":1,"t":[1],"cat":{"en":"Transform Pokémon","es":"Pokémon Transformación","fr":"Pokémon Morphing","it":"Pokémon Mutante","ja":"へんしんポケモン"},"desc":{"en":"When it encounters another Ditto, it will move faster than normal to duplicate that opponent exactly.","es":"Cuando se encuentra con otro Ditto, se mueve más rápido de lo normal para intentar adoptar su aspecto.","fr":"Quand il rencontre l’un de ses semblables, il s’agite avec plus de vivacité que d’habitude pour adopter exactement la même forme que lui.","it":"Quando incontra un altro Ditto, si muove più velocemente del solito nel tentativo di assumere le sue sembianze.","ja":"メタモンどうし であってしまうと あいてそっくりの かたちに なろうと いつもより はげしく うごく。"},"h":3,"w":40},{"n":133,"ja":"イーブイ","r":"Eievui","en":"Eevee","es":"Eevee","fr":"Évoli","it":"Eevee","pt":"","g":1,"t":[1],"cat":{"en":"Evolution Pokémon","es":"Pokémon Evolución","fr":"Pokémon Évolutif","it":"Pokémon Evoluzione","ja":"しんかポケモン"},"de endarias. Dicen que, cuando este Pokémon frota las alas, cae al instante un relámpago del cielo.","fr":"On raconte que lorsque ce Pokémon oiseau légendaire fait vibrer ses plumes, le frottement fait tomber la foudre instantanément.","it":"Si dice che quando questo leggendario Pokémon alato sfrega le ali fra loro, cada istantaneamente un fulmine.","ja":"はねを こすりあわせると たちまち いかずちが おちると いわれている でんせつの とりポケモン。"},"h":16,"w":526},{"n":146,"ja":"ファイヤー","r":"Fire","en":"Moltres","es":"Moltres","fr":"Sulfura","it":"Moltres","pt":"","g":1,"t":[10,3],"cat":{"en":"Flame Pokémon","es":"Pokémon Llama","fr":"Pokémon Flamme","it":"Pokémon Fiamma","ja":"かえんポケモン"},"desc":{"en":"There are stories of this Pokémon using its radiant, flame-cloaked wings to light up paths for those lost in the mountains.","es":"Se cuenta que alguna vez ha iluminado el camino con sus alas flamígeras para rescatar a alguien que se había perdido en la montaña.","fr":"On raconte qu’il a sauvé des personnes perdues en montagne en illuminant les sentiers à l’aide de ses splendides ailes flamboyantes.","it":"Si narra che abbia aiutato dei viandanti che si erano persi illuminando i sentieri montuosi con le splendide ali infuocate.","ja":"うつくしく もえあがる つばさで やまみちを てらし そうなんしゃを たすけたと いいつたえられている。"},"h":20,"w":600},{"n":147,"ja":"ミニリュウ","r":"Miniryu","en":"Dratini","es":"Dratini","fr":"Minidraco","it":"Dratini","pt":"","g":1,"t":[16],"cat":{"en":"Dragon Pokémon","es":"Pokémon Dragón","fr":"Pokémon Dragon","it":"Pokémon Drago","ja":"ドラゴンポケモン"},"desc":{"en":"This Pokémon was long considered to be no more than a myth. The small lump on a Dratini’s forehead is actually a horn that’s still coming in.","es":"Durante mucho tiempo se dudó de su existencia. La pequeña protuberancia de la frente es en realidad un cuerno incipiente.","fr":"On a longtemps douté de l’existence de ce Pokémon. La petite bosse sur son front est en fait sa corne en pleine croissance.","it":"È stato a lungo considerato un miraggio. La piccola protuberanza sull
