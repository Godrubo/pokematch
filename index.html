s, you might get burned.","es":"Su temperatura corporal aumenta de repente cuando se exalta y puede causar quemaduras al contacto con la piel.","fr":"Quand il est surexcité, sa température corporelle augmente d’un coup, à tel point qu’il est possible de se brûler en le touchant à mains nues.","it":"Quando si innervosisce, la sua temperatura corporea sale di colpo, tanto da causare scottature a chi lo tocca a mani nude.","ja":"こうふんすると たいおんが グッと あがる。 すでで さわると ヤケドすることも あるほどだ。"},"h":3,"w":17},{"n":662,"ja":"ヒノヤコマ","r":"Hinoyakoma","en":"Fletchinder","es":"Fletchinder","fr":"Braisillon","it":"Fletchinder","pt":"","g":6,"t":[10,3],"cat":{"en":"Ember Pokémon","es":"Pokémon Lumbre","fr":"Pokémon Braise","it":"Pokémon Sfavillante","ja":"ひのこポケモン"},"desc":{"en":"Fletchinder are exceedingly territorial and aggressive. These Pokémon fight among themselves over feeding grounds.","es":"Defienden su territorio con suma agresividad. Se pelean entre sí por el control de las áreas de caza.","fr":"De nature belliqueuse, il dispose d’un fort instinct territorial. Quand il chasse, il se dispute régulièrement les proies avec ses congénères.","it":"È molto territoriale e aggressivo. Si contende il territorio di caccia con gli altri Fletchinder.","ja":"なわばりいしきが とても つよく こうせんてき。 えさばを めぐり ヒノヤコマどうしで あらそう。"},"h":7,"w":160},{"n":663,"ja":"ファイアロー","r":"Fiarrow","en":"Talonflame","es":"Talonflame","fr":"Flambusard","it":"Talonflame","pt":"","g":6,"t":[10,3],"cat":{"en":"Scorching Pokémon","es":"Pokémon Flamígero","fr":"Pokémon Fournaise","it":"Pokémon Ardifiamma","ja":"れっかポケモン"},"desc":{"en":"Talonflame dives toward prey at speeds of up to 310 mph and assaults them with powerful kicks, giving the prey no chance to escape.","es":"Arremete contra sus presas a una velocidad de 500 km/h y les asesta el golpe de gracia con una patada muy potente, sin dejarles escapatoria.","fr":"Flambusard attaque à une vitesse de 500 km/h. Il achève ses proies d’un puissant coup de patte sans leur laisser la moindre chance de fuir.","it":"Piomba sulle prede a 500 km/h e le attacca con calci potentissimi senza dargli via di scampo.","ja":"じそく５００キロで とつげき。 えものが にげるすきを あたえずに きょうれつな けりで しとめる。"},"h":12,"w":245},{"n":664,"ja":"コフキムシ","r":"Kofukimushi","en":"Scatterbug","es":"Scatterbug","fr":"Lépidonille","it":"Scatterbug","pt":"","g":6,"t":[7],"cat":{"en":"Scatterdust Pokémon","es":"Pokémon Tiraescamas","fr":"Pokémon Exhalécaille","it":"Pokémon Tirascaglie","ja":"こなふきポケモン"},"desc":{"en":"The powder that covers its body regulates its temperature, so it can live in any region or climate.","es":"Gracias al polvo de escamas que lo recubre y regula su temperatura, puede vivir en cualquier región, sin importar las características del terreno o el clima.","fr":"La poudre qui recouvre son corps l’aide à réguler sa température. Il peut s’adapter à tous les climats.","it":"La sua temperatura corporea è regolata dalle scaglie che ne ricoprono il corpo. Grazie ad esse può adattarsi e sopravvivere in qualsiasi condizione climatica.","ja":"からだを おおう こなが たいおんを ちょうせつするので どんな きこうや ふうどの ちいきでも くらせる。"},"h":3,"w":25},{"n":665,"ja":"コフーライ","r":"Kofuurai","en":"Spewpa","es":"Spewpa","fr":"Pérégrain","it":"Spewpa","pt":"","g":6,"t":[7],"cat":{"en":"Scatterdust Pokémon","es":"Pokémon Tiraescamas","fr":"Pokémon Exhalécaille","it":"Pokémon Tirascaglie","ja":"こなふきポケモン"},"desc":{"en":"The beaks of bird Pokémon can’t begin to scratch its stalwart body. To defend itself, it spews powder.","es":"Su cuerpo es tan duro que ni siquiera los Pokémon pájaro pueden hacerle el menor rasguño con sus picos. Esparce polvo de escamas para defenderse.","fr":"Même les becs acérés des Pokémon Oiseaux ne parviennent pas à meurtrir son corps très dur. Il se défend en crachant de la poudre.","it":"Il becco dei Pokémon uccello non può neppure scalfire il suo durissimo corpo. Si difende spargendo scaglie.","ja":"かたい からだは とりポケモンの クチバシでも キズひとつ つかない。 コナを まきちらして ぼうせんする。"},"h":3,"w":84},{"n":666,"ja":"ビビヨン","r":"Viviyon","en":"Vivillon","es":  it on its prey. This Pokémon prefers to eat raw meat.","es":"Su aliento alcanza temperaturas de 6000 ºC, aunque no lo emplea contra sus presas, ya que prefiere la carne más bien cruda.","fr":"Son souffle enflammé atteint les 6 000 °C, mais il ne l’utilise jamais contre ses proies. Il préfère en effet la viande crue.","it":"Con il suo soffio, infiamma l’aria a una temperatura di 6.000 °C, ma evita di farlo con le prede perché preferisce la carne cruda.","ja":"せっし ６０００どの いきを はくが えものには つかわない。 にくは なまの ほうが このみ だから。"},"h":15,"w":815},{"n":669,"ja":"フラベベ","r":"Flabebe","en":"Flabébé","es":"Flabébé","fr":"Flabébé","it":"Flabébé","pt":"","g":6,"t":[18],"cat":{"en":"Single Bloom Pokémon","es":"Pokémon Monoflor","fr":"Pokémon Uniflore","it":"Pokémon Monofiore","ja":"いちりんポケモン"},"desc":{"en":"Flabébé wears a crown made from pollen it’s collected from its flower. The crown has hidden healing properties.","es":"Acumula el polen de las flores para confeccionar la tiara que lleva en la cabeza, que cuenta con propiedades curativas.","fr":"Il confectionne la couronne qui orne sa tête en récoltant du pollen. Elle recèle de nombreuses propriétés curatives.","it":"La corona sulla testa è realizzata con il polline che raccoglie dai fiori e ha proprietà curative.","ja":"あたまの かんむりは はなの かふんを あつめて つくったもの。 いやしの こうかが ひめられている。"},"h":1,"w":1},{"n":670,"ja":"フラエッテ","r":"Floette","en":"Floette","es":"Floette","fr":"Floette","it":"Floette","pt":"","g":6,"t":[18],"cat":{"en":"Single Bloom Pokémon","es":"Pokémon Monoflor","fr":"Pokémon Uniflore","it":"Pokémon Monofiore","ja":"いちりんポケモン"},"desc":{"en":"It gives its own power to flowers, pouring its heart into caring for them. Floette never forgives anyone who messes up a flower bed.","es":"Confiere su poder a las flores y cuida de ellas con mucho esmero; no perdona que destruyan los campos donde estas crecen.","fr":"Il fait profiter ses fleurs de ses pouvoirs et met tout son cœur à leur entretien. Gare à ceux qui ravagent ses plates-bandes !","it":"Tra s movimientos del rival. Puede reducir un camión a chatarra de un solo puñetazo.","fr":"Il anticipe les mouvements de son adversaire grâce à sa feuille. Ses coups de poing peuvent réduire un camion-benne en un tas de ferraille.","it":"Prevede i movimenti dei nemici dalle vibrazioni della foglia che tiene in bocca. Con un pugno può fare a pezzi un camion ribaltabile.","ja":"はっぱで あいての うごきを よむ。 おおがた ダンプカーを いちげきで スクラップにする パンチを もつ。"},"h":21,"w":1360},{"n":676,"ja":"トリミアン","r":"Trimmien","en":"Furfrou","es":"Furfrou","fr":"Couafarel","it":"Furfrou","pt":"","g":6,"t":[1],"cat":{"en":"Poodle Pokémon","es":"Pokémon Caniche","fr":"Pokémon Caniche","it":"Pokémon Barboncino","ja":"プードルポケモン"},"desc":{"en":"Left alone, its fur will grow longer and longer, but it will only allow someone it trusts to cut it.","es":"El pelo le crece sin cesar, pero solo deja que se lo corten aquellos de quienes se fía plenamente.","fr":"Sa fourrure pousse indéfiniment, mais il refuse de se faire couper la toison par une personne en qui il n’a pas confiance.","it":"Se non viene tagliato, il suo pelo continua a crescere a dismisura. Si lascia tosare solamente dalle persone di cui si fida.","ja":"ほうっておくと たいもうは どんどん のびつづけるが しんらいした ものにしか カットは ゆるさない。"},"h":12,"w":280},{"n":677,"ja":"ニャスパー","r":"Nyasper","en":"Espurr","es":"Espurr","fr":"Psystigri","it":"Espurr","pt":"","g":6,"t":[14],"cat":{"en":"Restraint Pokémon","es":"Pokémon Moderación","fr":"Pokémon Retenue","it":"Pokémon Moderazione","ja":"じせいポケモン"},"desc":{"en":"There’s enough psychic power in Espurr to send a wrestler flying, but because this power can’t be controlled, Espurr finds it troublesome.","es":"Es capaz de mandar por los aires a un luchador profesional gracias a sus poderes psíquicos, pero tiene serios problemas para controlarlos.","fr":"Il possède des pouvoirs psychiques si puissants qu’il peut faire valser un catcheur. Malheureusement, il a du mal à les contrôler.","it":"I suoi poteri psichici sono talmente forti da scaraventare in aria un lottatore di wrestling, ma ha seri problemi nel controllarli.","ja":"プロレスラーを ふきとばす ほどの サイコパワーを うちに ひめているが コントロールできずに こまっている。"},"h":3,"w":35},{"n":678,"ja":"ニャオニクス","r":"Nyaonix","en":"Meowstic","es":"Meowstic","fr":"Mistigrix","it":"Meowstic","pt":"","g":6,"t":[14],"cat":{"en":"Constraint Pokémon","es":"Pokémon Autocontrol","fr":"Pokémon SelfContrôle","it":"Pokémon Temperanza","ja":"よくせいポケモン"},"desc":{"en":"The defensive instinct of the males is strong. It’s when they’re protecting themselves or their partners that they unleash their full power.","es":"El fuerte instinto protector de los machos los lleva a liberar todo su poder cuando se trata de defenderse a sí mismos o a su Entrenador.","fr":"Le mâle a un instinct de défense très développé. Il n’hésite pas à lancer une attaque à pleine puissance pour protéger ses partenaires et lui.","it":"Il maschio ha un forte istinto protettivo. Se deve difendere se stesso o il suo Allenatore, attacca con una forza formidabile.","ja":"オスは ぼうえい ほんのうが つよく じぶんや パートナーを まもるときに さいだいきゅうの パワーを だす。"},"h":6,"w":85},{"n":679,"ja":"ヒトツキ","r":"Hitotsuki","en":"Honedge","es":"Honedge","fr":"Monorpale","it":"Honedge","pt":"","g":6,"t":[9,8],"cat":{"en":"Sword Pokémon","es":"Pokémon Tizona","fr":"Pokémon Glaive","it":"Pokémon Armabianca","ja":"とうけんポケモン"},"desc":{"en":"The blue eye on the sword’s handguard is the true body of Honedge. With its old cloth, it drains people’s lives away.","es":"El ojo azul de la empuñadura es su verdadero cuerpo. Absorbe la energía vital de las personas con su paño de aspecto andrajoso.","fr":"L’œil bleu sur la garde de la lame est le véritable corps de Monorpale. Il aspire l’énergie vitale des gens avec son étoffe usée par le temps.","it":"L’occhio blu sull’elsa della spada è il suo vero corpo. Usa il drappo consunto per assorbire la forza vitale degli uomini.","ja":"つるぎの つばの あおい めだまが ヒトツキの ほんたい。 ふるびた ぬので ひとの せいきを すいとる。"},"h":8,"w":20},{"n":680,"ja":"ニダンギル","r":"Nidangill","en":"Doublade","es":"Doublade","fr":"Dimoclès","it":"Doublade","pt":"","g":6,"t":[9,8],"cat":{"en":"Sword Pokémon","es":"Pokémon Tizona","fr":"Pokémon Glaive","it":"Pokémon Armabianca","ja":"とうけんポケモン"},"desc":{"en":"The two swords employ a strategy of rapidly alternating between offense and defense to bring down their prey.","es":"Su táctica para abatir a las presas consiste en alternar ataque y defensa de forma frenética entre ambas espadas.","fr":"Ses deux lames abattent leurs proies en enchaînant les attaques et les parades à un rythme effréné.","it":"Le due spade abbattono la preda alternando mosse di attacco e di difesa a un ritmo vertiginoso.","ja":"２ほんの つるぎは こうげきと ぼうぎょが めまぐるしく いれかわる せんぽうで えものを しとめる。"},"h":8,"w":45},{"n":681,"ja":"ギルガルド","r":"Gillgard","en":"Aegislash","es":"Aegislash","fr":"Exagide","it":"Aegislash","pt":"","g":6,"t":[9,8],"cat":{"en":"Royal Sword Pokémon","es":"Pokémon Espada Real","fr":"Pokémon Noble Lame","it":"Pokémon Spadareale","ja":"おうけんポケモン"},"desc":{"en":"Its potent spectral powers allow it to manipulate others. It once used its powers to force people and Pokémon to build a kingdom to its liking.","es":"Mediante el control ejercido con su inmenso poder espectral, logró que humanos y Pokémon le forjaran un país a medida de sus necesidades.","fr":"Grâce à ses puissants pouvoirs spirituels, il a contrôlé des humains et des Pokémon pour créer un pays conforme à ses idéaux.","it":"Ha manipolato il pensiero di esseri umani e Pokémon con il suo potere spettrale facendogli costruire un paese adatto alle sue esigenze.","ja":"きょうりょくな れいりょくで ひとや ポケモンを あやつり ギルガルドに つごうの よい くにを つくらせた。"},"h":17,"w":530},{"n":682,"ja":"シュシュプ","r":"Shushupu","en":"Spritzee","es":"Spritzee","fr":"Fluvetin","it":"Spritzee","pt":"","g":6,"t":[18],"cat":{"en":"Perfume Pokémon","es":"Pokémon Aroma","fr":"Pokémon Fragrance","it":"Pokémon Profumo","ja":"こうすいポケモン"},"desc":{"en":"The scent its body gives off enraptures those who smell it. Noble ladies had no shortage of love for Spritzee.","es":"Su cuerpo emana una fragancia que embelesa a quien la huele. Llegó a ser muy apreciado entre las damas de la nobleza.","fr":"Une douce odeur qui charme les gens émane de son corps. Les dames nobles raffolaient de lui.","it":"Il suo corpo emana un profumo irresistibile che ammalia gli esseri umani. Era particolarmente amato dalle nobildonne.","ja":"ひとを みりょうする かぐわしい においを からだから ただよわせる。 こうきな ふじんたちに あいされた。"},"h":2,"w":5},{"n":683,"ja":"フレフワン","r":"Frefuwan","en":"Aromatisse","es":"Aromatisse","fr":"Cocotine","it":"Aromatisse","pt":"","g":6,"t":[18],"cat":{"en":"Fragrance Pokémon","es":"Pokémon Fragancia","fr":"Pokémon Parfum","it":"Pokémon Fragranza","ja":"ほうこうポケモン"},"desc":{"en":"The scents Aromatisse can produce range from sweet smells that bolster allies to foul smells that sap an opponent’s will to fight.","es":"Puede emanar tanto un olor desagradable para desmotivar al rival como un dulce aroma para reconfortar a los aliados en combate.","fr":"Il peut émettre une puanteur si infâme qu’elle prive ses ennemis de leur combativité, ou un parfum si réconfortant qu’il encourage ses alliés.","it":"Può produrre un tanfo così tremendo da far passare ai nemici la voglia di lottare, e un profumo così buono da incoraggiare gli alleati.","ja":"てきの たたかう きもちを なくす あくしゅうや みかたを たすける かぐわしい かおりを つくりだす。"},"h":8,"w":155},{"n":684,"ja":"ペロッパフ","r":"Peroppafu","en":"Swirlix","es":"Swirlix","fr":"Sucroquin","it":"Swirlix","pt":"","g":6,"t":[18],"cat":{"en":"Cotton Candy Pokémon","es":"Pokémon Chuchería","fr":"Pokémon Confiserie","it":"Pokémon Zuccherino","ja":"わたあめポケモン"},"desc":{"en":"The sweet smell of cotton candy perfumes Swirlix’s fluffy fur. This Pokémon spits out sticky string to tangle up its enemies.","es":"Su esponjoso pelaje desprende un olor dulzón como el del algodón de azúcar. Escupe hebras pegajosas con las que envuelve a sus enemigos.","fr":"Sa douce fourrure possède une odeur sucrée comme la barbe à papa. Il produit des filaments gluants pour empêtrer ses adversaires.","it":"La sua soffice pelliccia emette un dolce profumo di zucchero filato. Avvolge il nemico con filamenti appiccicosi.","ja":"ふわふわの たいもうは わたあめの ように あまい におい。 べたつく いとを だして てきを からめとる。"},"h":4,"w":35},{"n":685,"ja":"ペロリーム","r":"Peroream","en":"Slurpuff","es":"Slurpuff","fr":"Cupcanaille","it":"Slurpuff","pt":"","g":6,"t":[18],"cat":{"en":"Meringue Pokémon","es":"Pokémon Nata","fr":"Pokémon Mousseline","it":"Pokémon Panna","ja":"ホイップポケモン"},"desc":{"en":"Slurpuff’s fur contains a lot of air, making it soft to the touch and lighter than it looks.","es":"La gran cantidad de aire acumulada en su pelaje le confiere un tacto aterciopelado y un peso muy inferior al que aparenta.","fr":"Sa fourrure est si aérée qu’elle le rend très doux et très agréable au toucher, et bien plus léger qu’il en a l’air.","it":"La grande quantità d’aria contenuta nella sua pelliccia la rende soffice al tatto. È più leggero di quanto possa sembrare.","ja":"たいもうに たくさん くうきを ふくんでいるので さわりごこちは やわらかく みためより かるい。"},"h":8,"w":50},{"n":686,"ja":"マーイーカ","r":"Maaiika","en":"Inkay","es":"Inkay","fr":"Sepiatop","it":"Inkay","pt":"","g":6,"t":[17,14],"cat":{"en":"Revolving Pokémon","es":"Pokémon Rotación","fr":"Pokémon Rotation","it":"Pokémon Volteggio","ja":"かいてんポケモン"},"desc":{"en":"By exposing foes to the blinking of its luminescent spots, Inkay demoralizes them, and then it seizes the chance to flee.","es":"Los destellos de luz intermitente que emite aplacan el ánimo de lucha del enemigo, tras lo que aprovecha para esconderse.","fr":"Il sape la combativité de son adversaire en faisant clignoter son corps lumineux, puis profite de cet instant de répit pour s’enfuir.","it":"Fa perdere ai nemici lo spirito combattivo grazie alla luce lampeggiante che emette dal suo corpo e ne approfitta per scappare.","ja":"てきに はっこうたいの てんめつを あびせて せんいを なくしてしまう。 その すきに にげだすのだ。"},"h":4,"w":35},{"n":687,"ja":"カラマネロ","r":"Calamanero","en":"Malamar","es":"Malamar","fr":"Sepiatroce","it":"Malamar","pt":"","g":6,"t":[17,14],"cat":{"en":"Overturning Pokémo la schiena di Avalugg congelando la base delle sue zampe.","ja":"ごっかんの ちいきに せいそくする。 クレベースの せなかと じぶんの あしを こおりつかせて こていする。"},"h":10,"w":995},{"n":713,"ja":"クレベース","r":"Crebase","en":"Avalugg","es":"Avalugg","fr":"Séracrawl","it":"Avalugg","pt":"","g":6,"t":[15],"cat":{"en":"Iceberg Pokémon","es":"Pokémon Iceberg","fr":"Pokémon Iceberg","it":"Pokémon Iceberg","ja":"ひょうざんポケモン"},"desc":{"en":"The armor of ice covering its lower jaw puts steel to shame and can shatter rocks with ease. This Pokémon barrels along steep mountain paths, cleaving through the deep snow.","es":"Las fisuras de su cuerpo se agrandan durante el día, pero por la noche vuelven a cerrarse.","fr":"Les crevasses sur son dos s’approfondissent au cours de la journée, mais se comblent de nouveau pendant la nuit.","it":"Durante il giorno le crepe sul suo corpo diventano più profonde, ma nel giro di una notte si riempiono del tutto.","ja":"にっちゅうの かつどうで からだの きれつは ふかくなるが ひとばんで きれつの ない からだに もどる。"},"h":20,"w":5050},{"n":714,"ja":"オンバット","r":"Onbat","en":"Noibat","es":"Noibat","fr":"Sonistrelle","it":"Noibat","pt":"","g":6,"t":[3,16],"cat":{"en":"Sound Wave Pokémon","es":"Pokémon Onda Sónica","fr":"Pokémon Ondes","it":"Pokémon Ondasonora","ja":"おんぱポケモン"},"desc":{"en":"No wavelength of sound is beyond Noibat’s ability to produce. The ultrasonic waves it generates can overcome much larger Pokémon.","es":"Su registro vocal cubre todo el espectro de frecuencias. Ni los Pokémon más grandes soportan las ondas ultrasónicas que emite.","fr":"Il peut contrôler des ondes à n’importe quelle fréquence du spectre. Même les plus grands Pokémon ne peuvent supporter ses ultrasons.","it":"Controlla onde sonore di qualsiasi frequenza. Nemmeno i Pokémon più grandi riescono a sopportare i suoi ultrasuoni.","ja":"あらゆる しゅうはすうの おんぱを あやつる。 ちょうおんぱを あびると きょたいの ポケモンも たまらない。"},"h":5,"w":80},{"n":715,"ja":"オンバーン","r":"Onvern","en":"Noivern","es":"Noivern","fr":"Bruyverne","it":"Noivern","pt":"","g":6,"t":[3,16],"cat":{"en":"Sound Wave Pokémon","es":"Pokémon Onda Sónica","fr":"Pokémon Ondes","it":"Pokémon Ondasonora","ja":"おんぱポケモン"},"desc":{"en":"Flying through the darkness, it weakens enemies with ultrasonic waves that could crush stone. Its fangs finish the fight.","es":"Vuela en la oscuridad atormentando al enemigo con ondas ultrasónicas capaces de partir rocas antes de rematarlo con sus afilados colmillos.","fr":"Il plane dans les ténèbres, blessant ses ennemis à coups d’ultrasons pouvant briser des rochers avant de les achever de ses crocs acérés.","it":"Vola nell’oscurità ferendo gli avversari con ultrasuoni in grado di frantumare anche i massi, per poi finirli con i suoi denti affilati.","ja":"くらやみを とびながら いわをも くだく ちょうおんぱで いためつけ するどい キバで とどめを さす。"},"h":15,"w":850},{"n":716,"ja":"ゼルネアス","r":"Xerneas","en":"Xerneas","es":"Xerneas","fr":"Xerneas","it":"Xerneas","pt":"","g":6,"t":[18],"cat":{"en":"Life Pokémon","es":"Pokémon Creación","fr":"Pokémon Existence","it":"Pokémon Creazione","ja":"せいめいポケモン"},"desc":{"en":"When the horns on its head shine in seven colors, it is said to be sharing everlasting life.","es":"Cuando los cuernos de su cabeza brillan en siete colores, se dice que comparte el don de la vida eterna.","fr":"D’après la légende, quand ses bois brillent de sept couleurs, cela signifie qu’il prodigue la vie éternelle.","it":"Si dice che possieda l’immortalità e che possa farne dono agli altri quando le sue corna brillano dei colori dell’arcobaleno.","ja":"あたまの ツノが なないろに かがやくとき えいえんの いのちを わけあたえると いわれている。"},"h":30,"w":2150},{"n":717,"ja":"イベルタル","r":"Yveltal","en":"Yveltal","es":"Yveltal","fr":"Yveltal","it":"Yveltal","pt":"","g":6,"t":[17,3],"cat":{"en":"Destruction Pokémon","es":"Pokémon Destrucción","fr":"Pokémon Annihilation","it":"Pokémon Distruzione","ja":"はかいポケモン"},"desc":{"en":"When its life comes to an end, it absorbs the life energy of every living thing and turns into a cocoon once more.","es":"Cuando su vida se extingue, absorbe la vitalidad de todos los seres vivos y regresa a su んそを あっしゅくして たくさんの ダイヤを いっしゅんで うみだす。"},"h":7,"w":88},{"n":720,"ja":"フーパ","r":"Hoopa","en":"Hoopa","es":"Hoopa","fr":"Hoopa","it":"Hoopa","pt":"","g":6,"t":[14,8],"cat":{"en":"Mischief Pokémon","es":"Pokémon Travesura","fr":"Pokémon Chenapan","it":"Pokémon Birba","ja":"いたずらポケモン"},"desc":{"en":"It is said to be able to seize anything it desires with its six rings and six huge arms. With its power sealed, it is transformed into a much smaller form.","es":"Dicen que gracias a sus seis anillos y seis enormes brazos puede robar todo lo que se le antoja. Adquirió una forma reducida cuando alguien selló su poder.","fr":"On raconte que grâce à ses six anneaux et ses six énormes bras, il est capable de dérober tout ce qui lui plaît. Mais son pouvoir a été scellé, et il a été réduit à l’état d’un être minuscule.","it":"Si dice che possa rubare tutto ciò che vuole grazie ai suoi sei anelli e alle sue sei enormi braccia. La sua potenza è stata sigillata, riducendo di molto le sue dimensioni effettive.","ja":"６つの リングと ６つの きょだいな うで で あらゆるものを うばうと いわれる。ちからを ふうじられ ちいさな すがたに かえられた。"},"h":5,"w":90},{"n":721,"ja":"ボルケニオン","r":"Volcanion","en":"Volcanion","es":"Volcanion","fr":"Volcanion","it":"Volcanion","pt":"","g":6,"t":[10,11],"cat":{"en":"Steam Pokémon","es":"Pokémon Vapor","fr":"Pokémon Vapeur","it":"Pokémon Vapore","ja":"スチームポケモン"},"desc":{"en":"It expels its internal steam from the arms on its back. It has enough power to blow away a mountain.","es":"Expulsa vapor de agua por los brazos que tiene en la espalda. Sale a tal potencia que sería capaz de arrasar una montaña entera.","fr":"Il évacue la vapeur qui s’accumule à l’intérieur de son corps par les bras situés sur son dos. Ce jet est assez puissant pour raser des montagnes.","it":"Emette il vapore generato nel suo corpo dalle braccia congiunte ad anello sul dorso. La potenza del getto potrebbe spazzare via una montagna.","ja":"せなかの アームから たいないの すいじょうきを ふんしゃする。 やま ひとつ ふきとばす いりょく。"},"h":17,"w":1950},{"n":722,"ja":"モクロー","r":"Mokuroh","en":"Rowlet","es":"Rowlet","fr":"Brindibou","it":"Rowlet","pt":"","g":7,"t":[12,3],"cat":{"en":"Grass Quill Pokémon","es":"Pokémon Pluma Hoja","fr":"Pokémon Plumefeuille","it":"Pokémon Aliderba","ja":"くさばねポケモン"},"desc":{"en":"Flies noiselessly on delicate wings. It has mastered the art of deftly launching dagger-sharp feathers from those same wings.","es":"Durante el día acumula energía mediante la fotosíntesis y, al caer la noche, vuela sin hacer ruido en busca de presas.","fr":"Pendant la journée, il emmagasine de l’énergie par photosynthèse. La nuit, il plane silencieusement à la recherche de proies.","it":"Accumula energia durante il giorno grazie alla fotosintesi e di notte vola senza fare alcun rumore in cerca di prede.","ja":"ひるまは こうごうせいで ちからを たくわえ よるに なると はおとを たてずに とんで えものを さがす。"},"h":3,"w":15},{"n":723,"ja":"フクスロー","r":"Fukuthrow","en":"Dartrix","es":"Dartrix","fr":"Efflèche","it":"Dartrix","pt":"","g":7,"t":[12,3],"cat":{"en":"Blade Quill Pokémon","es":"Pokémon Pluma Filo","fr":"Pokémon Plum’acérée","it":"Pokémon Piumaffilata","ja":"はばねポケモン"},"desc":{"en":"Regularly basks in sunlight to gather power—presumably due to the frigid climate. Nonetheless, the edges of the blade quills set into its wings are keen as ever.","es":"Jamás desatiende el cuidado de sus alas, no solo por mera cuestión estética, sino también para mantener las plumas perfectamente afiladas.","fr":"Il prend grand soin de son plumage, s’assurant ainsi d’avoir une apparence impeccable et des plumes aiguisées à souhait.","it":"Non trascura mai la cura delle proprie ali, non solo perché tiene al proprio aspetto, ma anche per mantenere affilate le sue piume.","ja":"はねの ていれを おこたらない。 みだしなみを ととのえる だけでなく はばねの きれあじを たもつためだ。"},"h":7,"w":160},{"n":724,"ja":"ジュナイパー","r":"Junaiper","en":"Decidueye","es":"Decidueye","fr":"Archéduc","it":"Decidueye","pt":"","g":7,"t":[12,8],"cat":{"en":"Arrow Quill Pokémon","es":"Pokémon Pluma Flecha","fr":"Pokémon Plumeflèche","it":"Pokémon Alifreccia","ja":"やばねポケモン"},"desc":{"en":"The air stored inside the rachises of Decidueye's feathers insulates the Pokémon against Hisui's extreme cold. This is firm proof that evolution can be influenced by environment.","es":"Tan solo le lleva una décima de segundo sacar una pluma y disparar al rival, a quien acierta en un punto vital antes de que pueda darse cuenta.","fr":"Il décoche ses plumes acérées en un dixième de seconde. Sa victime n’a pas le temps de le voir agir qu’elle est déjà grièvement touchée.","it":"Può preparare e scoccare una delle sue piume affilate in 0,1 secondi. Trafigge l’avversario nei suoi punti vitali prima che se ne accorga.","ja":"０．１びょうで やばねを つばさの つるに つがえて はなつ。 あいてが きづくまえに きゅうしょを いぬく。"},"h":16,"w":366},{"n":725,"ja":"ニャビー","r":"Nyabby","en":"Litten","es":"Litten","fr":"Flamiaou","it":"Litten","pt":"","g":7,"t":[10],"cat":{"en":"Fire Cat Pokémon","es":"Pokémon Gato Fuego","fr":"Pokémon Chat Feu","it":"Pokémon Pirofelino","ja":"ひねこポケモン"},"desc":{"en":"Trying to pet Litten before it trusts you will result in a nasty scratch from its sharp claws. Be careful.","es":"Quien trate de acariciarlo antes de ganarse su plena confianza se arriesga a comprobar de primera mano lo afiladas que están sus garras.","fr":"Quiconque essaie de le caresser avant d’avoir gagné sa confiance s’expose à de sérieuses griffures.","it":"Chi cerca di fargli le coccole prima di essersi guadagnato la sua fiducia si ritroverà addosso i suoi artigli affilati.","ja":"ニャビーに しんらいされる まえに なでようとすると するどい ツメで ひどく ひっかかれるので ちゅうい。"},"h":4,"w":43},{"n":726,"ja":"ニャヒート","r":"Nyaheat","en":"Torracat","es":"Torracat","fr":"Matoufeu","it":"Torracat","pt":"","g":7,"t":[10],"cat":{"en":"Fire Cat Pokémon","es":"Pokémon Gato Fuego","fr":"Pokémon Chat Feu","it":"Pokémon Pirofelino","ja":"ひねこポケモン"},"desc":{"en":"When facing a powerful enemy, Torracat’s fighting spirit gets pumped up, and its fire bell blazes hotter.","es":"Enfrentarse a un adversario formidable aviva tanto su espíritu combativo como la energía tér  pour porter bonheur aux jeunes époux.","it":"Le coppie di Toucannon sono famose per la loro perfetta armonia. Per questo c’è chi le porta ai matrimoni come augurio di felicità per gli sposi.","ja":"つがいが なかむつまじいことで しられる。 えんぎもの の かわりに けっこんしきに つれて こられる。"},"h":11,"w":260},{"n":734,"ja":"ヤングース","r":"Youngoose","en":"Yungoos","es":"Yungoos","fr":"Manglouton","it":"Yungoos","pt":"","g":7,"t":[1],"cat":{"en":"Loitering Pokémon","es":"Pokémon Patrulla","fr":"Pokémon Patrouille","it":"Pokémon Pattuglia","ja":"うろつきポケモン"},"desc":{"en":"Although it will eat anything, it prefers fresh living things, so it marches down streets in search of prey.","es":"Pese a ser omnívoro, siente predilección por los alimentos frescos o incluso seres vivos. Por eso marcha por los caminos en busca de presas.","fr":"Il mange de tout, mais aime particulièrement les proies fraîches, voire encore vives. Il erre sur les routes à leur recherche.","it":"Gli Yungoos mangiano di tutto ma preferiscono cibo fresco o prede vive. Si vedono spesso sfilare lungo le strade alla ricerca di cibo.","ja":"なんでも たべるが しんせんで いきているものが いいので えものを さがして みちを ねりあるく。"},"h":4,"w":60},{"n":735,"ja":"デカグース","r":"Dekagoose","en":"Gumshoos","es":"Gumshoos","fr":"Argouste","it":"Gumshoos","pt":"","g":7,"t":[1],"cat":{"en":"Stakeout Pokémon","es":"Pokémon Vigilante","fr":"Pokémon Filature","it":"Pokémon Sorveglianza","ja":"はりこみポケモン"},"desc":{"en":"Patient by nature, this Pokémon loses control of itself and pounces when it spots its favorite meal—Rattata!","es":"Tiene un carácter muy paciente, pero en cuanto avista un Rattata, su manjar predilecto, pierde el control y se lanza sobre él como un poseso.","fr":"D’un naturel très patient, il ne peut toutefois s’empêcher de bondir sur son plat favori, Rattata, s’il en voit un.","it":"È un Pokémon molto paziente, ma quando trova un Rattata, di cui va pazzo, perde il controllo e lo assale.","ja":"とても がまんづよい せいしつだが こうぶつの コラッタを みつけると われを わすれて とびかかるぞ。"},"h":7,"w":142},{"n":736,"ja":"アゴジムシ","r":"A ela llevando consigo un Charjabug a modo de batería adicional, puede liberar potentes descargas electromagnéticas.","fr":"S’il emporte un Chrysapile en tant que batterie de secours, il peut tirer une salve de rayons électriques extrêmement puissants en plein vol.","it":"Quando vola portando con sé un Charjabug come batteria di riserva, può sparare una raffica di potentissimi raggi elettromagnetici.","ja":"よびバッテリーとして デンヂムシを かかえて とべば だいでんりょくの でんじビームを れんしゃ できる。"},"h":15,"w":450},{"n":739,"ja":"マケンカニ","r":"Makenkani","en":"Crabrawler","es":"Crabrawler","fr":"Crabagarre","it":"Crabrawler","pt":"","g":7,"t":[2],"cat":{"en":"Boxing Pokémon","es":"Pokémon Púgil","fr":"Pokémon Boxeur","it":"Pokémon Pugile","ja":"けんとうポケモン"},"desc":{"en":"Crabrawler has been known to mistake Exeggutor for a coconut tree and climb it. The enraged Exeggutor shakes it off and stomps it.","es":"A veces trepa por Exeggutor al confundirlo con una palmera de verdad. Este, presa de la ira, se desembaraza de él a sacudidas y lo pisotea.","fr":"Il grimpe parfois sur un Noadkoko qu’il a pris pour un cocotier. Il se fait alors éjecter puis piétiner par le Noadkoko courroucé.","it":"A volte si arrampica sugli Exeggutor, prendendoli per vere palme. Per tutta risposta, questi si adirano, lo scaraventano a terra e lo calpestano.","ja":"ヤシのきと まちがえて ナッシーに のぼることもある。 いかりを かって ふりおとされて ふみつけられる。"},"h":6,"w":70},{"n":740,"ja":"ケケンカニ","r":"Kekenkani","en":"Crabominable","es":"Crabominable","fr":"Crabominable","it":"Crabominable","pt":"","g":7,"t":[2,15],"cat":{"en":"Woolly Crab Pokémon","es":"Pokémon Cangrejopelo","fr":"Pokémon Crabe Velu","it":"Pokémon Peligranchio","ja":"けがにポケモン"},"desc":{"en":"Before it stops to think, it just starts pummeling. There are records of its turning back avalanches with a flurry of punches.","es":"No se lo piensa dos veces a la hora de zurrar. Se tiene constancia de que sus puñetazos frenéticos han llegado a detener aludes.","fr":"Agir ou réfléchir ? Crabominable choisit de frapper ! On raconte qu’il serait déjà parvenu à repousser une avalanche à coups de pince.","it":"Attacca subito, senza pensarci due volte. Secondo alcune testimonianze, ha fermato una valanga con una raffica di pugni.","ja":"かんがえるより まず なぐってみる。 ゆきなだれを パンチの ラッシュで おしかえしたという きろくも ある。"},"h":17,"w":1800},{"n":741,"ja":"オドリドリ","r":"Odoridori","en":"Oricorio","es":"Oricorio","fr":"Plumeline","it":"Oricorio","pt":"","g":7,"t":[10,3],"cat":{"en":"Dancing Pokémon","es":"Pokémon Danza","fr":"Pokémon Danse","it":"Pokémon Danza","ja":"ダンスポケモン"},"desc":{"en":"This Oricorio has drunk red nectar. If its Trainer gives the wrong order, this passionate Pokémon becomes fiercely angry.","es":"Forma que toma Oricorio al libar Néctar Rojo. Su vehemencia le lleva a ponerse hecho una furia si el Entrenador le imparte la orden equivocada.","fr":"Un Plumeline ayant bu du Nectar Rouge. D’un naturel passionné, il brûle de rage quand son Dresseur se trompe d’ordre.","it":"Un Oricorio che si è nutrito di Nettare rosso. È molto melodrammatico e va su tutte le furie se il suo Allenatore gli dà un’indicazione sbagliata.","ja":"くれないのミツを すった オドリドリ。 トレーナーが しじを まちがえると はげしく おこる げきじょうか だ。"},"h":6,"w":34},{"n":742,"ja":"アブリー","r":"Abuly","en":"Cutiefly","es":"Cutiefly","fr":"Bombydou","it":"Cutiefly","pt":"","g":7,"t":[7,18],"cat":{"en":"Bee Fly Pokémon","es":"Pokémon Mosca Abeja","fr":"Pokémon Bombyle","it":"Pokémon Bombilide","ja":"ツリアブポケモン"},"desc":{"en":"An opponent’s aura can tell Cutiefly what that opponent’s next move will be. Then Cutiefly can glide around the attack and strike back.","es":"Al percibir el aura del rival, puede predecir sus movimientos y esquivarlos sin problema mientras lanza su contraataque.","fr":"Il perçoit l’aura de son ennemi et anticipe ses mouvements. Il parvient ainsi à éviter les attaques et à riposter dans la foulée.","it":"Prevede la prossima mossa del nemico percependone l’aura. Schiva agilmente i suoi colpi e poi contrattacca.","ja":"てきが はっする オーラから つぎの こうどうを よそくする。 こうげきを ひらりと かわして はんげきする。"},"h":1,"w":2},{"n":743,"ja":"アブリボン","r":"Aburibbon","en":"Ribombee","es":"Ribombee","fr":"Rubombelle","it":"Ribombee","pt":"","g":7,"t":[7,18],"cat":{"en":"Bee Fly Pokémon","es":"Pokémon Mosca Abeja","fr":"Pokémon Bombyle","it":"Pokémon Bombilide","ja":"ツリアブポケモン"},"desc":{"en":"Ribombee absolutely hate getting wet or rained on. In the cloudy Galar region, they are very seldom seen.","es":"Detesta verse empapado por la lluvia, por lo que rara vez se deja ver en la nubosa región de Galar.","fr":"Il a horreur d’être trempé par la pluie. On ne le voit que très rarement à Galar, région connue pour son temps couvert.","it":"Odia ritrovarsi madido di pioggia. È raro vederne uno nella regione di Galar, dove il tempo è spesso nuvoloso.","ja":"あめに ぬれることが だいきらい。 くもりがちな ガラルちほうでは すがたを めったに おがめない。"},"h":2,"w":5},{"n":744,"ja":"イワンコ","r":"Iwanko","en":"Rockruff","es":"Rockruff","fr":"Rocabot","it":"Rockruff","pt":"","g":7,"t":[6],"cat":{"en":"Puppy Pokémon","es":"Pokémon Perrito","fr":"Pokémon Chiot","it":"Pokémon Cagnolino","ja":"こいぬポケモン"},"desc":{"en":"This Pokémon intimidates opponents by striking the ground with the rocks on its neck. The moment an opponent flinches, Rockruff attacks.","es":"Intimida a los rivales golpeando contra el suelo las rocas que tiene en el cuello y, tan pronto como retroceden, se abalanza sobre ellos.","fr":"Il intimide ses ennemis en cognant les rochers autour de son cou contre le sol. Au premier signe de faiblesse, il passe à l’assaut.","it":"Intimorisce l’avversario battendo a terra le rocce che ha sul collo e non appena lo vede esitare si lancia all’attacco.","ja":"くびのいわを じめんに うちつけ あいてを いかく。 ひるんだ しゅんかんに おそいかかるのだ。"},"h":5,"w":92},{"n":745,"ja":"ルガルガン","r":"Lugarugan","en":"Lycanroc","es":"Lycanroc","fr":"Lougaroc","it":"Lycanroc","pt":"","g":7,"t":[6],"cat":{"en":"Wolf Pokémon","es":"Pokémon Lobo","fr":"Pokémon Loup","it":"Pokémon Lupo","ja":"オオカミポケモン"},"desc":{"en":"With swift movements, this Pokémon gradually backs its prey into a corner. Lycanroc’s fangs are always aimed toward opponents’ weak spots.","es":"Va acorralando pacientemente a su presa con movimientos raudos para finalmente clavarle los colmillos en sus puntos vitales.","fr":"Il poursuit ses proies avec rapidité et patience. Une fois la cible acculée, il attaque toujours son point faible avec ses crocs.","it":"Intrappola gradualmente la preda avvicinandosi con movimenti rapidi. Le sue zanne mirano dritto ai punti vitali.","ja":"すばやい うごきで えものを じわじわ おいつめる。 キバは つねに きゅうしょを ねらっている。"},"h":8,"w":250},{"n":746,"ja":"ヨワシ","r":"Yowashi","en":"Wishiwashi","es":"Wishiwashi","fr":"Froussardine","it":"Wishiwashi","pt":"","g":7,"t":[11],"cat":{"en":"Small Fry Pokémon","es":"Pokémon Pececillo","fr":"Pokémon Minipoisson","it":"Pokémon Pesciolino","ja":"こざかなポケモン"},"desc":{"en":"When it senses danger, its eyes tear up. The sparkle of its tears signals other Wishiwashi to gather.","es":"Al sentirse amenazado, le lloran los ojos. La luz que se refleja en sus lágrimas sirve de señal a sus congéneres para agruparse en gran número.","fr":"Ses yeux se mouillent quand il sent le danger approcher. Le scintillement de ses larmes sert de signal pour que ses congénères se rassemblent.","it":"Quando percepisce un pericolo gli lacrimano gli occhi. Lo scintillio delle sue lacrime è un segnale che indica ai suoi simili di radunarsi.","ja":"きけんを かんじると めが うるむ。 なみだの ひかりが シグナルとなって たくさんの なかまが あつまるのだ。"},"h":2,"w":3},{"n":747,"ja":"ヒドイデ","r":"Hidoide","en":"Mareanie","es":"Mareanie","fr":"Vorastérie","it":"Mareanie","pt":"","g":7,"t":[4,11],"cat":{"en":"Brutal Star Pokémon","es":"Pokémon Estrellatroz","fr":"Pokémon Cruel","it":"Pokémon Stellatroce","ja":"ヒトデナシポケモン"},"desc":{"en":"Unlike their Alolan counterparts, the Mareanie of the Galar region have not yet figured out that the branches of Corsola are delicious.","es":"A diferencia de sus congéneres de Alola, los ejemplares de Galar aún no saben lo deliciosas que están las ramas de Corsola.","fr":"Contrairement aux Vorastérie ぬりつけると あくろでも すべらず あるけるようになるのだ。"},"h":10,"w":1100},{"n":750,"ja":"バンバドロ","r":"Banbadoro","en":"Mudsdale","es":"Mudsdale","fr":"Bourrinos","it":"Mudsdale","pt":"","g":7,"t":[5],"cat":{"en":"Draft Horse Pokémon","es":"Pokémon Caballo Tiro","fr":"Pokémon Cheval Trait","it":"Pokémon Fortequino","ja":"ばんばポケモン"},"desc":{"en":"Mudsdale has so much stamina that it could carry over 10 tons across the Galar region without rest or sleep.","es":"Su resistencia le permitiría recorrer Galar de punta a punta sin un solo descanso portando cargas de más de diez toneladas.","fr":"Il a assez d’endurance pour arpenter tout Galar sans relâche en tirant des charges dépassant les dix tonnes.","it":"È così resistente da poter attraversare l’intera regione di Galar trainando carichi di oltre 10 tonnellate senza mai riposarsi.","ja":"１０トンを こえる にもつを ひいて ふみんふきゅうで ガラルちほうを じゅうだんできる じきゅうりょく。"},"h":25,"w":9200},{"n":751,"ja":"シズクモ","r":"Shizukumo","en":"Dewpider","es":"Dewpider","fr":"Araqua","it":"Dewpider","pt":"","g":7,"t":[11,7],"cat":{"en":"Water Bubble Pokémon","es":"Pokémon Pompa","fr":"Pokémon Aquabulle","it":"Pokémon Bolladacqua","ja":"すいほうポケモン"},"desc":{"en":"Dewpider normally lives underwater. When it comes onto land in search of food, it takes water with it in the form of a bubble on its head.","es":"Vive bajo el agua y, cuando emerge a tierra firme en busca de presas, se recubre la cabeza con una burbuja.","fr":"Il vit principalement dans l’eau, mais s’il a besoin de s’aventurer sur la terre ferme pour chasser ses proies, il protège sa tête avec une bulle d’eau.","it":"Vive principalmente in acqua. Quando sale sulla terraferma in cerca di cibo ricopre la sua testa con una bolla d’acqua.","ja":"ふだんは みずの なかで せいかつ しているが エサを さがしに りくに あがるときは すいほうを かぶる。"},"h":3,"w":40},{"n":752,"ja":"オニシズクモ","r":"Onishizukumo","en":"Araquanid","es":"Araquanid","fr":"Tarenbulle","it":"Araquanid","pt":"","g":7,"t":[11,7],"cat":{"en":"Water Bubble Pokémon","es":"Pokémon Pompa","fr":"Pokémon Aquabulle","it":"Pokémon Bolladacqua","ja":"すいほうポケモン"},"desc":{"en":"It acts as a caretaker for Dewpider, putting them inside its bubble and letting them eat any leftover food.","es":"Cuida de pequeños Dewpider acogiéndolos en su burbuja de agua y dejando que se alimenten de los restos de las presas que ha ingerido.","fr":"Il prend soin de petits Araqua en les abritant dans sa bulle et en les laissant grignoter les restes de ses repas.","it":"Tiene un Dewpider nella bolla e se ne prende cura lasciando che si nutra dei suoi avanzi.","ja":"あたまの すいほうの なかに シズクモを いれて えさの のこりを たべさせながら せわを するのだ。"},"h":18,"w":820},{"n":753,"ja":"カリキリ","r":"Karikiri","en":"Fomantis","es":"Fomantis","fr":"Mimantis","it":"Fomantis","pt":"","g":7,"t":[12],"cat":{"en":"Sickle Grass Pokémon","es":"Pokémon Filo Hoja","fr":"Pokémon Fauch’Herbe","it":"Pokémon Mantiderba","ja":"かまくさポケモン"},"desc":{"en":"During the day, Fomantis basks in sunlight and sleeps peacefully. It wakes and moves around at night.","es":"De día duerme tranquilamente a la luz del sol y, al ocaso, despierta e inicia su actividad nocturna.","fr":"La journée, il dort tranquillement au soleil pour en absorber les rayons. La nuit, il se réveille et vaque à ses occupations.","it":"Trascorre le giornate a dormire tranquillo sotto il sole. Quando giunge la notte si sveglia e si mette in movimento.","ja":"ひるまは ひの ひかりを あび すやすやと ねむる。 よなかに めを さまし かつどうを はじめる。"},"h":3,"w":15},{"n":754,"ja":"ラランテス","r":"Lalantes","en":"Lurantis","es":"Lurantis","fr":"Floramantis","it":"Lurantis","pt":"","g":7,"t":[12],"cat":{"en":"Bloom Sickle Pokémon","es":"Pokémon Filo Flor","fr":"Pokémon Fauch’Fleur","it":"Pokémon Mantifiore","ja":"はなかまポケモン"},"desc":{"en":"The petals on this Pokémon’s arms are thin and super sharp, and they can fire laser beams if Lurantis gathers light first.","es":"Los pétalos de sus brazos son finos y afilados. Absorbe la luz solar y la concentra para lanzar poderosos rayos.","fr":"Les pétales sur ses deux bras sont fins, mais très tranchants. Ils peuvent également absorber la lumière pour la renvoyer sous forme de laser.","it":"I petali delle sue braccia sono sottili e affilati. Li usa per assorbire la luce ed emettere raggi energetici.","ja":"りょううでの はなびらは うすく きれあじは するどい。 ひかりを あつめて ビームも はなてるぞ。"},"h":9,"w":185},{"n":755,"ja":"ネマシュ","r":"Nemasyu","en":"Morelull","es":"Morelull","fr":"Spododo","it":"Morelull","pt":"","g":7,"t":[12,18],"cat":{"en":"Illuminating Pokémon","es":"Pokémon Luminiscente","fr":"Pokémon Luminescent","it":"Pokémon Luminescenza","ja":"はっこうポケモン"},"desc":{"en":"Morelull live in forests that stay dark even during the day. They scatter flickering spores that put enemies to sleep.","es":"Vive en bosques umbríos. Esparce a su alrededor esporas titilantes que adormecen a sus enemigos.","fr":"Il vit dans les forêts sombres même en plein jour. Il dissémine des spores clignotantes pour endormir ses ennemis.","it":"Vive nei boschi perennemente ombrosi. Sparge tutto intorno spore che emettono una luce intermittente con cui addormenta i nemici.","ja":"ひるまでも くらい もりで くらす。 てんめつしながら ひかる ほうしを ばらまいて てきを ねむらせる。"},"h":2,"w":15},{"n":756,"ja":"マシェード","r":"Mashade","en":"Shiinotic","es":"Shiinotic","fr":"Lampignon","it":"Shiinotic","pt":"","g":7,"t":[12,18],"cat":{"en":"Illuminating Pokémon","es":"Pokémon Luminiscente","fr":"Pokémon Luminescent","it":"Pokémon Luminescenza","ja":"はっこうポケモン"},"desc":{"en":"If you see a light deep in a forest at night, don’t go near. Shiinotic will make you fall fast asleep.","es":"Conviene no acercarse si se avistan luces en la espesura del bosque en plena noche, ya que podrían ser las esporas soporíferas de Shiinotic.","fr":"Il ne faut pas s’approcher des lumières qui luisent la nuit au fond des bois, sous peine de se faire endormir par un Lampignon.","it":"Se di notte si scorge una luce nel cuore della foresta, meglio non avvicinarsi: si rischia di finire vittima delle spore soporifere di Shiinotic.","ja":"まよなか もりの おくに あかりを みつけても ちかづいては いけない。 マシェードに ねむらされてしまうぞ。"},"h":10,"w":115},{"n":757,"ja":"ヤトウモリ","r":"Yatoumori","en":"Salandit","es":"Salandit","fr":"Tritox","it":"Salandit","pt":"","g":7,"t":[4,10],"cat":{"en":"Toxic Lizard Pokémon","es":"Pokémon Lagartoxina","fr":"Pokémon Toxilézard","it":"Pokémon Lucertossina","ja":"どくトカゲポケモン"},"desc":{"en":"This sneaky Pokémon will slink behind its prey and immobilize it with poisonous gas before the prey even realizes Salandit is there.","es":"Se aproxima a su presa por la espalda y, antes de que pueda advertirlo, la inmoviliza con un gas venenoso.","fr":"Il s’approche de ses proies par-derrière et les asperge d’un gaz empoisonné avant qu’elles n’aient le temps de réagir, les clouant sur place.","it":"Si avvicina alla preda da dietro senza farsi vedere e prima che possa rendersene conto le spruzza addosso un gas velenoso paralizzante.","ja":"えものの はいごに しのびより きづかれる まえに どくガスを あびせて うごけなくしてしまう。"},"h":6,"w":48},{"n":758,"ja":"エンニュート","r":"Ennewt","en":"Salazzle","es":"Salazzle","fr":"Malamandre","it":"Salazzle","pt":"","g":7,"t":[4,10],"cat":{"en":"Toxic Lizard Pokémon","es":"Pokémon Lagartoxina","fr":"Pokémon Toxilézard","it":"Pokémon Lucertossina","ja":"どくトカゲポケモン"},"desc":{"en":"The winner of competitions between Salazzle is decided by which one has the most male Salandit with it.","es":"Libran disputas con sus congéneres cuyo resultado, al parecer, se inclina por quien tenga un séquito de Salandit machos más numeroso.","fr":"Les conflits entre Malamandre seraient réglés par un simple calcul : le spécimen dont la suite comporte le plus de Tritox l’emporte.","it":"Sembra che nelle dispute tra Salazzle prevalga sempre l’esemplare che ha il maggior numero di Salandit maschi al seguito.","ja":"エンニュートどうしの あらそいは ひきつれている オスの ヤトウモリの かずで しょうはいが きまるらしい。"},"h":12,"w":222},{"n":759,"ja":"ヌイコグマ","r":"Nuikoguma","en":"Stufful","es":"Stufful","fr":"Nounourson","it":"Stufful","pt":"","g":7,"t":[1,2],"cat":{"en":"Flailing Pokémon","es":"Pokémon Rabieta","fr":"Pokémon Gigoteur","it":"Pokémon Bizzoso","ja":"じたばたポケモン"},"desc":{"en":" ma atrae a más enemigos.","fr":"La sueur sucrée qu’il produit lorsqu’on l’attaque est délicieuse. L’odeur de celle-ci lui attire encore plus d’ennemis.","it":"Quando viene attaccato produce un sudore dolce e delizioso, il cui profumo attira ulteriori nemici.","ja":"おそわれた ときに ながす あせは あまくて おいしい。 その かおりが さらに てきを ふやしてしまうのだ。"},"h":3,"w":32},{"n":762,"ja":"アママイコ","r":"Amamaiko","en":"Steenee","es":"Steenee","fr":"Candine","it":"Steenee","pt":"","g":7,"t":[12],"cat":{"en":"Fruit Pokémon","es":"Pokémon Fruto","fr":"Pokémon Fruit","it":"Pokémon Frutto","ja":"フルーツポケモン"},"desc":{"en":"Any Corvisquire that pecks at this Pokémon will be greeted with a smack from its sepals followed by a sharp kick.","es":"Si un Corvisquire viene a picotearlo, se defiende golpeándolo con el cáliz de la cabeza y con fuertes patadas.","fr":"Lorsqu’un Bleuseille le picore, il commence par se défendre avec son calice, et lui assène ensuite de violents coups de pied.","it":"Quando un Corvisquire viene a stuzzicarlo, lo colpisce prima con i sepali che ha sulla testa e poi con calci violenti.","ja":"つついてくる アオガラスには あたまの ヘタで なぐりつけてから するどい けりわざを おみまいする。"},"h":7,"w":82},{"n":763,"ja":"アマージョ","r":"Amajo","en":"Tsareena","es":"Tsareena","fr":"Sucreine","it":"Tsareena","pt":"","g":7,"t":[12],"cat":{"en":"Fruit Pokémon","es":"Pokémon Fruto","fr":"Pokémon Fruit","it":"Pokémon Frutto","ja":"フルーツポケモン"},"desc":{"en":"A kick from the hardened tips of this Pokémon’s legs leaves a wound in the opponent’s body and soul that will never heal.","es":"Propina patadas con sus duras y puntiagudas piernas, con las que deja heridas indelebles en el cuerpo y el corazón del adversario.","fr":"Ce Pokémon frappe violemment ses ennemis de la pointe dure de ses jambes, ce qui leur inflige des dégâts irréversibles au corps et à l’âme.","it":"Tira calci all’avversario con la punta dura e appuntita dei piedi, lasciandogli cicatrici indelebili nel corpo e nell’animo.","ja":"かたく とがった つまさきで けりを おみまいして あいての からだと こころに きえない きずを のこす。"},"h":12,"w":214},{"n":764,"ja":"キュワワー","r":"Cuwawa","en":"Comfey","es":"Comfey","fr":"Guérilande","it":"Comfey","pt":"","g":7,"t":[18],"cat":{"en":"Posy Picker Pokémon","es":"Pokémon Recogeflores","fr":"Pokémon Tressefleur","it":"Pokémon Ghirlanda","ja":"はなつみポケモン"},"desc":{"en":"These Pokémon smell very nice. All Comfey wear different flowers, so each of these Pokémon has its own individual scent.","es":"Este Pokémon libera una agradable fragancia, que varía de individuo a individuo debido a que cada uno se engalana con flores diferentes.","fr":"Ce Pokémon dégage un parfum agréable qui varie d’un spécimen à l’autre, car chaque Guérilande s’habille de fleurs différentes.","it":"Questo Pokémon emette un profumo davvero delizioso. Ogni esemplare ha una fragranza diversa a seconda dei fiori che ha addosso.","ja":"とても よいかおりがする ポケモン。 みにつける はなが ちがうので キュワワーごとに かおりは ちがう。"},"h":1,"w":3},{"n":765,"ja":"ヤレユータン","r":"Yareyuutan","en":"Oranguru","es":"Oranguru","fr":"Gouroutan","it":"Oranguru","pt":"","g":7,"t":[1,14],"cat":{"en":"Sage Pokémon","es":"Pokémon Sabio","fr":"Pokémon Grand Sage","it":"Pokémon Saggio","ja":"けんじゃポケモン"},"desc":{"en":"It knows the forest inside and out. If it comes across a wounded Pokémon, Oranguru will gather medicinal herbs to treat it.","es":"Conoce hasta el último rincón del bosque y, si encuentra un Pokémon herido, va en busca de hierbas medicinales para curarlo.","fr":"Il connaît la forêt sur le bout des doigts. Lorsqu’il trouve un Pokémon blessé, il cherche des plantes médicinales pour le soigner.","it":"Conosce alla perfezione ogni angolo della foresta e quando trova un Pokémon ferito cerca subito una pianta medicinale per curarlo.","ja":"もりの すみずみまで しりつくし きずついた ポケモンが いると やくそうを さがして ちりょうする。"},"h":15,"w":760},{"n":766,"ja":"ナゲツケサル","r":"Nagetukesaru","en":"Passimian","es":"Passimian","fr":"Quartermac","it":"Passimian","pt":"","g":7,"t":[2],"cat":{"en":"Teamwork Pokémon","es":"Pokémon Cooperación","fr":"Pokémon Coopération","it":"Pokémon Giocosquadra","ja" ierde se convierte en una suculenta presa.","fr":"Il vit dans des trous ou des épaves au fond de l’océan. Il se bat souvent contre Krakos, et le perdant sert de repas au gagnant.","it":"Vive sul fondo del mare, nelle buche o nei relitti. Si scontra sempre con Grapploct. Il perdente diventa il cibo del vincitore.","ja":"かいていの あなや ちんぼつせんが すみか。 オトスパスと たたかい まけた ほうが エサになるのだ。"},"h":20,"w":1080},{"n":769,"ja":"スナバァ","r":"Sunaba","en":"Sandygast","es":"Sandygast","fr":"Bacabouh","it":"Sandygast","pt":"","g":7,"t":[8,5],"cat":{"en":"Sand Heap Pokémon","es":"Pokémon Montearena","fr":"Pokémon Pâtéd’Sable","it":"Pokémon Montesabbia","ja":"すなやまポケモン"},"desc":{"en":"Sandygast mainly inhabits beaches. It takes control of anyone who puts their hand into its mouth, forcing them to make its body bigger.","es":"Suele habitar en playas. Aumenta de tamaño al tomar control de todo aquel que se atreva a introducir la mano en su boca.","fr":"Il vit principalement sur les plages de sable et peut agrandir son corps en prenant le contrôle des gens qui mettent la main dans sa gueule.","it":"Vive principalmente in spiagge sabbiose. Aumenta di dimensioni prendendo il controllo di chiunque gli metta una mano in bocca.","ja":"すなはまが おもな すみか。 くちのなかに てをいれた あいてを あやつり じぶんを おおきくする。"},"h":5,"w":700},{"n":770,"ja":"シロデスナ","r":"Sirodethna","en":"Palossand","es":"Palossand","fr":"Trépassable","it":"Palossand","pt":"","g":7,"t":[8,5],"cat":{"en":"Sand Castle Pokémon","es":"Pokémon Castiarena","fr":"Pokémon Châtod’Sable","it":"Pokémon Castelsabbia","ja":"すなのしろポケモン"},"desc":{"en":"This Pokémon lives on beaches, but it hates water. Palossand can’t maintain its castle-like shape if it gets drenched by a heavy rain.","es":"Habita en las playas, aunque odia el agua. Cuando caen fuertes lluvias, no es capaz de preservar su forma de castillo.","fr":"Bien qu’il déteste l’eau, il vit sur les plages. Quand la pluie s’abat sur lui, il est incapable de conserver sa forme de château de sable.","it":"Vive sulla spiaggia ma odia l’acqua. Sotto una pioggia violenta, non riesce a mantenere la sua forma di castello di sabbia.","ja":"ビーチに すむが みずが きらい。 はげしい あめに うたれると おしろの かたちを たもてない。"},"h":13,"w":2500},{"n":771,"ja":"ナマコブシ","r":"Namakobushi","en":"Pyukumuku","es":"Pyukumuku","fr":"Concombaffe","it":"Pyukumuku","pt":"","g":7,"t":[11],"cat":{"en":"Sea Cucumber Pokémon","es":"Pokémon Pepino Mar","fr":"Pokémon Holothurie","it":"Pokémon Oloturia","ja":"なまこポケモン"},"desc":{"en":"It’s covered in a slime that keeps its skin moist, allowing it to stay on land for days without drying up.","es":"La formidable mucosidad que envuelve su piel lo mantiene hidratado y le permite permanecer en tierra firme varios días sin secarse.","fr":"Le fluide visqueux qui le recouvre garde sa peau bien hydratée, ce qui lui permet de vivre plusieurs jours sur la terre ferme sans se dessécher.","it":"Il muco di cui è ricoperto mantiene stabile l’umidità della sua pelle. Può rimanere fuori dall’acqua per giorni senza seccarsi.","ja":"ほしつこうかに すぐれた ねんえきが ひふを おおっているので なんにちも りくちに いても ひからびない。"},"h":3,"w":12},{"n":772,"ja":"タイプ：ヌル","r":"Null","en":"Type: Null","es":"Código Cero","fr":"Type:0","it":"Tipo Zero","pt":"","g":7,"t":[1],"cat":{"en":"Synthetic Pokémon","es":"Pokémon Multigénico","fr":"Pokémon Multigénome","it":"Pokémon Multigene","ja":"じんこうポケモン"},"desc":{"en":"It was modeled after a mighty Pokémon of myth. The mask placed upon it limits its power in order to keep it under control.","es":"Fue creado a imagen de un Pokémon mitológico. Lleva una máscara de contención para evitar que su poder se descontrole.","fr":"Il a été créé artificiellement d’après un Pokémon mythique. Il est muni d’un masque afin de contenir sa puissance.","it":"È stato creato sul modello di un Pokémon mitologico. È stato necessario dotarlo di una maschera per tenere a freno la sua potenza.","ja":"しんわの ポケモンを モデルに つくられたが ちからの ぼうそうを おさえる マスクを つけられている。"},"h":19,"w":1205},{"n":773,"ja":"シルヴァディ","r":"Silvady","en":"Silvally","es":"Silvally","fr":"Silvallié","it":"Silvally","pt":"","g":7,"t":[1],"cat":{"en":"Synthetic Pokémon","es":"Pokémon Multigénico","fr":"Pokémon Multigénome","it":"Pokémon Multigene","ja":"じんこうポケモン"},"desc":{"en":"The final factor needed to release this Pokémon’s true power was a strong bond with a Trainer it trusts.","es":"El factor decisivo que le ha permitido liberar toda su fuerza ha sido el estrecho vínculo y la confianza que profesa a su Entrenador.","fr":"La relation de confiance qui le lie à son Dresseur est le facteur décisif qui lui permet de libérer tout son potentiel.","it":"Il fattore decisivo che permette di liberare la sua vera potenza è il legame di fiducia che lo unisce al suo Allenatore.","ja":"ほんらいの ちからを ときはなつ さいごの ファクターは しんらいする トレーナーとの きずな だった。"},"h":23,"w":1005},{"n":774,"ja":"メテノ","r":"Meteno","en":"Minior","es":"Minior","fr":"Météno","it":"Minior","pt":"","g":7,"t":[6,3],"cat":{"en":"Meteor Pokémon","es":"Pokémon Meteoro","fr":"Pokémon Météore","it":"Pokémon Meteora","ja":"ながれぼしポケモン"},"desc":{"en":"Although its outer shell is uncommonly durable, the shock of falling to the ground smashes the shell to smithereens.","es":"Lo recubre un duro caparazón que se quiebra en pedazos al impactar con la superficie de la tierra.","fr":"Sa carapace, pourtant très solide, éclate en mille morceaux quand il s’écrase sur la terre en tombant du ciel.","it":"Il suo guscio esterno è estremamente resistente, ma quando precipita dallo strato d’ozono l’impatto con il suolo lo fa andare in mille pezzi.","ja":"がいかくは とても がんじょうだが ちじょうに らっかする ショックで こっぱみじんに くだけてしまう。"},"h":3,"w":400},{"n":775,"ja":"ネッコアラ","r":"Nekkoara","en":"Komala","es":"Komala","fr":"Dodoala","it":"Komala","pt":"","g":7,"t":[1],"cat":{"en":"Drowsing Pokémon","es":"Pokémon Duermevela","fr":"Pokémon Rêveur","it":"Pokémon Dormiveglia","ja":"ゆめうつつポケモン"},"desc":{"en":"It remains asleep from birth to death as a result of the sedative properties of the leaves that form its diet.","es":"El motivo de su letargo vitalicio es la sustancia somnífera que contienen las hojas de las que se alimenta.","fr":"Ce Pokémon passe sa vie entière à dormir à cause des composants anesthésiants qui se trouvent dans les feuilles qu’il mange.","it":"Poiché le foglie di cui si nutre contengono una sostanza soporifera, Komala trascorre la sua intera vita dormendo.","ja":"しぬまで ずっと ねむったままなのは エサの はっぱに ますいの ような せいぶんが ふくまれているからだ。"},"h":4,"w":199},{"n":776,"ja":"バクガメス","r":"Bakugames","en":"Turtonator","es":"Turtonator","fr":"Boumata","it":"Turtonator","pt":"","g":7,"t":[10,16],"cat":{"en":"Blast Turtle Pokémon","es":"Pokémon Tortugabomba","fr":"Pokémon Tortue Boum","it":"Pokémon Tartabomba","ja":"ばくはつがめポケモン"},"desc":{"en":"Eating sulfur in its volcanic habitat is what causes explosive compounds to develop in its shell. Its droppings are also dangerously explosive.","es":"El material explosivo de su caparazón está compuesto por el azufre del que se alimenta. Sus excrementos explosivos son muy peligrosos.","fr":"Il vit dans les volcans. Le soufre dont il se nourrit rend sa carapace explosive. Même ses selles sont dangereuses, car elles sont instables.","it":"Vive nei vulcani. Lo zolfo di cui si nutre rende esplosivo il suo carapace e i suoi escrementi. Questi ultimi sono molto pericolosi.","ja":"かざんで くらし たべた いおうが こうらの ばくやくの もとになる。 フンも ばくはつする きけんぶつ。"},"h":20,"w":2120},{"n":777,"ja":"トゲデマル","r":"Togedemaru","en":"Togedemaru","es":"Togedemaru","fr":"Togedemaru","it":"Togedemaru","pt":"","g":7,"t":[13,9],"cat":{"en":"Roly-Poly Pokémon","es":"Pokémon Bolita","fr":"Pokémon Roulenboule","it":"Pokémon Ricciopalla","ja":"まるまりポケモン"},"desc":{"en":"When it’s in trouble, it curls up into a ball, makes its fur spikes stand on end, and then discharges electricity indiscriminately.","es":"Cuando se encuentra en peligro, se hace una bola, eriza las púas del lomo y propina descargas eléctricas a diestro y siniestro.","fr":"En cas de danger, il se roule en boule, dresse ses épines dorsales et lance des décharges électriques au hasard.","it":"In caso di pericolo si appallottola, drizza le spine sulla schiena e scarica energia elettrica all’impazzata.","ja":"ピンチになると からだを まるめて せなかの とげとげを さかだてると でたらめに でんげきを うちまくる。"},"h":3,"w":33},{"n":778,"ja":"ミミッキュ","r":"Mimikkyu","en":"Mimikyu","es":"Mimikyu","fr":"Mimiqui","it":"Mimikyu","pt":"","g":7,"t":[8,18],"cat":{"en":"Disguise Pokémon","es":"Pokémon Disfraz","fr":"Pokémon Fantômasque","it":"Pokémon Fantasmanto","ja":"ばけのかわポケモン"},"desc":{"en":"There was a scientist who peeked under Mimikyu’s old rag in the name of research. The scientist died of a mysterious disease.","es":"Un investigador que miró dentro del saco para estudiar a este Pokémon perdió la vida a causa de una misteriosa enfermedad.","fr":"Les malheureux chercheurs qui ont regardé sous son déguisement en lambeaux ont succombé à une mystérieuse maladie.","it":"Uno scienziato che studiava questo Pokémon morì di una misteriosa malattia dopo aver guardato sotto il suo panno.","ja":"けんきゅうのため ボロぬのの なかを みてしまった がくしゃが なぞの びょうきで いのちを おとした。"},"h":2,"w":7},{"n":779,"ja":"ハギギシリ","r":"Hagigishiri","en":"Bruxish","es":"Bruxish","fr":"Denticrisse","it":"Bruxish","pt":"","g":7,"t":[11,14],"cat":{"en":"Gnash Teeth Pokémon","es":"Pokémon Rechinante","fr":"Pokémon Grincedent","it":"Pokémon Sfregadenti","ja":"はぎしりポケモン"},"desc":{"en":"Its skin is thick enough to fend off Mareanie’s spikes. With its robust teeth, Bruxish crunches up the spikes and eats them.","es":"Su piel es tan gruesa que ni las espinas de Mareanie pueden perforarla. Con su fuerte dentadura tritura y engulle dichas espinas.","fr":"Sa peau est si épaisse que même les épines de Vorastérie ne peuvent la percer. Il les croque bruyamment grâce à ses dents solides.","it":"La sua pelle spessa non viene scalfita neanche dagli aculei dei Mareanie, che sgranocchia con le robuste zanne.","ja":"ヒドイデの ハリも とおさないほど ぶあつい ひふ。 じょうぶな はで ボリボリと ハリを かじって くう。"},"h":9,"w":190},{"n":780,"ja":"ジジーロン","r":"Jijilong","en":"Drampa","es":"Drampa","fr":"Draïeul","it":"Drampa","pt":"","g":7,"t":[ ca con sus congéneres mediante los sonidos que produce al golpear sus escamas, duras como el acero.","fr":"Il communique avec ses congénères en faisant cliqueter ses écailles dures comme du métal.","it":"Comunica con i suoi simili scuotendo le squame dure come il metallo.","ja":"たいもうが きんぞくのように かたく なった ウロコを うちならして なかまと コミュニケーションする。"},"h":6,"w":297},{"n":783,"ja":"ジャランゴ","r":"Jyarango","en":"Hakamo-o","es":"Hakamo-o","fr":"Écaïd","it":"Hakamo-o","pt":"","g":7,"t":[16,2],"cat":{"en":"Scaly Pokémon","es":"Pokémon Escamas","fr":"Pokémon Écailles","it":"Pokémon Squama","ja":"うろこポケモン"},"desc":{"en":"Before attacking its enemies, it clashes its scales together and roars. Its sharp claws shred the opposition.","es":"Tras hacer sonar sus escamas y proferir su grito de guerra, carga contra el enemigo y lo hace trizas con sus afiladas garras.","fr":"Après avoir fait tinter ses écailles et poussé un terrible cri de guerre, il charge ses ennemis et les lacère de ses griffes acérées.","it":"Fa risuonare le squame ed emette un possente urlo, per poi lanciarsi sull’avversario e farlo a fettine con i suoi artigli affilati.","ja":"ウロコを うちならし おたけびを あげてから あいてに いどみかかり するどい ツメで ずたずたに する。"},"h":12,"w":470},{"n":784,"ja":"ジャラランガ","r":"Jyararanga","en":"Kommo-o","es":"Kommo-o","fr":"Ékaïser","it":"Kommo-o","pt":"","g":7,"t":[16,2],"cat":{"en":"Scaly Pokémon","es":"Pokémon Escamas","fr":"Pokémon Écailles","it":"Pokémon Squama","ja":"うろこポケモン"},"desc":{"en":"Certain ruins have paintings of ancient warriors wearing armor made of Kommo-o scales.","es":"Se han descubierto antiguas representaciones pictóricas de guerreros que lucían armaduras confeccionadas con escamas de Kommo-o.","fr":"Dans les ruines, on trouve parfois des fresques représentant des guerriers antiques qui portent des armures faites avec ses écailles.","it":"In antiche rovine sono stati rinvenuti dipinti raffiguranti guerrieri con armature fatte di squame di Kommo-o.","ja":"ジャラランガの ウロコで つくった ヨロイを みに まとった こだいの せんしが いせきに えがかれている。"}, ":[11],"cat":{"en":"Secret Agent Pokémon","es":"Pokémon Agente","fr":"Pokémon Agent Secret","it":"Pokémon Agente","ja":"エージェントポケモン"},"desc":{"en":"Its nictitating membranes let it pick out foes’ weak points so it can precisely blast them with water that shoots from its fingertips at Mach 3.","es":"Dispara chorros de agua por la punta de los dedos a 3 mach de velocidad. Con su membrana nictitante puede ver los puntos débiles del rival.","fr":"Il repère le point faible de l’ennemi grâce à sa membrane nictitante, puis il transperce sa cible en tirant des jets d’eau à Mach 3 du bout des doigts.","it":"Spara getti d’acqua dalla punta delle dita a una velocità di Mach 3. Grazie alle sue membrane nittitanti individua i punti deboli del nemico.","ja":"ゆびさきから はなつ みずでっぽうは マッハ３の はやさ。 しゅんまくで きゅうしょを みぬいて うちぬくぞ。"},"h":19,"w":452},{"n":819,"ja":"ホシガリス","r":"Hoshigarisu","en":"Skwovet","es":"Skwovet","fr":"Rongourmand","it":"Skwovet","pt":"","g":8,"t":[1],"cat":{"en":"Cheeky Pokémon","es":"Pokémon Abazón","fr":"Pokémon Joufflu","it":"Pokémon Guancepiene","ja":"ほおばりポケモン"},"desc":{"en":"It eats berries nonstop—a habit that has made it more resilient than it looks. It’ll show up on farms, searching for yet more berries.","es":"Siempre están comiendo bayas, por lo que son más robustos de lo que aparentan. Frecuentan los huertos en busca de su preciado manjar.","fr":"Comme il mange tout le temps des Baies, il est plus costaud qu’il n’en a l’air. Il parcourt les champs à la recherche de sa précieuse denrée.","it":"Per via dell’abitudine di mangiare senza sosta, è più forte di quanto possa sembrare. Fa incetta di bacche nei campi coltivati.","ja":"つねに きのみを くっているので みかけいじょうに タフ。 きのみを ねらって はたけに あらわれる。"},"h":3,"w":25},{"n":820,"ja":"ヨクバリス","r":"Yokubarisu","en":"Greedent","es":"Greedent","fr":"Rongrigou","it":"Greedent","pt":"","g":8,"t":[1],"cat":{"en":"Greedy Pokémon","es":"Pokémon Avaricia","fr":"Pokémon Goulu","it":"Pokémon Ingordigia","ja":"よくばりポケモン"},"desc":{"en":"Common throughout the
