e that the harsh winter is over, and the season of budding has begun.","es":"Es muy sensible a los cambios de temperatura. Anuncia la llegada inminente de la primavera cuando florece.","fr":"Il est sensible aux variations de température. Quand son bourgeon commence à s’ouvrir, l’arrivée du printemps est imminente.","it":"È sensibile agli sbalzi di temperatura. Quando le sue gemme si schiudono è segno che la primavera è vicina.","ja":"きおんの へんかに びんかん。 つぼみが ひらきはじめたら はるの おとずれは もうすぐだ。"},"h":2,"w":12},{"n":407,"ja":"ロズレイド","r":"Roserade","en":"Roserade","es":"Roserade","fr":"Roserade","it":"Roserade","pt":"","g":4,"t":[12,4],"cat":{"en":"Bouquet Pokémon","es":"Pokémon Ramillete","fr":"Pokémon Bouquet","it":"Pokémon Floreale","ja":"ブーケポケモン"},"desc":{"en":"Hidden within the bouquet on each hand are thorned whips loaded with virulent poison. Roserade moves gracefully as it corners its prey and mercilessly lashes them with its whips.","es":"Las toxinas de la mano derecha son de efecto inmediato, y las de la izquierda, retardado. No obstante, ambas pueden ser letales.","fr":"Sa main gauche administre un poison lent, et la droite, un poison foudroyant. Les deux peuvent être fatals.","it":"Il veleno nel bouquet destro ha effetto istantaneo, quello nel sinistro ha effetto ritardato. Entrambi possono essere letali.","ja":"みぎての どくは そっこうせい。 ひだりての どくは ちこうせい。 どちらも いのちに かかわるぞ。"},"h":9,"w":145},{"n":408,"ja":"ズガイドス","r":"Zugaidos","en":"Cranidos","es":"Cranidos","fr":"Kranidos","it":"Cranidos","pt":"","g":4,"t":[6],"cat":{"en":"Head Butt Pokémon","es":"Pokémon Cabezazo","fr":"Pokémon Coud’Boule","it":"Pokémon Cranioso","ja":"ずつきポケモン"},"desc":{"en":"An incredibly rare sight. They duel each other by ramming their heads together, and the resulting sound echoes throughout the area like the pealing of a bell.","es":"Se caracteriza por la dureza de su cráneo. Derribaba árboles a cabezazos para comerse las bayas maduras que colgaban de ellos.","fr":"Son crâne extrêmement solide est sa principale caractéristique. Il s’en servait pour faire tomber des arbres les Baies dont il se nourrissait.","it":"Era caratterizzato da un cranio durissimo, grazie al quale spezzava gli alberi a testate per poi cibarsi delle bacche mature.","ja":"かたい ずがいこつが とくちょう。 ずつきで じゅもくを へしおって みのった きのみを くっていた。"},"h":9,"w":315},{"n":409,"ja":"ラムパルド","r":"Rampard","en":"Rampardos","es":"Rampardos","fr":"Charkos","it":"Rampardos","pt":"","g":4,"t":[6],"cat":{"en":"Head Butt Pokémon","es":"Pokémon Cabezazo","fr":"Pokémon Coud’Boule","it":"Pokémon Cranioso","ja":"ずつきポケモン"},"desc":{"en":"Very little is known about its biology. Can knock down massive trees by smashing its beautiful, pearl-like crown against them.","es":"Pokémon prehistórico especializado en dar cabezazos. Una teoría atribuye su extinción a su cerebro pequeño y a su poca inteligencia.","fr":"Pokémon préhistorique célèbre pour ses coups de tête puissants et son petit cerveau, son extinction serait due à son extrême bêtise.","it":"Questo antico Pokémon eccelle nel dare testate. Secondo una teoria, si è estinto perché troppo ottuso. Il suo cervello è infatti molto piccolo.","ja":"ずつきが とくいな こだいのポケモン。 ほんとうに のうみそが ちいさいので おろかで ほろんだというせつも ある。"},"h":16,"w":1025},{"n":410,"ja":"タテトプス","r":"Tatetops","en":"Shieldon","es":"Shieldon","fr":"Dinoclier","it":"Shieldon","pt":"","g":4,"t":[6,9],"cat":{"en":"Shield Pokémon","es":"Pokémon Escudo","fr":"Pokémon Bouclier","it":"Pokémon Schermo","ja":"シールドポケモン"},"desc":{"en":"Much remains unknown about this Pokémon, as few have ever seen it. However, we know that it is calm and dislikes conflict, and it enjoys polishing its face against trees and rocks.","es":"Los fósiles que se han encontrado hasta ahora en estratos prehistóricos pertenecen solo a su cara.","fr":"On retrouve des fossiles de Dinoclier dans les couches sédimentaires préhistoriques, mais seule sa tête a résisté à l’épreuve du temps.","it":"Fossili di questo Pokémon sono stati trovati in strati geologici antichissimi. Tuttavia, gli unici resti pervenuti costituiscono parti del muso.","ja":"たいこの ちそうから かせきが みつかるが かおの ぶぶん いがいが はっけん されたことは ない。"},"h":5,"w":570},{"n":411,"ja":"トリデプス","r":"Trideps","en":"Bastiodon","es":"Bastiodon","fr":"Bastiodon","it":"Bastiodon","pt":"","g":4,"t":[6,9],"cat":{"en":"Shield Pokémon","es":"Pokémon Escudo","fr":"Pokémon Bouclier","it":"Pokémon Schermo","ja":"シールドポケモン"},"desc":{"en":"Its face is sturdy—as strong as diamond—and this hardness offers a very stable defense. Much about this species is still unknown, such as its natural habitat.","es":"Un Pokémon con una antigüedad de unos cien millones de años. Su rostro posee una dureza impresionante, superior incluso a la del acero.","fr":"Un Pokémon éteint depuis environ 100 millions d’années. Sa tête incroyablement solide était plus dure que l’acier.","it":"Questo Pokémon esisteva 100 milioni di anni fa. Il suo muso, incredibilmente resistente, può essere persino più duro dell’acciaio.","ja":"やく１おくねんまえの ポケモン。 おそろしく がんじょうな かおは こうてついじょうの こうどを もつ。"},"h":13,"w":1495},{"n":412,"ja":"ミノムッチ","r":"Minomucchi","en":"Burmy","es":"Burmy","fr":"Cheniti","it":"Burmy","pt":"","g":4,"t":[7],"cat":{"en":"Bagworm Pokémon","es":"Pokémon Larva","fr":"Pokémon Ver Caché","it":"Pokémon Larva","ja":"みのむしポケモン"},"desc":{"en":"If its cloak is even slightly damaged, Burmy will immediately repair it with whatever is close at hand. The Pokémon within the cloak is scrawny and vulnerable to the cold.","es":"Si su caparazón se rompe en combate, lo rehace rápidamente con lo que tenga a mano.","fr":"S’il perd sa cape au combat, il en tisse rapidement une nouvelle avec ce qui lui tombe sous la main.","it":"Se il suo manto si rompe mentre lotta, lo rifà velocemente con ciò che trova attorno a sé.","ja":"たたかいで ミノが こわれてしまうと ちかくにある ざいりょうで ミノを すぐに つくりなおす。"},"h":2,"w":34},{"n":413,"ja":"ミノマダム","r":"Minomadam","en":"Wormadam","es":"Wormadam","fr":"Cheniselle","it":"Wormadam","pt":"","g":4,"t":[7,12],"cat":{"en":"Bagworm Pokémon","es":"Pokémon Larva","fr":"Pokémon Ver Caché","it":"Pokémon Larva","ja":"みのむしポケモン"},"desc":{"en":"When Burmy evolved, its cloak became a part of this Pokémon’s body. The cloak is never shed.","es":"Cuando Burmy evolucionó, su caparazón pasó a formar parte de este Pokémon.","fr":"Quand Cheniti a évolué, sa cape a fusionné avec son corps. Cheniselle ne s’en sépare jamais.","it":"Con l’evoluzione, il manto di Burmy diventa parte del corpo di questo Pokémon. Non se ne separa mai.","ja":"ミノムッチから しんかしたとき ミノが からだの いちぶに なった。 いっしょう ミノを ぬぐことはない。"},"h":5,"w":65},{"n":414,"ja":"ガーメイル","r":"Garmeil","en":"Mothim","es":"Mothim","fr":"Papilord","it":"Mothim","pt":"","g":4,"t":[7,3],"cat":{"en":"Moth Pokémon","es":"Pokémon Polilla","fr":"Pokémon Phalène","it":"Pokémon Falena","ja":"ミノガポケモン"},"desc":{"en":"Scatters steel-colored scales as it flaps its wings. Despite being observed feeding primarily on the nectar of flowers, Mothim is not often seen around flower gardens.","es":"Hace vida nocturna. Revolotea y roba la miel de las colmenas de Combee cuando duermen.","fr":"Ce Pokémon s’active à la nuit tombée pour voler le miel des Apitrini pendant leur sommeil.","it":"Vola qua e là di notte per derubare i Combee del loro nettare mentre dormono, e poi fuggire.","ja":"よなか かっぱつに とびまわり ねむっている ミツハニーの す から ミツを うばって にげる。"},"h":9,"w":233},{"n":415,"ja":"ミツハニー","r":"Mitsuhoney","en":"Combee","es":"Combee","fr":"Apitrini","it":"Combee","pt":"","g":4,"t":[7,3],"cat":{"en":"Tiny Bee Pokémon","es":"Pokémon Abejita","fr":"Pokémon Miniabeille","it":"Pokémon Apetta","ja":"はちのこポケモン"},"desc":{"en":"They swear fealty to a queen Pokémon and work diligently to gather nectar. Each swarm produces a different flavor of honey.","es":"Recolecta néctar de sol a sol para entregarlo a la colonia y a Vespiquen.","fr":"Du lever du soleil à la tombée de la nuit, il récolte du nectar pour Apireine et sa colonie.","it":"Raccoglie nettare dal tramonto all’alba per il bene del gruppo e di Vespiquen.","ja":"よあけから ひぐれまで ミツを あつめつづける。 すべては むれと ビークインの ためだ。"},"h":3,"w":55},{"n":416,"ja":"ビークイン","r":"Beequeen","en":"Vespiquen","es":"Vespiquen","fr":"Apireine","it":"Vespiquen","pt":"","g":4,"t":[7,3],"cat":{"en":"Beehive Pokémon","es":"Pokémon Colmena","fr":"Pokémon Ruche","it":"Pokémon Alveare","ja":"はちのすポケモン"},"desc":{"en":"Commands its subjects to build its hive. It will dispatch any interlopers who dare sneak into its nest and use them as nourishment for itself.","es":"Cuanto mayor sea la cantidad de feromonas que segregue, mayor será el número de Combee que pueda controlar.","fr":"Plus la quantité de phéromones qu’il libère est élevée, plus le nombre d’Apitrini qu’il peut diriger est grand.","it":"Maggiore è la quantità di feromoni rilasciati da Vespiquen, maggiore è il numero di Combee sotto il suo controllo.","ja":"フェロモンを はなつ りょうが おおい ビークインほど おおくの ミツハニーを したがえている。"},"h":12,"w":385},{"n":417,"ja":"パチリス","r":"Pachirisu","en":"Pachirisu","es":"Pachirisu","fr":"Pachirisu","it":"Pachirisu","pt":"","g":4,"t":[13],"cat":{"en":"EleSquirrel Pokémon","es":"Pokémon Ardillalec","fr":"Pokémon Écurélec","it":"Pokémon Elescoiatto","ja":"でんきりすポケモン"},"desc":{"en":"A species related to the Pikachu line. Though Pachirisu is a calm Pokémon, it still presents a danger should one touch its electrified tail or cheeks.","es":"A veces se ve a dos frotándose las bolsas de las mejillas para compartir electricidad almacenada.","fr":"Il arrive que deux Pachirisu se frottent les joues pour partager l’électricité qu’ils ont accumulée.","it":"Talvolta due esemplari si sfregano le guance per condividere l’elettricità immagazzinata.","ja":"たまった でんきを わけあたえようと ほほぶくろを こすりあわせる パチリスを みかけることも ある。"},"h":4,"w":39},{"n":418,"ja":"ブイゼル","r":"Buoysel","en":"Buizel","es":"Buizel","fr":"Mustébouée","it":"Buizel","pt":"","g":4,"t":[11],"cat":{"en":"Sea Weasel Pokémon","es":"Pokémon Nutria Mar.","fr":"Pokémon Aquabelette","it":"Pokémon Maridonnola","ja":"うみイタチポケモン"},"desc":{"en":"It moves freely in the water by spinning its forked tail for propulsion. The resemblance to the screw of a steamboat is coincidental.","es":"Hincha el flotador de su cuello para flotar y saca la cabeza de la superficie del agua para explorar sus alrededores.","fr":"Il utilise la bouée autour de son cou pour passer sa tête hors de l’eau et observer les alentours.","it":"Gonfia il salvagente che ha attorno al collo per mantenere la testa fuori dall’acqua mentre controlla i paraggi.","ja":"くびの うきぶくろを ふくらませ すいめんから かおを だして あたりの ようすを うかがっている。"},"h":7,"w":295},{"n":419,"ja":"フローゼル","r":"Flowsel","en":"Floatzel","es":"Floatzel","fr":"Mustéflott","it":"Floatzel","pt":"","g":4,"t":[11],"cat":{"en":"Sea Weasel Pokémon","es":"Pokémon Nutria Mar.","fr":"Pokémon Aquabelette","it":"Pokémon Maridonnola","ja":"うみイタチポケモン"},"desc":{"en":"Has a long, rather splendid flotation sac, which prevents Floatzel from drowning even in stormy seas. One might glimpse this species around fishing hamlets from time to time.","es":"Su flotador se desarrolló a raíz de perseguir presas acuáticas. También sirve como balsa.","fr":"Il a développé une bouée pour poursuivre ses proies aquatiques. Elle fait office de canot gonflable.","it":"Il suo galleggiante, che funge da gommone, si è sviluppato perché caccia le prede nell’acqua.","ja":"すいちゅうの えものを おいかける うちに うきぶくろが はったつした。 ゴムボートのように ひとを のせる。"},"h":11,"w":335},{"n":420,"ja":"チェリンボ","r":"Cherinbo","en":"Cherubi","es":"Cherubi","fr":"Ceribou","it":"Cherubi","pt":"","g":4,"t":[12],"cat":{"en":"Cherry Pokémon","es":"Pokémon Cereza","fr":"Pokémon Cerise","it":"Pokémon Ciliegia","ja":"さくらんぼポケモン"},"desc":{"en":"Once the fruit growing alongside the main body is large and plump, Cherubi will use the nutrients within to evolve. The fruit then detaches, becoming nourishment for other creatures.","es":"Cuanto más rojo sea su cuerpo, más dulce y deliciosa será su pequeña esfera repleta de nutrientes.","fr":"Plus son corps est rouge, plus la saveur de sa petite boule gorgée de nutriments est sucrée et délicieuse.","it":"Più è rosso, più è ricco di sostanze nutritive e più la sua pallina si fa dolce e gustosa.","ja":"からだが あかい チェリンボほど えいようが おおく たまの あじも あまくて おいしいよ。"},"h":4,"w":33},{"n":421,"ja":"チェリム","r":"Cherrim","en":"Cherrim","es":"Cherrim","fr":"Ceriflor","it":"Cherrim","pt":"","g":4,"t":[12],"cat":{"en":"Blossom Pokémon","es":"Pokémon Floración","fr":"Pokémon Floraison","it":"Pokémon Bocciolo","ja":"サクラポケモン"},"desc":{"en":"Motionless, save for the occasional quiver. A rich array of Pokémon can be found gathered around it, drawn by the scent exuded from Cherrim's folded petals.","es":"Al cerrarse, sus pétalos son tan duros que resultan inmunes a los picotazos de los Pokémon pájaro.","fr":"Lorsqu’il se ferme, ses pétales sont si durs qu’il ne craint plus les attaques des Pokémon oiseaux.","it":"I petali ripiegati sono molto duri e lo proteggono dalle beccate dei Pokémon alati.","ja":"たたんだ はなびらは かたい。 とりポケモンに つっつかれても ぜんぜん へいき なのだ。"},"h":5,"w":93},{"n":422,"ja":"カラナクシ","r":"Karanakushi","en":"Shellos","es":"Shellos","fr":"Sancoki","it":"Shellos","pt":"","g":4,"t":[11],"cat":{"en":"Sea Slug Pokémon","es":"Pokémon Babosa Marina","fr":"Pokémon Aqualimace","it":"Pokémon Lumacomare","ja":"ウミウシポケモン"},"desc":{"en":"Found in abundance on seashores bordering warm waters. Shellos are unexpectedly friendly and will crawl toward any person they see. Take care not to get coated in mucus!","es":"Si se le aprieta muy fuerte, secreta un misterioso fluido morado que, aunque inofensivo, resulta desagradable por su viscosidad.","fr":"Si on le caresse trop fort, il sécrète un étrange liquide mauve qui est inoffensif, mais dont la texture est très gluante.","it":"Se premuto con forza secerne un misterioso liquido viola molto appiccicoso, ma non nocivo.","ja":"つよく ふれると むらさきいろの ナゾの しるを だす。 がいは ないけれど ネバネバするよ。"},"h":3,"w":63},{"n":423,"ja":"トリトドン","r":"Toritodon","en":"Gastrodon","es":"Gastrodon","fr":"Tritosor","it":"Gastrodon","pt":"","g":4,"t":[11,5],"cat":{"en":"Sea Slug Pokémon","es":"Pokémon Babosa Marina","fr":"Pokémon Aqualimace","it":"Pokémon Lumacomare","ja":"ウミウシポケモン"},"desc":{"en":"Eats beach sand for nourishment. Should one Gastrodon encounter another of a different color, a fierce battle will inevitably ensue.","es":"Aunque blando, su cuerpo es tremendamente resistente, ya que dispersa cualquier impacto que recibe dada su flexibilidad.","fr":"Son corps est caoutchouteux, mais très résistant, car la puissance des chocs qu’il subit se répand sur toute sa surface.","it":"Il suo corpo molliccio è in grado di assorbire i colpi, rendendo questo Pokémon molto resistente.","ja":"グニャグニャの からだ だけれど かなり タフ。 やわらかさが しょうげきを ぶんさんするのだ。"},"h":9,"w":299},{"n":424,"ja":"エテボース","r":"Eteboth","en":"Ambipom","es":"Ambipom","fr":"Capidextre","it":"Ambipom","pt":"","g":4,"t":[1],"cat":{"en":"Long Tail Pokémon","es":"Pokémon Cola Larga","fr":"Pokémon Longqueue","it":"Pokémon Lungacoda","ja":"おながポケモン"},"desc":{"en":"To affirm their kinship, members of this species will form a ring by linking their newly doubled tails together. On rare occasions, humans have been accepted into such rings.","es":"Utiliza las dos colas para todo. Cuando abraza a alguien con ellas significa que esa persona se ha ganado por completo su confianza.","fr":"Il utilise toujours ses deux queues pour faire la moindre tâche. Il s’en sert aussi pour enlacer les gens qu’il affectionne tout particulièrement.","it":"Usa le code per fare tutto. Se abbraccia qualcuno con entrambe le code, significa che prova un grande affetto per questa persona.","ja":"なにを するにも シッポを つかう。 ２ほんの シッポで だきしめられたら ほんとうに なつかれた あかし。"},"h":12,"w":203},{"n":425,"ja":"フワンテ","r":"Fuwante","en":"Drifloon","es":"Drifloon","fr":"Baudrive","it":"Drifloon","pt":"","g":4,"t":[8,3],"cat":{"en":"Balloon Pokémon","es":"Pokémon Globo","fr":"Pokémon Bouboule","it":"Pokémon Pallone","ja":"ふうせんポケモン"},"desc":{"en":"Said to lure away young children and carry them off to the afterlife. Some whisper that Drifloon are formed of reincarnated human souls, but these rumors are as yet unconfirmed.","es":"Está formado por una aglomeración de espíritus. Suele aparecer en grandes números durante las estaciones húmedas.","fr":"Nés d’une concentration d’âmes, ces Pokémon peuvent apparaître en grand nombre les jours où le taux d’humidité est élevé.","it":"È nato dall’aggregazione di diverse anime. Nelle stagioni umide possono apparirne numerosi esemplari.","ja":"たましいが あつまり うまれた。 しっけの おおい きせつには たいりょうに あらわれることも。"},"h":4,"w":12},{"n":426,"ja":"フワライド","r":"Fuwaride","en":"Drifblim","es":"Drifblim","fr":"Grodrive","it":"Drifblim","pt":"","g":4,"t":[8,3],"cat":{"en":"Blimp Pokémon","es":"Pokémon Dirigible","fr":"Pokémon Ballon","it":"Pokémon Dirigibile","ja":"ききゅうポケモン"},"desc":{"en":"It drifts along at dusk, perfectly silent. Its transient, melancholy aspect touches some people deeply—every so often, one will come upon a song or poem devoted to Drifblim.","es":"Agarra a gente y a Pokémon para llevárselos a algún sitio, aunque nadie sabe exactamente adónde.","fr":"Il attrape des personnes et des Pokémon pour les transporter vers une destination inconnue.","it":"Afferra persone e Pokémon e li trascina via con sé. Nessuno sa dove li porti.","ja":"ひとや ポケモンを つかんで そのまま どこかへ はこんでいく。 いきさきは だれも しらない。"},"h":12,"w":150},{"n":427,"ja":"ミミロル","r":"Mimirol","en":"Buneary","es":"Buneary","fr":"Laporeille","it":"Buneary","pt":"","g":4,"t":[1],"cat":{"en":"Rabbit Pokémon","es":"Pokémon Conejo","fr":"Pokémon Lapin","it":"Pokémon Coniglio","ja":"うさぎポケモン"},"desc":{"en":"My hypothesis as to why Buneary rolls up its ears is that its hearing is far too keen. I surmise that the Pokémon protects its hearing by limiting the sound that may enter its ears.","es":"Ataca estirando con un fuerte impulso las orejas enrolladas. Cuanto más entrena esta técnica, con más potencia la ejecuta.","fr":"Plus il s’entraîne, plus les coups qu’il assène en déroulant vigoureusement ses oreilles gagnent en puissance.","it":"Attacca estendendo con impeto l’orecchio arrotolato. Più si allena, più la potenza dei suoi attacchi aumenta.","ja":"まるめた みみを のばす いきおいで こうげきする わざは トレーニングを するほど いりょくが ましていく。"},"h":4,"w":55},{"n":428,"ja":"ミミロップ","r":"Mimilop","en":"Lopunny","es":"Lopunny","fr":"Lockpin","it":"Lopunny","pt":"","g":4,"t":[1],"cat":{"en":"Rabbit Pokémon","es":"Pokémon Conejo","fr":"Pokémon Lapin","it":"Pokémon Coniglio","ja":"うさぎポケモン"},"desc":{"en":"Its fur is warm and yet remarkably light. This Pokémon kicks as though it were a master of karate, driving back its opponents with ease.","es":"Cuando acaba la estación más tórrida, le crece un nuevo pelaje muy mullido que lo prepara para el frío.","fr":"À la fin de la saison chaude, il mue et se recouvre d’une fourrure épaisse et légère pour se préparer à affronter le froid hivernal.","it":"Terminata la stagione calda, si prepara all’arrivo del freddo coprendosi di una pelliccia soffice e vaporosa.","ja":"あつい きせつが おわると くうきを たくさん ふくんだ たいもうに はえかわり さむさに そなえる。"},"h":12,"w":333},{"n":429,"ja":"ムウマージ","r":"Mumage","en":"Mismagius","es":"Mismagius","fr":"Magirêve","it":"Mismagius","pt":"","g":4,"t":[8],"cat":{"en":"Magical Pokémon","es":"Pokémon Mágico","fr":"Pokémon Magique","it":"Pokémon Stregone","ja":"マジカルポケモン"},"desc":{"en":"The incantations Mismagius chants can ward against misfortune, so a custom exists of inviting it into one's home. Incur the Pokémon's displeasure, however, and disaster will surely ensue.","es":"Murmura conjuros para atormentar al enemigo y provocarle dolores de cabeza insoportables o visiones terroríficas.","fr":"Il susurre des malédictions pour tourmenter ses ennemis et leur infliger de terribles migraines ou des hallucinations terrifiantes.","it":"Infligge tormenti al nemico recitando formule malefiche che causano terribili emicranie o provocano spaventose visioni.","ja":"のろいの ことばを つぶやいて ひどい ずつうや おそろしい まぼろしを みせて くるしめる。"},"h":9,"w":44},{"n":430,"ja":"ドンカラス","r":"Donkarasu","en":"Honchkrow","es":"Honchkrow","fr":"Corboss","it":"Honchkrow","pt":"","g":4,"t":[17,3],"cat":{"en":"Big Boss Pokémon","es":"Pokémon Gran Jefe","fr":"Pokémon Big Boss","it":"Pokémon Grancapo","ja":"おおボスポケモン"},"desc":{"en":"One cry from this Pokémon, and a murder of Murkrow come flying. At such times, one would think the curtain of night had fallen, plunging the world into jet-black darkness.","es":"Delega el combate en sus leales súbditos y solo se involucra cuando llega la hora de asestarle el golpe de gracia al enemigo.","fr":"Ses sous-fifres font le sale boulot pour lui. Il n’intervient en combat que pour donner le coup de grâce à son ennemi.","it":"Lascia che siano i suoi seguaci a lottare contro il nemico e si scomoda solo per assestare il colpo di grazia.","ja":"てきと たたかうのは ほぼ こぶん。 じぶんの てを よごすのは あいてに さいごの とどめを さすときだけ。"},"h":9,"w":273},{"n":431,"ja":"ニャルマー","r":"Nyarmar","en":"Glameow","es":"Glameow","fr":"Chaglam","it":"Glameow","pt":"","g":4,"t":[1],"cat":{"en":"Catty Pokémon","es":"Pokémon Gastuto","fr":"Pokémon Chafouin","it":"Pokémon Felide","ja":"ねこかぶりポケモン"},"desc":{"en":"Bewitches humans with its helical tail and piercing gaze. Its hidden claws are quite sharp as well, making this Pokémon an exceedingly tricky opponent if antagonized.","es":"Dependiendo de su humor, mueve grácilmente su cola, que se asemeja a un lazo de gimnasia rítmica.","fr":"Lorsqu’il est heureux, sa queue décrit des arabesques comme un ruban de gymnastique rythmique.","it":"Il lunatico Glameow fa sinuosi movimenti di coda che ricordano i nastri della ginnastica artistica.","ja":"ごきげんな ニャルマーは しっぽで しんたいそうの リボンの ような うつくしい うごきを みせる。"},"h":5,"w":39},{"n":432,"ja":"ブニャット","r":"Bunyat","en":"Purugly","es":"Purugly","fr":"Chaffreux","it":"Purugly","pt":"","g":4,"t":[1],"cat":{"en":"Tiger Cat Pokémon","es":"Pokémon Tigre Gato","fr":"Pokémon Chatigre","it":"Pokémon Gattotigre","ja":"とらねこポケモン"},"desc":{"en":"Though impudent and difficult to tame, Purugly enjoys great popularity due to its fur, the beauty of which surpasses even velveteen.","es":"Para intimidar y parecer más corpulento, se aprieta la cintura con su cola bífida.","fr":"Il ceinture sa taille de sa queue bifide pour paraître plus imposant.","it":"Si stringe la vita con la coda biforcuta per apparire più imponente e minaccioso.","ja":"からだを おおきく みせて あいてを いあつするため ふたまたの しっぽで ウエストを ぎゅっと しぼっている。"},"h":10,"w":438},{"n":433,"ja":"リーシャン","r":"Lisyan","en":"Chingling","es":"Chingling","fr":"Korillon","it":"Chingling","pt":"","g":4,"t":[14],"cat":{"en":"Bell Pokémon","es":"Pokémon Campana","fr":"Pokémon Clochette","it":"Pokémon Sonaglio","ja":"すずポケモン"},"desc":{"en":"This Pokémon gave me an excruciating headache when it seemingly cried out without making a sound. Perhaps there are some sounds that the human ear is simply incapable of hearing.","es":"Tiene una esfera en la boca. Cuando salta, la esfera rebota y emite un tintineo.","fr":"Quand il sautille, l’orbe qu’il a dans la bouche s’agite et tinte comme une cloche.","it":"Ha una sfera nella gola. Quando saltella, la sfera si muove emettendo dei trilli.","ja":"とびはねると くちのなかにある たまが あちこちに はんしゃして すずのような ねいろと なる。"},"h":2,"w":6},{"n":434,"ja":"スカンプー","r":"Skunpoo","en":"Stunky","es":"Stunky","fr":"Moufouette","it":"Stunky","pt":"","g":4,"t":[4,17],"cat":{"en":"Skunk Pokémon","es":"Pokémon Mofeta","fr":"Pokémon Moufette","it":"Pokémon Moffetta","ja":"スカンクポケモン"},"desc":{"en":"The poison that gushes from its aft end is accompanied by an utterly evil-smelling odor with such potency that one whiff can induce memory loss.","es":"Si levanta la cola y apunta los cuartos traseros, es señal de que se dispone a expulsar un líquido cuyo hedor llega a provocar desmayos.","fr":"S’il lève la queue, c’est qu’il s’apprête à projeter un liquide tellement nauséabond qu’il peut faire perdre connaissance.","it":"Se mostra il posteriore alzando la coda, bisogna fare attenzione: sta per spruzzare un fluido così maleodorante da far perdere i sensi.","ja":"しっぽを あげて おしりを むけたら ようちゅうい。 きぜつ するほど くさい しるを とばす まえぶれ。"},"h":4,"w":192},{"n":435,"ja":"スカタンク","r":"Skutank","en":"Skuntank","es":"Skuntank","fr":"Moufflair","it":"Skuntank","pt":"","g":4,"t":[4,17],"cat":{"en":"Skunk Pokémon","es":"Pokémon Mofeta","fr":"Pokémon Moufette","it":"Pokémon Moffetta","ja":"スカンクポケモン"},"desc":{"en":"Sprays a poisonous fluid to take down prey. Sometimes, unable to stomach the stench of its own fluid, it leaves the bested prey uneaten.","es":"El fluido que expulsa por la punta de la cola emana una hediondez insoportable. Construye sus madrigueras cavando hoyos en la tierra.","fr":"Ce Pokémon, qui creuse son terrier dans le sol, peut projeter un liquide à l’odeur infecte avec le bout de sa queue.","it":"Il fluido che spruzza dalla punta della coda ha un odore tremendo. Costruisce la tana scavando un buco nel terreno.","ja":"しっぽの さきから とばす しるの においは きょうれつ。 じめんに あなを ほって すあなを つくる。"},"h":10,"w":380},{"n":436,"ja":"ドーミラー","r":"Domirror","en":"Bronzor","es":"Bronzor","fr":"Archéomire","it":"Bronzor","pt":"","g":4,"t":[9,14],"cat":{"en":"Bronze Pokémon","es":"Pokémon Bronce","fr":"Pokémon Bronze","it":"Pokémon Bronzo","ja":"せいどうポケモン"},"desc":{"en":"Floats using a mysterious energy. The pattern engraved upon its back is held as sacred and can sometimes be found in imagery from ancient cemeteries and other such timeworn places.","es":"Se dice que brilla y refleja la verdad al pulirlo, aunque es algo que detesta.","fr":"On raconte qu’il se met à briller et à refléter la vérité quand on le polit, mais il a horreur de cela.","it":"Si dice che si illumini e rifletta la verità se viene lucidato, ma a Bronzor dà molto fastidio.","ja":"みがけば ひかり しんじつを うつしだすとも いわれるが ドーミラーは とても イヤがる。"},"h":5,"w":605},{"n":437,"ja":"ドータクン","r":"Dotakun","en":"Bronzong","es":"Bronzong","fr":"Archéodong","it":"Bronzong","pt":"","g":4,"t":[9,14],"cat":{"en":"Bronze Bell Pokémon","es":"Pokémon Campana Bronce","fr":"Pokémon Clochebronze","it":"Pokémon Squibronzo","ja":"どうたくポケモン"},"desc":{"en":"Some believe that its bell-like cry opens holes to another world. It has been revered as a deity since ancient times.","es":"Basándose en los motivos de su cuerpo, muchos eruditos creen que este Pokémon no es originario de Galar.","fr":"De nombreux savants pensent que ce Pokémon n’est pas originaire de Galar à cause des motifs qui ornent son corps.","it":"Per via dei disegni sul corpo, molti studiosi ritengono che non sia un Pokémon originario di Galar.","ja":"からだのもよう から ほんらい ガラルには いない ポケモンと かんがえる がくしゃも おおい。"},"h":13,"w":1870},{"n":438,"ja":"ウソハチ","r":"Usohachi","en":"Bonsly","es":"Bonsly","fr":"Manzaï","it":"Bonsly","pt":"","g":4,"t":[6],"cat":{"en":"Bonsai Pokémon","es":"Pokémon Bonsái","fr":"Pokémon Bonsaï","it":"Pokémon Bonsai","ja":"ぼんさいポケモン"},"desc":{"en":"Its tears elicit sympathy from those who see them, but do not be deceived! This expulsion of body water is merely a physiological mechanism for keeping itself in good health.","es":"Vive en entornos áridos y pedregosos. Cuanto más se secan sus esferas verdes, más destaca su sutil lustre.","fr":"Il vit dans les zones rocheuses arides. Quand ses boules vertes sont sèches, elles se mettent à briller légèrement.","it":"Vive in ambienti aridi e pietrosi. Quando sono secche, le sue sfere verdi emettono un fioco bagliore.","ja":"かんそうした いわばに くらす。 みどりの たまは かわくほど ツヤツヤと にぶく かがやく。"},"h":5,"w":150},{"n":439,"ja":"マネネ","r":"Manene","en":"Mime Jr.","es":"Mime Jr.","fr":"Mime Jr.","it":"Mime Jr.","pt":"","g":4,"t":[14,18],"cat":{"en":"Mime Pokémon","es":"Pokémon Mimo","fr":"Pokémon Mime","it":"Pokémon Mimo","ja":"マイムポケモン"},"desc":{"en":"Known to turn up in bustling marketplaces now and again. It mimics people much as a child would, then watches how they react, eyes sparkling.","es":"Su admiración por Mr. Rime, un consumado danzarín, lo lleva a seguirlo para aprender de él e imitar con esmero sus pasos de baile.","fr":"Il considère les meilleurs danseurs parmi les M. Glaquette comme ses maîtres et s’évertue à mimer leurs mouvements.","it":"Considera Mr. Rime il proprio maestro per le sue doti di ballerino, e ne imita diligentemente i passi di danza.","ja":"ダンスの うまい バリコオルに でしの ように つきし utica lo adoptó como mascota.","fr":"Dilué, son poison sert de remède. Cela lui a valu de devenir la mascotte populaire d’une entreprise de produits pharmaceutiques.","it":"Se diluito, il suo veleno ha proprietà medicinali. È diventato popolare da quando una casa farmaceutica ne ha fatto la sua mascotte.","ja":"どくを うすめると くすりに なる。 やくひんがいしゃの マスコットに なって にんきものに なった。"},"h":7,"w":230},{"n":454,"ja":"ドクロッグ","r":"Dokurog","en":"Toxicroak","es":"Toxicroak","fr":"Coatox","it":"Toxicroak","pt":"","g":4,"t":[4,2],"cat":{"en":"Toxic Mouth Pokémon","es":"Pokémon Boca Tóxica","fr":"Pokémon Toxique","it":"Pokémon Inveieleno","ja":"どくづきポケモン"},"desc":{"en":"Its crimson claws contain a virulent toxin. This toxin can be made into a tonic by diluting it, mixing it with several types of wild grass, and boiling it down over two days.","es":"Cuando abate una presa, emite un croar de victoria a pleno pulmón. Está emparentado con los Seismitoad.","fr":"Il lance un coassement viril de victoire quand il parvient à terrasser sa proie. Il s’apparente aux Crapustule.","it":"Quando abbatte la preda, lancia un alto gracidio di vittoria. Come specie è affine ai Seismitoad.","ja":"えものを しとめると ゲロゲロと しょうりの おたけびを あげる。 ガマゲロゲと しゅとして ちかい。"},"h":13,"w":444},{"n":455,"ja":"マスキッパ","r":"Muskippa","en":"Carnivine","es":"Carnivine","fr":"Vortente","it":"Carnivine","pt":"","g":4,"t":[12],"cat":{"en":"Bug Catcher Pokémon","es":"Pokémon Caza Bichos","fr":"Pokémon Chopinsecte","it":"Pokémon Insettivoro","ja":"むしとりポケモン"},"desc":{"en":"Though this is a plant Pokémon, it has a gluttonous and unruly temperament. Carnivine attacks its prey with its cavernous maw wide open.","es":"Se cuelga de los árboles en los pantanos. Atrae a sus presas con su dulce olor y las engulle.","fr":"Il s’accroche aux arbres des marais et attire ses proies avec sa salive à l’odeur enivrante.","it":"Si attacca agli alberi nelle paludi. Attrae le prede con il dolce aroma della saliva e poi le ingoia.","ja":"しっちたいに はえる きにまきつき あまいかおりの だえきで えものを おび  とばして こうげき。てきを はっけんすると しっぽを たてる。"},"h":11,"w":270},{"n":506,"ja":"ヨーテリー","r":"Yorterrie","en":"Lillipup","es":"Lillipup","fr":"Ponchiot","it":"Lillipup","pt":"","g":5,"t":[1],"cat":{"en":"Puppy Pokémon","es":"Pokémon Perrito","fr":"Pokémon Chiot","it":"Pokémon Cagnolino","ja":"こいぬポケモン"},"desc":{"en":"This Pokémon is far brighter than the average child, and Lillipup won’t forget the love it receives or any abuse it suffers.","es":"Muestra una inteligencia muy superior a la media de los niños humanos. No olvida ni el amor ni los malos tratos que recibe.","fr":"Ce Pokémon est plus intelligent que la plupart des enfants. Il n’oublie ni l’affection qu’il a reçue ni les mauvais traitements qu’il a pu subir.","it":"È molto più intelligente di un bambino. Non scorda né l’affetto ricevuto né i maltrattamenti subiti.","ja":"なみの こども よりも ずっと りこう。 うけた あいじょうも された しうちも わすれないのだ。"},"h":4,"w":41},{"n":507,"ja":"ハーデリア","r":"Herderrie","en":"Herdier","es":"Herdier","fr":"Ponchien","it":"Herdier","pt":"","g":5,"t":[1],"cat":{"en":"Loyal Dog Pokémon","es":"Pokémon Leal","fr":"Pokémon Chien Fidèle","it":"Pokémon Fedeltà","ja":"ちゅうけんポケモン"},"desc":{"en":"The black fur that covers this Pokémon’s body is dense and springy. Even sharp fangs bounce right off.","es":"El pelaje negro que lo recubre es tan denso y elástico que puede repeler incluso los colmillos más afilados.","fr":"Les poils sombres qui recouvrent son dos sont si épais et si souples qu’ils peuvent même repousser des crocs acérés.","it":"La pelliccia scura che ricopre il suo corpo è spessa ed elastica, al punto da respingere anche delle zanne affilate.","ja":"からだを おおう くろい けは ぶあつく だんりょくが ある。 するどい キバも はじきかえすぞ。"},"h":9,"w":147},{"n":508,"ja":"ムーランド","r":"Mooland","en":"Stoutland","es":"Stoutland","fr":"Mastouffe","it":"Stoutland","pt":"","g":5,"t":[1],"cat":{"en":"Big-Hearted Pokémon","es":"Pokémon Magnánimo","fr":"Pokémon Magnanime","it":"Pokémon Generosità","ja":"かんだいポケモン"},"desc":{"en":"Stoutland is immensely proud of its impressive moustache. It’s said that moustache length is what determines social standing among this species.","es":"Sus impresionantes bigotes son su orgullo. Entre los de su especie se establece una jerarquía según su longitud.","fr":"Sa moustache remarquable fait sa fierté, car sa longueur permettrait de déterminer la hiérarchie au sein de l’espèce.","it":"Va molto fiero dei suoi splendidi baffi. Si dice che la loro lunghezza determini la sua superiorità o inferiorità rispetto ai suoi simili.","ja":"りっぱなヒゲが じまんの ポケモン。 その ながさで なかまどうしの ゆうれつが きまると いう。"},"h":12,"w":610},{"n":509,"ja":"チョロネコ","r":"Choroneko","en":"Purrloin","es":"Purrloin","fr":"Chacripan","it":"Purrloin","pt":"","g":5,"t":[17],"cat":{"en":"Devious Pokémon","es":"Pokémon Malicioso","fr":"Pokémon Scélérat","it":"Pokémon Furbizia","ja":"しょうわるポケモン"},"desc":{"en":"Opponents that get drawn in by its adorable behavior come away with stinging scratches from its claws and stinging pride from its laughter.","es":"Una vez que ha logrado distraer al rival mediante sus gestos adorables, lo araña de improviso con las garras mientras muestra un semblante risueño.","fr":"Malheur à qui se laisse berner par ses gestes adorables : une fois les gens à sa portée, il les griffe sans crier gare, en ricanant.","it":"Lascia avvicinare il nemico distraendolo con pose ammalianti, e poi all’improvviso lo graffia ridendo.","ja":"あいくるしい しぐさで ゆだんさせ よってきた あいてを いきなり ツメで ひっかいて わらっている。"},"h":4,"w":101},{"n":510,"ja":"レパルダス","r":"Lepardas","en":"Liepard","es":"Liepard","fr":"Léopardus","it":"Liepard","pt":"","g":5,"t":[17],"cat":{"en":"Cruel Pokémon","es":"Pokémon Calculador","fr":"Pokémon Implacable","it":"Pokémon Sanguefreddo","ja":"れいこくポケモン"},"desc":{"en":"This stealthy Pokémon sneaks up behind prey without making any sound at all. It competes with Thievul for territory.","es":"Libra disputas territoriales con los Thievul. Se acerca a sus rivales por la espalda sin hacer el menor ruido.","fr":"Sans un bruit, il approche ses victimes par-derrière pour les frapper. Il dispute son territoire avec les Roublenard.","it":"Si avvicina di soppiatto alla preda, attaccandola alle spalle all’improvviso. Spesso si contende il territorio con Thievul.","ja":"フォクスライと なわばりを めぐり あらそう。 おとひとつ たてずに えものの はいごに しのびよる。"},"h":11,"w":375},{"n":511,"ja":"ヤナップ","r":"Yanappu","en":"Pansage","es":"Pansage","fr":"Feuillajou","it":"Pansage","pt":"","g":5,"t":[12],"cat":{"en":"Grass Monkey Pokémon","es":"Pokémon Mono Hierba","fr":"Pokémon Singe Herbe","it":"Pokémon Scimperba","ja":"くさざるポケモン"},"desc":{"en":"It’s good at finding berries and gathers them from all over. It’s kind enough to share them with friends.","es":"Es todo un experto en la búsqueda de bayas y es tan gentil que las comparte con todos sus compañeros.","fr":"Il est très doué pour trouver des Baies et aime les partager avec ses amis sans rien demander en échange.","it":"È un Pokémon molto generoso. Abilissimo nello scovare le bacche, va in giro a raccoglierle per poi condividerle.","ja":"きのみを さがすのが じょうずで あちこちで あつめて なかまに わけあたえる やさしさを もつ。"},"h":6,"w":105},{"n":512,"ja":"ヤナッキー","r":"Yanakkie","en":"Simisage","es":"Simisage","fr":"Feuiloutan","it":"Simisage","pt":"","g":5,"t":[12],"cat":{"en":"Thorn Monkey Pokémon","es":"Pokémon Mono Pincho","fr":"Pokémon Singépine","it":"Pokémon Spinpanzé","ja":"とげざるポケモン"},"desc":{"en":"Ill tempered, it fights by swinging its barbed tail around wildly. The leaf growing on its head is very bitter.","es":"Pokémon muy temperamental que lucha con su cola revestida de púas. Las hojas de su cabeza están muy amargas.","fr":"Il a un tempérament violent et se bat avec sa queue pleine d’épines. La feuille sur sa tête est très amère.","it":"Di carattere impetuoso, lotta roteando la coda dotata di aculei. Le foglie che ha sul capo sono molto amare.","ja":"きしょうが はげしく トゲの ついた しっぽを ふりまわして たたかう。 あたまの はっぱは とても にがい。"},"h":11,"w":305},{"n":513,"ja":"バオップ","r":"Baoppu","en":"Pansear","es":"Pansear","fr":"Flamajou","it":"Pansear","pt":"","g":5,"t":[10],"cat":{ ine de nutriments. Elle fait pousser les plantes avec vigueur.","it":"L’acqua accumulata nel ciuffo è ricca di nutrimento e fa crescere rigogliose le piante che ne vengono annaffiate.","ja":"あたまの ふさに ためた みずは えいよう たっぷり。しょくぶつに かけると おおきく そだつのだ。"},"h":6,"w":135},{"n":516,"ja":"ヒヤッキー","r":"Hiyakkie","en":"Simipour","es":"Simipour","fr":"Flotoutan","it":"Simipour","pt":"","g":5,"t":[11],"cat":{"en":"Geyser Pokémon","es":"Pokémon Drenaje","fr":"Pokémon Drainage","it":"Pokémon Spruzzacqua","ja":"ほうすいポケモン"},"desc":{"en":"It prefers places with clean water. When its tuft runs low, it replenishes it by siphoning up water with its tail.","es":"Le encantan los lugares con agua limpia. Cuando desciende el nivel de agua de su pelo, se abastece a través de su cola.","fr":"Il aime les endroits où l’eau est pure. Il se ravitaille en eau en l’aspirant avec sa queue.","it":"Predilige i luoghi dove l’acqua è pura. Se l’acqua che ha sul capo diminuisce, ne aggiunge altra aspirandola con la coda.","ja":"みずが きれいな ばしょを このむ。 あたまに ためこんだ みずがへると しっぽから すいあげて ほきゅう。"},"h":10,"w":290},{"n":517,"ja":"ムンナ","r":"Munna","en":"Munna","es":"Munna","fr":"Munna","it":"Munna","pt":"","g":5,"t":[14],"cat":{"en":"Dream Eater Pokémon","es":"Pokémon Comesueños","fr":"Pokémon Mangerêve","it":"Pokémon Divorasogni","ja":"ゆめくいポケモン"},"desc":{"en":"It eats dreams and releases mist. The mist is pink when it’s eating a good dream, and black when it’s eating a nightmare.","es":"El humo que despide cambia de color en función del sueño que haya consumido. Si es alegre, será rosa, o negruzco en el caso de una pesadilla.","fr":"Il se nourrit de songes et expire de la fumée qui prend la couleur rose si le rêve est joyeux, ou noire s’il s’agit d’un cauchemar.","it":"Si nutre di sogni. Esala un fumo rosa se sono sogni piacevoli e nero se sono incubi.","ja":"ゆめを たべて けむりを はく。 たのしい ゆめなら ピンクいろで あくむの ときは くろっぽいぞ。"},"h":6,"w":233},{"n":518,"ja":"ムシャーナ","r":"Musharna","en":"Musharna","es":"Musharna","fr":"Mushana","it":"Musharna","pt":"","g":5,"t":[14],"cat":{"en":"Drowsing Pokémon","es":"Pokémon Duermevela","fr":"Pokémon Rêveur","it":"Pokémon Dormiveglia","ja":"ゆめうつつポケモン"},"desc":{"en":"It drowses and dreams all the time. It’s best to leave it be if it’s just woken up, as it’s a terrible grump when freshly roused from sleep.","es":"Siempre está soñando o adormecido. Se pone de muy mal humor al despertar, por lo que es mejor no perturbarlo.","fr":"Il est sans cesse assoupi, plongé dans ses rêves. Il vaut mieux éviter de le déranger, car il est toujours mal luné au réveil.","it":"Sonnecchia costantemente, sognando. Quando si sveglia è di pessimo umore, quindi è meglio tenersi a debita distanza.","ja":"いつも まどろみ ゆめを みている。 ねおきは とっても ふきげんに なるので そっとして おこう。"},"h":11,"w":605},{"n":519,"ja":"マメパト","r":"Mamepato","en":"Pidove","es":"Pidove","fr":"Poichigeon","it":"Pidove","pt":"","g":5,"t":[1,3],"cat":{"en":"Tiny Pigeon Pokémon","es":"Pokémon Pichón","fr":"Pokémon Tipigeon","it":"Pokémon Piccione","ja":"こばとポケモン"},"desc":{"en":"It’s forgetful and not very bright, but many Trainers love it anyway for its friendliness and sincerity.","es":"Es muy olvidadizo y no demasiado avispado, pero muchos Entrenadores le tienen simpatía por su carácter afable y sincero.","fr":"Il n’est pas très malin et un peu distrait, mais beaucoup de Dresseurs l’apprécient pour son caractère affectueux et sa bonne volonté.","it":"È un po’ smemorato e non molto sveglio. Tuttavia è diligente e si affeziona facilmente, e per questo molti Allenatori lo adorano.","ja":"わすれっぽく かしこくはないが ひとなつっこくて まじめなので かわいがる トレーナーは おおい。"},"h":3,"w":21},{"n":520,"ja":"ハトーボー","r":"Hatoboh","en":"Tranquill","es":"Tranquill","fr":"Colombeau","it":"Tranquill","pt":"","g":5,"t":[1,3],"cat":{"en":"Wild Pigeon Pokémon","es":"Pokémon Torcaz","fr":"Pokémon Sauvapigeon","it":"Pokémon Granpiccione","ja":"のばとポケモン"},"desc":{"en":"These bright Pokémon have acute memories. Apparently delivery workers often choose them as their partners.","es":"Posee una mente ágil y muy buena memoria. Tal vez por eso muchos repartidores lo eligen como compañero.","fr":"Il est intelligent et possède une bonne mémoire. On raconte que les livreurs le choisissent souvent comme partenaire.","it":"Pokémon intelligente, dotato di una memoria di ferro. Sembra che molti fattorini lo scelgano come compagno.","ja":"かしこく ものおぼえが いい。 はいたついんが パートナーに えらぶことが おおいらしい。"},"h":6,"w":150},{"n":521,"ja":"ケンホロウ","r":"Kenhallow","en":"Unfezant","es":"Unfezant","fr":"Déflaisan","it":"Unfezant","pt":"","g":5,"t":[1,3],"cat":{"en":"Proud Pokémon","es":"Pokémon Altanero","fr":"Pokémon Fier","it":"Pokémon Orgoglio","ja":"プライドポケモン"},"desc":{"en":"This Pokémon is intelligent and intensely proud. People will sit up and take notice if you become the Trainer of one.","es":"Es un Pokémon muy inteligente y orgulloso. Se tiene en alta estima a aquellos que se convierten en sus Entrenadores.","fr":"Ce Pokémon est aussi intelligent qu’il est arrogant. Les Dresseurs de Déflaisan sont tenus en haute estime.","it":"È tanto intelligente quanto orgoglioso. Diventare Allenatori di questo Pokémon equivale a guadagnarsi il rispetto e l’ammirazione di tutti.","ja":"かしこいぶん プライドも たかい。 ケンホロウの トレーナーに なれば みんなに いちもく おかれるよ。"},"h":12,"w":290},{"n":522,"ja":"シママ","r":"Shimama","en":"Blitzle","es":"Blitzle","fr":"Zébibron","it":"Blitzle","pt":"","g":5,"t":[13],"cat":{"en":"Electrified Pokémon","es":"Pokémon Electrizado","fr":"Pokémon Étincélec","it":"Pokémon Caricavolt","ja":"たいでんポケモン"},"desc":{"en":"Its mane shines when it discharges electricity. They use the frequency and rhythm of these flashes to communicate.","es":"Su crin brilla cuando emite una descarga eléctrica. Se comunica con los suyos mediante el ritmo y el número de brillos.","fr":"Sa crinière luit quand il lâche des décharges. Il module leur rythme et leur nombre pour communiquer avec ses pairs.","it":"Se emette scariche la sua criniera brilla. Comunica con i suoi simili tramite il ritmo e la frequenza delle pulsazioni luminose.","ja":"ほうでんすると たてがみが ひかる。 たてがみが かがやく かいすうや リズムで なかまと かいわしている。"},"h":8,"w":298},{"n":523,"ja":"ゼブライカ","r":"Zebraika","en":"Zebstrika","es":"Zebstrika","fr":"Zéblitz","it":"Zebstrika","pt":"","g":5,"t":[13],"cat":{"en":"Thunderbolt Pokémon","es":"Pokémon Rayo","fr":"Pokémon Foudrélec","it":"Pokémon Saetta","ja":"らいでんポケモン"},"desc":{"en":"They have lightning-like movements. When Zebstrika run at full speed, the sound of thunder reverberates.","es":"Su velocidad se asemeja a la de un rayo. Si corre al máximo, se dejan oír truenos por doquier.","fr":"Il réagit à la vitesse de l’éclair. Lorsqu’il est en plein galop, on peut entendre le grondement du tonnerre.","it":"È scattante come una saetta. Se corre alla massima velocità, si sente un rimbombo di tuoni.","ja":"いなずまのような しゅんぱつりょく。 ゼブライカが ぜんそくりょくで はしると らいめいが ひびきわたる。"},"h":16,"w":795},{"n":524,"ja":"ダンゴロ","r":"Dangoro","en":"Roggenrola","es":"Roggenrola","fr":"Nodulithe","it":"Roggenrola","pt":"","g":5,"t":[6],"cat":{"en":"Mantle Pokémon","es":"Pokémon Manto","fr":"Pokémon Manteau","it":"Pokémon Placca","ja":"マントルポケモン"},"desc":{"en":"When it detects a noise, it starts to move. The energy core inside it makes this Pokémon slightly warm to the touch.","es":"Se dirige hacia cualquier sonido que perciba. Es ligeramente cálido al tacto, debido al efecto de su núcleo energético.","fr":"Il se déplace en réagissant aux sons environnants. Son noyau d’énergie rend son corps légèrement chaud au toucher.","it":"Si muove reagendo ai rumori. È tiepido al tatto per via del nucleo di energia al suo interno.","ja":"おとに はんのうし うごきだす。 エネルギーコアの えいきょうで さわると すこし あったかい。"},"h":4,"w":180},{"n":525,"ja":"ガントル","r":"Gantle","en":"Boldore","es":"Boldore","fr":"Géolithe","it":"Boldore","pt":"","g":5,"t":[6],"cat":{"en":"Ore Pokémon","es":"Pokémon Mineral","fr":"Pokémon Minerai","it":"Pokémon Minerale","ja":"こうせきポケモン"},"desc":{"en":"It relies on sound in order to monitor what’s in its vicinity. When angered, it will attack without ever changing the direction it’s facing.","es":"Se vale del sonido para percibir el entorno. Si alguien despierta su ira, lo perseguirá sin cambiar la orientación del cuerpo.","fr":"Il sonde les environs grâce au son. Lorsqu’un importun le met en colère, il se lance à sa poursuite sans changer l’orientation de son corps.","it":"Perlustra la zona intorno a sé servendosi dei rumori. Se irritato, insegue chi lo ha importunato senza cambiare orientamento del corpo.","ja":"おとで まわりの ようすを さぐる。 おこらせると からだの むきを かえないまま おってくる。"},"h":9,"w":1020},{"n":526,"ja":"ギガイアス","r":"Gigaiath","en":"Gigalith","es":"Gigalith","fr":"Gigalithe","it":"Gigalith","pt":"","g":5,"t":[6],"cat":{"en":"Compressed Pokémon","es":"Pokémon Presurizado","fr":"Pokémon Surpression","it":"Pokémon Pressionalta","ja":"こうあつポケモン"},"desc":{"en":"Although its energy blasts can blow away a dump truck, they have a limitation— they can only be fired when the sun is out.","es":"Las bolas de energía que lanza solo en días soleados son tan potentes que pueden hacer saltar un camión por los aires.","fr":"Il est capable d’envoyer des boules d’énergie assez puissantes pour balayer un camion-benne, mais il ne peut tirer que les jours ensoleillés.","it":"La potenza delle sue sfere di energia è tale da spazzare via un camion. Tuttavia, può spararle solo nei giorni di sole.","ja":"はれた ひに しか うてないが エネルギーだんの はかいりょくは ダンプカーも ふきとばすほど。"},"h":17,"w":2600},{"n":527,"ja":"コロモリ","r":"Koromori","en":"Woobat","es":"Woobat","fr":"Chovsourir","it":"Woobat","pt":"","g":5,"t":[14,3],"cat":{"en":"Bat Pokémon","es":"Pokémon Murciélago","fr":"Pokémon Chovsouris","it":"Pokémon Pipistrello","ja":"こうもりポケモン"},"desc":{"en":"It emits ultrasonic waves as it flutters about, searching for its prey—bug Pokémon.","es":"Emite ultrasonidos mientras revolotea en busca de los Pokémon insecto con los que se sustenta.","fr":"Il virevolte gaiement et émet des ultrasons pour trouver des Pokémon Insecte à grignoter.","it":"Svolazza emettendo ultrasuoni in cerca di Pokémon di tipo Coleottero, di cui si nutre.","ja":"ちょうおんぱを はなちながら フラフラと とびまわり エサの むしポケモンを さがしている。"},"h":4,"w":21},{"n":528,"ja":"ココロモリ","r":"Kokoromori","en":"Swoobat","es":"Swoobat","fr":"Rhinolove","it":"Swoobat","pt":"","g":5,"t":[14,3],"cat":{"en":"Courting Pokémon","es":"Pokémon Galante","fr":"Pokémon Cupidon","it":"Pokémon Cercamore","ja":"きゅうあいポケモン"},"desc":{"en":"The auspicious shape of this Pokémon’s nose apparently led some regions to consider Swoobat a symbol of good luck.","es":"En algunas regiones se venera a este Pokémon, ya que consideran la forma de su nariz como un símbolo de felicidad.","fr":"Certaines contrées le vénèrent et pensent que la forme de son nez est un symbole de chance et de bonheur.","it":"Si dice che in alcune regioni venga venerato per via della forma del suo naso, ritenuta di buon auspicio.","ja":"はなの かたちが おめでたいと こうふくを よぶ シンボルとして まつる ちいきも あるという。"},"h":9,"w":105},{"n":529,"ja":"モグリュー","r":"Mogurew","en":"Drilbur","es":"Drilbur","fr":"Rototaupe","it":"Drilbur","pt":"","g":5,"t":[5],"cat":{"en":"Mole Pokémon","es":"Pokémon Topo","fr":"Pokémon Taupe","it":"Pokémon Talpa","ja":"もぐらポケモン"},"desc":{"en":"It’s a digger, using its claws to burrow through the ground. It causes damage to vegetable crops, so many farmers have little love for it.","es":"Su costumbre de horadar túneles bajo tierra le ha granjeado la antipatía de los agricultores, ya que puede echar a perder cosechas enteras.","fr":"Les cultivateurs le détestent, car il abîme leurs légumes en creusant la terre avec ses griffes.","it":"Non è ben visto dagli agricoltori per la sua abitudine di scavare cunicoli sottoterra con le unghie, rovinando gli ortaggi.","ja":"ツメで ちちゅうを ほりすすむので そだてた やさいが いたむと のうぎょうかんけいしゃは きらう。"},"h":3,"w":85},{"n":530,"ja":"ドリュウズ","r":"Doryuzu","en":"Excadrill","es":"Excadrill","fr":"Minotaupe","it":"Excadrill","pt":"","g":5,"t":[5,9],"cat":{"en":"Subterrene Pokémon","es":"Pokémon Subterráneo","fr":"Pokémon Souterrain","it":"Pokémon Sottoterra","ja":"ちていポケモン"},"desc":{"en":"Known as the Drill King, this Pokémon can tunnel through the terrain at speeds of over 90 mph.","es":"Se lo conoce como el Rey del Taladro. Puede horadar túneles bajo tierra a una velocidad de 150 km/h.","fr":"On l’appelle le « roi de la vrille ». Il creuse la terre à une vitesse pouvant atteindre 150 km/h.","it":"Conosciuto anche come “re delle trivelle”, questo Pokémon è capace di scavare sottoterra a una velocità di 150 km/h.","ja":"べつめい ドリルキング。 ちちゅうを ほりすすむ そくどは じそく１５０キロに たっする。"},"h":7,"w":404},{"n":531,"ja":"タブンネ","r":"Tabunne","en":"Audino","es":"Audino","fr":"Nanméouïe","it":"Audino","pt":"","g":5,"t":[1],"cat":{"en":"Hearing Pokémon","es":"Pokémon Escucha","fr":"Pokémon Audition","it":"Pokémon Ascolto","ja":"ヒヤリングポケモン"},"desc":{"en":"This Pokémon has a kind heart. By touching with its feelers, Audino can gauge other creatures’ feelings and physical conditions.","es":"Un Pokémon gentil que es capaz de comprender los sentimientos y averiguar el estado de salud de todo aquel que toque con sus antenas.","fr":"Ce Pokémon gentil est capable de deviner les émotions et l’état de santé des autres rien qu’en les touchant avec ses antennes.","it":"Questo Pokémon dal cuore tenero è in grado di percepire le condizioni fisiche e mentali di chi tocca con le antenne.","ja":"こころやさしい ポケモン。 しょっかくを おしあて あいての きもちや たいちょうを りかいする。"},"h":11,"w":310},{"n":532,"ja":"ドッコラー","r":"Dokkorer","en":"Timburr","es":"Timburr","fr":"Charpenti","it":"Timburr","pt":"","g":5,"t":[2],"cat":{"en":"Muscular Pokémon","es":"Pokémon Musculoso","fr":"Pokémon Costaud","it":"Pokémon Forzaimmane","ja":"きんこつポケモン"},"desc":{"en":"Timburr that have started carrying logs that are about three times their size are nearly ready to evolve.","es":"Cuando logra transportar una viga de madera que triplica su altura y peso, es señal de que va a evolucionar.","fr":"Lorsque Charpenti est capable de soulever une poutre faisant trois fois son poids, le jour de son évolution est proche.","it":"Quando diventa capace di reggere travi di legno tre volte
