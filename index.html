his Pokémon chooses to live out of sight deep under the sea.","es":"La fuerza que tiene Lugia en las alas es devastadora; con nada que las bata es capaz de derribar edificios enteros. Por eso mismo, prefiere vivir donde no haya nadie, en lo más profundo del mar.","fr":"Les ailes de Lugia renferment une puissance dévastatrice. Un simple battement de ses ailes peut détruire de petites maisons. Du coup, ce Pokémon a choisi de vivre loin de tout, dans les profondeurs océaniques.","it":"Le ali di Lugia hanno un’enorme potenza distruttiva: un leggero battito d’ali è in grado di abbattere una normale abitazione. Perciò il Pokémon ha scelto di vivere lontano dall’uomo, nelle profondità abissali.","ja":"つばさを かるく はばたかせた だけで みんかを ふきとばす はかいりょくを もっている ために かいていで ひとしれず くらす ように なった。"},"h":52,"w":2160},{"n":250,"ja":"ホウオウ","r":"Houou","en":"Ho-Oh","es":"Ho-Oh","fr":"Ho-Oh","it":"Ho-Oh","pt":"","g":2,"t":[10,3],"cat":{"en":"Rainbow Pokémon","es":"Pokémon Arcoíris","fr":"Pokémon Arcenciel","it":"Pokémon Arcobaleno","ja":"にじいろポケモン"},"desc":{"en":"Ho-Oh’s feathers glow in seven colors depending on the angle at which they are struck by light. These feathers are said to bring happiness to the bearers. This Pokémon is said to live at the foot of a rainbow.","es":"El plumaje de Ho-Oh contiene siete colores que pueden apreciarse según el ángulo desde el que les dé la luz. Dicen que sus plumas dan felicidad a quienes las llevan y, también, que este Pokémon vive a los pies del arco iris.","fr":"Les plumes de Ho-Oh brillent de sept couleurs selon l’orientation de son corps par rapport à la lumière. On raconte que ces plumes portent bonheur. On dit aussi que ce Pokémon vit au pied d’un arc-en-ciel.","it":"Il piumaggio di Ho-Oh brilla in sette colori a seconda dell’angolazione dei raggi luminosi. Si dice che le sue piume portino felicità a chi le possiede. Si narra che viva ai piedi di un arcobaleno.","ja":"ひかりの あたる かくどに よって なないろに かがやく ハネは しあわせを もたらすと いう。 にじの ふもとに すむと いわれている。"},"h":38,"w":1990},{"n":251,"ja":"セレビィ","r":"Celebi","en":"Celebi","es":"Celebi","fr":"Celebi","it":"Celebi","pt":"","g":2,"t":[14,12],"cat":{"en":"Time Travel Pokémon","es":"Pokémon Viajetiempo","fr":"Pokémon Temporel","it":"Pokémon Tempovia","ja":"ときわたりポケモン"},"desc":{"en":"This Pokémon traveled through time to come from the future. It bolsters grass and trees with its own strength, and it can heal wounds, too.","es":"Vino del futuro haciendo un viaje en el tiempo. Además de curar las heridas, posee la capacidad de revitalizar la hierba y los árboles.","fr":"Ce Pokémon venu du futur soigne les blessures et donne de la force aux plantes.","it":"È giunto dal futuro, viaggiando nel tempo. Cura le ferite e dona vigore alla vegetazione.","ja":"みらいから ときを わたって やってきた。 きずを いやし くさきに ちからを わけあたえる。"},"h":6,"w":50},{"n":252,"ja":"キモリ","r":"Kimori","en":"Treecko","es":"Treecko","fr":"Arcko","it":"Treecko","pt":"","g":3,"t":[12],"cat":{"en":"Wood Gecko Pokémon","es":"Pokémon Geco Bosque","fr":"Pokémon Bois Gecko","it":"Pokémon Legnogeco","ja":"もりトカゲポケモン"},"desc":{"en":"Treecko is cool, calm, and collected—it never panics under any situation. If a bigger foe were to glare at this Pokémon, it would glare right back without conceding an inch of ground.","es":"Treecko es tranquilo y tiene gran capacidad de autocontrol; no pierde la calma en ninguna situación. Si algún rival se le queda mirando fijamente, le devolverá la mirada sin ceder ni lo más mínimo de su territorio.","fr":"Arcko est cool, calme et serein. Il ne panique jamais, quelle que soit la situation. Quand un ennemi plus gros que lui lui lance un regard de défi, ce Pokémon reste stoïque et ne cède pas un centimètre de terrain.","it":"Treecko ha classe, è calmo e posato: non si lascia mai prendere dal panico. Quando affronta un nemico più grande di lui, lo fissa dritto negli occhi senza la minima esitazione.","ja":"ちんちゃく れいせい なにごとにも どうじない。 からだの おおきな ポケモンに にらまれても いっぽも ひかずに にらみかえすぞ。"},"h":5,"w":50},{"n":253,"ja":"ジュプトル","r":"Juptile","en":"Grovyle","es":"Grovyle","fr":"Massko","it":"Grovyle","pt":"","g":3,"t":[12],"cat":{"en":"Wood Gecko Pokémon","es":"Pokémon Geco Bosque","fr":"Pokémon Bois Gecko","it":"Pokémon Legnogeco","ja":"もりトカゲポケモン"},"desc":{"en":"This Pokémon adeptly flies from branch to branch in trees. In a forest, no Pokémon can ever hope to catch a fleeing Grovyle however fast they may be.","es":"Este Pokémon revolotea de rama en rama con maestría. Cuando Grovyle va volando por el bosque, no hay quien lo alcance por muy rápido que sea.","fr":"Ce Pokémon vole de branche en branche avec brio. En forêt, aucun Pokémon, même le plus rapide, ne peut espérer attraper un Massko qui s’enfuit.","it":"Grovyle vola di ramo in ramo e di albero in albero. Non c’è nessun Pokémon nella foresta in grado di catturarlo in volo: la sua velocità è impressionante!","ja":"えだから えだへ みがるに とびまわる。 どんなに すばやい ポケモンも もりの なかで ジュプトルを つかまえる ことは ふかのうだ。"},"h":9,"w":216},{"n":254,"ja":"ジュカイン","r":"Jukain","en":"Sceptile","es":"Sceptile","fr":"Jungko","it":"Sceptile","pt":"","g":3,"t":[12],"cat":{"en":"Forest Pokémon","es":"Pokémon Monte","fr":"Pokémon Forêt","it":"Pokémon Foresta","ja":"みつりんポケモン"},"desc":{"en":"Sceptile has seeds growing on its back. They are said to be bursting with nutrients that revitalize trees. This Pokémon raises the trees in a forest with loving care.","es":"A Sceptile le crecen en la espalda unas semillas llenas de nutrientes que sirven para revitalizar los árboles. De hecho, se dedica a cuidarlos con mimo para que crezcan bien.","fr":"Jungko a des graines qui lui poussent sur le dos. On dit qu’elles regorgent de nutriments qui revitalisent les arbres. Ce Pokémon s’occupe des forêts avec amour.","it":"Sulla schiena di Sceptile crescono alcuni semi che si dice siano ricchi di nutrienti per gli alberi. Questo Pokémon coltiva amorevolmente le sue piante nella foresta.","ja":"せなかの タネには じゅもくを げんきにする えいようが たくさん つまっていると いわれる。 もりの きを だいじに そだてている ポケモン。"},"h":17,"w":522},{"n":255,"ja":"アチャモ","r":"Achamo","en":"Torchic","es":"Torchic","fr":"Poussifeu","it":"Torchic","pt":"","g":3,"t":[10],"cat":{"en":"Chick Pokémon","es":"Pokémon Polluelo","fr":"Pokémon Poussin","it":"Pokémon Pulcino","ja":"ひよこポケモン"},"desc":{"en":"Torchic has a place inside its body where it keeps its flame. Give it a hug—it will be glowing with warmth. This Pokémon is covered all over by a fluffy coat of down.","es":"Torchic tiene un lugar en el interior de su organismo en el que guarda la llama que posee. Si le das un abrazo, arderá encantado. Este Pokémon está recubierto totalmente de sedoso plumón.","fr":"Poussifeu dispose d’un endroit dans son corps pour stocker sa flamme. Si on lui fait un gros câlin, sa flamme s’illumine chaleureusement. Ce Pokémon est couvert d’un duvet très doux.","it":"Nel corpo di Torchic è custodita la sua fiamma. Abbracciandolo si illumina emanando un incredibile calore. Questo Pokémon è ricoperto da un piumaggio soffice e caldo.","ja":"たいないに ほのおを もやす ばしょが あるので だきしめると ぽかぽか とっても あたたかい。 ぜんしん ふかふかの うもうに おおわれている。"},"h":4,"w":25},{"n":256,"ja":"ワカシャモ","r":"Wakasyamo","en":"Combusken","es":"Combusken","fr":"Galifeu","it":"Combusken","pt":"","g":3,"t":[10,2],"cat":{"en":"Young Fowl Pokémon","es":"Pokémon Ave Corral","fr":"Pokémon Poulet","it":"Pokémon Rampollo","ja":"わかどりポケモン"},"desc":{"en":"Combusken battles with the intensely hot flames it spews from its beak and with outstandingly destructive kicks. This Pokémon’s cry is very loud and distracting.","es":"Combusken lucha haciendo uso de las abrasadoras llamas que expulsa por el pico y de unas patadas fulminantes. Este Pokémon emite un sonido muy fuerte y molesto.","fr":"Galifeu combat grâce aux flammes ardentes qu’il crache de son bec et à ses coups de pied destructeurs. Le cri de ce Pokémon est très puissant et très gênant pour l’adversaire.","it":"Combusken combatte sputando fiamme roventi dal becco e sferrando calci dall’enorme potenza distruttiva. Il verso di questo Pokémon è lacerante e distrae gli avversari.","ja":"クチバシから はきだす しゃくねつの ほのおと はかいりょく ばつぐんの キックで たたかう。 なきごえが おおきいので とても やかましい。"},"h":9,"w":195},{"n":257,"ja":"バシャーモ","r":"Bursyamo","en":"Blaziken","es":"Blaziken","fr":"Braségali","it":"Blaziken","pt":"","g":3,"t":[10,2],"cat":{"en":"Blaze Pokémon","es":"Pokémon Llameante","fr":"Pokémon Ardent","it":"Pokémon Vampe","ja":"もうかポケモン"},"desc":{"en":"Blaziken has incredibly strong legs—it can easily clear a 30-story building in one leap. This Pokémon’s blazing punches leave its foes scorched and blackened.","es":"Blaziken tiene unas piernas tan fuertes que puede saltar por encima de un edificio de 30 pisos con facilidad. Además, da unos puñetazos fulminantes que dejan al oponente chamuscado y lleno de tizne.","fr":"Braségali a des jambes incroyablement puissantes. Il peut sauter par-dessus un immeuble de trente étages. Les coups de poing enflammés de ce Pokémon peuvent carboniser ses ennemis.","it":"Blaziken è dotato di zampe molto potenti in grado di radere al suolo un edificio di 30 piani in un colpo solo. I suoi pugni fulminei lasciano il nemico ustionato e talvolta carbonizzato.","ja":"きょうじんな あしこしを もち ３０かい だての ビルも らくらく とびこす ことが できる。 ほのおの パンチで あいてを くろこげに する。"},"h":19,"w":520},{"n":258,"ja":"ミズゴロウ","r":"Mizugorou","en":"Mudkip","es":"Mudkip","fr":"Gobou","it":"Mudkip","pt":"","g":3,"t":[11],"cat":{"en":"Mud Fish Pokémon","es":"Pokémon Pez Lodo","fr":"Pokémon Poissonboue","it":"Pokémon Fango Pesce","ja":"ぬまうおポケモン"},"desc":{"en":"In water, Mudkip breathes using the gills on its cheeks. If it is faced with a tight situation in battle, this Pokémon will unleash its amazing power—it can crush rocks bigger than itself.","es":"En el agua, Mudkip usa las branquias que tiene en los mofletes para respirar. Cuando tiene que enfrentarse a una situación delicada en combate, desata una fuerza asombrosa con la que puede destruir rocas incluso mayores que él.","fr":"Sous l’eau, Gobou peut respirer grâce aux branchies sur ses joues. S’il se retrouve en difficulté pendant un combat, ce Pokémon déchaîne ses pouvoirs incroyables. Il peut détruire des rochers plus gros que lui.","it":"In acqua Mudkip respira usando le branchie sulle mascelle. In caso di situazioni critiche nella lotta scatena la sua forza strabiliante, riuscendo a frantumare rocce più grandi di lui.","ja":"すいちゅうでは ほっぺの エラで こきゅうする。 ピンチに なると からだより おおきな いわを こなごなに くだく パワーを はっきする。"},"h":4,"w":76},{"n":259,"ja":"ヌマクロー","r":"Numacraw","en":"Marshtomp","es":"Marshtomp","fr":"Flobio","it":"Marshtomp","pt":"","g":3,"t":[11,5],"cat":{"en":"Mud Fish Pokémon","es":"Pokémon Pez Lodo","fr":"Pokémon Poissonboue","it":"Pokémon Fango Pesce","ja":"ぬまうおポケモン"},"desc":{"en":"Marshtomp is much faster at traveling through mud than it is at swimming. This Pokémon’s hindquarters exhibit obvious development, giving it the ability to walk on just its hind legs.","es":"Marshtomp se desplaza más rápido por el lodo que por el agua. Los cuartos traseros de este Pokémon muestran un desarrollo más que evidente, lo que le permite andar solo sobre las patas traseras.","fr":"Flobio est bien plus rapide dans la boue que dans l’eau. L’arrière-train de ce Pokémon est particulièrement développé, ce qui lui donne la capacité de marcher sur ses pattes arrière.","it":"Marshtomp è molto più a suo agio nel fango che non in acqua e sa muoversi con estrema rapidità. La parte inferiore del suo corpo mostra un chiaro sviluppo, consentendogli di camminare solo sugli arti inferiori.","ja":"すいちゅうを およぐより どろの なかを すすむ ほうが だんぜん はやく いどうできる。 あしこしが はったつして ２ほんあしで あるく。"},"h":7,"w":280},{"n":260,"ja":"ラグラージ","r":"Laglarge","en":"Swampert","es":"Swampert","fr":"Laggron","it":"Swampert","pt":"","g":3,"t":[11,5],"cat":{"en":"Mud Fish Pokémon","es":"Pokémon Pez Lodo","fr":"Pokémon Poissonboue","it":"Pokémon Fango Pesce","ja":"ぬまうおポケモン"},"desc":{"en":"Swampert predicts storms by sensing subtle differences in the sounds of waves and tidal winds with its fins. If a storm is approaching, it piles up boulders to protect itself.","es":"Swampert puede predecir tormentas al percibir con las aletas los sutiles cambios que producen las olas y las corrientes. Si está a punto de estallar una tormenta, empezará a apilar piedras para resguardarse.","fr":"Laggron peut prédire l’arrivée des tempêtes en utilisant ses nageoires pour sentir les variations dans les vagues et les marées. Si une tempête s’approche, il empile des rochers pour protéger son habitat.","it":"Swampert prevede le tempeste poiché grazie alle pinne percepisce le sottili differenze nel suono delle onde e dei venti dovuti alle maree. In caso di burrasca imminente, crea delle pile di massi per proteggere la tana.","ja":"ラグラージは なみおとや しおかぜの わずかな ちがいを ヒレで かんじ あらしを よかんする。 あらしになると いわを つみあげ すを まもる。"},"h":15,"w":819},{"n":261,"ja":"ポチエナ","r":"Pochiena","en":"Poochyena","es":"Poochyena","fr":"Medhyèna","it":"Poochyena","pt":"","g":3,"t":[17],"cat":{"en":"Bite Pokémon","es":"Pokémon Mordisco","fr":"Pokémon Morsure","it":"Pokémon Morso","ja":"かみつきポケモン"},"desc":{"en":"Poochyena is an omnivore—it will eat anything. A distinguishing feature is how large its fangs are compared to its body. This Pokémon tries to intimidate its foes by making the hair on its tail bristle out.","es":"Poochyena es un Pokémon omnívoro. Se come lo que sea. Le caracteriza el gran tamaño de sus colmillos respecto al resto del cuerpo. Este Pokémon hace que se le erice la cola para intentar intimidar a su rival.","fr":"Medhyèna est omnivore. Il mange de tout. Ses crocs sont très gros, comparés à son corps. Ce Pokémon essaie d’intimider ses ennemis en hérissant les poils de sa queue.","it":"Poochyena è onnivoro: mangia di tutto. Una caratteristica distintiva è la dimensione delle zanne rispetto al corpo. Cerca di intimidire i nemici rizzando il pelo della coda.","ja":"なんでも たべる ざっしょくせいの ポケモン。 からだに くらべ おおきな キバが とくちょう。 しっぽの けを さかだてて てきを いかくする。"},"h":5,"w":136},{"n":262,"ja":"グラエナ","r":"Guraena","en":"Mightyena","es":"Mightyena","fr":"Grahyèna","it":"Mightyena","pt":"","g":3,"t":[17],"cat":{"en":"Bite Pokémon","es":"Pokémon Mordisco","fr":"Pokémon Morsure","it":"Pokémon Morso","ja":"かみつきポケモン"},"desc":{"en":"Mightyena travel and act as a pack in the wild. The memory of its life in the wild compels the Pokémon to obey only those Trainers that it recognizes to possess superior skill.","es":"Mightyena se desplaza y vive con su jauría en estado salvaje. Por eso, acostumbrado a esta libertad, obedece al Entrenador al que considere realmente dotado de habilidades superiores al resto.","fr":"Les Grahyèna vivent et se déplacent en meute. Leurs réminiscences de la vie sauvage les poussent à n’obéir qu’aux Dresseurs qu’ils considèrent comme réellement talentueux.","it":"Allo stato brado Mightyena si sposta e agisce soltanto assieme al suo branco. A causa della sua natura selvatica obbedisce solo a quegli Allenatori che considera possedere abilità superiori.","ja":"グループで こうどうしていた やせいの ちが のこっているので すぐれた トレーナー だけを リーダーと みとめて めいれいに したがう。"},"h":10,"w":370},{"n":263,"ja":"ジグザグマ","r":"Ziguzaguma","en":"Zigzagoon","es":"Zigzagoon","fr":"Zigzaton","it":"Zigzagoon","pt":"","g":3,"t":[1],"cat":{"en":"Tiny Raccoon Pokémon","es":"Pokémon Mapachito","fr":"Pokémon Petit Raton","it":"Pokémon Procione","ja":"まめだぬきポケモン"},"desc":{"en":"Zigzagoon that adapted to regions outside Galar acquired this appearance. If you’ve lost something, this Pokémon can likely find it.","es":"El Zigzagoon de Galar desarrolló este aspecto tras adaptarse a otras regiones. Muestra una gran habilidad a la hora de encontrar cosas.","fr":"Le Zigzaton de Galar a adopté cette forme dans les autres régions. Il est très doué pour dénicher des choses.","it":"Lo Zigzagoon di Galar ha assunto questo aspetto negli altri territori in cui si è diffuso. Ritrovare gli oggetti smarriti è la sua specialità.","ja":"ガラルの ジグザグマが ほかの ちいきに てきおうした すがた。 さがしものを みつけるのが とくい。"},"h":4,"w":175},{"n":264,"ja":"マッスグマ","r":"Massuguma","en":"Linoone","es":"Linoone","fr":"Linéon","it":"Linoone","pt":"","g":3,"t":[1],"cat":{"en":"Rushing Pokémon","es":"Pokémon Lanzado","fr":"Pokémon Fonceur","it":"Pokémon Sfrecciante","ja":"とっしんポケモン"},"desc":{"en":"It uses its explosive speed and razor-sharp claws to bring down prey. Running along winding paths is not its strong suit.","es":"Abate a sus presas con su vertiginosa velocidad y sus afiladas garras. Los trayectos sinuosos merman notablemente su capacidad para correr.","fr":"Il se sert de sa force de propulsion et de ses griffes aiguisées pour achever ses proies. Il a du mal à courir sur les routes sinueuses.","it":"Si serve della sua straordinaria forza esplosiva e dei suoi artigli affilati per abbattere la preda. Correre lungo strade tortuose non è il suo forte.","ja":"バツグンの しゅんぱつりょくと するどいツメで エモノを しとめる。 まがった みちを はしるのは ヘタ。"},"h":5,"w":325},{"n":265,"ja":"ケムッソ","r":"Kemusso","en":"Wurmple","es":"Wurmple","fr":"Chenipotte","it":"Wurmple","pt":"","g":3,"t":[7],"cat":{"en":"Worm Pokémon","es":"Pokémon Gusano","fr":"Pokémon Ver","it":"Pokémon Baco","ja":"いもむしポケモン"},"desc":{"en":"Likes sap and is abundant in the wild. Why it evolves into various different forms is unknown. One cannot tell from a Wurmple's appearance which form it will take when it evolves.","es":"Wurmple es la presa preferida de Swellow. La forma que tiene de intentar defenderse es apuntar con las púas del lomo al amenazante enemigo y debilitarlo inyectándole veneno.","fr":"Chenipotte est la proie de Hélédelle. Ce Pokémon essaie de résister en dirigeant les pointes de son dos vers le prédateur. Il affaiblit son ennemi en lui injectant du poison.","it":"Wurmple è la preda favorita di Swellow. Questo Pokémon cerca di resistere puntando gli aculei irti sulla schiena contro il predatore che attacca. Poi indebolisce il nemico emettendo veleno da questi aculei.","ja":"エサにしようと つかまえにきた オオスバメに おしりの トゲを むけて ていこうする。 しみだした どくで あいてを よわらせるぞ。"},"h":3,"w":36},{"n":266,"ja":"カラサリス","r":"Karasalis","en":"Silcoon","es":"Silcoon","fr":"Armulys","it":"Silcoon","pt":"","g":3,"t":[7],"cat":{"en":"Cocoon Pokémon","es":"Pokémon Capullo","fr":"Pokémon Cocon","it":"Pokémon Bozzolo","ja":"さなぎポケモン"},"desc":{"en":"Wraps itself in thin strings of silk while it stores energy for evolution. It can't extend its limbs and its movement is slow, but its eyes keep a sharp lookout—Silcoon is always on guard.","es":"Se pensaba que Silcoon podía aguantar el hambre y no consumir nada antes de evolucionar. Sin embargo, ahora se cree que sacia su sed bebiendo el agua de la lluvia que se le queda sobre la seda del capullo.","fr":"On pensait qu’Armulys pouvait résister à la faim et ne consommait rien avant son évolution. On sait maintenant que ce Pokémon étanche sa soif en récupérant l’eau de pluie déposée sur sa soie.","it":"In passato si pensava che Silcoon resistesse alla fame senza ingerire nulla fino all’evoluzione. Tuttavia, ora si presume che il Pokémon plachi la sua sete bevendo l’acqua piovana che si posa sul suo bozzolo.","ja":"しんかするまで なにも たべずに たえていると かんがえられていたが どうやら いとに ついた あまみずで かわきを いやしているらしい。"},"h":6,"w":100},{"n":267,"ja":"アゲハント","r":"Agehunt","en":"Beautifly","es":"Beautifly","fr":"Charmillon","it":"Beautifly","pt":"","g":3,"t":[7,3],"cat":{"en":"Butterfly Pokémon","es":"Pokémon Mariposa","fr":"Pokémon Papillon","it":"Pokémon Farfalla","ja":"ちょうちょポケモン"},"desc":{"en":"A colorful and incredibly beautiful but also greedy Pokémon. In an effort to keep its favorite food all to itself, it will chase away Combee as they try to gather nectar.","es":"Beautifly tiene una boca enorme en espiral que parece una aguja y le resulta muy útil para recolectar polen. Este Pokémon va revoloteando de flor en flor para recogerlo.","fr":"Charmillon a une longue trompe en spirale, particulièrement pratique pour récupérer le pollen des fleurs. Ce Pokémon se laisse porter par les vents printaniers pendant qu’il butine.","it":"La bocca di Beautifly è costituita da un ago spiraliforme, molto utile per succhiare il polline dai fiori. Questo Pokémon si fa trasportare dal vento nei suoi viaggi alla ricerca del polline.","ja":"くるりと まいた はりの ような ながい くちは かふんを あつめる ときに とても べんり。 はるかぜに のって かふんを あつめて まわる。"},"h":10,"w":284},{"n":268,"ja":"マユルド","r":"Mayuld","en":"Cascoon","es":"Cascoon","fr":"Blindalys","it":"Cascoon","pt":"","g":3,"t":[7],"cat":{"en":"Cocoon Pokémon","es":"Pokémon Capullo","fr":"Pokémon Cocon","it":"Pokémon Bozzolo","ja":"さなぎポケモン"},"desc":{"en":"The silk coating its body is thin but sufficiently strong. Cascoon's silk has a luster and texture superior to that of Silcoon's, and clothes made using Cascoon silk are regarded as top-notch.","es":"Si atacan a Cascoon, se queda inmóvil aunque le hayan hecho mucho daño, puesto que, si se moviera, perdería fuerzas para evolucionar. Nunca olvida el daño que le han hecho.","fr":"Lorsqu’il est attaqué, Blindalys reste immobile, même s’il a très mal. En effet, s’il bougeait, son corps serait affaibli lors de son évolution. En revanche, ce Pokémon n’oubliera pas la douleur endurée.","it":"In caso di aggressione Cascoon rimane immobile indipendentemente dalla violenza dell’attacco subito. Questo lo aiuta a evitare di indebolire il suo corpo in vista dell’evoluzione. Non dimentica mai il dolore provato.","ja":"うごくと つよい からだに しんか できないので どんなに いためつけられても じっと している。 そのとき うけた いたみは ずっと わすれない。"},"h":7,"w":115},{"n":269,"ja":"ドクケイル","r":"Dokucale","en":"Dustox","es":"Dustox","fr":"Papinox","it":"Dustox","pt":"","g":3,"t":[7,4],"cat":{"en":"Poison Moth Pokémon","es":"Pokémon Polilla Ven.","fr":"Pokémon Papipoison","it":"Pokémon Velentarma","ja":"どくがポケモン"},"desc":{"en":"Tends to be drawn to bonfires on dark nights. Difficult to chase away from settlements because of the way it scatters highly toxic scales.","es":"Cuando Dustox bate las alas, libera un polvillo fino que en realidad es un peligroso veneno que puede resultar dañino hasta al más fuerte de los fuertes. Las antenas le sirven de radar para buscar comida.","fr":"Lorsque Papinox bat des ailes, une légère poussière se répand. Cette poussière est en fait un puissant poison capable de mettre au tapis un boxeur professionnel. Ce Pokémon cherche sa nourriture avec ses antennes, comme un radar.","it":"Quando agita le ali, Dustox sparge una polvere sottile tutt’intorno. In realtà si tratta di un potente veleno capace di mettere al tappeto anche un campione di lotta libera. Per cercare il cibo usa le antenne come un radar.","ja":"はばたくと こまかい こなが まいあがる。 すいこむと プロレスラーも ねこむ もうどくだ。 しょっかくの レーダーで エサを さがす。"},"h":12,"w":316},{"n":270,"ja":"ハスボー","r":"Hassboh","en":"Lotad","es":"Lotad","fr":"Nénupiot","it":"Lotad","pt":"","g":3,"t":[11,12],"cat":{"en":"Water Weed Pokémon","es":"Pokémon Lenteja Agua","fr":"Pokémon Aquaplante","it":"Pokémon Alga","ja":"うきくさポケモン"},"desc":{"en":"Its leaf grew too large for it to live on land. That is how it began to live floating in the water.","es":"El excesivo tamaño y peso de la hoja que tiene en la cabeza ha propiciado que viva flotando en el agua.","fr":"Sa feuille est devenue si grande et si lourde qu’il doit vivre en flottant sur l’eau.","it":"La foglia che ha in testa, diventata troppo grande e pesante, lo ha spinto a vivere galleggiando a pelo d’acqua.","ja":"はっぱが おおきく なりすぎて おもくなって しまったため みずに うかんで くらすように なった。"},"h":5,"w":26},{"n":271,"ja":"ハスブレロ","r":"Hasubrero","en":"Lombre","es":"Lombre","fr":"Lombre","it":"Lombre","pt":"","g":3,"t":[11,12],"cat":{"en":"Jolly Pokémon","es":"Pokémon Alegre","fr":"Pokémon Jovial","it":"Pokémon Giocoso","ja":"ようきポケモン"},"desc":{"en":"It lives at the water’s edge where it is sunny. It sleeps on a bed of water grass by day and becomes active at night.","es":"Vive en las riberas bañadas por el sol. De día duerme sobre un lecho de plantas acuáticas y de noche entra en acción.","fr":"Il vit au bord de l’eau dans les endroits ensoleillés. Il s’endort sur un tas d’algues dans la journée et ne se lève qu’à la nuit tombée.","it":"Vive in riva a specchi d’acqua, in aree soleggiate. Di giorno dorme su di un letto di piante acquatiche, mentre la notte è attivo.","ja":"ひあたりの よい みずべに すむ。 ひるまは みずくさの ベッドで ねむり ひが くれると うごきだす。"},"h":12,"w":325},{"n":272,"ja":"ルンパッパ","r":"Runpappa","en":"Ludicolo","es":"Ludicolo","fr":"Ludicolo","it":"Ludicolo","pt":"","g":3,"t":[11,12],"cat":{"en":"Carefree Pokémon","es":"Pokémon Optimista","fr":"Pokémon Insouciant","it":"Pokémon Spensierato","ja":"のうてんきポケモン"},"desc":{"en":"If it hears festive music, it begins moving in rhythm in order to amplify its power.","es":"Mover su cuerpo al ritmo de música festiva puede hacer que aumente su fuerza.","fr":"Il bouge son corps sur un rythme entraînant pour décupler ses forces.","it":"Aumenta la propria forza danzando al ritmo di una musica giocosa.","ja":"ようきな リズムに あわせて からだを うごかす ことで パワーを ぞうふくさせて いるのだ。"},"h":15,"w":550},{"n":273,"ja":"タネボー","r":"Taneboh","en":"Seedot","es":"Seedot","fr":"Grainipiot","it":"Seedot","pt":"","g":3,"t":[12],"cat":{"en":"Acorn Pokémon","es":"Pokémon Bellota","fr":"Pokémon Gland","it":"Pokémon Ghianda","ja":"どんぐりポケモン"},"desc":{"en":"It attaches itself to a tree branch using the top of its head. Strong winds can sometimes make it fall.","es":"Se cuelga de las ramas con el extremo de la cabeza. A veces se cae cuando soplan vientos fuertes.","fr":"Il se suspend aux branches par l’extrémité de sa tête. Il arrive qu’une bourrasque le fasse tomber.","it":"Si attacca ai rami degli alberi usando il picciolo che ha sul capo. Talvolta il vento lo fa cadere.","ja":"あたまの さきを えだに くっつけて ぶらさがる。 きょうふうに あおられ おちてしまう ことも あるのだ。"},"h":5,"w":40},{"n":274,"ja":"コノハナ","r":"Konohana","en":"Nuzleaf","es":"Nuzleaf","fr":"Pifeuil","it":"Nuzleaf","pt":"","g":3,"t":[12,17],"cat":{"en":"Wily Pokémon","es":"Pokémon Astuto","fr":"Pokémon Malin","it":"Pokémon Scaltro","ja":"いじわるポケモン"},"desc":{"en":"They live in holes bored in large trees. The sound of Nuzleaf’s grass flute fills listeners with dread.","es":"Vive en las oquedades de los árboles grandes. El sonido que emite al usar la hoja de la cabeza como flauta asusta a quienes lo escuchan.","fr":"Il vit dans les trous des grands arbres. Le sifflement qu’il produit avec sa feuille suffit à remplir ses adversaires d’effroi.","it":"Vive in buchi scavati in grandi alberi. Il suono del suo flauto di foglia inquieta chi lo ascolta.","ja":"コノハナの ふく くさぶえの おとは きいた ものを ふあんに させる。 たいぼくに あいた あなで くらす。"},"h":10,"w":280},{"n":275,"ja":"ダーテング","r":"Dirteng","en":"Shiftry","es":"Shiftry","fr":"Tengalice","it":"Shiftry","pt":"","g":3,"t":[12,17],"cat":{"en":"Wicked Pokémon","es":"Pokémon Malvado","fr":"Pokémon Malveillant","it":"Pokémon Burbero","ja":"よこしまポケモン"},"desc":{"en":"It lives quietly in the deep forest. It is said to create chilly winter winds with the fans it holds.","es":"Vive sigiloso en lo más profundo del bosque. Se dice que con sus abanicos puede generar vientos gélidos.","fr":"Il vit caché au fond des forêts. On raconte qu’il fait souffler la bise lorsqu’il agite ses grands éventails.","it":"Vive nella calma delle foreste. Si dice che sia in grado di creare raffiche di vento gelido agitando i suoi grandi ventagli.","ja":"もりの おくで ひっそりと くらす。 おおきな うちわを あおぐと こがらしが ふくと いわれている。"},"h":13,"w":596},{"n":276,"ja":"スバメ","r":"Subame","en":"Taillow","es":"Taillow","fr":"Nirondelle","it":"Taillow","pt":"","g":3,"t":[1,3],"cat":{"en":"Tiny Swallow Pokémon","es":"Pokémon Pequebuche","fr":"Pokémon Minirondel","it":"Pokémon Rondinella","ja":"こツバメポケモン"},"desc":{"en":"Taillow is young—it has only just left its nest. As a result, it sometimes becomes lonesome and cries at night. This Pokémon feeds on Wurmple that live in forests.","es":"Taillow es pequeño, está recién salido del nido. Por eso, se siente solo con frecuencia y se pone a piar. Este Pokémon se alimenta de los Wurmple que hay por el bosque.","fr":"Nirondelle est jeune. Il vient de quitter son nid. Du coup, il se sent parfois un peu seul et pleure la nuit. Ce Pokémon se nourrit des Chenipotte qu’il trouve dans les forêts.","it":"Taillow è molto piccolo, infatti ha appena lasciato il nido. Talvolta di notte si sente solo e piange. Si nutre dei Wurmple che vivono nella foresta.","ja":"すだちを おえたばかり なので よるに なると さみしく なって ないてしまう ことも ある。 もりに すむ ケムッソを つかまえて たべる。"},"h":3,"w":23},{"n":277,"ja":"オオスバメ","r":"Ohsubame","en":"Swellow","es":"Swellow","fr":"Hélédelle","it":"Swellow","pt":"","g":3,"t":[1,3],"cat":{"en":"Swallow Pokémon","es":"Pokémon Buche","fr":"Pokémon Hirondelle","it":"Pokémon Rondine","ja":"ツバメポケモン"},"desc":{"en":"Swellow is very conscientious about the upkeep of its glossy wings. Once two Swellow are gathered, they diligently take care of cleaning each other’s wings.","es":"Swellow se preocupa a conciencia del mantenimiento de sus lustrosas alas. Cuando hay dos juntos, el uno se ocupa de limpiarle las alas al otro.","fr":"Hélédelle fait attention à bien entretenir ses ailes brillantes. Lorsque deux Hélédelle se rencontrent, ils se nettoient mutuellement les ailes avec attention.","it":"Swellow è molto attento a mantenere le proprie ali sempre lucide e splendenti. Spesso si incontra coi propri simili e questi Pokémon in gruppo si lisciano vicendevolmente le piume.","ja":"ツヤの ある はねの ていれは おこたらない。 オオスバメが ２ひき あつまると かならず おたがいの はねを きれいに ていれするぞ。"},"h":7,"w":198},{"n":278,"ja":"キャモメ","r":"Camome","en":"Wingull","es":"Wingull","fr":"Goélise","it":"Wingull","pt":"","g":3,"t":[11,3],"cat":{"en":"Seagull Pokémon","es":"Pokémon Gaviota","fr":"Pokémon Mouette","it":"Pokémon Gabbiano","ja":"うみねこポケモン"},"desc":{"en":"It soars on updrafts without flapping its wings. It makes a nest on sheer cliffs at the sea’s edge.","es":"Aprovecha las corrientes de aire para ganar altura sin necesidad de batir las alas. Anida en acantilados costeros.","fr":"Il niche dans les falaises. En utilisant les courants d’air, il peut voler sans battre des ailes.","it":"Sfrutta le correnti ascensionali per volteggiare nel cielo senza sbattere le ali. Fa il nido nelle scogliere lungo la costa.","ja":"くうきの ながれを りようして はばたかずに そらへ まいあがる。 うみべの がけに すを つくる。"},"h":6,"w":95},{"n":279,"ja":"ペリッパー","r":"Pelipper","en":"Pelipper","es":"Pelipper","fr":"Bekipan","it":"Pelipper","pt":"","g":3,"t":[11,3],"cat":{"en":"Water Bird Pokémon","es":"Pokémon Ave Agua","fr":"Pokémon Oiseaudo","it":"Pokémon Alacquatico","ja":"みずどりポケモン"},"desc":{"en":"Skimming the water’s surface, it dips its large bill in the sea, scoops up food and water, and carries it.","es":"Vuela a ras de la superficie marina para llenar su inmenso pico de agua y comida, que se lleva consigo.","fr":"Avec son grand bec, il transporte de la nourriture qu’il a récoltée en volant la bouche ouverte au ras de la mer, gobant de l’eau au passage.","it":"Si libra a pelo dell’acqua del mare pescando il suo cibo e trasportandolo via con il suo grande becco.","ja":"かいめん すれすれを とんで おおきな くちばしで かいすいごと エサを すくいとって はこぶのだ。"},"h":12,"w":280},{"n":280,"ja":"ラルトス","r":"Ralts","en":"Ralts","es":"Ralts","fr":"Tarsal","it":"Ralts","pt":"","g":3,"t":[14,18],"cat":{"en":"Feeling Pokémon","es":"Pokémon Sensible","fr":"Pokémon Sentiment","it":"Pokémon Sensazione","ja":"きもちポケモン"},"desc":{"en":"Tends to prefer people with a chipper disposition to those who are gloomy, but it has shown no discrimination with regard to age or gender. Needs more research.","es":"Si sus cuernos perciben emociones positivas de personas o Pokémon, su cuerpo se calienta un poco.","fr":"Quand ses cornes rouges captent les ondes positives d’un Pokémon ou d’un humain, tout son corps se réchauffe.","it":"Se con le sue corna rosse avverte emozioni positive di persone o Pokémon, il suo corpo si scalda leggermente.","ja":"あかいツノで ひとや ポケモンの あたたかな きもちを キャッチすると ぜんしんが ほのかに あつくなる。"},"h":4,"w":66},{"n":281,"ja":"キルリア","r":"Kirlia","en":"Kirlia","es":"Kirlia","fr":"Kirlia","it":"Kirlia","pt":"","g":3,"t":[14,18],"cat":{"en":"Emotion Pokémon","es":"Pokémon Sensorio","fr":"Pokémon Émotion","it":"Pokémon Emozione","ja":"かんじょうポケモン"},"desc":{"en":"It resembles a maiden in appearance, but it wields strange powers to project visions of paradise. I suspect the crimson ornaments on its head are the key to its abilities.","es":"Con sus poderes psíquicos puede deformar el espacio a su alrededor y predecir el futuro.","fr":"Il peut distordre l’espace-temps grâce à ses pouvoirs psychiques et ainsi voir l’avenir.","it":"Sfruttando i suoi poteri psichici può distorcere lo spazio circostante per prevedere l’avvenire.","ja":"サイコパワーを あやつり まわりの くうかんを ねじまげる ことで みらいを みとおす ことが できる。"},"h":8,"w":202},{"n":282,"ja":"サーナイト","r":"Sirnight","en":"Gardevoir","es":"Gardevoir","fr":"Gardevoir","it":"Gardevoir","pt":"","g":3,"t":[14,18],"cat":{"en":"Embrace Pokémon","es":"Pokémon Envolvente","fr":"Pokémon Étreinte","it":"Pokémon Abbraccio","ja":"ほうようポケモン"},"desc":{"en":"It will dedicate itself to defending a master it has come to adore. Its pure white dress, reminiscent of those worn by ladies of nobility, is the dress of one who is willing to risk their life.","es":"Para proteger a su Entrenador, emplea todo su poder psíquico en crear un pequeño agujero negro.","fr":"Prêt à tout pour protéger son Dresseur, il peut aller jusqu’à épuiser sa force mentale pour créer un mini trou noir.","it":"Quando il suo Allenatore è in pericolo, usa tutto il suo potere psichico per creare un piccolo buco nero.","ja":"トレーナーを まもるためなら サイコパワーを つかいきり ちいさな ブラックホールを つくりだす。"},"h":16,"w":484},{"n":283,"ja":"アメタマ","r":"Ametama","en":"Surskit","es":"Surskit","fr":"Arakdo","it":"Surskit","pt":"","g":3,"t":[7,11],"cat":{"en":"Pond Skater Pokémon","es":"Pokémon Zapatero","fr":"Pokémon Maresurfeur","it":"Pokémon Sfiorapozze","ja":"あめんぼポケモン"},"desc":{"en":"It lives in ponds and marshes that feature lots of plant life. It often fights with Dewpider, whose habitat and diet are similar.","es":"Vive en estanques y pantanales donde abunde la flora acuática y compite fieramente con los Dewpider por el territorio y el sustento.","fr":"Il vit dans les lacs ou les marais où prospèrent les plantes hydrophiles. Il se dispute souvent proies et territoire avec son voisin, Araqua.","it":"Vive tra le piante acquatiche di stagni e paludi. Spesso lotta con i Dewpider per contendersi il cibo e il territorio.","ja":"みずくさの おおい いけや ぬまに すむ。 せいそくちも くう エサも ちかい シズクモと よく あらそう。"},"h":5,"w":17},{"n":284,"ja":"アメモース","r":"Amemoth","en":"Masquerain","es":"Masquerain","fr":"Maskadra","it":"Masquerain","pt":"","g":3,"t":[7,3],"cat":{"en":"Eyeball Pokémon","es":"Pokémon Globocular","fr":"Pokémon Boule Œil","it":"Pokémon Occhi","ja":"めだまポケモン"},"desc":{"en":"Its thin, winglike antennae are highly absorbent. It waits out rainy days in tree hollows.","es":"Sus grandes antenas en forma de ojos tienden a absorber humedad. Los días de lluvia, se refugia en cavidades de los árboles y espera paciente.","fr":"Ses antennes en forme d’ailes absorbent facilement l’humidité. Par temps de pluie, il attend patiemment au creux d’un arbre.","it":"Le sue antenne, simili ad ali sottili, assorbono l’umidità. Quando piove si rifugia all’interno delle cavità degli alberi.","ja":"うすい ハネの ような しょっかくは しっけを すいやすい。 あめの ひは きの ウロなどで じっと すごす。"},"h":8,"w":36},{"n":285,"ja":"キノココ","r":"Kinococo","en":"Shroomish","es":"Shroomish","fr":"Balignon","it":"Shroomish","pt":"","g":3,"t":[12],"cat":{"en":"Mushroom Pokémon","es":"Pokémon Hongo","fr":"Pokémon Champignon","it":"Pokémon Fungo","ja":"きのこポケモン"},"desc":{"en":"If Shroomish senses danger, it shakes its body and scatters spores from the top of its head. This Pokémon’s spores are so toxic, they make trees and weeds wilt.","es":"Si Shroomish siente peligro, agita el cuerpo y libera esporas venenosas por la cabeza. Estas esporas son tan tóxicas que pueden hacer que se marchiten los árboles y hasta las malas hierbas.","fr":"Lorsque Balignon sent un danger, il secoue son corps et répand ses spores du haut de sa tête. Les spores de ce Pokémon sont si toxiques qu’elles font dépérir les arbres et les herbes.","it":"In caso di pericolo Shroomish agita il proprio corpo spargendo spore dalla sommità del capo. Le spore di questo Pokémon sono così tossiche da far appassire fiori e piante.","ja":"きけんを かんじると からだを ふるわせて あたまの てっぺんから ほうしを ばらまくぞ。 くさきも しおれてしまうほどの もうどくだ。"},"h":4,"w":45},{"n":286,"ja":"キノガッサ","r":"Kinogassa","en":"Breloom","es":"Breloom","fr":"Chapignon","it":"Breloom","pt":"","g":3,"t":[12,2],"cat":{"en":"Mushroom Pokémon","es":"Pokémon Hongo","fr":"Pokémon Champignon","it":"Pokémon Fungo","ja":"きのこポケモン"},"desc":{"en":"The seeds ringing Breloom’s tail are made of hardened toxic spores. It is horrible to eat the seeds. Just taking a bite of this Pokémon’s seed will cause your stomach to rumble.","es":"Las semillas que Breloom tiene prendidas de la cola están formadas por sólidas esporas tóxicas. Comérselas puede resultar fatal. Hasta el más mínimo bocado puede hacerte polvo el estómago.","fr":"Les graines autour de la queue de Chapignon sont des spores toxiques. Elles sont totalement immangeables. Une simple bouchée d’une graine de ce Pokémon peut causer de grandes douleurs à l’estomac.","it":"I semi sulla punta della coda di Breloom sono costituiti da spore tossiche indurite. Se ingeriti hanno un effetto orribile, infatti un solo morso a questi semi crea gravi disturbi allo stomaco.","ja":"シッポの タネは どくの ほうしが かたまって できた ものなので たべたら たいへんだ。 ひとくちで おなかが グルグル なりだすぞ。"},"h":12,"w":392},{"n":287,"ja":"ナマケロ","r":"Namakero","en":"Slakoth","es":"Slakoth","fr":"Parecool","it":"Slakoth","pt":"","g":3,"t":[1],"cat":{"en":"Slacker Pokémon","es":"Pokémon Gandul","fr":"Pokémon Flâneur","it":"Pokémon Ozioso","ja":"なまけものポケモン"},"desc":{"en":"Slakoth’s heart beats just once a minute. Whatever happens, it is content to loaf around motionless. It is rare to see this Pokémon in motion.","es":"A Slakoth le late el corazón una vez por minuto. Ya puede pasar lo que pase, que este Pokémon no mueve un dedo. Está todo el día holgazaneando. Es muy raro verlo en movimiento.","fr":"Le cœur de Parecool ne bat qu’une fois par minute. Quoi qu’il arrive, il se contente de s’avachir, immobile. Il est très rare de voir ce Pokémon se déplacer.","it":"Il cuore di Slakoth batte con una frequenza di appena un battito al minuto. Qualsiasi cosa accada, non si muove mai. Infatti adora poltrire, riducendo al minimo i suoi movimenti.","ja":"しんぞうの こどうは １ぷんかんに １かい。 とにかく じっと ねそべっている ポケモンで うごく すがたを みることは ほとんど ない。"},"h":8,"w":240},{"n":288,"ja":"ヤルキモノ","r":"Yarukimono","en":"Vigoroth","es":"Vigoroth","fr":"Vigoroth","it":"Vigoroth","pt":"","g":3,"t":[1],"cat":{"en":"Wild Monkey Pokémon","es":"Pokémon Mono Feroz","fr":"Pokémon Turbusinge","it":"Pokémon Indocile","ja":"あばれザルポケモン"},"desc":{"en":"Vigoroth is simply incapable of remaining still. Even when it tries to sleep, the blood in its veins grows agitated, compelling this Pokémon to run wild throughout the jungle before it can settle down.","es":"A Vigoroth le resulta totalmente imposible estarse quieto. Cuando intenta dormir, la sangre le fluye a velocidad de vértigo y se pone a correr por el bosque de un lado a otro hasta que se calma.","fr":"Vigoroth ne tient pas en place. Même quand il essaie de dormir, le sang dans ses veines s’agite, obligeant ce Pokémon à courir comme un fou dans la forêt pour s’épuiser afin de pouvoir se reposer.","it":"Vigoroth è incapace di stare fermo e tranquillo. Anche quando cerca di dormire, il sangue gli ribolle nelle vene, costringendolo a correre selvaggiamente in lungo e in largo nella foresta prima di riuscire a calmarsi.","ja":"じっとしている ことが できない ポケモンだ。 ねむろうとしても からだの ちが たぎってしまい もりじゅうを かけまわらないと おさまらない。"},"h":14,"w":465},{"n":289,"ja":"ケッキング","r":"Kekking","en":"Slaking","es":"Slaking","fr":"Monaflèmit","it":"Slaking","pt":"","g":3,"t":[1],"cat":{"en":"Lazy Pokémon","es":"Pokémon Holgazán","fr":"Pokémon Fainéant","it":"Pokémon Pigrizia","ja":"ものぐさポケモン"},"desc":{"en":"Wherever Slaking live, rings of over a yard in diameter appear in grassy fields. They are made by the Pokémon as it eats all the grass within reach while lying prone on the ground.","es":"Cuando Slaking se instala a vivir en una zona, aparecen círculos de un metro de radio de terreno baldío, pues se come todo el césped que pilla mientras está tumbado boca abajo.","fr":"On trouve parfois des cercles de plus de 1 m de rayon totalement désherbés dans les plaines. Ils sont faits par les Monaflèmit qui passent leurs journées allongés à manger toute l’herbe à portée de main.","it":"Dove vive Slaking, si formano anelli del raggio di 1 m nei prati erbosi. Infatti, quando questo Pokémon si stende prono al suolo, mangia tutta l’erba che riesce a raggiungere.","ja":"そうげんに きざまれた はんけい １メートルの わっかは ケッキングが ねそべったまま まわりの くさを たべつくして できた ものだ。"},"h":20,"w":1305},{"n":290,"ja":"ツチニン","r":"Tutinin","en":"Nincada","es":"Nincada","fr":"Ningale","it":"Nincada","pt":"","g":3,"t":[7,5],"cat":{"en":"Trainee Pokémon","es":"Pokémon Aprendiz","fr":"Pokémon Apprenti","it":"Pokémon Novizio","ja":"したづみポケモン"},"desc":{"en":"It can sometimes live underground for more than 10 years. It absorbs nutrients from the roots of trees.","es":"Pueden pasar más de diez años bajo tierra. Absorben nutrientes de las raíces de los árboles.","fr":"Il peut passer plus de dix ans sous terre. Les racines des arbres constituent son régime alimentaire.","it":"Gli capita di restare anche più di dieci anni sottoterra. Assorbe le sostanze nutritive dalle radici degli alberi.","ja":"１０ねん いじょう つちの なかで くらす ことも ある。 じゅもくの ねっこから えいようを すいとる。"},"h":5,"w":55},{"n":291,"ja":"テッカニン","r":"Tekkanin","en":"Ninjask","es":"Ninjask","fr":"Ninjask","it":"Ninjask","pt":"","g":3,"t":[7,3],"cat":{"en":"Ninja Pokémon","es":"Pokémon Ninja","fr":"Pokémon Ninja","it":"Pokémon Ninja","ja":"しのびポケモン"},"desc":{"en":"This Pokémon is so quick, it is said to be able to avoid any attack. It loves to feed on tree sap.","es":"Este Pokémon es tan rápido que, según dicen, puede esquivar cualquier ataque. Le encanta alimentarse de la dulce savia de los árboles.","fr":"Ce Pokémon est tellement rapide qu’on le dit capable d’éviter toutes les attaques. Il adore se nourrir de la sève sucrée des arbres.","it":"È così rapido che si dice sia in grado di schivare qualsiasi attacco. Ama nutrirsi della linfa degli alberi.","ja":"どんな こうげきでも よけてしまうと いわれるほど すばやい ポケモン。 あまい じゅえきが だいこうぶつ。"},"h":8,"w":120},{"n":292,"ja":"ヌケニン","r":"Nukenin","en":"Shedinja","es":"Shedinja","fr":"Munja","it":"Shedinja","pt":"","g":3,"t":[7,8],"cat":{"en":"Shed Pokémon","es":"Pokémon Muda","fr":"Pokémon Exuvie","it":"Pokémon Cambiapelle","ja":"ぬけがらポケモン"},"desc":{"en":"A strange Pokémon—it flies without moving its wings, has a hollow shell for a body, and does not breathe.","es":"Es un Pokémon muy peculiar: revolotea sin batir las alas, no respira y su cuerpo está hueco por dentro.","fr":"Cet étrange Pokémon, dont le corps est comme une coquille vide, ne respire pas et peut voler sans battre des ailes.","it":"Svolazza in giro senza muovere le ali. È un Pokémon strano: è vuoto all’interno e non respira.","ja":"ハネを うごかさずに とびまわる。 からだの なかは からっぽで いきを しない ふしぎな ポケモン。"},"h":8,"w":12},{"n":293,"ja":"ゴニョニョ","r":"Gonyonyo","en":"Whismur","es":"Whismur","fr":"Chuchmur","it":"Whismur","pt":"","g":3,"t":[1],"cat":{"en":"Whisper Pokémon","es":"Pokémon Susurro","fr":"Pokémon Chuchoteur","it":"Pokémon Sussurro","ja":"ささやきポケモン"},"desc":{"en":"When Whismur cries, the sound of its own voice startles it, making the Pokémon cry even louder. It cries until it’s exhausted, then it falls asleep.","es":"Al chillar, se asusta con su propia voz, lo cual le lleva a gritar más fuerte todavía. Cuando se cansa, se echa a dormir.","fr":"Quand il se met à crier, il se surprend lui-même et hurle de plus belle. Il continue ainsi jusqu’à ce qu’il se fatigue et tombe de sommeil.","it":"Se inizia a gridare, si spaventa al suono della sua stessa voce e urla ancora di più. Quando si stanca di urlare, va a dormire.","ja":"なきはじめると じぶんの こえに おどろいて さらに はげしく なく。 なきつかれると ねむってしまう。"},"h":6,"w":163},{"n":294,"ja":"ドゴーム","r":"Dogohmb","en":"Loudred","es":"Loudred","fr":"Ramboum","it":"Loudred","pt":"","g":3,"t":[1],"cat":{"en":"Big Voice Pokémon","es":"Pokémon Chillón","fr":"Pokémon Grosse Voix","it":"Pokémon Vocione","ja":"おおごえポケモン"},"desc":{"en":"The force of this Pokémon’s loud voice isn’t just the sound—it’s also the wave of air pressure that blows opponents away and damages them.","es":"Su voz no afecta solo al oído. Sus ondas sonoras provocan variaciones de presión en el aire que hacen que sus enemigos salgan despedidos.","fr":"Ses hurlements n’affectent pas seulement l’ouïe ; ils provoquent aussi une onde de choc qui balaie les ennemis et leur inflige des dégâts.","it":"Oltre a colpire l’udito, la sua potente voce produce anche delle onde d’urto con le quali spazza via e danneggia i nemici.","ja":"おおごえは ちょうかく だけでなく くうきの あつりょくとなり てきを ふきとばし ダメージを あたえる。"},"h":10,"w":405},{"n":295,"ja":"バクオング","r":"Bakuong","en":"Exploud","es":"Exploud","fr":"Brouhabam","it":"Exploud","pt":"","g":3,"t":[1],"cat":{"en":"Loud Noise Pokémon","es":"Pokémon Escandaloso","fr":"Pokémon Bruit Sourd","it":"Pokémon Fragore","ja":"そうおんポケモン"},"desc":{"en":"This Pokémon can do more than just shout. To communicate with others of its kind, it’ll emit all sorts of sounds from the holes in its body.","es":"Además de sus bramidos, es capaz de emitir distintos tonos por los tubos de su cuerpo, que le permiten comunicarse con sus semejantes.","fr":"Pour communiquer avec ses semblables, il n’utilise pas que son cri puissant ; il émet aussi des sons par les trous de son corps.","it":"Oltre a emettere potenti urla, grazie alle aperture del suo corpo produce suoni di tonalità diverse, che usa per comunicare con i suoi simili.","ja":"おおごえ だけじゃない。 からだの あなから いろいろな ねいろを だし なかまと いしそつうを するのだ。"},"h":15,"w":840},{"n":296,"ja":"マクノシタ","r":"Makunoshita","en":"Makuhita","es":"Makuhita","fr":"Makuhita","it":"Makuhita","pt":"","g":3,"t":[2],"cat":{"en":"Guts Pokémon","es":"Pokémon Valiente","fr":"Pokémon Tenace","it":"Pokémon Coraggio","ja":"こんじょうポケモン"},"desc":{"en":"There’s a rumor of a traditional recipe for stew that Trainers can use to raise strong Makuhita.","es":"Dicen que los Entrenadores dan de comer a sus Makuhita un guiso tradicional para que se hagan más fuertes todavía.","fr":"Il existerait un plat mijoté traditionnel que les Dresseurs cuisinent pour rendre leur Makuhita encore plus fort.","it":"Sembra che gli Allenatori preparino un piatto tradizionale particolarmente indicato per far crescere forti i propri Makuhita.","ja":"つよい マクノシタを そだてるために トレーナーたちが でんとうてきに つくる ナベりょうりが あるという。"},"h":10,"w":864},{"n":297,"ja":"ハリテヤマ","r":"Hariteyama","en":"Hariyama","es":"Hariyama","fr":"Hariyama","it":"Hariyama","pt":"","g":3,"t":[2],"cat":{"en":"Arm Thrust Pokémon","es":"Pokémon Empuje","fr":"Pokémon Cogneur","it":"Pokémon Sberletese","ja":"つっぱりポケモン"},"desc":{"en":"Hariyama that are big and fat aren’t necessarily strong. There are some small ones that move nimbly and use moves skillfully.","es":"No todos los Hariyama son grandotes, recios y fuertes. También los hay de menor tamaño pero mayor agilidad y precisión en los movimientos.","fr":"Les Hariyama les plus forts ne sont pas forcément les plus grands. Les petits gabarits aussi ont plus d’un tour dans leur sac.","it":"Gli Hariyama non hanno bisogno di essere grandi e grossi per essere forti. Quelli piccoli sono agili ed efficaci nell’eseguire le mosse.","ja":"ふとって おおきな ハリテヤマが つよいとは かぎらない。 こがらでも みがるで わざに たけたものもいる。"},"h":23,"w":2538},{"n":298,"ja":"ルリリ","r":"Ruriri","en":"Azurill","es":"Azurill","fr":"Azurill","it":"Azurill","pt":"","g":3,"t":[1,18],"cat":{"en":"Polka Dot Pokémon","es":"Pokémon A Topos","fr":"Pokémon Point Polka","it":"Pokémon Pois","ja":"みずたまポケモン"},"desc":{"en":"Although Azurill are normally docile, an angry one will swing around the big ball on its tail and try to smash its opponents.","es":"Es un Pokémon tranquilo, pero, si se le hace enfadar, atacará utilizando la enorme bola que tiene en la cola.","fr":"C’est un Pokémon docile, mais si on l’énerve, il n’hésite pas à frapper en faisant tournoyer la grosse boule au bout de sa queue.","it":"È un Pokémon docile, ma se si arrabbia attacca agitando la grossa palla che ha sulla coda.","ja":"おとなしい ポケモンだが おこると しっぽの おおきな たまを ぶんぶん ふりまわして たたきつけてくるぞ。"},"h":2,"w":20},{"n":299,"ja":"ノズパス","r":"Nosepass","en":"Nosepass","es":"Nosepass","fr":"Tarinor","it":"Nosepass","pt":"","g":3,"t":[6],"cat":{"en":"Compass Pokémon","es":"Pokémon Brújula","fr":"Pokémon Boussole","it":"Pokémon Bussola","ja":"コンパスポケモン"},"desc":{"en":"Once the people of Hisui discovered that its red nose always points north, they grew to rely on it greatly when traveling afar. The nose seems to work in a similar way to ancient compasses.","es":"Su potente fuerza magnética le permite atraer a sus presas sin necesidad de moverse, aunque a veces también atrae a sus enemigos naturales.","fr":"Grâce à sa force magnétique, il peut chasser ses proies sans se déplacer, mais il attire parfois ses pires ennemis.","it":"Il suo potente magnetismo gli permette di attirare le prede senza muoversi, ma a volte attrae anche i suoi nemici naturali.","ja":"きょうりょくな じりょくで えものを ひきよせ うごかず かりを するが てんてきを ひきよせることもある。"},"h":10,"w":970},{"n":300,"ja":"エネコ","r":"Eneco","en":"Skitty","es":"Skitty","fr":"Skitty","it":"Skitty","pt":"","g":3,"t":[1],"cat":{"en":"Kitten Pokémon","es":"Pokémon Gatito","fr":"Pokémon Chaton","it":"Pokémon Micio","ja":"こねこポケモン"},"desc":{"en":"Skitty is known to chase around playfully after its own tail. In the wild, this Pokémon lives in holes in the trees of forests. It is very popular as a pet because of its adorable looks.","es":"Skitty es conocido por la costumbre que tiene de juguetear y de intentar pillarse la cola. En estado salvaje, habita en las cavidades de los troncos de los árboles del bosque. Es la mascota de muchos por lo dulce que parece.","fr":"On sait que Skitty court souvent après sa queue. À l’état sauvage, ce Pokémon vit dans les cavités des arbres de la forêt. Il est tellement adorable qu’il a un grand succès comme animal de compagnie.","it":"Skitty è noto per il suo movimento rotatorio inteso a mordere la propria coda. Allo stato brado, vive all’interno di tronchi cavi nella foresta. È molto amato come animale domestico grazie all’aspetto estremamente dolce.","ja":"じぶんの シッポを おいかけまわす ポケモン。 やせいは もりの じゅもくの あなで くらす。 あいくるしい かおで ペットとして だいにんき。"},"h":6,"w":110},{"n":301,"ja":"エネコロロ","r":"Enekororo","en":"Delcatty","es":"Delcatty","fr":"Delcatty","it":"Delcatty","pt":"","g":3,"t":[1],"cat":{"en":"Prim Pokémon","es":"Pokémon Cursi","fr":"Pokémon Guindé","it":"Pokémon Finezza","ja":"おすましポケモン"},"desc":{"en":"Delcatty sleeps anywhere it wants without keeping a permanent nest. If other Pokémon approach it as it sleeps, this Pokémon will never fight—it will just move away somewhere else.","es":"Delcatty duerme en cualquier lugar sin tener que mantener el nido en un mismo sitio. Si otro Pokémon se le acerca mientras duerme, no se pondrá a luchar con él; simplemente se irá a otro sitio.","fr":"Delcatty peut dormir n’importe où. Il n’a pas de nid permanent. Lorsque d’autres Pokémon lui cherchent des noises pendant son sommeil, il ne répond pas et se contente de partir dormir ailleurs.","it":"Delcatty dorme dove più gli aggrada senza mai una dimora fissa. Se gli si avvicinano altri Pokémon, Delcatty non lotta mai, ma leva le tende e si sposta da un’altra parte.","ja":"きまった すみかを もたずに くらす ポケモン。 ほかの ポケモンが ねどこに ちかよって きても けっして あらそわず ねる ばしょを かえる。"},"h":11,"w":326},{"n":302,"ja":"ヤミラミ","r":"Yamirami","en":"Sableye","es":"Sableye","fr":"Ténéfix","it":"Sableye","pt":"","g":3,"t":[17,8],"cat":{"en":"Darkness Pokémon","es":"Pokémon Oscuridad","fr":"Pokémon Obscurité","it":"Pokémon Oscurità","ja":"くらやみポケモン"},"desc":{"en":"It feeds on gemstone crystals. In darkness, its eyes sparkle with the glitter of jewels.","es":"Se alimenta de gemas. En la oscuridad, los ojos le brillan con el destello de las piedras preciosas.","fr":"Ce Pokémon se nourrit de pierres précieuses. Dans les ténèbres, ses yeux brillent du reflet des joyaux.","it":"Si nutre di gemme. Nell’oscurità i suoi occhi brillano come gioielli.","ja":"ほうせきの けっしょうを たべる。 くらやみの なかでは りょうめが ほうせきの かがやきを はなつ。"},"h":5,"w":110},{"n":303,"ja":"クチート","r":"Kucheat","en":"Mawile","es":"Mawile","fr":"Mysdibule","it":"Mawile","pt":"","g":3,"t":[9,18],"cat":{"en":"Deceiver Pokémon","es":"Pokémon Tramposo","fr":"Pokémon Trompeur","it":"Pokémon Inganno","ja":"あざむきポケモン"},"desc":{"en":"It chomps with its gaping mouth. Its huge jaws are actually steel horns that have been transformed.","es":"Sus otrora cuernos de acero se han transformado en grandes fauces con las que muerde a sus enemigos.","fr":"Ses cornes d’acier forment une grande mâchoire avec laquelle il mord férocement ses adversaires.","it":"Le sue corna d’acciaio si sono trasformate in enormi mascelle, con cui morde i nemici.","ja":"はがねの ツノが へんけいして できた おおきな アゴで あいてに がぶりと かみつくのだ。"},"h":6,"w":115},{"n":304,"ja":"ココドラ","r":"Cokodora","en":"Aron","es":"Aron","fr":"Galekid","it":"Aron","pt":"","g":3,"t":[9,6],"cat":{"en":"Iron Armor Pokémon","es":"Pokémon Coraza Férrea","fr":"Pokémon Armurfer","it":"Pokémon Corazza","ja":"てつヨロイポケモン"},"desc":{"en":"When Aron evolves, its steel armor peels off. In ancient times, people would collect Aron’s shed armor and make good use of it in their daily lives.","es":"Antiguamente se recogía la coraza de acero que este Pokémon desprende al evolucionar y se empleaba para distintos usos.","fr":"Quand il évolue, il perd son armure d’acier. Autrefois, les gens la ramassaient pour en faire usage dans leur vie quotidienne.","it":"Quando si evolve, l’armatura d’acciaio si stacca. In passato, gli esseri umani la raccoglievano per utilizzarla in attività quotidiane.","ja":"しんかのとき はがねの よろいが はがれおちる。 むかしの ひとは ひろって せいかつに やくだてた。"},"h":4,"w":600},{"n":305,"ja":"コドラ","r":"Kodora","en":"Lairon","es":"Lairon","fr":"Galegon","it":"Lairon","pt":"","g":3,"t":[9,6],"cat":{"en":"Iron Armor Pokémon","es":"Pokémon Coraza Férrea","fr":"Pokémon Armurfer","it":"Pokémon Corazza","ja":"てつヨロイポケモン"},"desc":{"en":"During territorial disputes, Lairon fight by slamming into each other. Close inspection of their steel armor reveals scratches and dents.","es":"Resuelven sus disputas territoriales embistiendo y golpeando con el cuerpo. En sus corazas de acero se pueden apreciar hendiduras y rasguños.","fr":"Les Galegon se disputent les territoires en luttant au corps à corps, comme le montrent les éraflures sur leur armure d’acier.","it":"I Lairon lottano per il territorio scagliandosi l’uno contro l’altro. A un’osservazione attenta, la loro armatura d’acciaio mostra graffi e ammaccature.","ja":"からだを ぶつけあって なわばりを あらそう。 はがねの よろいは よく みると きずや へこみが あるのだ。"},"h":9,"w":1200},{"n":306,"ja":"ボスゴドラ","r":"Bossgodora","en":"Aggron","es":"Aggron","fr":"Galeking","it":"Aggron","pt":"","g":3,"t":[9,6],"cat":{"en":"Iron Armor Pokémon","es":"Pokémon Coraza Férrea","fr":"Pokémon Armurfer","it":"Pokémon Corazza","ja":"てつヨロイポケモン"},"desc":{"en":"Long ago, there was a king who wore a helmet meant to resemble the head of an Aggron. He was trying to channel the Pokémon’s strength.","es":"En la antigüedad, hubo un monarca que llevaba un casco hecho a imagen de Aggron para que le otorgase fuerza.","fr":"Il y a fort longtemps, un roi portait un casque à l’effigie de Galeking, pensant qu’il pourrait ainsi s’approprier sa force.","it":"In tempi antichi ci fu un re che, aspirando alla forza di Aggron, indossava un elmo ispirato alla testa di questo Pokémon.","ja":"おおむかし ボスゴドラの つよさに あやかり あたまの かたちを もした かぶとを かぶる おうさまが いた。"},"h":21,"w":3600},{"n":307,"ja":"アサナン","r":"Asanan","en":"Meditite","es":"Meditite","fr":"Méditikka","it":"Meditite","pt":"","g":3,"t":[2,14],"cat":{"en":"Meditate Pokémon","es":"Pokémon Meditador","fr":"Pokémon Méditation","it":"Pokémon Meditazione","ja":"めいそうポケモン"},"desc":{"en":"Meditite heightens its inner energy through meditation. It survives on just one berry a day. Minimal eating is another aspect of this Pokémon’s training.","es":"Meditite aumenta su energía interior mediante meditación. Para subsistir le basta con una baya al día. El comer poco entra dentro de su entrenamiento.","fr":"Méditikka intensifie son énergie intérieure grâce à la méditation. Il lui suffit d’une Baie par jour pour survivre. La diète fait partie de l’entraînement de ce Pokémon.","it":"Meditite incrementa la sua energia interiore grazie alla meditazione. La sua alimentazione minima - si nutre di una bacca al giorno - è un’altra peculiarità dell’esercizio di questo Pokémon.","ja":"めいそうで せいしんエネルギーを たかめている。 １にちに きのみを １こだけしか たべない。 あまり たべない ことも しゅぎょうの ひとつ。"},"h":6,"w":112},{"n":308,"ja":"チャーレム","r":"Charem","en":"Medicham","es":"Medicham","fr":"Charmina","it":"Medicham","pt":"","g":3,"t":[2,14],"cat":{"en":"Meditate Pokémon","es":"Pokémon Meditador","fr":"Pokémon Méditation","it":"Pokémon Meditazione","ja":"めいそうポケモン"},"desc":{"en":"Through the power of meditation, Medicham developed its sixth sense. It gained the ability to use psychokinetic powers. This Pokémon is known to meditate for a whole month without eating.","es":"A través de la meditación, Medicham desarrolló su sexto sentido y aprendió a usar poderes psicoquinéticos. Se sabe que este Pokémon puede pasarse un mes meditando y sin comer.","fr":"Grâce au pouvoir de la méditation, Charmina a développé son sixième sens. Il peut utiliser des pouvoirs télékinétiques. On sait que ce Pokémon peut méditer pendant un mois sans manger.","it":"Grazie alla propria abilità meditativa Medicham ha sviluppato il sesto senso. Ha acquisito anche la capacità di usare i poteri psicocinetici. È noto per rimanere fermo in meditazione un mese intero senza mangiare.","ja":"ヨガの ちからで だい６かんが はったつして サイコパワーを あやつれる ように なった。 １かげつかん なにも たべずに めいそうする。"},"h":13,"w":315},{"n":309,"ja":"ラクライ","r":"Rakurai","en":"Electrike","es":"Electrike","fr":"Dynavolt","it":"Electrike","pt":"","g":3,"t":[13],"cat":{"en":"Lightning Pokémon","es":"Pokémon Calambre","fr":"Pokémon Orage","it":"Pokémon Lampo","ja":"いなずまポケモン"},"desc":{"en":"It stores electricity in its fur. It gives off sparks from all over its body in seasons when the air is dry.","es":"Almacena electricidad estática en su pelaje. En estaciones secas, suelta chispas por todo el cuerpo.","fr":"L’électricité statique s’accumule dans sa fourrure. Par temps sec, elle dégage des étincelles.","it":"Accumula elettricità statica nella pelliccia. Nella stagione secca, il suo corpo sprizza scintille.","ja":"せいでんきを たいもうに ためる。 くうきの かんそうした きせつには ぜんしんから ひばなを ちらす。"},"h":6,"w":152},{"n":310,"ja":"ライボルト","r":"Livolt","en":"Manectric","es":"Manectric","fr":"Élecsprint","it":"Manectric","pt":"","g":3,"t":[13],"cat":{"en":"Discharge Pokémon","es":"Pokémon Descarga","fr":"Pokémon Décharge","it":"Pokémon Scossa","ja":"ほうでんポケモン"},"desc":{"en":"It rarely appears before people. It is said to nest where lightning has fallen.","es":"Rara vez aparece ante la gente. Dicen que suele colocar su madriguera donde caen rayos.","fr":"Ce Pokémon évite de se montrer aux humains. On raconte qu’il fait son nid aux endroits où la foudre s’est abattue.","it":"Raramente si mostra agli umani. Si dice che viva nelle zone dove è caduto un fulmine.","ja":"ひとまえには めったに すがたを みせない。 かみなりの おちた ばしょに すみかが あると いう。"},"h":15,"w":402},{"n":311,"ja":"プラスル","r":"Prasle","en":"Plusle","es":"Plusle","fr":"Posipi","it":"Plusle","pt":"","g":3,"t":[13],"cat":{"en":"Cheering Pokémon","es":"Pokémon Ánimo","fr":"Pokémon Acclameur","it":"Pokémon Incitamento","ja":"おうえんポケモン"},"desc":{"en":"When Plusle is cheering on its partner, it flashes with electric sparks from all over its body. If its partner loses, this Pokémon cries loudly.","es":"Cuando Plusle está animando a su compañero, resplandece y provoca un chisporroteo que le rodea todo el cuerpo. Si su compañero pierde, se pone a chillar a voz en grito.","fr":"Quand Posipi veut encourager son partenaire, des étincelles jaillissent un peu partout de son corps. Si son partenaire perd, ce Pokémon pleure à chaudes larmes.","it":"Quando Plusle si esibisce per rallegrare i suoi compagni, emana vivaci scintille elettriche da tutto il corpo. Se la sua squadra perde, piange rumorosamente.","ja":"なかまを おうえんする ときは ぜんしんから でんきの ひばなを だして パチパチ ひかる。 なかまが まけると おおごえで ないてしまう。"},"h":4,"w":42},{"n":312,"ja":"マイナン","r":"Minun","en":"Minun","es":"Minun","fr":"Négapi","it":"Minun","pt":"","g":3,"t":[13],"cat":{"en":"Cheering Pokémon","es":"Pokémon Ánimo","fr":"Pokémon Acclameur","it":"Pokémon Incitamento","ja":"おうえんポケモン"},"desc":{"en":"Minun loves to cheer on its partner in battle. It gives off sparks from its body while it is doing so. If its partner is in trouble, this Pokémon gives off increasing amounts of sparks.","es":"Minun empieza a echar chispas cuando está animando a su compañero en pleno combate. Si su compañero está en peligro, el chisporroteo aumenta su intensidad por momentos.","fr":"Négapi adore encourager son partenaire pendant les combats. Des étincelles jaillissent alors de son corps. Lorsque son partenaire est en difficulté, le corps de ce Pokémon libère encore plus d’étincelles.","it":"Minun ama tenere alto il morale della squadra nella lotta, emanando scintille da tutto il corpo. Se la sua squadra è in difficoltà, emette una maggiore quantità di scintille.","ja":"なかまの おうえんが だいすきな ポケモン。 なかまが まけそうに なると からだから でる ひばなの かずが どんどん ふえていくよ。"},"h":4,"w":42},{"n":313,"ja":"バルビート","r":"Barubeat","en":"Volbeat","es":"Volbeat","fr":"Muciole","it":"Volbeat","pt":"","g":3,"t":[7],"cat":{"en":"Firefly Pokémon","es":"Pokémon Luciérnaga","fr":"Pokémon Luciole","it":"Pokémon Lucciola","ja":"ほたるポケモン"},"desc":{"en":"Volbeat’s tail glows like a lightbulb. With other Volbeat, it uses its tail to draw geometric shapes in the night sky. This Pokémon loves the sweet aroma given off by Illumise.","es":"La cola de Volbeat brilla como una bombilla. Ante otro de su grupo, la usa para dibujar formas geométricas en la oscuridad del cielo por la noche. Este Pokémon adora el dulce aroma que desprende Illumise.","fr":"La queue de Muciole éclaire comme une ampoule. Ensemble, les Muciole dessinent des figures géométriques dans la nuit étoilée. Ce Pokémon adore le parfum dégagé par Lumivole.","it":"La coda di Volbeat si illumina come una lampadina. Assieme ai suoi simili usa la coda per tracciare figure geometriche nel cielo notturno. Questo Pokémon ama il dolce aroma emanato da Illumise.","ja":"しっぽの あかりを つかって しゅうだんで よぞらに きかがくてきな ずけいを えがく。 イルミーゼの だす あまい かおりが だいすき。"},"h":7,"w":177},{"n":314,"ja":"イルミーゼ","r":"Illumise","en":"Illumise","es":"Illumise","fr":"Lumivole","it":"Illumise","pt":"","g":3,"t":[7],"cat":{"en":"Firefly Pokémon","es":"Pokémon Luciérnaga","fr":"Pokémon Luciole","it":"Pokémon Lucciola","ja":"ほたるポケモン"},"desc":{"en":"Illumise leads a flight of illuminated Volbeat to draw signs in the night sky. This Pokémon is said to earn greater respect from its peers by composing more complex designs in the sky.","es":"Illumise guía en el vuelo a un grupo de iluminados Volbeat para que hagan dibujos en el oscuro cielo. Según dicen, cuanto más complejos sean los dibujos, más le respetan los miembros de su grupo.","fr":"Lumivole dirige un vol de Muciole lumineux pour dessiner des figures dans la nuit étoilée. On raconte que ce Pokémon gagne le respect de ses pairs en composant des figures complexes dans le ciel.","it":"Illumise dirige i voli dei Volbeat luminosi per disegnare figure nel cielo notturno. Pare che guadagni maggior rispetto dai suoi simili componendo disegni sempre più complessi.","ja":"バルビートを ゆうどうして サインを えがく。 ふくざつな サインを えがく イルミーゼほど なかまから そんけいされると いわれているよ。"},"h":6,"w":177},{"n":315,"ja":"ロゼリア","r":"Roselia","en":"Roselia","es":"Roselia","fr":"Rosélia","it":"Roselia","pt":"","g":3,"t":[12,4],"cat":{"en":"Thorn Pokémon","es":"Pokémon Espina","fr":"Pokémon Épine","it":"Pokémon Spina","ja":"いばらポケモン"},"desc":{"en":"Though beautiful, it has highly poisonous thorns. There is an old tradition in my homeland wherein one would send these thorns to an opponent to challenge them to a duel.","es":"Ataca con sus manos, cada una de las cuales contiene un tipo de veneno diferente. Cuanto más intenso es su aroma, mejor salud tiene.","fr":"Ses mains sécrètent chacune un poison différent dont il se sert pour attaquer. Plus le parfum de Rosélia est intense, plus sa santé est bonne.","it":"Attacca usando abilmente i suoi arti, che contengono veleni diversi. Più è forte la sua fragranza, più è in salute.","ja":"みぎてと ひだりてで ２しゅるいの どくを つかいわけて こうげきする。 かおりが つよいほど げんきだ。"},"h":3,"w":20},{"n":316,"ja":"ゴクリン","r":"Gokulin","en":"Gulpin","es":"Gulpin","fr":"Gloupti","it":"Gulpin","pt":"","g":3,"t":[4],"cat":{"en":"Stomach Pokémon","es":"Pokémon Estómago","fr":"Pokémon Estomac","it":"Pokémon Stomaco","ja":"いぶくろポケモン"},"desc":{"en":"Most of Gulpin’s body is made up of its stomach—its heart and brain are very small in comparison. This Pokémon’s stomach contains special enzymes that dissolve anything.","es":"La mayor parte del cuerpo de Gulpin está ocupado por su estómago. En comparación, el corazón y el cerebro son muy pequeños. Este Pokémon tiene enzimas especiales en el estómago capaces de corroerlo todo.","fr":"Le corps de Gloupti n’est pratiquement qu’un gros estomac. En comparaison, son cœur et son cerveau sont tout petits. L’estomac de ce Pokémon contient des enzymes spéciales capables de tout dissoudre.","it":"La maggior parte del corpo di Gulpin è formato dallo stomaco di dimensioni enormi rispetto al cuore e al cervello. Lo stomaco di questo Pokémon contiene enzimi speciali che sciolgono qualsiasi cosa.","ja":"からだの だいぶぶんが いぶくろで できていて しんぞうや のうみそは とても ちいさい。 なんでも とかす とくしゅな いえきを もつ。"},"h":4,"w":103},{"n":317,"ja":"マルノーム","r":"Marunoom","en":"Swalot","es":"Swalot","fr":"Avaltout","it":"Swalot","pt":"","g":3,"t":[4],"cat":{"en":"Poison Bag Pokémon","es":"Pokémon Bolsa Veneno","fr":"Pokémon Sac Poison","it":"Pokémon Velenosacco","ja":"どくぶくろポケモン"},"desc":{"en":"Swalot has no teeth, so what it eats, it swallows whole, no matter what. Its cavernous mouth yawns widely. An automobile tire could easily fit inside this Pokémon’s mouth.","es":"Swalot no tiene dientes, así que lo que come se lo traga de una vez; da igual lo que sea. A este Pokémon le cabría un neumático en la boca sin problema.","fr":"Avaltout n’a pas de dents, ce qui le force à tout avaler en une bouchée. Quand il bâille, sa bouche prend une taille impressionnante, et on pourrait y placer une roue de voiture.","it":"Swalot non ha denti, così quando mangia ingoia ogni cosa intera, senza masticare. Quando sbadiglia, la sua bocca enorme si apre a mo’ di voragine. È così grande che potrebbe contenere persino uno pneumatico.","ja":"はが １ぽんも ないので なんでも まるのみ。 いっぱいに あけた くちは とても おおきく じどうしゃの タイヤだって すっぽり はいるぞ。"},"h":17,"w":800},{"n":318,"ja":"キバニア","r":"Kibanha","en":"Carvanha","es":"Carvanha","fr":"Carvanha","it":"Carvanha","pt":"","g":3,"t":[11,17],"cat":{"en":"Savage Pokémon","es":"Pokémon Feroz","fr":"Pokémon Féroce","it":"Pokémon Feroce","ja":"どうもうポケモン"},"desc":{"en":"These Pokémon have sharp fangs and powerful jaws. Sailors avoid Carvanha dens at all costs.","es":"Los marineros evitan por completo las zonas donde habita este Pokémon de afilados colmillos y fuertes mandíbulas.","fr":"Il possède une mâchoire puissante garnie de dents acérées. Les marins ne s’approchent jamais des eaux habitées par les Carvanha.","it":"È dotato di denti affilati e mascelle robuste. Chi viaggia per mare si tiene accuratamente alla larga dalle tane di Carvanha.","ja":"するどい キバと たくましい アゴを もつ。 ふなのりたちは キバニアの すみかには けっして ちかづかない。"},"h":8,"w":208},{"n":319,"ja":"サメハダー","r":"Samehader","en":"Sharpedo","es":"Sharpedo","fr":"Sharpedo","it":"Sharpedo","pt":"","g":3,"t":[11,17],"cat":{"en":"Brutal Pokémon","es":"Pokémon Voraz","fr":"Pokémon Brutal","it":"Pokémon Brutale","ja":"きょうぼうポケモン"},"desc":{"en":"This Pokémon is known as the Bully of the Sea. Any ship entering the waters Sharpedo calls home will be attacked—no exceptions.","es":"Conocido como el Terror de los Mares, ataca sin excepción a todo barco que ose adentrarse en su territorio oceánico.","fr":"Surnommé le « tyran des mers », ce Pokémon attaque sans exception tous les navires qui osent s’aventurer sur son territoire.","it":"Questo Pokémon, detto “Tiranno del mare”, assale qualsiasi nave si addentri nelle acque in cui dimora.","ja":"うみのギャングと よばれ せいそく かいいきに はいりこんでしまった ふねは もれなく おそわれてしまう。"},"h":18,"w":888},{"n":320,"ja":"ホエルコ","r":"Whalko","en":"Wailmer","es":"Wailmer","fr":"Wailmer","it":"Wailmer","pt":"","g":3,"t":[11],"cat":{"en":"Ball Whale Pokémon","es":"Pokémon Ballenabola","fr":"Pokémon Baleinboule","it":"Pokémon Balenottero","ja":"たまくじらポケモン"},"desc":{"en":"When it sucks in a large volume of seawater, it becomes like a big, bouncy ball. It eats a ton of food daily.","es":"Cuando traga una gran cantidad de agua marina, se hincha hasta parecer una pelota. Necesita una tonelada de alimento al día.","fr":"Il ressemble à un énorme ballon quand il avale de très grandes quantités d’eau de mer. Il dévore une tonne de nourriture par jour.","it":"Se inghiotte molta acqua diventa una specie di palla rimbalzante. Ha bisogno di una tonnellata di cibo al giorno.","ja":"かいすいを たくさん のみこむと からだが ボールの ように はずむ。 まいにち １トンの エサを たべる。"},"h":20,"w":1300},{"n":321,"ja":"ホエルオー","r":"Whaloh","en":"Wailord","es":"Wailord","fr":"Wailord","it":"Wailord","pt":"","g":3,"t":[11],"cat":{"en":"Float Whale Pokémon","es":"Pokémon Ballenaflot","fr":"Pokémon Cachabouée","it":"Pokémon Megabalena","ja":"うきくじらポケモン"},"desc":{"en":"Its immense size is the reason for its popularity. Wailord watching is a favorite sightseeing activity in various parts of the world.","es":"Su descomunal tamaño lo convierte en un Pokémon muy popular. Los enclaves turísticos donde se avistan Wailord son todo un éxito.","fr":"Sa taille fait de lui un Pokémon fascinant. Les sites touristiques proposant d’observer les Wailord ont toujours beaucoup de succès.","it":"È molto amato per la sua enorme stazza. Il Wailord watching è un’attività turistica popolare in tutto il mondo.","ja":"とにかく どでかいので にんき。 ホエルオーウォッチングは かくちで にんきの かんこうプラン なのだ。"},"h":145,"w":3980},{"n":322,"ja":"ドンメル","r":"Donmel","en":"Numel","es":"Numel","fr":"Chamallot","it":"Numel","pt":"","g":3,"t":[10,5],"cat":{"en":"Numb Pokémon","es":"Pokémon Torpe","fr":"Pokémon Engourdi","it":"Pokémon Torpore","ja":"どんかんポケモン"},"desc":{"en":"Numel stores magma of almost 2,200 degrees Fahrenheit within its body. If it gets wet, the magma cools and hardens. In that event, the Pokémon’s body grows heavy and its movements become sluggish.","es":"Numel acumula en su interior un magma de 1200 °C. Si se moja, el magma se enfría y se solidifica. Cuando esto ocurre, aumenta su tamaño y se vuelve pesado y lento en sus movimientos.","fr":"Chamallot stocke du magma à 1 200 °C dans son corps. Lorsqu’il est mouillé, le magma se refroidit et durcit. Le corps du Pokémon devient alors très lourd et ses mouvements très lents.","it":"Numel accumula magma a una temperatura di 1200 °C all’interno del proprio corpo. Se si bagna, il magma si raffredda e si solidifica. Se si appesantisce diventa goffo nei movimenti.","ja":"１２００どの マグマを からだに ためている。 みずに ぬれると マグマが ひえて かたまり おもたくなるので うごきが にぶって しまう。"},"h":7,"w":240},{"n":323,"ja":"バクーダ","r":"Bakuuda","en":"Camerupt","es":"Camerupt","fr":"Camérupt","it":"Camerupt","pt":"","g":3,"t":[10,5],"cat":{"en":"Eruption Pokémon","es":"Pokémon Erupción","fr":"Pokémon Éruption","it":"Pokémon Eruzione","ja":"ふんかポケモン"},"desc":{"en":"The humps on Camerupt’s back are formed by a transformation of its bones. They sometimes blast out molten magma. This Pokémon apparently erupts often when it is enraged.","es":"Las jorobas de Camerupt se originaron por una deformación de los huesos. A veces escupen magma líquido, sobre todo cuando el Pokémon se enfada.","fr":"Les bosses sur le dos de Camérupt sont apparues après une déformation de ses os. Elles crachent parfois du magma en fusion. Ce Pokémon entre apparemment en éruption lorsqu’il est énervé.","it":"Le gobbe sulla schiena di Camerupt si sono formate dalla trasformazione delle sue ossa. Talvolta emettono magma fuso. Pare che questo Pokémon erutti spesso quando è infuriato.","ja":"せなかの コブは ほねが かたちを かえたもの。 にえたぎった マグマを ときどき ふきあげる。 おこった ときに よく ふんかする らしい。"},"h":19,"w":2200},{"n":324,"ja":"コータス","r":"Cotoise","en":"Torkoal","es":"Torkoal","fr":"Chartor","it":"Torkoal","pt":"","g":3,"t":[10],"cat":{"en":"Coal Pokémon","es":"Pokémon Carbón","fr":"Pokémon Charbon","it":"Pokémon Carbone","ja":"せきたんポケモン"},"desc":{"en":"You find abandoned coal mines full of them. They dig tirelessly in search of coal.","es":"Se junta con numerosos congéneres para establecer su morada en minas abandonadas, donde se afanan en localizar y extraer carbón.","fr":"Les Chartor vivent en grand nombre dans les mines abandonnées, où ils extraient le charbon avec ardeur.","it":"Elegge a propria dimora miniere abbandonate, dove cerca carbone scavando con ardore.","ja":"つかわれなくなった たんこうには たくさんの コータスが すみついて せきたんを せっせと ほっている。"},"h":5,"w":804},{"n":325,"ja":"バネブー","r":"Baneboo","en":"Spoink","es":"Spoink","fr":"Spoink","it":"Spoink","pt":"","g":3,"t":[14],"cat":{"en":"Bounce Pokémon","es":"Pokémon Saltarín","fr":"Pokémon Rebond","it":"Pokémon Molla","ja":"とびはねポケモン"},"desc":{"en":"Spoink keeps a pearl on top of its head. The pearl functions to amplify this Pokémon’s psychokinetic powers. It is therefore on a constant search for a bigger pearl.","es":"Spoink lleva una perla en la cabeza, que sirve para amplificar los poderes psicoquinéticos que tiene. Por eso, está continuamente buscando una perla mayor.","fr":"Spoink garde une perle sur sa tête. Elle lui sert à amplifier ses pouvoirs télékinétiques. Il est constamment en quête d’une perle plus grosse.","it":"Sulla sommità del capo Spoink porta una perla che serve per amplificare i suoi poteri psicocinetici. Per questo motivo è sempre in cerca di una perla più grande.","ja":"あたまに のせた しんじゅが バネブーの サイコパワーを たかめる はたらきをする。 おおきな しんじゅを いつも さがしている。"},"h":7,"w":306},{"n":326,"ja":"ブーピッグ","r":"Boopig","en":"Grumpig","es":"Grumpig","fr":"Groret","it":"Grumpig","pt":"","g":3,"t":[14],"cat":{"en":"Manipulate Pokémon","es":"Pokémon Manipulador","fr":"Pokémon Magouilleur","it":"Pokémon Raggiro","ja":"あやつりポケモン"},"desc":{"en":"Grumpig uses the black pearls on its body to wield its fantastic powers. When it is doing so, it dances bizarrely. This Pokémon’s black pearls are valuable as works of art.","es":"Grumpig utiliza las perlas negras que tiene para usar fantásticos poderes mientras baila de forma muy extraña. Las perlas de este Pokémon están consideradas como valiosas obras de arte.","fr":"Groret utilise les perles noires sur son corps pour exercer ses formidables pouvoirs. Quand il est en action, il entame une étrange danse. Les perles noires de ce Pokémon ont une valeur inestimable.","it":"Grumpig usa le perle nere che ha sul corpo per esercitare i suoi fantastici poteri. In queste occasioni danza in modo bizzarro. Le perle nere di questo Pokémon sono preziose opere d’arte.","ja":"くろしんじゅを りようして ふしぎな ちからを つかうとき きみょうな ステップで おどりだす。 くろしんじゅは びじゅつひんの かちを もつ。"},"h":9,"w":715},{"n":327,"ja":"パッチール","r":"Patcheel","en":"Spinda","es":"Spinda","fr":"Spinda","it":"Spinda","pt":"","g":3,"t":[1],"cat":{"en":"Spot Panda Pokémon","es":"Pokémon Panda Topos","fr":"Pokémon Panda Tache","it":"Pokémon Macchipanda","ja":"ぶちパンダポケモン"},"desc":{"en":"Each Spinda’s spot pattern is different. With its stumbling movements, it evades opponents’ attacks brilliantly!","es":"Los dibujos en el pelaje de cada Spinda son diferentes. Esquiva de forma asombrosa los ataques de los rivales gracias a sus tambaleos.","fr":"Chaque Spinda possède un pelage unique. Ce Pokémon esquive les attaques de son adversaire grâce à d’imprévisibles oscillations.","it":"Ogni Spinda ha un motivo maculato unico. Grazie ai suoi movimenti incerti, riesce a schivare brillantemente gli attacchi nemici.","ja":"１ぴきずつ ブチもようは ことなる。 フラフラした うごきで あいての こうげきを ぜつみょうに かわすぞ。"},"h":11,"w":50},{"n":328,"ja":"ナックラー","r":"Nuckrar","en":"Trapinch","es":"Trapinch","fr":"Kraknoix","it":"Trapinch","pt":"","g":3,"t":[5],"cat":{"en":"Ant Pit Pokémon","es":"Pokémon Hormiga León","fr":"Pokémon Piégeur","it":"Pokémon Trappola","ja":"ありじごくポケモン"},"desc":{"en":"It makes an inescapable conical pit and lies in wait at the bottom for prey to come tumbling down.","es":"Excava fosas cóncavas, de las cuales resulta imposible escapar, y espera a que una presa caiga en su interior.","fr":"Il creuse, puis attend ses proies dans son antre en forme de cône, dont il est impossible de s’échapper.","it":"Costruisce una tana a forma di imbuto dalla quale non si può scappare, aspettando poi che le prede cadano in trappola.","ja":"ぜったいに だっしゅつ ふかのうな すりばちじょうの すあなを つくって えものが おちてくるのを まつ。"},"h":7,"w":150},{"n":329,"ja":"ビブラーバ","r":"Vibrava","en":"Vibrava","es":"Vibrava","fr":"Vibraninf","it":"Vibrava","pt":"","g":3,"t":[5,16],"cat":{"en":"Vibration Pokémon","es":"Pokémon Vibrante","fr":"Pokémon Vibration","it":"Pokémon Vibrazione","ja":"しんどうポケモン"},"desc":{"en":"To help make its wings grow, it dissolves quantities of prey in its digestive juices and guzzles them down every day.","es":"Para terminar de desarrollar sus alas, se nutre a diario de un gran número de presas, a las que disuelve con ácido antes de devorarlas.","fr":"Pour aider ses ailes à pousser, il se nourrit chaque jour d’un grand nombre de proies qu’il dissout en projetant de l’acide.","it":"Per far sviluppare le ali, si nutre ogni giorno di una grande quantità di prede, che succhia dopo averle sciolte con il proprio acido.","ja":"ハネを せいちょう させるために まいにち たいりょうの えものを しょうかえきで とかして すする。"},"h":11,"w":153},{"n":330,"ja":"フライゴン","r":"Frygon","en":"Flygon","es":"Flygon","fr":"Libégon","it":"Flygon","pt":"","g":3,"t":[5,16],"cat":{"en":"Mystic Pokémon","es":"Pokémon Místico","fr":"Pokémon Mystique","it":"Pokémon Magico","ja":"せいれいポケモン"},"desc":{"en":"It is nicknamed the Desert Spirit because the flapping of its wings sounds like a woman singing.","es":"El batir de sus alas suena como un bello canto de mujer. Se lo conoce como el Alma del Desierto.","fr":"On l’appelle « l’esprit du désert », car ses battements d’ailes résonnent comme une mélodie entonnée par une voix douce.","it":"Viene chiamato anche “spirito del deserto”, poiché il suono del suo battito d’ali ricorda un bellissimo canto di donna.","ja":"はばたく おとが おんなのひとの うつくしい うたごえに にているため さばくのせいれい と よばれている。"},"h":20,"w":820},{"n":331,"ja":"サボネア","r":"Sabonea","en":"Cacnea","es":"Cacnea","fr":"Cacnea","it":"Cacnea","pt":"","g":3,"t":[12],"cat":{"en":"Cactus Pokémon","es":"Pokémon Cactus","fr":"Pokémon Cactus","it":"Pokémon Cactus","ja":"サボテンポケモン"},"desc":{"en":"The more arid and harsh the environment, the more pretty and fragrant a flower Cacnea grows. This Pokémon battles by wildly swinging its thorny arms.","es":"Cuanto más árido y hostil sea el hábitat de Cacnea, más bonita y aromática será la flor que le crece. Este Pokémon lucha agitando violentamente los brazos cargados de pinchos que tiene.","fr":"Si son environnement est aride et difficile, la fleur de Cacnea devient plus jolie et dégage un parfum délicat. Ce Pokémon se bat en agitant ses bras épineux.","it":"Quanto più arido e aspro è l’ambiente, tanto più rigoglioso cresce il fiore di Cacnea. Il Pokémon lotta agitando furiosamente gli spinosi arti superiori.","ja":"あめの すくない きびしい かんきょう ほど きれいで かおりの つよい はなを さかせる。 トゲの ついた うでを ふりまわして たたかう。"},"h":4,"w":513},{"n":332,"ja":"ノクタス","r":"Noctus","en":"Cacturne","es":"Cacturne","fr":"Cacturne","it":"Cacturne","pt":"","g":3,"t":[12,17],"cat":{"en":"Scarecrow Pokémon","es":"Pokémon Espantajo","fr":"Pokémon Épouvantail","it":"Pokémon Spavento","ja":"カカシぐさポケモン"},"desc":{"en":"If a traveler is going through a desert in the thick of night, Cacturne will follow in a ragtag group. The Pokémon are biding their time, waiting for the traveler to tire and become incapable of moving.","es":"Cuando alguien se adentra en un desierto por la noche, Cacturne le sigue junto con varios de los suyos. Este Pokémon espera pacientemente a que el viajero se fatigue y no pueda continuar más, vencido por el cansancio.","fr":"Lorsqu’un voyageur traverse le désert au milieu de la nuit, les Cacturne le suivent en groupe. Ces Pokémon attendent le bon moment, quand le voyageur est fatigué et qu’il n’est plus capable de bouger.","it":"Se un viaggia
