tore passa attraverso il deserto nella notte tenebrosa, un gruppo scomposto di Cacturne lo segue. Poi attende pazientemente che il malcapitato sia esausto e incapace di muoversi.","ja":"まよなか さばくを あるく たびびとの うしろを ぞろぞろと しゅうだんで くっついて あるく。 つかれて うごけなく なるのを まっているのだ。"},"h":13,"w":774},{"n":333,"ja":"チルット","r":"Tyltto","en":"Swablu","es":"Swablu","fr":"Tylton","it":"Swablu","pt":"","g":3,"t":[1,3],"cat":{"en":"Cotton Bird Pokémon","es":"Pokémon Ave Algodón","fr":"Pokémon Oiseaucoton","it":"Pokémon Alidicotone","ja":"わたどりポケモン"},"desc":{"en":"Since Swablu looks like a cumulus cloud, foes can have a hard time finding it. Apparently its wings turned white over many generations.","es":"Sus alas parecen nubes algodonadas y lo ocultan de sus rivales. Se cree que se volvieron blancas con el paso de las generaciones.","fr":"Ses ailes en forme de nuage le dissimulent aux yeux des ennemis. On raconte qu’elles sont devenues blanches après plusieurs générations.","it":"Poiché sembra una nuvola, è difficile che i nemici lo individuino. Si dice che le ali siano diventate bianche con il passare delle generazioni.","ja":"わたぐもに みえるため てきから みつかりにくい。 せだいを かさねる うち つばさが しろくなったという。"},"h":4,"w":12},{"n":334,"ja":"チルタリス","r":"Tyltalis","en":"Altaria","es":"Altaria","fr":"Altaria","it":"Altaria","pt":"","g":3,"t":[16,3],"cat":{"en":"Humming Pokémon","es":"Pokémon Cantor","fr":"Pokémon Virevolteur","it":"Pokémon Canterino","ja":"ハミングポケモン"},"desc":{"en":"This Pokémon has a kind disposition, but if it’s provoked, it will threaten opponents with shrill cries before attacking them without mercy.","es":"Es de carácter amable, pero, si monta en cólera, intimidará al oponente con estridentes chillidos y atacará sin piedad.","fr":"Il est de nature aimable, mais si on le met en colère, il intimide son adversaire en poussant un cri strident et l’attaque sans pitié.","it":"Ha un carattere gentile, ma se lo si fa arrabbiare emette un verso minaccioso, per poi attaccare senza pietà.","ja":"やさしい せいしつだが おこらせると するどい なきごえで いかくして ようしゃない こうげきを くわえる。"},"h":11,"w":206},{"n":335,"ja":"ザングース","r":"Zangoose","en":"Zangoose","es":"Zangoose","fr":"Mangriff","it":"Zangoose","pt":"","g":3,"t":[1],"cat":{"en":"Cat Ferret Pokémon","es":"Pokémon Gato Hurón","fr":"Pokémon Chat Furet","it":"Pokémon Furogatto","ja":"ネコイタチポケモン"},"desc":{"en":"Zangoose usually stays on all fours, but when angered, it gets up on its hind legs and extends its claws. This Pokémon shares a bitter rivalry with Seviper that dates back over generations.","es":"Zangoose suele caminar a cuatro patas, pero cuando se enfada se pone de pie sobre las traseras y saca las zarpas. Este Pokémon tiene desde hace varias generaciones una áspera rivalidad con Seviper.","fr":"Mangriff est généralement à quatre pattes, mais lorsqu’il est en colère, il se lève sur ses pattes arrière et montre ses griffes. Ce Pokémon est l’ennemi juré de Séviper depuis plusieurs générations.","it":"Di solito Zangoose cammina a quattro zampe, ma quando si infuria si alza sulle zampe posteriori ed estrae gli artigli. Questo Pokémon è acerrimo nemico di Seviper, infatti la loro inimicizia è ormai leggendaria.","ja":"ふだんは ４ほんあしで こうどうするが おこると うしろあしで たち まえあしの ツメが とびだす。 ハブネークとは せんぞから つづく ライバルだ。"},"h":13,"w":403},{"n":336,"ja":"ハブネーク","r":"Habunake","en":"Seviper","es":"Seviper","fr":"Séviper","it":"Seviper","pt":"","g":3,"t":[4],"cat":{"en":"Fang Snake Pokémon","es":"Pokémon Colmillos","fr":"Pokémon Serpacroc","it":"Pokémon Zannaserpe","ja":"キバへびポケモン"},"desc":{"en":"Seviper’s swordlike tail serves two purposes—it slashes foes and douses them with secreted poison. This Pokémon will not give up its long-running blood feud with Zangoose.","es":"Seviper tiene una cola que parece una espada y le sirve para dar un sablazo al enemigo y para envenenarlo. Este Pokémon se mantiene firme en la enemistad que siente hacia Zangoose.","fr":"La queue tranchante comme un sabre de Séviper a deux fonctions : elle peut frapper l’ennemi et lui injecter un poison qu’il sécrète. Ce Pokémon n’oublie jamais sa vieille rancune envers Mangriff.","it":"La coda a forma di spada di Seviper ha una duplice funzione: lacera il nemico e gli inietta un potente veleno. Il Pokémon non dimentica mai le lotte con il suo secolare nemico, Zangoose.","ja":"かたなの ような しっぽは てきを きりさくのと どうじに しみだした もうどくを あびせるぞ。 しゅくてき ザングースと たたかい つづける。"},"h":27,"w":525},{"n":337,"ja":"ルナトーン","r":"Lunatone","en":"Lunatone","es":"Lunatone","fr":"Séléroc","it":"Lunatone","pt":"","g":3,"t":[6,14],"cat":{"en":"Meteorite Pokémon","es":"Pokémon Meteorito","fr":"Pokémon Météorite","it":"Pokémon Meteorite","ja":"いんせきポケモン"},"desc":{"en":"It was discovered at the site of a meteor strike 40 years ago. Its stare can lull its foes to sleep.","es":"Fue descubierto hace 40 años en el lugar donde había caído un meteorito. Le basta fulminar a sus enemigos con la mirada para dormirlos.","fr":"Il a été découvert dans le cratère d’une météorite il y a 40 ans. Un simple regard de sa part endort ses ennemis.","it":"Fu scoperto 40 anni fa nella zona d’impatto di un meteorite. Può addormentare il nemico con il solo sguardo.","ja":"４０ねんまえに いんせきの おちた ばしょで はじめて みつかった。 にらむ だけで てきを ねむらせる。"},"h":10,"w":1680},{"n":338,"ja":"ソルロック","r":"Solrock","en":"Solrock","es":"Solrock","fr":"Solaroc","it":"Solrock","pt":"","g":3,"t":[6,14],"cat":{"en":"Meteorite Pokémon","es":"Pokémon Meteorito","fr":"Pokémon Météorite","it":"Pokémon Meteorite","ja":"いんせきポケモン"},"desc":{"en":"Solar energy is the source of its power, so it is strong during the daytime. When it spins, its body shines.","es":"Usa el sol como fuente de energía, por lo que es más poderoso de día. Brilla al rotar.","fr":"Tirant sa force de l’énergie solaire, il est particulièrement puissant pendant la journée. Il s’illumine quand il tourne.","it":"L’energia solare è la fonte della sua potenza, per cui è più forte di giorno. Emana luce quando ruota su se stesso.","ja":"たいようエネルギーが パワーの みなもと なので ひるまは つよい。 かいてんすると からだが ひかる。"},"h":12,"w":1540},{"n":339,"ja":"ドジョッチ","r":"Dojoach","en":"Barboach","es":"Barboach","fr":"Barloche","it":"Barboach","pt":"","g":3,"t":[11,5],"cat":{"en":"Whiskers Pokémon","es":"Pokémon Bigotudo","fr":"Pokémon Barbillon","it":"Pokémon Baffetti","ja":"ひげうおポケモン"},"desc":{"en":"Makes its home in swamps with murky water. The poor visibility hides this Pokémon from predators, and the slime on its body makes grasping it difficult.","es":"Examina los lechos lodosos de los ríos con los largos bigotes que tiene. Está protegido por una capa viscosa.","fr":"Il sonde les bords boueux des rivières avec ses barbillons. Un film fin et visqueux protège tout son corps.","it":"Si serve dei lunghi baffi per saggiare i letti fangosi dei fiumi. Ha il corpo protetto da una membrana viscida.","ja":"２ほんの ながい ヒゲで にごった かわぞこを さぐる。 ヌルヌルした ねんまくが からだを まもっている。"},"h":4,"w":19},{"n":340,"ja":"ナマズン","r":"Namazun","en":"Whiscash","es":"Whiscash","fr":"Barbicha","it":"Whiscash","pt":"","g":3,"t":[11,5],"cat":{"en":"Whiskers Pokémon","es":"Pokémon Bigotudo","fr":"Pokémon Barbillon","it":"Pokémon Baffetti","ja":"ひげうおポケモン"},"desc":{"en":"Strikes its caudal fin against the swamp bed to shake the ground and startle its prey. It will then swallow the fleeing prey whole. People mistook this behavior as the cause of earthquakes.","es":"Habita en grandes pantanos. Si se acerca un enemigo, monta en cólera y causa temblores monumentales.","fr":"Il a besoin d’un marais entier pour vivre. Si un ennemi s’approche, il s’énerve et déclenche un séisme.","it":"Stabilisce il suo territorio nelle grandi paludi. Se un nemico si avvicina, si scatena provocando grossi terremoti.","ja":"おおきな ぬまを なわばりにする。 てきが ちかづくと おおあばれして おおきな じしんを おこすのだ。"},"h":9,"w":236},{"n":341,"ja":"ヘイガニ","r":"Heigani","en":"Corphish","es":"Corphish","fr":"Écrapince","it":"Corphish","pt":"","g":3,"t":[11],"cat":{"en":"Ruffian Pokémon","es":"Pokémon Rufián","fr":"Pokémon Brute","it":"Pokémon Birbone","ja":"ごろつきポケモン"},"desc":{"en":"It was originally a Pokémon from afar that escaped to the wild. It can adapt to the dirtiest river.","es":"Si bien procede del extranjero, ahora se halla en estado salvaje. Puede vivir hasta en los ríos más sucios.","fr":"Un Pokémon importé, retourné à l’état sauvage. Il s’adapte même aux rivières les plus polluées.","it":"Importato dall’estero, si è successivamente rinselvatichito. Si adatta anche ai fiumi più inquinati.","ja":"がいこくから やってきた ポケモンが やせいかした。 どんなに きたない かわでも てきおうしてしまう。"},"h":6,"w":115},{"n":342,"ja":"シザリガー","r":"Shizariger","en":"Crawdaunt","es":"Crawdaunt","fr":"Colhomard","it":"Crawdaunt","pt":"","g":3,"t":[11,17],"cat":{"en":"Rogue Pokémon","es":"Pokémon Granuja","fr":"Pokémon Crapule","it":"Pokémon Canaglia","ja":"ならずものポケモン"},"desc":{"en":"A brutish Pokémon that loves to battle. It will crash itself into any foe that approaches its nest.","es":"Le encanta pelear, debido a su naturaleza. Si alguien se acerca a su madriguera, le propinará una paliza sin ningún tipo de miramiento.","fr":"Il adore se battre et frappe comme une brute tous ceux qui approchent de sa mare.","it":"Ama la lotta. Il malcapitato che si avvicina alla sua tana verrà brutalmente malmenato.","ja":"たたかいを このむ せいかく。 すみかに ちかづく あいてを ようしゃなく たたきのめす。"},"h":11,"w":328},{"n":343,"ja":"ヤジロン","r":"Yajilon","en":"Baltoy","es":"Baltoy","fr":"Balbuto","it":"Baltoy","pt":"","g":3,"t":[5,14],"cat":{"en":"Clay Doll Pokémon","es":"Pokémon Muñeca Barro","fr":"Pokémon Poupargile","it":"Pokémon Argilla","ja":"どぐうポケモン"},"desc":{"en":"It was discovered in ancient ruins. While moving, it constantly spins. It stands on one foot even when asleep.","es":"Fue hallado en unas ruinas antiguas. Se desplaza girando sobre sí mismo y se mantiene sobre una extremidad incluso cuando duerme.","fr":"Ce Pokémon découvert dans des ruines anciennes tourne sur lui-même pour se déplacer. Il se tient toujours sur un pied, même quand il dort.","it":"Scoperto in antiche rovine. Si sposta girando su se stesso e rimane bilanciato sull’estremità inferiore del suo corpo anche quando dorme.","ja":"こだい いせきで はっけんされた。 かいてん しながら いどう。 よる ねむる ときも いっぽんあしだ。"},"h":5,"w":215},{"n":344,"ja":"ネンドール","r":"Nendoll","en":"Claydol","es":"Claydol","fr":"Kaorine","it":"Claydol","pt":"","g":3,"t":[5,14],"cat":{"en":"Clay Doll Pokémon","es":"Pokémon Muñeca Barro","fr":"Pokémon Poupargile","it":"Pokémon Argilla","ja":"どぐうポケモン"},"desc":{"en":"It appears to have been born from clay dolls made by ancient people. It uses telekinesis to float and move.","es":"Dicen que surgió de una figurilla de barro hecha por una antigua civilización. Usa telequinesia para levitar y moverse.","fr":"Ce Pokémon aurait été créé à partir d’une poupée d’argile confectionnée par une ancienne civilisation. Il se déplace en lévitant.","it":"Pare che sia nato da un’antica bambola di argilla. Si sposta levitando a mezz’aria grazie alla telecinesi.","ja":"こだいじんの どろにんぎょうから うまれたらしい。 ねんりきを つかい くうちゅうに ういて いどうする。"},"h":15,"w":1080},{"n":345,"ja":"リリーラ","r":"Lilyla","en":"Lileep","es":"Lileep","fr":"Lilia","it":"Lileep","pt":"","g":3,"t":[6,12],"cat":{"en":"Sea Lily Pokémon","es":"Pokémon Lirio de Mar","fr":"Pokémon Lis d’Eau","it":"Pokémon Fiordimare","ja":"ウミユリポケモン"},"desc":{"en":"Lileep clings to rocks on the seabed. When prey comes close, this Pokémon entangles it with petallike tentacles.","es":"Se ancla a una roca en el lecho marino y atrapa a las presas que se le acercan con sus tentáculos en forma de pétalos.","fr":"Accroché aux rochers des profondeurs, il attend qu’une proie s’approche de lui pour l’attraper avec ses tentacules en forme de pétales.","it":"Si attacca alle rocce dei fondali marini e usa i tentacoli simili a petali per catturare le prede che si avvicinano.","ja":"かいていの いわに はりつき えものが ちかくにくると はなびらの ような しょくしゅで からめとる。"},"h":10,"w":238},{"n":346,"ja":"ユレイドル","r":"Yuradle","en":"Cradily","es":"Cradily","fr":"Vacilys","it":"Cradily","pt":"","g":3,"t":[6,12],"cat":{"en":"Barnacle Pokémon","es":"Pokémon Percebe","fr":"Pokémon Bernacle","it":"Pokémon Lepade","ja":"いわつぼポケモン"},"desc":{"en":"Once Cradily catches prey in its tentacles, it digests them whole and absorbs their nutrients.","es":"Atrapa a sus presas con los tentáculos y enseguida las disuelve con sus jugos gástricos para absorber los nutrientes.","fr":"Il attrape ses proies à l’aide de ses tentacules, puis les dissout immédiatement avec ses sucs digestifs pour en absorber les nutriments.","it":"Cattura le prede con i tentacoli e le scioglie con un fluido digestivo, assorbendone così le sostanze nutritive.","ja":"しょくしゅで えものを つかまえると そのまま しょうかえきで とかして えいようぶんを きゅうしゅうする。"},"h":15,"w":604},{"n":347,"ja":"アノプス","r":"Anopth","en":"Anorith","es":"Anorith","fr":"Anorith","it":"Anorith","pt":"","g":3,"t":[6,7],"cat":{"en":"Old Shrimp Pokémon","es":"Pokémon Camarón","fr":"Pokémon Crustage","it":"Pokémon Primaceo","ja":"むかしエビポケモン"},"desc":{"en":"Anorith can swim swiftly by pulling its eight wings through the water like oars on a boat. This Pokémon is an ancestor of modern bug Pokémon.","es":"Puede nadar rápidamente gracias a sus ocho alas que usa a modo de remo. Es uno de los antepasados de los Pokémon insecto.","fr":"Ce Pokémon peut nager très vite en agitant ses huit ailes comme des rames de bateau. Il fait partie des ancêtres des Pokémon Insecte.","it":"Nuota rapidamente utilizzando le sue otto ali come fossero remi di una barca. È uno degli antenati dei Pokémon di tipo Coleottero.","ja":"８まいの ハネを ボートの オールの ように うごかし はやく およげる。 むしポケモンの そせんの いっしゅ。"},"h":7,"w":125},{"n":348,"ja":"アーマルド","r":"Armaldo","en":"Armaldo","es":"Armaldo","fr":"Armaldo","it":"Armaldo","pt":"","g":3,"t":[6,7],"cat":{"en":"Plate Pokémon","es":"Pokémon Armadura","fr":"Pokémon Blindage","it":"Pokémon Piastre","ja":"かっちゅうポケモン"},"desc":{"en":"Though it lives on land, it’s also a good swimmer. It dives into the ocean in search of prey, using its sharp claws to take down its quarry.","es":"Vive en tierra firme, pero es un hábil nadador. Se zambulle en el agua en busca de presas y las atrapa con sus afiladas pinzas.","fr":"Bien que vivant sur la terre ferme, il est très bon nageur. Il plonge dans la mer à la recherche de proies et les abat avec ses pinces acérées.","it":"Vive sulla terraferma, ma è un abile nuotatore. Si tuffa in mare alla ricerca di prede, che abbatte con i suoi artigli affilati.","ja":"りくちで せいかつするが およぎも とくい。 えものを もとめて うみに もぐり するどい ツメで しとめる。"},"h":15,"w":682},{"n":349,"ja":"ヒンバス","r":"Hinbass","en":"Feebas","es":"Feebas","fr":"Barpau","it":"Feebas","pt":"","g":3,"t":[11],"cat":{"en":"Fish Pokémon","es":"Pokémon Pez","fr":"Pokémon Poisson","it":"Pokémon Pesce","ja":"さかなポケモン"},"desc":{"en":"It is a shabby and ugly Pokémon. However, it is very hardy and can survive on little water.","es":"Su apariencia deja bastante que desear, pero es muy resistente y puede sobrevivir con poca agua.","fr":"Ce Pokémon a peut-être un physique disgracieux, mais il est robuste et peut survivre dans très peu d’eau.","it":"È un Pokémon dall’aspetto brutto e misero. Tuttavia, è molto resistente e può sopravvivere anche in pochissima acqua.","ja":"みすぼらしく みにくい ポケモンだが しぶとい せいめいりょくを もち わずかな みずだけでも いきのびる。"},"h":6,"w":74},{"n":350,"ja":"ミロカロス","r":"Milokaross","en":"Milotic","es":"Milotic","fr":"Milobellus","it":"Milotic","pt":"","g":3,"t":[11],"cat":{"en":"Tender Pokémon","es":"Pokémon Tierno","fr":"Pokémon Tendre","it":"Pokémon Tenerezza","ja":"いつくしみポケモン"},"desc":{"en":"It’s said that a glimpse of a Milotic and its beauty will calm any hostile emotions you’re feeling.","es":"Se dice que su hermosa figura puede apaciguar el corazón de aquellos que tengan el ánimo alterado.","fr":"On dit que la beauté de ce Pokémon est telle qu’elle apaise l’esprit de ceux qui le voient.","it":"Si dice che la sua bellezza sia in grado di alleviare qualsiasi dolore nel cuore di chi lo ammira.","ja":"ミロカロスの うつくしい すがたを みた ものは すさんだ こころが いやされると いわれている。"},"h":62,"w":1620},{"n":351,"ja":"ポワルン","r":"Powalen","en":"Castform","es":"Castform","fr":"Morphéo","it":"Castform","pt":"","g":3,"t":[1],"cat":{"en":"Weather Pokémon","es":"Pokémon Clima","fr":"Pokémon Climat","it":"Pokémon Meteo","ja":"てんきポケモン"},"desc":{"en":"Its form changes depending on the weather. The rougher conditions get, the rougher Castform’s disposition!","es":"El tiempo atmosférico cambia tanto su aspecto como su estado de ánimo. Cuanto más arrecia, más agresivo se vuelve.","fr":"Il n’y a pas que son apparence qui change en fonction de la météo : son tempérament aussi ! Plus il y a de vent, plus il se montre agressif.","it":"Il suo aspetto cambia con le condizioni atmosferiche. Più il tempo è brutto, più diventa aggressivo.","ja":"てんきに よって すがたが かわる。 きしょうが あらくなるほど きしょうも あらっぽく なってくる。"},"h":3,"w":8},{"n":352,"ja":"カクレオン","r":"Kakureon","en":"Kecleon","es":"Kecleon","fr":"Kecleon","it":"Kecleon","pt":"","g":3,"t":[1],"cat":{"en":"Color Swap Pokémon","es":"Pokémon Camaleónico","fr":"Pokémon Multicolor","it":"Pokémon Mutacolore","ja":"いろへんげポケモン"},"desc":{"en":"Its color changes for concealment and also when its mood or health changes. The darker the color, the healthier it is.","es":"Incluso cuando no se está mimetizando, el color de su cuerpo cambia según cómo se encuentre. Un color más intenso indica mayor vitalidad.","fr":"Sa couleur change quand il se cache, mais varie aussi selon son humeur et son état de santé : plus il est en forme, plus sa couleur est vive.","it":"Cambia colore non solo per mimetizzarsi ma anche in base all’umore e allo stato di salute. Più il suo colore è intenso, più è in forze.","ja":"かくれるとき いがいにも きぶんや ちょうしで からだのいろが かわる。 いろが こいときほど げんきだぞ。"},"h":10,"w":220},{"n":353,"ja":"カゲボウズ","r":"Kagebouzu","en":"Shuppet","es":"Shuppet","fr":"Polichombr","it":"Shuppet","pt":"","g":3,"t":[8],"cat":{"en":"Puppet Pokémon","es":"Pokémon Títere","fr":"Pokémon Poupée","it":"Pokémon Pupazzo","ja":"にんぎょうポケモン"},"desc":{"en":"There’s a proverb that says, “Shun the house where Shuppet gather in the growing dusk.”","es":"Según un viejo proverbio, conviene mantenerse alejado de aquellas casas a las que se arrime una multitud de Shuppet cuando cae la noche.","fr":"Il existe un proverbe ancien qui dit : « Fuis la demeure où les Polichombr se rassemblent en nombre à la pénombre. »","it":"Un vecchio proverbio esorta a stare lontani dalle case in cui, al calar del sole, si annidano gli Shuppet.","ja":"ひぐれに カゲボウズが ならぶような いえとは つきあうな と いう ふるい ことわざが のこっている。"},"h":6,"w":23},{"n":354,"ja":"ジュペッタ","r":"Juppeta","en":"Banette","es":"Banette","fr":"Branette","it":"Banette","pt":"","g":3,"t":[8],"cat":{"en":"Marionette Pokémon","es":"Pokémon Marioneta","fr":"Pokémon Marionnette","it":"Pokémon Marionetta","ja":"ぬいぐるみポケモン"},"desc":{"en":"Resentment at being cast off made it spring into being. Some say that treating it well will satisfy it, and it will once more become a stuffed toy.","es":"El rencor de haber sido tirado a la basura fue lo que le dio vida. Se dice que puede convertirse de nuevo en muñeco si se le trata con cariño.","fr":"Il est né de la rancune qu’il a ressentie quand il a été abandonné. Il redevient apparemment une poupée si l’on en prend grand soin.","it":"È stato generato dalla rabbia per essere stato buttato via. Si dice che se ci si prende cura di lui, tornerà a essere il peluche di un tempo.","ja":"すてられた おんねんで うまれる。 たいせつに されると まんぞくして もとの ヌイグルミに もどるという。"},"h":11,"w":125},{"n":355,"ja":"ヨマワル","r":"Yomawaru","en":"Duskull","es":"Duskull","fr":"Skelénox","it":"Duskull","pt":"","g":3,"t":[8],"cat":{"en":"Requiem Pokémon","es":"Pokémon Réquiem","fr":"Pokémon Requiem","it":"Pokémon Requiem","ja":"おむかえポケモン"},"desc":{"en":"I've heard that the children of Hisui all begin to behave once they've been told the story of how this Pokémon roams about before the witching hour to spirit away misbehaving children.","es":"Se vuelve invisible para acercarse sigilosamente a su presa. Es capaz de atravesar anchos muros.","fr":"Ce Pokémon devient invisible pour se rapprocher furtivement de ses proies. Il a le pouvoir de traverser les murs.","it":"Si avvicina alla preda rendendosi invisibile. Ha la capacità di passare attraverso spesse pareti.","ja":"すがたを とうめいに して そっと えものに ちかよる。 あつい カベを とおりぬける のうりょくを もつ。"},"h":8,"w":150},{"n":356,"ja":"サマヨール","r":"Samayouru","en":"Dusclops","es":"Dusclops","fr":"Téraclope","it":"Dusclops","pt":"","g":3,"t":[8],"cat":{"en":"Beckon Pokémon","es":"Pokémon Atrayente","fr":"Pokémon Appel","it":"Pokémon Ipnosguardo","ja":"てまねきポケモン"},"desc":{"en":"There are rumors that peeking inside its bandage-wrapped body will cause one to get pulled in through the gaps between the bandages, never to return. I've been too scared to verify.","es":"Busca fuegos fatuos y los absorbe en su cuerpo hueco. Lo que pasa dentro luego es un misterio.","fr":"Il cherche des feux follets pour les avaler. Ce qu’il se passe alors à l’intérieur de son corps vide est un mystère.","it":"Va in cerca di fuochi fatui e li risucchia nel suo corpo vuoto. Cosa succeda all’interno è un mistero.","ja":"さまよっている ひとだまを みつけ からっぽの たいないに すいこむ。 すいこまれて どうなるかは なぞ。"},"h":16,"w":306},{"n":357,"ja":"トロピウス","r":"Tropius","en":"Tropius","es":"Tropius","fr":"Tropius","it":"Tropius","pt":"","g":3,"t":[12,3],"cat":{"en":"Fruit Pokémon","es":"Pokémon Fruto","fr":"Pokémon Fruit","it":"Pokémon Frutto","ja":"フルーツポケモン"},"desc":{"en":"Bunches of delicious fruit grow around its neck. In warm areas, many ranches raise Tropius.","es":"A la gente le encanta la deliciosa fruta de sus racimos. En las regiones cálidas abundan las granjas que se dedican a criar Tropius.","fr":"Dans les régions où il fait chaud, on trouve des fermes dédiées à l’élevage de ce Pokémon, très apprécié pour les fruits poussant sur son cou.","it":"Molti amano i grappoli di frutti che crescono attorno al collo di Tropius. Nelle regioni calde, diversi pascoli sono riservati a questo Pokémon.","ja":"くびの フサが おいしくて にんき。 あたたかい とちには トロピウスを そだてる ぼくじょうが たくさん。"},"h":20,"w":1000},{"n":358,"ja":"チリーン","r":"Chirean","en":"Chimecho","es":"Chimecho","fr":"Éoko","it":"Chimecho","pt":"","g":3,"t":[14],"cat":{"en":"Wind Chime Pokémon","es":"Pokémon Sonido Aire","fr":"Pokémon Carillon","it":"Pokémon Vencampana","ja":"ふうりんポケモン"},"desc":{"en":"Can emit waves of air powerful enough to knock out prey taller than itself. I hypothesize that it amplifies the faint sound of wind within its body.","es":"Cuando hay viento fuerte, Chimecho chilla colgado de la rama de un árbol o de los aleros de un edificio por la ventosa que tiene en la cabeza. Este Pokémon usa la larga cola que tiene para agarrar bayas y comérselas.","fr":"Lorsqu’il y a beaucoup de vent, Éoko pousse des cris, accroché à une branche ou à un auvent par une ventouse placée sur sa tête. Ce Pokémon attrape des Baies avec sa longue queue pour les manger.","it":"Quando soffia il vento forte, Chimecho emette il suo verso penzolando dai rami degli alberi o dai cornicioni, a cui si attacca con la ventosa che ha sul capo. Con la sua lunga coda scova le bacche dal terreno e se ne ciba.","ja":"かぜが つよくなると きの えだや のきしたに あたまの きゅうばんで ぶらさがり なきだす。 ながい シッポで きのみを つまんで たべる。"},"h":6,"w":10},{"n":359,"ja":"アブソル","r":"Absol","en":"Absol","es":"Absol","fr":"Absol","it":"Absol","pt":"","g":3,"t":[17],"cat":{"en":"Disaster Pokémon","es":"Pokémon Catástrofe","fr":"Pokémon Désastre","it":"Pokémon Catastrofe","ja":"わざわいポケモン"},"desc":{"en":"Because of this Pokémon’s ability to detect danger, people mistook Absol as a bringer of doom.","es":"Debido a su capacidad para predecir desastres, se lo ha considerado desacertadamente un Pokémon portador de desgracias.","fr":"Sa capacité à pressentir le danger lui a autrefois valu la réputation de porter malheur.","it":"A causa della sua capacità di percepire i disastri è stato considerato erroneamente un Pokémon portatore di disgrazie.","ja":"きけんを さっちする のうりょくを もつがゆえに ひとからは わざわいを もたらす ポケモンと ごかいされた。"},"h":12,"w":470},{"n":360,"ja":"ソーナノ","r":"Sohnano","en":"Wynaut","es":"Wynaut","fr":"Okéoké","it":"Wynaut","pt":"","g":3,"t":[14],"cat":{"en":"Bright Pokémon","es":"Pokémon Radiante","fr":"Pokémon Ravi","it":"Pokémon Brillante","ja":"ほがらかポケモン"},"desc":{"en":"It tends to move in a pack with others. They cluster in a tight group to sleep in a cave.","es":"Suelen ir en grupo y, a la hora de dormir, se pegan unos a otros para descansar resguardados en cuevas.","fr":"Ces Pokémon adorent se déplacer en groupe. Ils se blottissent les uns contre les autres dans des cavernes pour dormir.","it":"Hanno l’abitudine di spostarsi in gruppo. Quando è ora di dormire, si radunano in una grotta e riposano stretti l’uno all’altro.","ja":"むれで こうどうする しゅうせい。 ねむる ときは どうくつの なかで なかまたちと からだを よせあう。"},"h":6,"w":140},{"n":361,"ja":"ユキワラシ","r":"Yukiwarashi","en":"Snorunt","es":"Snorunt","fr":"Stalgamin","it":"Snorunt","pt":"","g":3,"t":[15],"cat":{"en":"Snow Hat Pokémon","es":"Pokémon Gorro Nieve","fr":"Pokémon Capuche","it":"Pokémon Cappelneve","ja":"ゆきかさポケモン"},"desc":{"en":"Arrives alongside the first snow. It's thought that homes Snorunt visit will prosper for many generations. By tradition, one might offer a lump of ice made from pure water at one's front door.","es":"Las regiones frías son su hábitat natural. Se encuentra a sus anchas incluso en lugares donde la temperatura alcanza los -100 °C.","fr":"Il ne peut vivre que dans les plus froides contrées. Il s’accommode parfaitement de températures atteignant les - 100 °C.","it":"Sopravvive solo nelle regioni fredde. Si trova perfettamente a suo agio anche a una temperatura di -100 ºC.","ja":"さむい とちでしか いきられない。 マイナス １００どの かんきょうでも げんきに はねまわっているよ。"},"h":7,"w":168},{"n":362,"ja":"オニゴーリ","r":"Onigohri","en":"Glalie","es":"Glalie","fr":"Oniglali","it":"Glalie","pt":"","g":3,"t":[15],"cat":{"en":"Face Pokémon","es":"Pokémon Cara","fr":"Pokémon Face","it":"Pokémon Tuttomuso","ja":"がんめんポケモン"},"desc":{"en":"It covers its body with an armor of ice harder than steel. Uses its breath to freeze prey, which it then devours as if they were frozen desserts.","es":"Congela a sus presas helando en un momento la humedad contenida en el aire que lo rodea.","fr":"Il a le pouvoir de geler l’humidité ambiante en un instant et peut ainsi immobiliser ses proies.","it":"È capace di ghiacciare istantaneamente l’umidità dell’atmosfera. Sfrutta questo potere per congelare la preda.","ja":"くうきちゅうの すいぶんを いっしゅんで こおらせる ちからで えものを れいとうして しまう。"},"h":15,"w":2565},{"n":363,"ja":"タマザラシ","r":"Tamazarashi","en":"Spheal","es":"Spheal","fr":"Obalie","it":"Spheal","pt":"","g":3,"t":[15,11],"cat":{"en":"Clap Pokémon","es":"Pokémon Aplauso","fr":"Pokémon Clap Clap","it":"Pokémon Rotolante","ja":"てたたきポケモン"},"desc":{"en":"During the season when drift ice approaches the shore, Spheal prefers living on the ice—where fewer predators lurk—rather than the land. Its fur retains heat superbly and resists harsh cold.","es":"Flota entre las olas para examinar el océano. Si encuentra una presa, avisa enseguida a los Walrein de su manada.","fr":"Il scrute la mer en se laissant porter par les vagues. Lorsqu’il repère des proies, il avertit les Kaimorse du groupe.","it":"Fluttua tra le onde ispezionando il mare. Quando individua una preda, avverte i Walrein del suo gruppo.","ja":"なみまに ただよい うみの ようすを さぐる。 えものを はっけんすると むれの トドゼルガに しらせるのだ。"},"h":8,"w":395},{"n":364,"ja":"トドグラー","r":"Todoggler","en":"Sealeo","es":"Sealeo","fr":"Phogleur","it":"Sealeo","pt":"","g":3,"t":[15,11],"cat":{"en":"Ball Roll Pokémon","es":"Pokémon Rodabola","fr":"Pokémon Roule Boule","it":"Pokémon Rotapalla","ja":"たままわしポケモン"},"desc":{"en":"Its white whiskers are very sensitive. Sealeo will balance Spheal on the tip of its nose, checking its scent and its feel to be sure the Spheal is healthy.","es":"Tiene la costumbre de hacer girar en la punta del morro cualquier objeto redondeado, ya sea una Poké Ball o un Spheal.","fr":"Il ne peut pas s’empêcher de faire tourner sur son museau tout ce qui a une forme sphérique, comme les Obalie ou les Poké Balls.","it":"È solito giocare facendo ruotare sulla punta del naso qualsiasi cosa rotonda gli capiti a tiro, compresi Spheal e Poké Ball.","ja":"タマザラシや モンスターボールなど まるい ものなら なんでも はなの うえで まわしてしまう しゅうせい。"},"h":11,"w":876},{"n":365,"ja":"トドゼルガ","r":"Todoseruga","en":"Walrein","es":"Walrein","fr":"Kaimorse","it":"Walrein","pt":"","g":3,"t":[15,11],"cat":{"en":"Ice Break Pokémon","es":"Pokémon Rompehielo","fr":"Pokémon Brise Glace","it":"Pokémon Spaccagelo","ja":"こおりわりポケモン"},"desc":{"en":"Its thick tusks are strong enough to shatter drift ice. They have been known to break, but they will grow back by the next year. The Hisui region is well known for these broken tusks.","es":"Sus colmillos nunca dejan de crecer. Aunque los pierda en un combate, al cabo de un año ya los habrá regenerado por completo.","fr":"Ses défenses poussent tout au long de sa vie. Si l’une d’elles se brise au cours d’un combat, au bout d’un an, elle aura repoussé entièrement.","it":"Le sue zanne continuano a crescere per tutta la vita. Se si spezzano mentre lotta, tornano forti e robuste nell’arco di un anno.","ja":"キバは いっしょう のびつづける。 たたかいで おれても １ねんあれば もとの りっぱな キバに もどる。"},"h":14,"w":1506},{"n":366,"ja":"パールル","r":"Pearlulu","en":"Clamperl","es":"Clamperl","fr":"Coquiperl","it":"Clamperl","pt":"","g":3,"t":[11],"cat":{"en":"Bivalve Pokémon","es":"Pokémon Bivalvo","fr":"Pokémon Bivalve","it":"Pokémon Bivalve","ja":"２まいがいポケモン"},"desc":{"en":"Clamperl’s pearls are exceedingly precious. They can be more than 10 times as costly as Shellder’s pearls.","es":"La perla que contiene vale un potosí. De hecho, su precio puede llegar a ser incluso más de diez veces superior al de la perla de Shellder.","fr":"La perle de Coquiperl est tellement précieuse qu’elle peut valoir plus de dix fois la valeur de celle de Kokiyas.","it":"La perla di Clamperl è talmente preziosa da valere fino a oltre dieci volte quella di Shellder.","ja":"パールルの しんじゅは とても きちょう。 シェルダーの しんじゅの １０ばいいじょう かちが あるとも。"},"h":4,"w":525},{"n":367,"ja":"ハンテール","r":"Huntail","en":"Huntail","es":"Huntail","fr":"Serpang","it":"Huntail","pt":"","g":3,"t":[11],"cat":{"en":"Deep Sea Pokémon","es":"Pokémon Abisal","fr":"Pokémon Abysse","it":"Pokémon Abissi","ja":"しんかいポケモン"},"desc":{"en":"Deep seas are their habitat. According to tradition, when Huntail wash up onshore, something unfortunate will happen.","es":"Vive en los fondos marinos. Según una leyenda, que un Huntail aparezca varado en la playa es señal de mal augurio.","fr":"Il habite dans les profondeurs de l’océan. Un Serpang trouvé sur la plage serait un mauvais présage.","it":"Vive nelle profondità marine. Secondo le leggende, quando un Huntail si arena sulla riva è segno che sta per accadere una disgrazia.","ja":"しんかいに せいそく。 ハンテールが はまに うちあがると ふきつなことが おこるという いいつたえが ある。"},"h":17,"w":270},{"n":368,"ja":"サクラビス","r":"Sakurabyss","en":"Gorebyss","es":"Gorebyss","fr":"Rosabyss","it":"Gorebyss","pt":"","g":3,"t":[11],"cat":{"en":"South Sea Pokémon","es":"Pokémon Mar del Sur","fr":"Pokémon Mer du Sud","it":"Pokémon Sudmarino","ja":"なんかいポケモン"},"desc":{"en":"It sucks bodily fluids out of its prey. The leftover meat sinks to the seafloor, where it becomes food for other Pokémon.","es":"Absorbe los fluidos corporales de su presa. Los restos que deja caen hasta el lecho marino y se convierten en alimento para otros Pokémon.","fr":"Il se nourrit en aspirant les fluides corporels de ses proies. Le reste tombe au fond de la mer, nourrissant ainsi d’autres Pokémon.","it":"Succhia i fluidi corporei delle sue prede. La carne che ne rimane sprofonda sui fondali marini e diventa prezioso nutrimento per altri Pokémon.","ja":"えものの たいえきを すう。 にくは かいていに しずみ ほかの ポケモンの エサに なるのだ。"},"h":18,"w":226},{"n":369,"ja":"ジーランス","r":"Glanth","en":"Relicanth","es":"Relicanth","fr":"Relicanth","it":"Relicanth","pt":"","g":3,"t":[11,6],"cat":{"en":"Longevity Pokémon","es":"Pokémon Longevo","fr":"Pokémon Longévité","it":"Pokémon Longevità","ja":"ちょうじゅポケモン"},"desc":{"en":"This Pokémon was discovered during deep-sea exploration. Its appearance hasn’t changed in 100,000,000 years, so it’s called a living fossil.","es":"Fue descubierto durante una expedición marina. Se lo considera un fósil viviente, pues no ha cambiado en cien millones de años.","fr":"Découvert lors d’une expédition dans les abysses, son apparence inchangée depuis 100 millions d’années lui a valu le surnom de « fossile vivant ».","it":"Scoperto durante una perlustrazione degli abissi marini, viene chiamato “fossile vivente” per via del suo aspetto, immutato da 100 milioni di anni.","ja":"しんかいちょうさで はっけんされた。 １おくねんかん すがたが かわらず いきているかせき と よばれている。"},"h":10,"w":234},{"n":370,"ja":"ラブカス","r":"Lovecus","en":"Luvdisc","es":"Luvdisc","fr":"Lovdisc","it":"Luvdisc","pt":"","g":3,"t":[11],"cat":{"en":"Rendezvous Pokémon","es":"Pokémon Cita","fr":"Pokémon Rendezvous","it":"Pokémon Rendezvous","ja":"ランデブーポケモン"},"desc":{"en":"Luvdisc makes its home in coral reefs in warm seas. It especially likes sleeping in the space between Corsola’s branches.","es":"Vive en los arrecifes de coral de mares cálidos. Dormir entre las ramas de los Corsola es algo por lo que siente una especial predilección.","fr":"Il vit dans les récifs coralliens des mers chaudes, et aime particulièrement dormir entre les cornes des Corayon.","it":"Vive nelle barriere coralline dei mari caldi. Ama particolarmente dormire fra le ramificazioni dei Corsola.","ja":"あたたかい うみの サンゴしょうが すみか。 サニーゴのえだの あいだで ねむるのが とくに おきにいり。"},"h":6,"w":87},{"n":371,"ja":"タツベイ","r":"Tatsubay","en":"Bagon","es":"Bagon","fr":"Draby","it":"Bagon","pt":"","g":3,"t":[16],"cat":{"en":"Rock Head Pokémon","es":"Pokémon Cabeza Roca","fr":"Pokémon Tête de Roc","it":"Pokémon Rocciotesta","ja":"いしあたまポケモン"},"desc":{"en":"Bagon is a solitary Pokémon that doesn’t form groups with others of its kind. It also has a head hard enough to cleave a boulder in one strike.","es":"Vive en solitario, sin formar manadas, y posee una cabeza dura como la piedra que le permite hacer añicos rocas enormes de un solo golpe.","fr":"La tête de ce Pokémon solitaire est si solide qu’il est capable de fendre en deux un rocher d’un seul coup.","it":"Vive in solitudine senza formare branchi. È dotato di una testa così dura da poter spaccare in due rocce granitiche con un solo colpo.","ja":"むれを つくらず １ぴきで くらす。 いちげきで かたい がんせきを まっぷたつにする いしあたまをもつ。"},"h":6,"w":421},{"n":372,"ja":"コモルー","r":"Komoruu","en":"Shelgon","es":"Shelgon","fr":"Drackhaus","it":"Shelgon","pt":"","g":3,"t":[16],"cat":{"en":"Endurance Pokémon","es":"Pokémon Resistencia","fr":"Pokémon Endurant","it":"Pokémon Resistenza","ja":"にんたいポケモン"},"desc":{"en":"Shelgon ignores its hunger entirely, never eating any food. Apparently, Shelgon will evolve once all its energy stores are used up.","es":"Aguanta el hambre sin comer nada. Al parecer, inicia el proceso evolutivo cuando se agota toda la energía que tenía acumulada.","fr":"Il se prive de nourriture, résistant à la faim. On dit que son évolution commence lorsque ses réserves d’énergie sont épuisées.","it":"Resta a digiuno, sopportando la fame. Sembra che l’evoluzione si inneschi quando esaurisce l’energia accumulata.","ja":"エサを たべず くうふくに たえる。 ためた エネルギーを つかいきると しんかが はじまるらしい。"},"h":11,"w":1105},{"n":373,"ja":"ボーマンダ","r":"Bohmander","en":"Salamence","es":"Salamence","fr":"Drattak","it":"Salamence","pt":"","g":3,"t":[16,3],"cat":{"en":"Dragon Pokémon","es":"Pokémon Dragón","fr":"Pokémon Dragon","it":"Pokémon Drago","ja":"ドラゴンポケモン"},"desc":{"en":"While basking in the joy of flight generally keeps this Pokémon in high spirits, Salamence turns into an uncontrollable menace if something angers it.","es":"Feliz de ver cumplido su deseo, surca los cielos con buen ánimo, pero, si se enfada, se vuelve violento e incontrolable.","fr":"Heureux de pouvoir voler dans le ciel, il est souvent de bonne humeur, mais il devient incontrôlable lorsqu’on le met en colère.","it":"È generalmente di buon umore e traboccante di gioia per essere riuscito a volare, ma se si arrabbia diventa una furia incontrollabile.","ja":"おおぞらを とぶ よろこびに ひたり じょうきげんだが おこらせると てが つけられない らんぼうもの。"},"h":15,"w":1026},{"n":374,"ja":"ダンバル","r":"Dumbber","en":"Beldum","es":"Beldum","fr":"Terhal","it":"Beldum","pt":"","g":3,"t":[9,14],"cat":{"en":"Iron Ball Pokémon","es":"Pokémon Bola Hierro","fr":"Pokémon Boulefer","it":"Pokémon Ferrosfera","ja":"てっきゅうポケモン"},"desc":{"en":"The cells in this Pokémon’s body are composed of magnetic material. Instead of blood, magnetic forces flow through Beldum’s body.","es":"Las células de su cuerpo están hechas de imanes. En lugar de sangre, una fuerza magnética recorre su cuerpo.","fr":"Les cellules de son corps sont composées d’aimants. Une force magnétique coule dans ses veines à la place du sang.","it":"Nel suo corpo, le cui cellule sono composte da calamite, scorre forza magnetica al posto del sangue.","ja":"からだの さいぼうは じしゃくで できている。 けつえきの かわりに じりょくが ぜんしんを めぐる。"},"h":6,"w":952},{"n":375,"ja":"メタング","r":"Metang","en":"Metang","es":"Metang","fr":"Métang","it":"Metang","pt":"","g":3,"t":[9,14],"cat":{"en":"Iron Claw Pokémon","es":"Pokémon Garra Hierro","fr":"Pokémon Pincefer","it":"Pokémon Ferrunghia","ja":"てつツメポケモン"},"desc":{"en":"Using magnetic forces to stay aloft, this Pokémon flies at high speeds, weaving through harsh mountain terrain in pursuit of prey.","es":"Levita gracias al magnetismo. Es capaz de sortear escarpadas montañas mientras vuela a altas velocidades en pos de su presa.","fr":"Ce Pokémon vole par magnétisme. Il poursuit ses proies en slalomant à toute allure entre les pics escarpés.","it":"Levita sfruttando la forza magnetica. Si fa strada fra i picchi scoscesi volando a grande velocità mentre insegue le prede.","ja":"じりょくで そらを とぶ。 けわしい さんがくを ぬうように こうそくで ひこうして えものを おいつめる。"},"h":12,"w":2025},{"n":376,"ja":"メタグロス","r":"Metagross","en":"Metagross","es":"Metagross","fr":"Métalosse","it":"Metagross","pt":"","g":3,"t":[9,14],"cat":{"en":"Iron Leg Pokémon","es":"Pokémon Pata Hierro","fr":"Pokémon Pattefer","it":"Pokémon Ferrarto","ja":"てつあしポケモン"},"desc":{"en":"Metagross is the result of the fusion of two Metang. This Pokémon defeats its opponents through use of its supercomputer-level brain.","es":"Formado a partir de la unión de dos Metang. Emplea su inteligencia, comparable a la de un superordenador, para derrotar a sus rivales.","fr":"Né de la fusion de deux Métang, il vient à bout de ses ennemis grâce à son cerveau qui est aussi performant qu’un superordinateur.","it":"È il risultato della fusione di due Metang. Per sconfiggere i nemici si serve del suo cervello, equiparabile a un supercomputer.","ja":"２ひきの メタングが がったいした すがた。 スーパーコンピュータなみの ずのうを くしして てきを たおす。"},"h":16,"w":5500},{"n":377,"ja":"レジロック","r":"Regirock","en":"Regirock","es":"Regirock","fr":"Regirock","it":"Regirock","pt":"","g":3,"t":[6],"cat":{"en":"Rock Peak Pokémon","es":"Pokémon Pico Roca","fr":"Pokémon Pic Rocheux","it":"Pokémon Picco","ja":"いわやまポケモン"},"desc":{"en":"Cutting-edge technology was used to study the internals of this Pokémon’s rock body, but nothing was found—not even a brain or a heart.","es":"Su cuerpo rocoso ha sido examinado con las técnicas científicas más avanzadas, pero no se han encontrado ni su cerebro ni su corazón.","fr":"Bien que son corps de pierre ait été examiné avec les technologies les plus modernes, nulle trace de cerveau ou de cœur n’a été trouvée.","it":"Il suo corpo roccioso è stato analizzato usando le più moderne tecnologie, ma non si è trovata traccia di organi come cervello o cuore.","ja":"さいしんの かがくぎじゅつを つかい いわの からだを しらべたが のうや しんぞうを みつけられなかった。"},"h":17,"w":2300},{"n":378,"ja":"レジアイス","r":"Regice","en":"Regice","es":"Regice","fr":"Regice","it":"Regice","pt":"","g":3,"t":[15],"cat":{"en":"Iceberg Pokémon","es":"Pokémon Iceberg","fr":"Pokémon Iceberg","it":"Pokémon Iceberg","ja":"ひょうざんポケモン"},"desc":{"en":"This Pokémon’s body is made of solid ice. It’s said that Regice was born beneath thick ice in the ice age.","es":"Todo su cuerpo está compuesto de hielo. Se dice que surgió bajo una gruesa placa de hielo durante alguna glaciación.","fr":"Ce Pokémon de l’ère glaciaire dont le corps est entièrement composé d’eau gelée serait né sous une épaisse couche de glace.","it":"Il suo corpo è interamente costituito da ghiaccio. Si narra che nacque sotto un massiccio strato di ghiaccio durante l’era glaciale.","ja":"ぜんしんが こおりで できている。 ひょうがじだいに ぶあつい こおりの したで うまれたと いわれている。"},"h":18,"w":1750},{"n":379,"ja":"レジスチル","r":"Registeel","en":"Registeel","es":"Registeel","fr":"Registeel","it":"Registeel","pt":"","g":3,"t":[9],"cat":{"en":"Iron Pokémon","es":"Pokémon Hierro","fr":"Pokémon Fer","it":"Pokémon Ferro","ja":"くろがねポケモン"},"desc":{"en":"It’s rumored that this Pokémon was born deep underground in the planet’s mantle and that it emerged onto the surface 10,000 years ago.","es":"Dicen que se formó en el manto terrestre y ascendió a la superficie hace aproximadamente diez mil años.","fr":"Il paraît qu’il est né dans le manteau terrestre et qu’il en a émergé il y a environ 10 000 ans.","it":"Si dice che sia nato nel mantello terrestre e che sia salito in superficie circa 10.000 anni fa.","ja":"ちかの マントルの なかで うまれて およそ １まんねんまえに ちじょうに でてきたと うわさされている。"},"h":19,"w":2050},{"n":380,"ja":"ラティアス","r":"Latias","en":"Latias","es":"Latias","fr":"Latias","it":"Latias","pt":"","g":3,"t":[16,14],"cat":{"en":"Eon Pokémon","es":"Pokémon Eón","fr":"Pokémon Éon","it":"Pokémon Eone","ja":"むげんポケモン"},"desc":{"en":"Latias is highly intelligent and capable of understanding human speech. It is covered with a glass-like down. The Pokémon enfolds its body with its down and refracts light to alter its appearance.","es":"Latias tiene un nivel de inteligencia tan alto que es capaz de entender el lenguaje humano. Este Pokémon usa el plumón cristalizado del que está cubierto como peto para refractar la luz y cambiar de aspecto.","fr":"Latias est très intelligent et comprend le langage des hommes. Il est recouvert d’une espèce de duvet ressemblant à du verre. Ce Pokémon s’enveloppe dans ce duvet et reflète la lumière pour changer son apparence.","it":"Estremamente intelligente, Latias è in grado di capire il linguaggio umano. Il suo corpo è ricoperto di piumino vetroso che usa per rifrangere la luce e mutare il proprio aspetto.","ja":"ちのうが たかく ひとの ことばを りかいする。 ガラスの ような うもうで からだを つつみこみ ひかりを くっせつさせて すがたを かえる。"},"h":14,"w":400},{"n":381,"ja":"ラティオス","r":"Latios","en":"Latios","es":"Latios","fr":"Latios","it":"Latios","pt":"","g":3,"t":[16,14],"cat":{"en":"Eon Pokémon","es":"Pokémon Eón","fr":"Pokémon Éon","it":"Pokémon Eone","ja":"むげんポケモン"},"desc":{"en":"Latios will only open its heart to a Trainer with a compassionate spirit. This Pokémon can fly faster than a jet plane by folding its forelegs to minimize air resistance.","es":"Latios solo le abre el corazón a los Entrenadores compasivos. A la hora de volar, este Pokémon pliega las patas delanteras para minimizar la resistencia al aire y supera en velocidad a un avión a reacción.","fr":"Latios n’ouvrira son cœur qu’à un Dresseur doté d’un esprit compatissant. Ce Pokémon peut voler plus vite qu’un avion à réaction en repliant ses pattes avant pour améliorer son aérodynamisme.","it":"Latios apre il proprio cuore ad Allenatori d’animo buono e generoso. Il Pokémon riesce a volare più veloce di un aereo a reazione, piegando le zampe anteriori per minimizzare l’attrito dell’aria.","ja":"やさしい こころの もちぬしにしか なつかない。 うでを おりたたむと くうきていこうが へって ジェットき よりも はやく そらを とべるぞ。"},"h":20,"w":600},{"n":382,"ja":"カイオーガ","r":"Kyogre","en":"Kyogre","es":"Kyogre","fr":"Kyogre","it":"Kyogre","pt":"","g":3,"t":[11],"cat":{"en":"Sea Basin Pokémon","es":"Pokémon Cuenca Mar","fr":"Pokémon Bassinmarin","it":"Pokémon Oceano","ja":"かいていポケモン"},"desc":{"en":"Kyogre is said to be the personification of the sea itself. Legends tell of its many clashes against Groudon, as each sought to gain the power of nature.","es":"A Kyogre siempre se le ha descrito como el Pokémon que expandió los océanos. Varias leyendas cuentan que libró combates contra Groudon en repetidas ocasiones para tener el control de la energía de la naturaleza.","fr":"Un Pokémon considéré comme l’avatar des océans. Selon les légendes, il a disputé de nombreux combats avec Groudon pour contrôler l’énergie de la nature.","it":"Si dice che questo Pokémon abbia un profondo legame con le distese dei mari. Le leggende narrano dei suoi continui scontri con Groudon per ottenere l’energia della natura.","ja":"うみの けしん と つたわる ポケモン。 しぜんのエネルギーを もとめて グラードンと あらそいを くりかえした でんせつが ある。"},"h":45,"w":3520},{"n":383,"ja":"グラードン","r":"Groudon","en":"Groudon","es":"Groudon","fr":"Groudon","it":"Groudon","pt":"","g":3,"t":[5],"cat":{"en":"Continent Pokémon","es":"Pokémon Continente","fr":"Pokémon Continent","it":"Pokémon Continente","ja":"たいりくポケモン"},"desc":{"en":"Through Primal Reversion and with nature’s full power, it will take back its true form. It can cause magma to erupt and expand the landmass of the world.","es":"Groudon se sirve de la energía de la naturaleza para realizar su Regresión Primigenia y recobrar su apariencia primitiva. Con tal poder, puede crear magma para expandir los continentes.","fr":"Grâce à l’énergie de la nature, il peut accomplir sa Primo-Résurgence pour retrouver son apparence originelle. Ce pouvoir lui permet de créer du magma pour étendre les continents.","it":"L’energia della natura può causare l’archeorisveglio di questo Pokémon, facendolo tornare al suo aspetto originario. Può produrre fiumi di magma in grado di espandere le terre emerse.","ja":"しぜんのエネルギーに よって ゲンシカイキし ほんらいの すがたを とりもどす。そのちからは マグマを うみだし だいちを ひろげる。"},"h":35,"w":9500},{"n":384,"ja":"レックウザ","r":"Rayquaza","en":"Rayquaza","es":"Rayquaza","fr":"Rayquaza","it":"Rayquaza","pt":"","g":3,"t":[16,3],"cat":{"en":"Sky High Pokémon","es":"Pokémon Cielo","fr":"Pokémon Cieux","it":"Pokémon Stratosfera","ja":"てんくうポケモン"},"desc":{"en":"It flies forever through the ozone layer, consuming meteoroids for sustenance. The many meteoroids in its body provide the energy it needs to Mega Evolve.","es":"Rayquaza ha vivido en la capa de ozono durante millones de años, alimentándose de meteoritos. La energía de estos meteoritos se acumula en su cuerpo y le permite megaevolucionar.","fr":"Un Pokémon qui vit dans la couche d’ozone et se nourrit des météorites qu’il intercepte. Leur énergie s’accumule dans son corps, ce qui lui permet de méga-évoluer.","it":"Risiede nello strato di ozono, dove si nutre di meteoriti. Grazie alla loro energia che si accumula all’interno del suo corpo, può megaevolversi.","ja":"オゾンそうを とびつづけ エサとなる いんせきを くらう。たいないに たまった いんせきの エネルギーで メガシンカする。"},"h":70,"w":2065},{"n":385,"ja":"ジラーチ","r":"Jirachi","en":"Jirachi","es":"Jirachi","fr":"Jirachi","it":"Jirachi","pt":"","g":3,"t":[9,14],"cat":{"en":"Wish Pokémon","es":"Pokémon Deseo","fr":"Pokémon Souhait","it":"Pokémon Desiderio","ja":"ねがいごとポケモン"},"desc":{"en":"It’s believed that when this Pokémon wakes from its 1,000-year slumber, it will grant any wishes written on the notes attached to its head.","es":"Se dice que concederá los deseos escritos en las notas de su cabeza cuando se despierte de su sueño milenario.","fr":"On raconte que lorsqu’il se réveille de son sommeil millénaire, il exauce les vœux écrits sur les rubans de papier de sa tête.","it":"Si dice che, al risveglio dal suo sonno millenario, realizzi i desideri scritti sui bigliettini attaccati alla sua testa.","ja":"１０００ねんの ねむりから めざめた とき あたまの たんざくに かかれた ねがいごとを かなえる という。"},"h":3,"w":11},{"n":386,"ja":"デオキシス","r":"Deoxys","en":"Deoxys","es":"Deoxys","fr":"Deoxys","it":"Deoxys","pt":"","g":3,"t":[14],"cat":{"en":"DNA Pokémon","es":"Pokémon ADN","fr":"Pokémon ADN","it":"Pokémon DNA","ja":"ＤＮＡポケモン"},"desc":{"en":"Deoxys emerged from a virus that came from space. It is highly intelligent and wields psychokinetic powers. This Pokémon shoots lasers from the crystalline organ on its chest.","es":"Deoxys surgió a partir de un virus espacial. Tiene un alto nivel intelectual y poderes psicoquinéticos. Este Pokémon dispara rayos láser por el órgano cristalino que tiene en el torso.","fr":"Deoxys était à l’origine un virus provenant de l’espace. Il est extrêmement intelligent et dispose de pouvoirs télékinétiques. Ce Pokémon envoie des lasers avec l’organe cristallin situé sur sa poitrine.","it":"Deoxys è nato da un virus proveniente dallo spazio. È dotato di estrema intelligenza e di poteri psicocinetici. Spara raggi laser dall’organo cristallino del proprio corpo.","ja":"うちゅうウィルスから たんじょうした ポケモン。 ちのうが たかく ちょうのうりょくを あやつる。 むねの すいしょうたいから レーザーを だす。"},"h":17,"w":608},{"n":387,"ja":"ナエトル","r":"Naetle","en":"Turtwig","es":"Turtwig","fr":"Tortipouss","it":"Turtwig","pt":"","g":4,"t":[12],"cat":{"en":"Tiny Leaf Pokémon","es":"Pokémon Hojita","fr":"Pokémon Minifeuille","it":"Pokémon Fogliolina","ja":"わかばポケモン"},"desc":{"en":"This Pokémon becomes more energetic the more sunlight there is. The part resembling a shell is similar to silt and is slightly damp and warm to the touch.","es":"Realiza la fotosíntesis para obtener oxígeno. Si tiene sed, las hojas de la cabeza se marchitan.","fr":"Son corps produit de l’oxygène par photosynthèse. La feuille sur sa tête flétrit quand il a soif.","it":"È in grado di svolgere la fotosintesi e di produrre ossigeno. La sua foglia appassisce se ha sete.","ja":"ぜんしんで こうごうせいを して さんそを つくる。のどが かわくと あたまの はっぱが しおれてしまう。"},"h":4,"w":102},{"n":388,"ja":"ハヤシガメ","r":"Hayashigame","en":"Grotle","es":"Grotle","fr":"Boskara","it":"Grotle","pt":"","g":4,"t":[12],"cat":{"en":"Grove Pokémon","es":"Pokémon Arboleda","fr":"Pokémon Bosquet","it":"Pokémon Boschetto","ja":"こだちポケモン"},"desc":{"en":"Appears where there is clean spring water. The fruit that grows on the shrubs on its shell is sweet, nutritious, and truly delicious.","es":"Sabe dónde encontrar manantiales de agua pura y lleva a los Pokémon amigos hasta allí en su lomo.","fr":"Il sait d’instinct où trouver une source d’eau pure. Il y transporte d’autres Pokémon sur son dos.","it":"Sa come trovare sorgenti incontaminate, dove porta i Pokémon amici tenendoli sulla schiena.","ja":"きれいな みずが わきでる ばしょを しっていて なかまの ポケモンを せなかに のせて そこまで はこぶ。"},"h":11,"w":970},{"n":389,"ja":"ドダイトス","r":"Dodaitose","en":"Torterra","es":"Torterra","fr":"Torterra","it":"Torterra","pt":"","g":4,"t":[12,5],"cat":{"en":"Continent Pokémon", rs et les plafonds. Sa queue ardente n’est pas son seul atout.","it":"Attacca la preda lanciandosi da soffitti e pareti. Le fiamme sulla coda sono solo una delle sue armi.","ja":"てんじょうや かべを りようして くうちゅうさっぽうを くりだす。 しっぽの ほのおも ぶきの ひとつ。"},"h":9,"w":220},{"n":392,"ja":"ゴウカザル","r":"Gōkazaru","en":"Infernape","es":"Infernape","fr":"Simiabraz","it":"Infernape","pt":"","g":4,"t":[10,2],"cat":{"en":"Flame Pokémon","es":"Pokémon Llama","fr":"Pokémon Flamme","it":"Pokémon Fiamma","ja":"かえんポケモン"},"desc":{"en":"A tall, hardy Pokémon with a dazzling appearance. It shrouds itself in flame and battles as if engaged in dance—truly a sight to behold.","es":"Maneja a sus rivales con tremenda agilidad. En su especial forma de luchar usa todos sus miembros.","fr":"Il fait voltiger ses ennemis grâce à sa vitesse et son style de combat spécial qui utilise ses quatre membres.","it":"Confonde il nemico con la velocità. Ha uno stile di lotta speciale, che prevede l’uso dei quattro arti.","ja":"すばやさで あいてを ほんろうする。 りょうて りょうあしを つかった どくとくの たたかい かたを する。"},"h":12,"w":550},{"n":393,"ja":"ポッチャマ","r":"Pochama","en":"Piplup","es":"Piplup","fr":"Tiplouf","it":"Piplup","pt":"","g":4,"t":[11],"cat":{"en":"Penguin Pokémon","es":"Pokémon Pingüino","fr":"Pokémon Pingouin","it":"Pokémon Pinguino","ja":"ペンギンポケモン"},"desc":{"en":"Prefers cold climes and appears along coasts. It's an adorable little thing—as cute as any child—but it's also prideful, unwilling to accept handouts from people.","es":"Es muy orgulloso, por lo que odia aceptar comida de la gente. Su grueso plumón lo protege del frío.","fr":"Il est fier et déteste accepter la nourriture qu’on lui offre. Son pelage épais le protège du froid.","it":"È molto orgoglioso e odia accettare cibo dalla gente. Le fitte piume lo proteggono dal freddo.","ja":"プライドが たかく ひとから たべものを もらう ことを きらう。 ながい うぶげが さむさを ふせぐ。"},"h":4,"w":52},{"n":394,"ja":"ポッタイシ","r":"Pottaishi","en":"Prinplup","es":"Prinplup","fr":"Prinplouf","it":"Prinplup","pt":"","g":4,"t":[11],"cat":{"en":"Pe  un sonido similar al de un xilófono.","fr":"Quand ses antennes s’entrechoquent, elles laissent échapper un bruit de xylophone.","it":"Le antenne, scontrandosi, producono un suono simile allo xilofono: klon, klon!","ja":"しょっかく どうしが ぶつかると コロン コロンと もっきんに にた ねいろを かなでる。"},"h":3,"w":22},{"n":402,"ja":"コロトック","r":"Korotok","en":"Kricketune","es":"Kricketune","fr":"Mélokrik","it":"Kricketune","pt":"","g":4,"t":[7],"cat":{"en":"Cricket Pokémon","es":"Pokémon Grillo","fr":"Pokémon Criquet","it":"Pokémon Grillo","ja":"こおろぎポケモン"},"desc":{"en":"It uses its cutlass-like arms to produce sound, the melody of which varies from individual to individual. It is a worthwhile endeavor to seek out one's favorite tunes.","es":"Los científicos tratan de estudiar sus melodías, que son reflejo de sus emociones.","fr":"Il exprime ses émotions par des mélodies. Les scientifiques étudient actuellement leur structure.","it":"Esprime le proprie emozioni con melodie, che sono oggetto di studio di molti scienziati.","ja":"かんじょうを メロディで あらわす。 メロディの ほうそくせいを がくしゃたちが けんきゅうしている。"},"h":10,"w":255},{"n":403,"ja":"コリンク","r":"Kolink","en":"Shinx","es":"Shinx","fr":"Lixy","it":"Shinx","pt":"","g":4,"t":[13],"cat":{"en":"Flash Pokémon","es":"Pokémon Flash","fr":"Pokémon Flash","it":"Pokémon Baleno","ja":"せんこうポケモン"},"desc":{"en":"Shakes its body to generate electricity. Its stature belies its aggression—one must be patient to tame this Pokémon.","es":"Su pelaje brilla gracias a la electricidad. Envía señales a sus semejantes agitando la punta luminosa de la cola.","fr":"Sa fourrure s’illumine grâce à l’électricité. Il agite l’extrémité lumineuse de sa queue pour envoyer des signes à ses congénères.","it":"La sua pelliccia irradia luce per via dell’elettricità. Invia segnali ai suoi simili agitando la punta luminosa della coda.","ja":"たいもうが でんきで はっこうする。 あかるく ひかる しっぽの さきを ふって なかまに サインを おくる。"},"h":5,"w":95},{"n":404,"ja":"ルクシオ","r":"Luxio","en":"Luxio","es":"Luxio","fr":"Luxio","it":"Luxio","pt":"","g":4,"t":[13],
