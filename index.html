feuille pour tenir son ennemi à distance. Un doux parfum s’en dégage également, apaisant les Pokémon qui se battent et créant une atmosphère agréable et amicale.","it":"Nella lotta, Chikorita sventola la sua foglia in modo da tenere a bada il nemico. Tuttavia, la foglia emana anche un aroma dolce, che calma il Pokémon avversario, creando un’atmosfera gradevole e rilassata tutt’attorno.","ja":"はっぱを ふりまわして あいてを いかくするが はっぱから あまい かおりが ただようので おたがいに なごやかな ふんいきに なるよ。"},"h":9,"w":64},{"n":153,"ja":"ベイリーフ","r":"Bayleaf","en":"Bayleef","es":"Bayleef","fr":"Macronium","it":"Bayleef","pt":"","g":2,"t":[12],"cat":{"en":"Leaf Pokémon","es":"Pokémon Hoja","fr":"Pokémon Feuille","it":"Pokémon Foglia","ja":"はっぱポケモン"},"desc":{"en":"Bayleef’s neck is ringed by curled-up leaves. Inside each tubular leaf is a small shoot of a tree. The fragrance of this shoot makes people peppy.","es":"Bayleef tiene un collar de hojas alrededor del cuello y un brote de un árbol en cada una de ellas. La fragancia que desprenden estos brotes anima a la gente.","fr":"Le cou de Macronium est entouré de nombreuses feuilles. Dans chacune d’elles se trouve une pousse d’arbre. Le parfum de cette pousse donne la pêche aux personnes qui le sentent.","it":"Il collo di Bayleef è agghindato da foglie, dentro cui è presente il piccolo germoglio di un albero. L’aroma emanato da questo germoglio ha un effetto energizzante sull’uomo.","ja":"くびの まわりの くるりと まいた はっぱの なかには ちいさな きのめが １こ なっている。 その かおりは ひとを げんきに させるぞ。"},"h":12,"w":158},{"n":154,"ja":"メガニウム","r":"Meganium","en":"Meganium","es":"Meganium","fr":"Méganium","it":"Meganium","pt":"","g":2,"t":[12],"cat":{"en":"Herb Pokémon","es":"Pokémon Hierba","fr":"Pokémon Herbe","it":"Pokémon Erbe","ja":"ハーブポケモン"},"desc":{"en":"The fragrance of Meganium’s flower soothes and calms emotions. In battle, this Pokémon gives off more of its becalming scent to blunt the foe’s fighting spirit.","es":"La fragancia de la flor de Meganium aplaca y suaviza los ánimos. Al luchar, este Pokémon libera mayor cantidad de esencia para disminuir el ánimo de combate de su oponente.","fr":"Le parfum de la fleur de Méganium apaise et calme les esprits. Pendant les combats, ce Pokémon émet son parfum relaxant pour atténuer l’agressivité de l’ennemi.","it":"L’aroma del fiore di Meganium placa le emozioni. Nella lotta questo Pokémon emana un profumo con effetto calmante per smorzare l’aggressività del nemico.","ja":"はなの かおりは きもちを おだやかにする。 たたかいの ときは かおりを はっさんさせて あいての たたかう きもちを にぶらせるのだ。"},"h":18,"w":1005},{"n":155,"ja":"ヒノアラシ","r":"Hinoarashi","en":"Cyndaquil","es":"Cyndaquil","fr":"Héricendre","it":"Cyndaquil","pt":"","g":2,"t":[10],"cat":{"en":"Fire Mouse Pokémon","es":"Pokémon Ratón Fuego","fr":"Pokémon Souris Feu","it":"Pokémon Fuocotopo","ja":"ひねずみポケモン"},"desc":{"en":"Hails from the Johto region. Though usually curled into a ball due to its timid disposition, it harbors tremendous firepower.","es":"Cyndaquil se protege soltando llamas por el lomo. Cuando está enfadado, las llamas son fieras, pero, si está cansado, solo consigue echar algunas chispas que no llegan a cuajar en una completa combustión.","fr":"Héricendre se protège en faisant jaillir des flammes de son dos. Ces flammes peuvent être violentes si le Pokémon est en colère. Cependant, s’il est fatigué, seules quelques flammèches vacillent laborieusement.","it":"Cyndaquil si protegge grazie alle fiamme che gli ardono sul dorso. Le fiamme divampano impetuose se il Pokémon è adirato. Tuttavia, quando è stanco diventano fiammelle innocue dalla combustione incompleta.","ja":"せなかから ほのおを ふきあげて みを まもる。 おこった ときの ほのおは いきおいが いいが つかれている ときは ふかんぜんねんしょうする。"},"h":5,"w":79},{"n":156,"ja":"マグマラシ","r":"Magmarashi","en":"Quilava","es":"Quilava","fr":"Feurisson","it":"Quilava","pt":"","g":2,"t":[10],"cat":{"en":"Volcano Pokémon","es":"Pokémon Volcán","fr":"Pokémon Volcan","it":"Pokémon Vulcano","ja":"かざんポケモン"},"desc":{"en":"This creature's fur is most mysterious—it is wholly impervious to the burning touch of flame. Should Quilava turn its back to you, take heed! Such a posture indicates a forthcoming attack.","es":"Quilava mantiene a sus rivales a raya con la intensidad de sus llamas y las ráfagas de aire ígneo que producen. También aprovecha su espectacular agilidad para esquivar ataques a la vez que abrasa al rival con sus llamas.","fr":"Feurisson garde ses ennemis à distance grâce à l’intensité de ses flammes et à des rafales d’air brûlant. Ce Pokémon utilise son incroyable agilité pour éviter les attaques, tout en enflammant ses ennemis.","it":"Quilava tiene a bada il nemico grazie all’intensità delle sue fiamme e a getti di aria rovente. Questo Pokémon sfrutta la sua estrema destrezza per evitare gli attacchi anche mentre ustiona il nemico.","ja":"ほのおの いきおいと ねっぷうで いかくする。 すばやい みのこなしで あいての こうげきを かわしながら どうじに ほのおで もやす。"},"h":9,"w":190},{"n":157,"ja":"バクフーン","r":"Bakphoon","en":"Typhlosion","es":"Typhlosion","fr":"Typhlosion","it":"Typhlosion","pt":"","g":2,"t":[10],"cat":{"en":"Volcano Pokémon","es":"Pokémon Volcán","fr":"Pokémon Volcan","it":"Pokémon Vulcano","ja":"かざんポケモン"},"desc":{"en":"Said to purify lost, forsaken souls with its flames and guide them to the afterlife. I believe its form has been influenced by the energy of the sacred mountain towering at Hisui's center.","es":"Typhlosion se oculta tras un trémulo haz de calor que crea mediante sus intensas y sofocantes llamaradas. Este Pokémon causa explosiones de fuego que reducen todo a cenizas.","fr":"Typhlosion se cache derrière un chatoyant nuage de chaleur qu’il crée en attisant ses flammes intenses. Ce Pokémon peut générer des rafales explosives qui réduisent tout en cendres.","it":"Typhlosion si nasconde avvolto da una lucente nube di calore creata dalle sue fiamme roventi. Questo Pokémon crea esplosioni spettacolari che riducono in cenere ogni cosa.","ja":"しゃくねつの ほのおで まわりに かげろうを つくりだして すがたを かくす ことが できる。 もえあがる ばくふうは すべてを やきつくすぞ。"},"h":17,"w":795},{"n":158,"ja":"ワニノコ","r":"Waninoko","en":"Totodile","es":"Totodile","fr":"Kaiminus","it":"Totodile","pt":"","g":2,"t":[11],"cat":{"en":"Big Jaw Pokémon","es":"Pokémon Fauces","fr":"Pokémon Mâchoire","it":"Pokémon Mascellone","ja":"おおあごポケモン"},"desc":{"en":"Despite the smallness of its body, Totodile’s jaws are very powerful. While the Pokémon may think it is just playfully nipping, its bite has enough power to cause serious injury.","es":"Totodile tiene cuerpo pequeño, pero fuertes mandíbulas. A veces, piensa que solo está dando un mordisquito y hace unas heridas bastante considerables.","fr":"Malgré son tout petit corps, la mâchoire de Kaiminus est très puissante. Parfois, ce Pokémon mordille les gens pour jouer, sans se rendre compte que sa morsure peut gravement blesser quelqu’un.","it":"Nonostante il suo corpicino minuto, le mascelle di Totodile sono molto potenti. Sebbene creda solo di giocare, il suo morso è così forte e pericoloso da causare serie ferite.","ja":"ちいさな からだでも アゴの ちからは つよい。 ワニノコじしんは あまがみ している つもりでも おおけがを してしまう ほどの ちからが ある。"},"h":6,"w":95},{"n":159,"ja":"アリゲイツ","r":"Alligates","en":"Croconaw","es":"Croconaw","fr":"Crocrodil","it":"Croconaw","pt":"","g":2,"t":[11],"cat":{"en":"Big Jaw Pokémon","es":"Pokémon Fauces","fr":"Pokémon Mâchoire","it":"Pokémon Mascellone","ja":"おおあごポケモン"},"desc":{"en":"Once Croconaw has clamped its jaws on its foe, it will absolutely not let go. Because the tips of its fangs are forked back like barbed fishhooks, they become impossible to remove when they have sunk in.","es":"Una vez que Croconaw le ha clavado los colmillos a su presa, es imposible que escape porque los tiene hacia adentro como si fueran anzuelos. Cuando Croconaw hinca los dientes, no hay escapatoria.","fr":"Une fois que Crocrodil a refermé sa mâchoire sur son ennemi, il est impossible de le faire lâcher prise. Ses crocs sont recourbés comme des hameçons et ne peuvent pas être retirés une fois enfoncés.","it":"Una volta azzannato il nemico, Croconaw non molla la presa facilmente. Le zanne a punta ricurva all’indietro, a mo’ di amo da pesca, rendono impossibile estrarle quando sono conficcate in profondità.","ja":"いちど かみついたら ぜったいに はなさない。 キバの さきが つりばり みたいに そりかえって いるので いちど ささると ぬけなく なるのだ。"},"h":11,"w":250},{"n":160,"ja":"オーダイル","r":"Ordile","en":"Feraligatr","es":"Feraligatr","fr":"Aligatueur","it":"Feraligatr","pt":"","g":2,"t":[11],"cat":{"en":"Big Jaw Pokémon","es":"Pokémon Fauces","fr":"Pokémon Mâchoire","it":"Pokémon Mascellone","ja":"おおあごポケモン"},"desc":{"en":"Feraligatr intimidates its foes by opening its huge mouth. In battle, it will kick the ground hard with its thick and powerful hind legs to charge at the foe at an incredible speed.","es":"Feraligatr intimida a sus oponentes abriendo las grandes fauces que tiene. En combate, golpea el suelo bruscamente con las gruesas y fuertes patas traseras que tiene para cargar contra su rival a una velocidad de vértigo.","fr":"Aligatueur impressionne ses ennemis en ouvrant son énorme gueule. Pendant les combats, il piétine le sol de ses puissantes pattes arrière avant de charger ses adversaires à pleine vitesse.","it":"Feraligatr spaventa il nemico spalancando la sua bocca enorme. Nella lotta pesta pesantemente il terreno con le sue possenti zampe posteriori per scagliarsi contro il nemico a un’incredibile velocità.","ja":"おおきな くちを あけて あいてを いかくする。 きょうじんな うしろあしで じめんを けって ものすごい スピードで とっしん してくるぞ。"},"h":23,"w":888},{"n":161,"ja":"オタチ","r":"Otachi","en":"Sentret","es":"Sentret","fr":"Fouinette","it":"Sentret","pt":"","g":2,"t":[1],"cat":{"en":"Scout Pokémon","es":"Pokémon Explorador","fr":"Pokémon Espion","it":"Pokémon Esplorante","ja":"みはりポケモン"},"desc":{"en":"When Sentret sleeps, it does so while another stands guard. The sentry wakes the others at the first sign of danger. When this Pokémon becomes separated from its pack, it becomes incapable of sleep due to fear.","es":"Sentret no duerme a menos que otro haga guardia. El que hace de centinela lo despertará al mínimo signo de peligro. Cuando este Pokémon se separa de su manada, es incapaz de echarse a dormir, presa del miedo.","fr":"Lorsqu’un Fouinette dort, un autre monte la garde. La sentinelle réveille les autres au moindre signe de danger. Si un de ces Pokémon est séparé de sa meute, il est incapable de dormir, car il a peur.","it":"Sentret dorme soltanto se un suo simile rimane vigile. La vedetta allerta gli altri al primo segnale di pericolo. Se viene allontanato dal branco, questo Pokémon non riesce più a dormire dalla paura.","ja":"ねむる ときには こうたいで みはりをする。 きけんを さっちすると なかまを おこすのだ。 むれから はぐれると こわくて ねむれなくなる。"},"h":8,"w":60},{"n":162,"ja":"オオタチ","r":"Ootachi","en":"Furret","es":"Furret","fr":"Fouinar","it":"Furret","pt":"","g":2,"t":[1],"cat":{"en":"Long Body Pokémon","es":"Pokémon Alargado","fr":"Pokémon Allongé","it":"Pokémon Lungocorpo","ja":"どうながポケモン"},"desc":{"en":"Furret has a very slim build. When under attack, it can slickly squirm through narrow spaces and get away. In spite of its short limbs, this Pokémon is very nimble and fleet.","es":"Furret es de constitución muy delgada. En combate le resulta útil porque puede escabullirse con habilidad por cualquier huequito y escapar. A pesar de que tiene patas cortas, es ágil y veloz.","fr":"Fouinar est très mince. Lorsqu’il est attaqué, il peut s’enfuir en se faufilant habilement dans les recoins étroits. Malgré ses pattes courtes, ce Pokémon est très agile et rapide.","it":"Furret è di esile costituzione. Quando è attaccato riesce a scappare intrufolandosi in ogni fessura. Nonostante i suoi arti corti, questo Pokémon è molto agile e rapido nei movimenti.","ja":"てきに おそわれても ほそい すきまに するりと もぐりこんで にげる ことが できる。 てあしは みじかいが とても すばしっこい。"},"h":18,"w":325},{"n":163,"ja":"ホーホー","r":"Hoho","en":"Hoothoot","es":"Hoothoot","fr":"Hoothoot","it":"Hoothoot","pt":"","g":2,"t":[1,3],"cat":{"en":"Owl Pokémon","es":"Pokémon Búho","fr":"Pokémon Hibou","it":"Pokémon Gufo","ja":"ふくろうポケモン"},"desc":{"en":"It begins to hoot at the same time every day. Some Trainers use them in place of clocks.","es":"Todos los días empieza a ulular a la misma hora, por lo que algunos Entrenadores lo usan a modo de reloj.","fr":"Il hulule chaque jour aux mêmes moments. Certains Dresseurs s’en servent comme d’une montre.","it":"Emette il suo verso ogni giorno alla stessa ora. Alcuni Allenatori preferiscono affidarsi a questo Pokémon anziché usare un orologio.","ja":"いつも きまった じかんになると なきだすので とけいがわりに つれてあるく トレーナーもいる。"},"h":7,"w":212},{"n":164,"ja":"ヨルノズク","r":"Yorunozuku","en":"Noctowl","es":"Noctowl","fr":"Noarfang","it":"Noctowl","pt":"","g":2,"t":[1,3],"cat":{"en":"Owl Pokémon","es":"Pokémon Búho","fr":"Pokémon Hibou","it":"Pokémon Gufo","ja":"ふくろうポケモン"},"desc":{"en":"When it needs to think, it rotates its head 180 degrees to sharpen its intellectual power.","es":"Cuando necesita pensar, gira la cabeza 180° para agudizar su capacidad intelectual.","fr":"Quand il réfléchit, il tourne sa tête sur 180 degrés pour optimiser son mode de pensée.","it":"Quando pensa ruota la testa di 180 gradi per potenziare le sue capacità intellettive.","ja":"ものごとを かんがえだすと くびを １８０ど かいてん させて あたまの はたらきを たかめる。"},"h":16,"w":408},{"n":165,"ja":"レディバ","r":"Rediba","en":"Ledyba","es":"Ledyba","fr":"Coxy","it":"Ledyba","pt":"","g":2,"t":[7,3],"cat":{"en":"Five Star Pokémon","es":"Pokémon 5 Estrellas","fr":"Pokémon 5 Étoiles","it":"Pokémon Pentastra","ja":"いつつぼしポケモン"},"desc":{"en":"These very cowardly Pokémon join together and use Reflect to protect their nest.","es":"Un Pokémon bastante temeroso. Junto con sus congéneres, protege su nido usando Reflejo.","fr":"Extrêmement timide, ce Pokémon défend le nid qu’il partage avec ses congénères en utilisant Protection.","it":"È un Pokémon incredibilmente timido. Protegge il nido usando Riflesso assieme ai suoi simili.","ja":"とっても おくびょうな ポケモン。 なかまと いっしょに リフレクターを はって すを まもって いるのだ。"},"h":10,"w":108},{"n":166,"ja":"レディアン","r":"Redian","en":"Ledian","es":"Ledian","fr":"Coxyclaque","it":"Ledian","pt":"","g":2,"t":[7,3],"cat":{"en":"Five Star Pokémon","es":"Pokémon 5 Estrellas","fr":"Pokémon 5 Étoiles","it":"Pokémon Pentastra","ja":"いつつぼしポケモン"},"desc":{"en":"It flies through the night sky, sprinkling sparkly dust. According to some, if that dust sticks to you, good things will happen to you.","es":"Vuela por el cielo nocturno esparciendo un polvo brillante. Dicen que entrar en contacto con este polvo trae buena suerte.","fr":"Il vole dans le ciel nocturne en répandant une poudre scintillante. Si elle vous touche, quelque chose de positif devrait bientôt vous arriver.","it":"Svolazza nel cielo notturno lasciando dietro di sé una scia di polvere luccicante. Si dice che il contatto con essa porti fortuna.","ja":"きらめく こなを ふりまきながら よぞらを とぶ。 こなが からだに つくと いいことが あるといわれる。"},"h":14,"w":356},{"n":167,"ja":"イトマル","r":"Itomaru","en":"Spinarak","es":"Spinarak","fr":"Mimigal","it":"Spinarak","pt":"","g":2,"t":[7,4],"cat":{"en":"String Spit Pokémon","es":"Pokémon Escupesoga","fr":"Pokémon Crache Fil","it":"Pokémon Tela","ja":"いとはきポケモン"},"desc":{"en":"Although the poison from its fangs isn’t that strong, it’s potent enough to weaken prey that gets caught in its web.","es":"El veneno de sus colmillos no es demasiado tóxico, pero basta para mantener inmovilizadas a las presas que caen en sus redes.","fr":"Le poison contenu dans les mandibules de ce Pokémon n’est pas très violent, mais il suffit à immobiliser les proies piégées dans sa toile.","it":"Il veleno delle zanne non è particolarmente potente, ma è sufficiente a indebolire le prede intrappolate nella tela.","ja":"キバの どくは さほど つよくないが すに かかって うごけない えものを よわらせるには じゅうぶん。"},"h":5,"w":85},{"n":168,"ja":"アリアドス","r":"Ariados","en":"Ariados","es":"Ariados","fr":"Migalos","it":"Ariados","pt":"","g":2,"t":[7,4],"cat":{"en":"Long Leg Pokémon","es":"Pokémon Pata Larga","fr":"Pokémon Long-Patte","it":"Pokémon Lungazampa","ja":"あしながポケモン"},"desc":{"en":"It spews threads from its mouth to catch its prey. When night falls, it leaves its web to go hunt aggressively.","es":"Captura a sus presas con el hilo que segrega. Al caer la noche, abandona su tela y sale a cazar activamente.","fr":"Il capture ses proies en projetant un fil qu’il sécrète. À la nuit tombée, il quitte sa toile et part chasser activement.","it":"Intrappola la preda usando il filo che secerne dalla bocca. Quando scende la notte si allontana dalla tela per cacciare.","ja":"いとを はいて えものを とらえる。 よるに なると すから はなれて せっきょくてきに かりを するぞ。"},"h":11,"w":335},{"n":169,"ja":"クロバット","r":"Crobat","en":"Crobat","es":"Crobat","fr":"Nostenfer","it":"Crobat","pt":"","g":2,"t":[4,3],"cat":{"en":"Bat Pokémon","es":"Pokémon Murciélago","fr":"Pokémon Chovsouris","it":"Pokémon Pipistrello","ja":"こうもりポケモン"},"desc":{"en":"Its hind limbs have become another set of wings. Crobat expertly maneuvers its four wings to dart in exquisite fashion through even the most confined caves without losing any speed.","es":"Controla de forma independiente cada una de sus cuatro alas. Puede revolotear por cuevas estrechas sin aminorar la velocidad.","fr":"Il vole en contrôlant librement ses quatre ailes et peut se déplacer sans avoir besoin de ralentir, même dans les grottes étroites.","it":"Vola controllando indipendentemente le sue quattro ali. Non riduce la velocità nemmeno nelle caverne più anguste.","ja":"４まいの ハネを じざいに あやつり はばたく。 せまい どうくつでも スピードを おとさず とびまわれる。"},"h":18,"w":750},{"n":170,"ja":"チョンチー","r":"Chonchie","en":"Chinchou","es":"Chinchou","fr":"Loupio","it":"Chinchou","pt":"","g":2,"t":[11,13],"cat":{"en":"Angler Pokémon","es":"Pokémon Rape","fr":"Pokémon Poisson","it":"Pokémon Pescatore","ja":"あんこうポケモン"},"desc":{"en":"On the dark ocean floor, its only means of communication is its constantly flashing lights.","es":"En el oscuro fondo del océano, su único modo de comunicarse son las luces parpadeantes que emite por las antenas.","fr":"Au plus profond de l’océan, son seul moyen de communication est la lumière de ses antennes, qui clignotent constamment.","it":"Il suo unico mezzo di comunicazione negli oscuri fondali oceanici sono le luci delle sue antenne, che lampeggiano costantemente.","ja":"くらい かいていでは いつも てんめつ している しょくしゅの あかり だけが つうしんしゅだん。"},"h":5,"w":120},{"n":171,"ja":"ランターン","r":"Lantern","en":"Lanturn","es":"Lanturn","fr":"Lanturn","it":"Lanturn","pt":"","g":2,"t":[11,13],"cat":{"en":"Light Pokémon","es":"Pokémon Luz","fr":"Pokémon Lumière","it":"Pokémon Luce","ja":"ライトポケモン"},"desc":{"en":"This Pokémon flashes a bright light that blinds its prey. This creates an opening for it to deliver an electrical attack.","es":"Ciega a sus presas con una luz intensa. Si tiene la ocasión, les propina una descarga eléctrica.","fr":"Il dégage une vive lumière pour éblouir ses proies, puis leur inflige un choc électrique bien senti.","it":"Acceca la preda con una luce intensa per poi attaccarla immediatamente con una scossa elettrica.","ja":"つよい ひかりを はなち えものの めを くらませる。 スキが できたら でんげきを おみまいする。"},"h":12,"w":225},{"n":172,"ja":"ピチュー","r":"Pichu","en":"Pichu","es":"Pichu","fr":"Pichu","it":"Pichu","pt":"","g":2,"t":[13],"cat":{"en":"Tiny Mouse Pokémon","es":"Pokémon Ratoncito","fr":"Pokémon Minisouris","it":"Pokémon Topino","ja":"こねずみポケモン"},"desc":{"en":"Pichu stores electricity in the sacs on its cheeks but discharges it inadvertently when agitated or excited. Being yet immature, the Pokémon's handling of electricity is rather inept.","es":"Las bolsas de electricidad de sus mejillas son muy pequeñas y, a poco que se desborden, recibe una fuerte descarga.","fr":"Les poches électriques de ses joues sont très petites. Lorsqu’elles sont surchargées, il s’électrocute lui-même.","it":"Le sacche elettriche sulle sue guance sono molto piccole e, se fuoriesce anche solo un po’ di elettricità, resta fulminato.","ja":"ほほの でんきぶくろは ちいさく ちょっとでも でんきが あふれると じぶんじしんが しびれてしまう。"},"h":3,"w":20},{"n":173,"ja":"ピィ","r":"Py","en":"Cleffa","es":"Cleffa","fr":"Mélo","it":"Cleffa","pt":"","g":2,"t":[18],"cat":{"en":"Star Shape Pokémon","es":"Pokémon Estrella","fr":"Pokémon Étoile","it":"Pokémon Stella","ja":"ほしがたポケモン"},"desc":{"en":"In silhouette, they resemble twinkling starlight. When shooting stars rain from the night sky, Cleffa gather in numbers and dance as though they are indeed incarnations of the stars.","es":"Por su inusual forma estrellada, la gente cree que procede de un meteorito que cayó a la tierra.","fr":"Il ressemble un peu à une étoile. On suppose qu’il est venu sur terre accroché à une météorite.","it":"Per il suo aspetto bizzarro, che ricorda una stella, c’è chi crede che provenga da una stella cadente.","ja":"おほしさまのような シルエット。 そのすがたから ながれぼしにのって やってくると しんじられている。"},"h":3,"w":30},{"n":174,"ja":"ププリン","r":"Pupurin","en":"Igglybuff","es":"Igglybuff","fr":"Toudoudou","it":"Igglybuff","pt":"","g":2,"t":[1,18],"cat":{"en":"Balloon Pokémon","es":"Pokémon Globo","fr":"Pokémon Bouboule","it":"Pokémon Pallone","ja":"ふうせんポケモン"},"desc":{"en":"Taking advantage of the softness of its body, Igglybuff moves as if bouncing. Its body turns a deep pink when its temperature rises.","es":"Se desplaza dando botes con su cuerpo mullido. Cuando aumenta su temperatura corporal, se va poniendo de un color rosa cada vez más intenso.","fr":"Il se déplace en faisant rebondir son corps tout mou. Lorsque sa température corporelle augmente, il devient rose foncé.","it":"Si sposta facendo rimbalzare il suo corpo morbido. Quando la sua temperatura corporea si alza, si colora di un rosa intenso.","ja":"やわらかい からだで はずむように うごきまわる。 たいおんが あがると からだは こい ピンクいろに なる。"},"h":3,"w":10},{"n":175,"ja":"トゲピー","r":"Togepy","en":"Togepi","es":"Togepi","fr":"Togepi","it":"Togepi","pt":"","g":2,"t":[18],"cat":{"en":"Spike Ball Pokémon","es":"Pokémon Bolaclavos","fr":"Pokémon Balle Pic","it":"Pokémon Pallapunte","ja":"はりたまポケモン"},"desc":{"en":"This ovate creature is frequently mistaken for a moving egg when encountered out in the fields or in the mountains. Its guileless smile soothes the soul.","es":"Se lo considera un símbolo de buena suerte y, según se dice, su cascarón está lleno de alegría.","fr":"C’est un symbole de chance. On dit que sa coquille est remplie de joie.","it":"Viene considerato un simbolo di buona fortuna. Si dice che il suo guscio sia ricolmo di felicità.","ja":"こううんの シンボル。 カラの なかには しあわせが たくさん つまっている という。"},"h":3,"w":15},{"n":176,"ja":"トゲチック","r":"Togechick","en":"Togetic","es":"Togetic","fr":"Togetic","it":"Togetic","pt":"","g":2,"t":[18,3],"cat":{"en":"Happiness Pokémon","es":"Pokémon Felicidad","fr":"Pokémon Bonheur","it":"Pokémon Felicità","ja":"しあわせポケモン"},"desc":{"en":"No records exist of Togetic being seen in the wilds. Rumors abound that it evolves under the loving care of a trusted human companion, upon whom the Pokémon then bestows great joy.","es":"Si no está con gente amable, se entristece. Puede flotar en el aire sin mover las alas.","fr":"Ce Pokémon est capable de léviter sans battre des ailes. Il est vite démoralisé s’il n’est pas en compagnie de gens sympathiques.","it":"S’intristisce se non ha persone gentili al suo fianco. Può restare sospeso in aria senza dover muovere le ali.","ja":"やさしいひとの そばに いないと げんきが でなくなってしまう。 はねをうごかさずに そらにうかべる。"},"h":6,"w":32},{"n":177,"ja":"ネイティ","r":"Naty","en":"Natu","es":"Natu","fr":"Natu","it":"Natu","pt":"","g":2,"t":[14,3],"cat":{"en":"Tiny Bird Pokémon","es":"Pokémon Pajarito","fr":"Pokémon Minoiseau","it":"Pokémon Uccellino","ja":"ことりポケモン"},"desc":{"en":"Because its wings aren’t yet fully grown, it has to hop to get around. It is always staring at something.","es":"Se desplaza dando saltitos porque sus alas no han crecido lo suficiente. Siempre está mirando algo fijamente.","fr":"Ses ailes ne sont pas assez développées donc il ne peut se déplacer qu’en sautillant. Il fixe toujours quelque chose du regard.","it":"Poiché le sue ali non sono ancora ben sviluppate, è costretto ad andarsene in giro saltellando. Sembra sempre intento a fissare qualcosa.","ja":"はねが そだちきって おらず とびはねるようにして いどうする。 いつも なにかを みつめている。"},"h":2,"w":20},{"n":178,"ja":"ネイティオ","r":"Natio","en":"Xatu","es":"Xatu","fr":"Xatu","it":"Xatu","pt":"","g":2,"t":[14,3],"cat":{"en":"Mystic Pokémon","es":"Pokémon Místico","fr":"Pokémon Mystique","it":"Pokémon Magico","ja":"せいれいポケモン"},"desc":{"en":"This odd Pokémon can see both the past and the future. It eyes the sun’s movement all day.","es":"Este extraño Pokémon puede ver el pasado y el futuro. Se pasa el día mirando al sol.","fr":"Capable de voir le passé et l’avenir, ce Pokémon mystérieux consacre toutes ses journées à observer la course du soleil.","it":"Pokémon enigmatico che vede il passato e prevede il futuro osservando il sole tutto il giorno.","ja":"かこと みらいを みとおせる。 まいにち たいようの うごきを みつづけている ふしぎな ポケモン。"},"h":15,"w":150},{"n":179,"ja":"メリープ","r":"Merriep","en":"Mareep","es":"Mareep","fr":"Wattouat","it":"Mareep","pt":"","g":2,"t":[13],"cat":{"en":"Wool Pokémon","es":"Pokémon Lana","fr":"Pokémon Laine","it":"Pokémon Lana","ja":"わたげポケモン"},"desc":{"en":"Rubbing its fleece generates electricity. You’ll want to pet it because it’s cute, but if you use your bare hand, you’ll get a painful shock.","es":"Su lana acumula electricidad estática con la fricción. Al ser tan adorable, la gente se acerca para acariciarlo y se lleva un doloroso chispazo.","fr":"Il a beau être mignon, sa laine génère de l’électricité quand on la frotte. Tentez de le caresser, et il vous mettra vite au courant !","it":"La lana di Mareep genera elettricità se sfregata. Chi lo tocca a mani nude, tentato dal suo aspetto adorabile, riceve una dolorosa scossa.","ja":"わたげが こすれ でんきが たまる。 かわいいからと すでで さわると バチッと しびれて いたいのだ。"},"h":6,"w":78},{"n":180,"ja":"モココ","r":"Mokoko","en":"Flaaffy","es":"Flaaffy","fr":"Lainergie","it":"Flaaffy","pt":"","g":2,"t":[13],"cat":{"en":"Wool Pokémon","es":"Pokémon Lana","fr":"Pokémon Laine","it":"Pokémon Lana","ja":"わたげポケモン"},"desc":{"en":"It stores electricity in its fluffy fleece. If it stores up too much, it will start to go bald in those patches.","es":"Su lana sedosa acumula tanta electricidad que algunas partes de su cuerpo se han quedado desprovistas de pelo.","fr":"Il accumule de l’électricité dans sa toison duveteuse. Il en a tellement stocké qu’il en a perdu sa laine par endroits.","it":"Raccoglie elettricità nel soffice manto. Alcune parti del suo corpo sono diventate interamente glabre per la troppa elettricità immagazzinata.","ja":"ふかふかの けに でんきを ためこむ。 たくわえすぎて ところどころ つるつるに はげあがって しまった。"},"h":8,"w":133},{"n":181,"ja":"デンリュウ","r":"Denryu","en":"Ampharos","es":"Ampharos","fr":"Pharamp","it":"Ampharos","pt":"","g":2,"t":[13],"cat":{"en":"Light Pokémon","es":"Pokémon Luz","fr":"Pokémon Lumière","it":"Pokémon Luce","ja":"ライトポケモン"},"desc":{"en":"Its tail shines bright and strong. It has been prized since long ago as a beacon for sailors.","es":"Su cola emite un brillo claro e intenso. Se lo venera desde tiempos remotos como guía de los marineros.","fr":"Sa queue brille d’une lumière éclatante. Depuis des temps très anciens, il est vénéré comme le guide des marins.","it":"La punta della sua coda brilla di una luce molto intensa che in passato era una preziosa guida per i marinai.","ja":"シッポは つよく あかるく かがやく。 ふなのりたちの みちしるべ として むかしから たいせつに されてきた。"},"h":14,"w":615},{"n":182,"ja":"キレイハナ","r":"Kireihana","en":"Bellossom","es":"Bellossom","fr":"Joliflor","it":"Bellossom","pt":"","g":2,"t":[12],"cat":{"en":"Flower Pokémon","es":"Pokémon Flor","fr":"Pokémon Fleur","it":"Pokémon Fiore","ja":"フラワーポケモン"},"desc":{"en":"Bellossom gather at times and appear to dance. They say that the dance is a ritual to summon the sun.","es":"Los Bellossom se reúnen en ocasiones para ejecutar una especie de danza, considerada un ritual para invocar al sol.","fr":"Les Joliflor se réunissent parfois pour danser. On pense que c’est un rituel pour invoquer le soleil.","it":"A volte i Bellossom si riuniscono ed eseguono una specie di danza. Si dice che sia un rito per invocare il sole.","ja":"ときおり キレイハナが あつまって おどるような しぐさを みせる。 たいようをよぶ ぎしき といわれる。"},"h":4,"w":58},{"n":183,"ja":"マリル","r":"Maril","en":"Marill","es":"Marill","fr":"Marill","it":"Marill","pt":"","g":2,"t":[11,18],"cat":{"en":"Aqua Mouse Pokémon","es":"Pokémon Ratón Agua","fr":"Pokémon Aquasouris","it":"Pokémon Acquatopo","ja":"みずねずみポケモン"},"desc":{"en":"Even after Marill swims in a cold sea, its water- repellent fur dries almost as soon as Marill leaves the water. That’s why this Pokémon is never cold.","es":"Su pelaje repele el agua, lo que evita que pase frío al salir de mares gélidos porque se seca al momento.","fr":"Sa fourrure est hydrophobe, si bien qu’elle sèche en un instant. Il n’a donc jamais froid, même lorsqu’il sort d’une mer glaciale.","it":"Non soffre il freddo nemmeno quando emerge dai mari gelidi, grazie alla pelliccia idrorepellente che si asciuga subito.","ja":"よく みずを はじく たいもうは つめたい うみから あがったときでも すぐに かわいて さむくないのだ。"},"h":4,"w":85},{"n":184,"ja":"マリルリ","r":"Marilli","en":"Azumarill","es":"Azumarill","fr":"Azumarill","it":"Azumarill","pt":"","g":2,"t":[11,18],"cat":{"en":"Aqua Rabbit Pokémon","es":"Pokémon Conejo Agua","fr":"Pokémon Aqualapin","it":"Pokémon Acquniglio","ja":"みずうさぎポケモン"},"desc":{"en":"These Pokémon create air-filled bubbles. When Azurill play in rivers, Azumarill will cover them with these bubbles.","es":"Crea burbujas llenas de aire con las que cubre a los Azurill cuando juegan en el río.","fr":"Il crée des bulles d’air dont il enveloppe gentiment les Azurill venus jouer dans la rivière.","it":"Crea delle bolle d’aria con cui avvolge dolcemente gli Azurill che giocano nel fiume.","ja":"くうきが つまった あわを つくる。 ルリリが かわで あそぶときは この あわで つつんで あげるのだ。"},"h":8,"w":285},{"n":185,"ja":"ウソッキー","r":"Usokkie","en":"Sudowoodo","es":"Sudowoodo","fr":"Simularbre","it":"Sudowoodo","pt":"","g":2,"t":[6],"cat":{"en":"Imitation Pokémon","es":"Pokémon Imitación","fr":"Pokémon Imitation","it":"Pokémon Imitazione","ja":"まねポケモン"},"desc":{"en":"Though it pretends to be a tree, it fails to fool even children. To the touch, its body feels more like rock than tree bark. Sudowoodo's extreme aversion to water merits special note.","es":"Finge ser un árbol para evitar que lo ataquen. Odia tanto el agua que desaparecerá si empieza a llover.","fr":"Il se déguise en arbre pour éviter de se faire attaquer. Il déteste l’eau et se cache par temps de pluie.","it":"Fa finta di essere un albero per evitare di essere attaccato. Poiché odia l’acqua, scompare appena inizia a piovere.","ja":"おそわれないように きのまねをする。 みずがにがてで あめが ふりだすと いつのまにか すがたを けす。"},"h":12,"w":380},{"n":186,"ja":"ニョロトノ","r":"Nyorotono","en":"Politoed","es":"Politoed","fr":"Tarpaud","it":"Politoed","pt":"","g":2,"t":[11],"cat":{"en":"Frog Pokémon","es":"Pokémon Rana","fr":"Pokémon Grenouille","it":"Pokémon Rana","ja":"かえるポケモン"},"desc":{"en":"The cry of a male is louder than that of a female. Male Politoed with deep, menacing voices find more popularity with the opposite gender.","es":"Los machos emiten gritos muy potentes. Las hembras sienten predilección por los de voz grave e imponente.","fr":"Le cri des mâles est plus puissant que celui des femelles, qui préfèrent les voix fortes et intimidantes.","it":"Il gracidio del maschio è più forte. I Politoed con un verso basso e minaccioso sono molto apprezzati dalle femmine.","ja":"オスのほうが なきごえが おおきい。 ひくく すごみのある こえで なく ニョロトノが メスに すかれる。"},"h":11,"w":339},{"n":187,"ja":"ハネッコ","r":"Hanecco","en":"Hoppip","es":"Hoppip","fr":"Granivol","it":"Hoppip","pt":"","g":2,"t":[12,3],"cat":{"en":"Cottonweed Pokémon","es":"Pokémon Algadón","fr":"Pokémon Pissenlit","it":"Pokémon Gramigna","ja":"わたくさポケモン"},"desc":{"en":"This Pokémon drifts and floats with the wind. If it senses the approach of strong winds, Hoppip links its leaves with other Hoppip to prepare against being blown away.","es":"Este Pokémon flota en el aire y se deja llevar. Cuando percibe que el viento va a cambiar a fuerte, Hoppip entrelaza sus hojas con otros Hoppip para hacer resistencia y evitar salir volando por la fuerza de la corriente.","fr":"Ce Pokémon flotte à la dérive, porté par le vent. S’il sent qu’un vent très fort approche, Granivol attache ses feuilles aux autres Granivol pour ne pas être emporté par la bourrasque.","it":"Hoppip fluttua nell’aria trasportato dal vento. Se percepisce l’avvicinarsi di una forte corrente, Hoppip unisce le foglie con quelle dei suoi simili per non essere spazzato via.","ja":"かぜに のって ふわふわ ただよう ポケモン。 きょうふうの けはいを かんじると なかまどうし はっぱを からめ とばされない じゅんびをする。"},"h":4,"w":5},{"n":188,"ja":"ポポッコ","r":"Popocco","en":"Skiploom","es":"Skiploom","fr":"Floravol","it":"Skiploom","pt":"","g":2,"t":[12,3],"cat":{"en":"Cottonweed Pokémon","es":"Pokémon Algadón","fr":"Pokémon Pissenlit","it":"Pokémon Gramigna","ja":"わたくさポケモン"},"desc":{"en":"Skiploom’s flower blossoms when the temperature rises above 64 degrees Fahrenheit. How much the flower opens depends on the temperature. For that reason, this Pokémon is sometimes used as a thermometer.","es":"Skiploom florece cuando la temperatura llega a 18 °C. La apertura de los pétalos varía según la temperatura que haga. Por este motivo, la gente lo usa a veces a modo de termómetro.","fr":"La fleur de Floravol éclot lorsque la température atteint 18 °C. L’ouverture de la fleur change en fonction de la température. Certaines personnes se servent de ce Pokémon comme d’un thermomètre.","it":"Il fiore di Skiploom sboccia quando la temperatura sale oltre i 18 °C. L’apertura del fiore dipende dalla temperatura. Per questo motivo il Pokémon è usato anche come termometro.","ja":"きおんが １８どを こえると はなが ひらく。 おんどに より はなの ひらきかたが かわるので おんどけいの かわりに することも ある。"},"h":6,"w":10},{"n":189,"ja":"ワタッコ","r":"Watacco","en":"Jumpluff","es":"Jumpluff","fr":"Cotovol","it":"Jumpluff","pt":"","g":2,"t":[12,3],"cat":{"en":"Cottonweed Pokémon","es":"Pokémon Algadón","fr":"Pokémon Pissenlit","it":"Pokémon Gramigna","ja":"わたくさポケモン"},"desc":{"en":"Jumpluff rides warm southern winds to cross the sea and fly to foreign lands. The Pokémon descends to the ground when it encounters cold air while it is floating.","es":"Jumpluff se vale de los cálidos vientos del sur para volar a tierras lejanas. Si llega a zonas de aire frío en pleno vuelo, descenderá y tomará tierra.","fr":"Cotovol traverse la mer, porté par les vents, pour découvrir de nouveaux territoires. Ce Pokémon se rapproche du sol quand le vent est trop froid.","it":"Jumpluff si affida alle correnti d’aria calda per attraversare il mare e volare verso terre lontane. Questo Pokémon ridiscende a terra quando incontra una corrente fredda mentre fluttua.","ja":"あたたかい みなみかぜに のって うみを こえ がいこくまで とんでいってしまう ポケモン。 つめたい くうきに ふれると じめんに おりる。"},"h":8,"w":30},{"n":190,"ja":"エイパム","r":"Eipam","en":"Aipom","es":"Aipom","fr":"Capumain","it":"Aipom","pt":"","g":2,"t":[1],"cat":{"en":"Long Tail Pokémon","es":"Pokémon Cola Larga","fr":"Pokémon Longqueue","it":"Pokémon Lungacoda","ja":"おながポケモン"},"desc":{"en":"This treetop dweller possesses a tail as dexterous as a hand. Ancient writings describe this Pokémon as a one-armed oddity.","es":"Sube a las copas de los árboles para buscar presas. Si encuentra un Bounsweet, su manjar predilecto, se alboroza y se abalanza sobre él.","fr":"Il guette ses proies depuis la cime des arbres. Quand il aperçoit un Croquine, son mets préféré, il se jette dessus.","it":"Individua le prede dalla cima degli alberi. Appena avvista un Bounsweet, di cui è ghiotto, gli balza addosso preso dall’entusiasmo.","ja":"きの うえから えものが いないか さがす。 こうぶつの アマカジを みると こうふんして とびかかるぞ。"},"h":8,"w":115},{"n":191,"ja":"ヒマナッツ","r":"Himanuts","en":"Sunkern","es":"Sunkern","fr":"Tournegrin","it":"Sunkern","pt":"","g":2,"t":[12],"cat":{"en":"Seed Pokémon","es":"Pokémon Semilla","fr":"Pokémon Graine","it":"Pokémon Seme","ja":"たねポケモン"},"desc":{"en":"Sunkern tries to move as little as it possibly can. It does so because it tries to conserve all the nutrients it has stored in its body for its evolution. It will not eat a thing, subsisting only on morning dew.","es":"Sunkern intenta moverse lo menos posible para conservar todos los nutrientes que ha guardado en su interior y poder evolucionar. Ni come siquiera; se alimenta solo del rocío de la mañana.","fr":"Tournegrin essaie de bouger le moins possible. C’est parce qu’il veut conserver tous les nutriments qu’il stocke dans son corps pour son évolution. Il ne mange pas, ne subsistant que grâce à la rosée matinale.","it":"Sunkern cerca di muoversi il meno possibile per preservare le sostanze nutritive che ha immagazzinato nel corpo per la sua evoluzione. Non mangia nulla, si nutre solo di rugiada mattutina.","ja":"からだに ためた えいようは しんかの ときまで とっておくため ほとんど うごこうとしない。 なにも たべずに あさつゆ だけを のんでいる。"},"h":3,"w":18},{"n":192,"ja":"キマワリ","r":"Kimawari","en":"Sunflora","es":"Sunflora","fr":"Héliatronc","it":"Sunflora","pt":"","g":2,"t":[12],"cat":{"en":"Sun Pokémon","es":"Pokémon Sol","fr":"Pokémon Soleil","it":"Pokémon Sole","ja":"たいようポケモン"},"desc":{"en":"Sunflora converts solar energy into nutrition. It moves around actively in the daytime when it is warm. It stops moving as soon as the sun goes down for the night.","es":"Sunflora transforma la energía solar en nutrientes. De día, cuando hace calor, está en continuo movimiento. Solo para cuando comienza a anochecer.","fr":"Héliatronc convertit l’énergie solaire en nutriments. Il remue activement pendant la journée, quand il fait chaud. Il redevient immobile dès que le soleil se couche.","it":"Sunflora converte l’energia solare in nutrimento. È attivo durante il giorno quando fa caldo. Tuttavia, appena il sole tramonta non fa più il minimo movimento.","ja":"たいようエネルギーから えいようを つくりだす。 きおんの たかい にっちゅう かっぱつに うごき たいようが しずむと ぱったり うごかなくなる。"},"h":8,"w":85},{"n":193,"ja":"ヤンヤンマ","r":"Yanyanma","en":"Yanma","es":"Yanma","fr":"Yanma","it":"Yanma","pt":"","g":2,"t":[7,3],"cat":{"en":"Clear Wing Pokémon","es":"Pokémon Ala Clara","fr":"Pokémon Translaile","it":"Pokémon Alachiara","ja":"うすばねポケモン"},"desc":{"en":"Its frail wings are so thin that one can see clear through them. However, during flight these wings exhibit the power to churn air with force enough to launch a house skyward.","es":"Yanma tiene un ángulo de visión de 360° sin mover los ojos. Es un gran volador, experto en hacer repentinas paradas y cambios de dirección en el aire. Aprovecha la habilidad que tiene de volar para lanzarse sobre su presa.","fr":"Yanma a un champ de vision de 360 degrés sans avoir besoin de bouger les yeux. Il vole incroyablement bien et peut faire des figures acrobatiques. Ce Pokémon descend en piqué sur ses proies.","it":"Yanma è dotato di un campo visivo a 360 gradi senza bisogno di muovere gli occhi. Grazie alle grandi ali riesce a fermarsi improvvisamente e virare a mezz’aria. Sfrutta la sua abilità in volo per abbattere la preda al suolo.","ja":"めだまを うごかさずに ３６０ど みわたせる。 きゅうブレーキや ほうこうてんかんが とくい。 ねらった えものを すばやく おいつめていく。"},"h":12,"w":380},{"n":194,"ja":"ウパー","r":"Upah","en":"Wooper","es":"Wooper","fr":"Axoloto","it":"Wooper","pt":"","g":2,"t":[11,5],"cat":{"en":"Water Fish Pokémon","es":"Pokémon Pez Agua","fr":"Pokémon Poisson","it":"Pokémon Acquapesce","ja":"みずうおポケモン"},"desc":{"en":"When walking on land, it covers its body with a poisonous film that keeps its skin from dehydrating.","es":"Cuando se desplaza en tierra firme, cubre su cuerpo con una membrana mucosa y venenosa para mantener hidratada la piel.","fr":"Lorsqu’il est sur la terre ferme, il couvre son corps d’un voile toxique qui le protège de la déshydratation.","it":"Quando si avventura sulla terraferma, ricopre il suo corpo di una sostanza velenosa che lo mantiene idratato.","ja":"ちじょうを あるくときは ひふが かんそう しないように どくの ねんまくで からだを おおっている。"},"h":4,"w":85},{"n":195,"ja":"ヌオー","r":"Nuoh","en":"Quagsire","es":"Quagsire","fr":"Maraiste","it":"Quagsire","pt":"","g":2,"t":[11,5],"cat":{"en":"Water Fish Pokémon","es":"Pokémon Pez Agua","fr":"Pokémon Poisson","it":"Pokémon Acquapesce","ja":"みずうおポケモン"},"desc":{"en":"Its body is always slimy. It often bangs its head on the river bottom as it swims but seems not to care.","es":"Su cuerpo siempre resulta escurridizo al tacto. Suele chocarse contra el lecho del río al nadar, pero no le importa demasiado.","fr":"Il est toujours gluant. Quand il nage, il se cogne souvent la tête au fond des rivières, mais semble s’en moquer.","it":"Ha un corpo molto viscido. Spesso, nuotando, sbatte la testa sul letto dei fiumi, ma non se ne preoccupa.","ja":"からだは いつも ぬめっている。 およぐたびに かわぞこに あたまを ぶつけているが きに していない。"},"h":14,"w":750},{"n":196,"ja":"エーフィ","r":"Eifie","en":"Espeon","es":"Espeon","fr":"Mentali","it":"Espeon","pt":"","g":2,"t":[14],"cat":{"en":"Sun Pokémon","es":"Pokémon Sol","fr":"Pokémon Soleil","it":"Pokémon Sole","ja":"たいようポケモン"},"desc":{"en":"Wields an arcane power with which it can predict the weather and even people's thoughts. When bathed in sunshine, the scarlet orb on its brow glows and builds energy.","es":"Lucha con los poderes psíquicos que brotan de la esfera de su frente, que se oscurece cuando su energía disminuye.","fr":"Le joyau sur le front de Mentali projette des ondes psychiques en combat, et s’obscurcit quand il est à bout de force.","it":"Lotta emettendo poteri psichici dalla sfera che ha sulla fronte, che diventa più scura man mano che le sue energie diminuiscono.","ja":"ひたいの たまから サイコパワーを ほうしゃして たたかう。 パワーが つきると たまの いろが くすむ。"},"h":9,"w":265},{"n":197,"ja":"ブラッキー","r":"Blacky","en":"Umbreon","es":"Umbreon","fr":"Noctali","it":"Umbreon","pt":"","g":2,"t":[17],"cat":{"en":"Moonlight Pokémon","es":"Pokémon Luz Lunar","fr":"Pokémon Lune","it":"Pokémon Lucelunare","ja":"げっこうポケモン"},"desc":{"en":"It is most active in the wee hours of the night, when moonlight bathes the land. Its large eyes can pierce the darkness and perceive prey with absolute clarity.","es":"En las noches de luna llena, o cuando se exalta, le empiezan a brillar los anillos de color dorado.","fr":"Les nuits de pleine lune, ou s’il est agité, les anneaux sur sa peau se mettent à briller.","it":"I cerchi sul corpo emettono un bagliore giallo quando è agitato o nelle notti di luna piena.","ja":"まんげつの よるや こうふん したとき ぜんしんの わっかもようは きいろく ひかる。"},"h":10,"w":270},{"n":198,"ja":"ヤミカラス","r":"Yamikarasu","en":"Murkrow","es":"Murkrow","fr":"Cornèbre","it":"Murkrow","pt":"","g":2,"t":[17,3],"cat":{"en":"Darkness Pokémon","es":"Pokémon Oscuridad","fr":"Pokémon Obscurité","it":"Pokémon Oscurità","ja":"くらやみポケモン"},"desc":{"en":"Widely shunned as a bearer of ill fortune. Upon crossing paths with this creature, I've been told one must chant ”Workrum, Workrum—bad luck, don't come” as a protective incantation.","es":"Busca objetos brillantes para su patrón. No cuenta con muchas simpatías, pues la gente lo considera ave de mal agüero.","fr":"Il cherche des objets brillants pour son chef. Sa réputation d’oiseau de mauvais augure lui vaut la haine de nombreuses personnes.","it":"Va in cerca di oggetti luccicanti per il suo capo. Molti lo temono e lo detestano credendo che porti sfortuna.","ja":"ボスのために キラキラ ひかるものを さがしている。 ふきつな そんざいと いわれ いみきらう ひとも おおい。"},"h":5,"w":21},{"n":199,"ja":"ヤドキング","r":"Yadoking","en":"Slowking","es":"Slowking","fr":"Roigada","it":"Slowking","pt":"","g":2,"t":[11,14],"cat":{"en":"Royal Pokémon","es":"Pokémon Regio","fr":"Pokémon Royal","it":"Pokémon Reale","ja":"おうじゃポケモン"},"desc":{"en":"Slowking can solve any problem presented to it, but no one can understand a thing Slowking says.","es":"Es capaz de dar respuesta a cualquier cuestión que se le formule, pero, por desgracia, nadie logra descifrar una sola palabra de lo que dice.","fr":"Il est capable de résoudre tous les problèmes qu’on lui présente, mais personne ne parvient à comprendre ce qu’il dit.","it":"È in grado di risolvere qualsiasi problema gli venga sottoposto, ma nessuno riesce a comprendere le sue parole.","ja":"たずねれば どんな なんだいでも かいけつしてくれるが ヤドキングの ことばは だれも りかいできない。"},"h":20,"w":795},{"n":200,"ja":"ムウマ","r":"Muma","en":"Misdreavus","es":"Misdreavus","fr":"Feuforêve","it":"Misdreavus","pt":"","g":2,"t":[8],"cat":{"en":"Screech Pokémon","es":"Pokémon Chirrido","fr":"Pokémon Strident","it":"Pokémon Strido","ja":"よなきポケモン"},"desc":{"en":"It conceals itself in darkness, sending chills up travelers' spines with its childlike weeping. As it observes the frightened travelers with glee, the red orbs upon its chest let off an eerie light.","es":"Disfruta imitando llantos humanos para asustar a la gente. Los valientes no le caen demasiado bien.","fr":"Il adore faire peur aux humains en imitant leurs pleurs, et n’apprécie guère ceux qui ne se laissent pas intimider.","it":"Si diverte a seminare il terrore imitando le grida e i lamenti degli esseri umani. Non ha vita facile con chi non si lascia intimidire.","ja":"ひとが なきさけぶ こえを まねて みんなを おびえさせ よろこぶ。 きもが すわった あいては にがて。"},"h":7,"w":10},{"n":201,"ja":"アンノーン","r":"Unknown","en":"Unown","es":"Unown","fr":"Zarbi","it":"Unown","pt":"","g":2,"t":[14],"cat":{"en":"Symbol Pokémon","es":"Pokémon Símbolo","fr":"Pokémon Symbolique","it":"Pokémon Simbolo","ja":"シンボルポケモン"},"desc":{"en":"It is hard to believe these strangely shaped Pokémon are truly living creatures. I've pointed out that the species' many forms resemble writing from other lands; no one will take me seriously.","es":"Estos Pokémon tienen forma de caracteres antiguos. No se sabe qué surgió primero, si la vieja escritura o los distintos Unown. Esta cuestión sigue siendo objeto de estudio, pero aún no se ha averiguado nada.","fr":"Ce Pokémon a la forme d’un caractère d’écriture antique. Personne ne sait si ces écritures antiques sont apparues avant les Zarbi ou le contraire. Des études sont en cours, mais aucun résultat n’a été annoncé.","it":"Questo Pokémon pare una lettera di un alfabeto antico. A tutt’oggi rimane un mistero chi sia comparso prima, se l’alfabeto o Unown. Sono in corso ricerche in merito ma non si sa ancora praticamente nulla.","ja":"こだいの もじに にた すがたの ポケモン。 さきに うまれたのは もじか アンノーンなのか。 けんきゅうちゅうだが いまだに なぞである。"},"h":5,"w":50},{"n":202,"ja":"ソーナンス","r":"Sonans","en":"Wobbuffet","es":"Wobbuffet","fr":"Qulbutoké","it":"Wobbuffet","pt":"","g":2,"t":[14],"cat":{"en":"Patient Pokémon","es":"Pokémon Paciente","fr":"Pokémon Patient","it":"Pokémon Pazienza","ja":"がまんポケモン"},"desc":{"en":"To keep its pitch-black tail hidden, it lives quietly in the darkness. It is never first to attack.","es":"Para mantener oculta su negra cola, vive en silencio en la oscuridad. Nunca ataca primero.","fr":"Il vit discrètement dans l’obscurité pour cacher sa queue noire. Il n’attaque jamais en premier.","it":"Vive nel silenzio e nell’oscurità per nascondere la coda nera come la pece. Non attacca mai per primo.","ja":"まっくろな シッポを かくすため くらやみで ひっそりと いきている。 じぶんからは こうげき しない。"},"h":13,"w":285},{"n":203,"ja":"キリンリキ","r":"Kirinriki","en":"Girafarig","es":"Girafarig","fr":"Girafarig","it":"Girafarig","pt":"","g":2,"t":[1,14],"cat":{"en":"Long Neck Pokémon","es":"Pokémon Gran Cuello","fr":"Pokémon Long-Cou","it":"Pokémon Lungocollo","ja":"くびながポケモン"},"desc":{"en":"Girafarig’s rear head contains a tiny brain that is too small for thinking. However, the rear head doesn’t need to sleep, so it can keep watch over its surroundings 24 hours a day.","es":"La cabeza trasera de Girafarig tiene un cerebro muy pequeño para pensar, pero, como no le hace falta dormir, al menos puede hacer de centinela las 24 horas del día.","fr":"La tête à l’arrière de Girafarig abrite un cerveau trop petit pour penser. En revanche, cette tête arrière n’a pas besoin de dormir, ce qui lui permet de monter la garde tout le temps.","it":"La testa posteriore di Girafarig contiene un cervello minuto, troppo piccolo per pensare. Tuttavia, questa testolina non dorme mai, così può rimanere di sorveglianza 24 ore su 24.","ja":"しっぽの のうは かんがえごとが できないほど ちいさいけど ねむらなくても へいき なので ２４じかん あたりを みはりつづけて いるぞ。"},"h":15,"w":415},{"n":204,"ja":"クヌギダマ","r":"Kunugidama","en":"Pineco","es":"Pineco","fr":"Pomdepik","it":"Pineco","pt":"","g":2,"t":[7],"cat":{"en":"Bagworm Pokémon","es":"Pokémon Larva","fr":"Pokémon Ver Caché","it":"Pokémon Larva","ja":"みのむしポケモン"},"desc":{"en":"It sticks tree bark to itself with its saliva, making itself thicker and larger. Elderly Pineco are ridiculously huge.","es":"Usa saliva para adherir corteza de árbol a su cuerpo y así aumentar de volumen. Con la edad puede alcanzar un tamaño gigantesco.","fr":"Il grandit en utilisant sa salive pour coller l’écorce des arbres sur son corps. Un Pomdepik âgé peut prendre des proportions démesurées.","it":"Aumenta di dimensioni e spessore incollandosi addosso strati di corteccia con la saliva. Con il tempo può raggiungere dimensioni spropositate.","ja":"きのかわを だえきで はりあわせ あつく おおきくしていく。 としおいた クヌギダマは とてつもない でかさ。"},"h":6,"w":72},{"n":205,"ja":"フォレトス","r":"Foretos","en":"Forretress","es":"Forretress","fr":"Foretress","it":"Forretress","pt":"","g":2,"t":[7,9],"cat":{"en":"Bagworm Pokémon","es":"Pokémon Larva","fr":"Pokémon Ver Caché","it":"Pokémon Larva","ja":"みのむしポケモン"},"desc":{"en":"In the moment that it gulps down its prey, the inside of its shell is exposed, but to this day, no one has ever seen that sight.","es":"El momento en el que engulle a su presa es el único instante donde muestra su cuerpo, pero hasta ahora ningún humano lo ha visto.","fr":"On ne peut voir l’intérieur de sa carapace que lorsqu’il engloutit sa nourriture, mais il est si rapide que personne n’a encore jamais réussi.","it":"L’istante in cui ingoia la preda è l’unico momento in cui è possibile sbirciare nella sua conchiglia. Nessuno sa esattamente come sia fatto.","ja":"えものを のみこむ いっしゅんだけ カラの なかみが あらわれるが その すがたを みたものは まだいない。"},"h":12,"w":1258},{"n":206,"ja":"ノコッチ","r":"Nokocchi","en":"Dunsparce","es":"Dunsparce","fr":"Insolourdo","it":"Dunsparce","pt":"","g":2,"t":[1],"cat":{"en":"Land Snake Pokémon","es":"Pokémon Serpiente Tierra","fr":"Pokémon Serpent","it":"Pokémon Terraserpe","ja":"つちへびポケモン"},"desc":{"en":"The nests Dunsparce live in are mazes of tunnels. They never get lost in their own nests—they can tell where they are by the scent of the dirt.","es":"Habita en madrigueras laberínticas. Gracias a su capacidad para ubicarse por el olor de la tierra que lo rodea, nunca se pierde.","fr":"Bien que son nid ressemble à un labyrinthe, il ne s’y perd jamais, car il se repère grâce à l’odeur de la terre.","it":"Costruisce tane simili a labirinti, ma poiché riesce a capire dove si trova in base all’odore del terreno non si smarrisce mai.","ja":"めいろのような すあなが すみか。 つちの においで じぶんの ばしょが わかるので ぜったいに まよわない。"},"h":15,"w":140},{"n":207,"ja":"グライガー","r":"Gliger","en":"Gligar","es":"Gligar","fr":"Scorplane","it":"Gligar","pt":"","g":2,"t":[5,3],"cat":{"en":"Fly Scorpion Pokémon","es":"Pokémon Escorpiala","fr":"Pokémon Scorpivol","it":"Pokémon Aliscorpio","ja":"とびさそりポケモン"},"desc":{"en":"Its tail is tipped by a thick, horrible stinger. To bring down prey, it will first obscure their vision by covering their faces with its body, and then it will use the stinger to inject them with venom.","es":"Gligar planea por el aire sin hacer ningún ruido, como si fuera patinando. Este Pokémon se agarra a la cara de su rival con las patas traseras, con forma de garra, y las pinzas de las delanteras y le inyecta veneno por el aguijón.","fr":"Scorplane plane dans les airs sans un bruit, comme s’il glissait. Ce Pokémon s’accroche au visage de son ennemi grâce aux serres de ses pattes arrière et aux pinces de ses pattes avant, et pique avec son dard empoisonné.","it":"Gligar fende l’aria impercettibilmente come se stesse scivolando. Questo Pokémon si aggrappa al viso del nemico usando le zampe posteriori artigliate e le possenti chele sulle zampe anteriori, poi avvelena la preda con il suo aculeo.","ja":"おとを たてず すべる ように かっくうする。 りょううでの おおきな ツメと あしの ツメで えものの かおに しがみつき どくばりを さす。"},"h":11,"w":648},{"n":208,"ja":"ハガネール","r":"Haganeil","en":"Steelix","es":"Steelix","fr":"Steelix","it":"Steelix","pt":"","g":2,"t":[9,5],"cat":{"en":"Iron Snake Pokémon","es":"Pokémon Serpiente Férrea","fr":"Pokémon Serpenfer","it":"Pokémon Ferroserpe","ja":"てつへびポケモン"},"desc":{"en":"This Pokémon evolved through use of a strange item. Its body is coated with steel powder and notably hard—not even diamond can leave so much as a scratch.","es":"Se cree que su cuerpo se ha ido transformando por el hierro acumulado en la tierra que ha ingerido.","fr":"On pense que son corps s’est transformé à force d’avaler le fer contenu dans la terre en creusant.","it":"Si pensa che si sia trasformato a causa del ferro contenuto nella terra che mangia.","ja":"つちと いっしょに のみこんだ てつぶんが たまっていって からだが へんかしたとも かんがえられる。"},"h":92,"w":4000},{"n":209,"ja":"ブルー","r":"Bulu","en":"Snubbull","es":"Snubbull","fr":"Snubbull","it":"Snubbull","pt":"","g":2,"t":[18],"cat":{"en":"Fairy Pokémon","es":"Pokémon Hada","fr":"Pokémon Fée","it":"Pokémon Fata","ja":"ようせいポケモン"},"desc":{"en":"In contrast to its appearance, it’s quite timid. When playing with other puppy Pokémon, it sometimes gets bullied.","es":"A pesar de su aspecto, es muy tímido y afable. A menudo es objeto de burla cuando se junta con Pokémon Perrito.","fr":"Malgré les apparences, c’est un grand timide qui fait souvent l’objet de railleries quand il se trouve au milieu d’un groupe de Pokémon Chiot.","it":"Nonostante il suo aspetto, è piuttosto timido. Quando si ritrova in mezzo a dei Pokémon Cagnolino, tutti lo prendono in giro.","ja":"みためと ちがって おくびょうなので ほかの こいぬポケモンと いっしょに すると いじめられることも ある。"},"h":6,"w":78},{"n":210,"ja":"グランブル","r":"Granbulu","en":"Granbull","es":"Granbull","fr":"Granbull","it":"Granbull","pt":"","g":2,"t":[18],"cat":{"en":"Fairy Pokémon","es":"Pokémon Hada","fr":"Pokémon Fée","it":"Pokémon Fata","ja":"ようせいポケモン"},"desc":{"en":"Although it’s popular with young people, Granbull is timid and sensitive, so it’s totally incompetent as a watchdog.","es":"Es muy popular entre la gente joven, pero su personalidad afable y algo miedosa hacen de él un pésimo guardián.","fr":"Les jeunes gens en sont fous, mais sa timidité et sa grande délicatesse en font un piètre Pokémon de garde.","it":"Piace moltissimo ai giovani. Di indole timida e delicata, non è adatto a fare la guardia.","ja":"わかい じょせいに だいにんきだが おくびょうなうえに せんさいなので ばんけん としては むのうだ。"},"h":14,"w":487},{"n":211,"ja":"ハリーセン","r":"Harysen","en":"Qwilfish","es":"Qwilfish","fr":"Qwilfish","it":"Qwilfish","pt":"","g":2,"t":[11,4],"cat":{"en":"Balloon Pokémon","es":"Pokémon Globo","fr":"Pokémon Bouboule","it":"Pokémon Pallone","ja":"ふうせんポケモン"},"desc":{"en":"Fishers detest this troublesome Pokémon because it sprays poison from its spines, getting it everywhere. A different form of Qwilfish lives in other regions.","es":"Las pequeñas púas que cubren su cuerpo eran escamas. Inyectan una toxina que hace perder el conocimiento.","fr":"Ses petites épines étaient autrefois des écailles. Elles sécrètent des toxines pouvant faire perdre connaissance.","it":"I piccoli aculei che coprono il suo corpo si sono formati dalle squame. Contengono una tossina che fa svenire.","ja":"ぜんしんの ちいさな ハリは うろこが へんかしたもの。 ささると どくで きをうしなう。"},"h":5,"w":39},{"n":212,"ja":"ハッサム","r":"Hassam","en":"Scizor","es":"Scizor","fr":"Cizayox","it":"Scizor","pt":"","g":2,"t":[7,9],"cat":{"en":"Pincer Pokémon","es":"Pokémon Tenaza","fr":"Pokémon Pince","it":"Pokémon Chela","ja":"はさみポケモン"},"desc":{"en":"Evolved by way of a curious item. The shell covering its body has been shown to be stronger than forged steel.","es":"Su potencia de ataque, que asombra dada su delgadez, se debe a que sus músculos están hechos de metal.","fr":"Malgré son corps fin, sa puissance de frappe est prodigieuse, car même ses muscles sont composés de métal.","it":"Nonostante il corpo esile, è dotato di capacità offensive spaventose. Persino i suoi muscoli sono formati da metallo.","ja":"からだは ほそいが こうげきりょくは すさまじい。 からだの きんにくも きんぞくで できているのだ。"},"h":18,"w":1180},{"n":213,"ja":"ツボツボ","r":"Tsubotsubo","en":"Shuckle","es":"Shuckle","fr":"Caratroc","it":"Shuckle","pt":"","g":2,"t":[7,6],"cat":{"en":"Mold Pokémon","es":"Pokémon Moho","fr":"Pokémon Pourri","it":"Pokémon Muffa","ja":"はっこうポケモン"},"desc":{"en":"The berries stored in its vaselike shell eventually become a thick, pulpy juice.","es":"Las bayas que almacena en su caparazón con forma de vasija se convierten al final en un espeso zumo.","fr":"Les Baies qu’il conserve dans sa carapace en forme d’urne se changent en jus onctueux après un certa anti dove questo Pokémon nasconde le proprie scorte di cibo. Ogni giorno si aggira nella foresta alla ricerca di alimenti.","ja":"もりの なかには リングマが エサあつめを する たいぼくや おがわが あちこちに あると いう。 まいにち エサを あつめて もりを あるく。"},"h":18,"w":1258},{"n":218,"ja":"マグマッグ","r":"Magmag","en":"Slugma","es":"Slugma","fr":"Limagma","it":"Slugma","pt":"","g":2,"t":[10],"cat":{"en":"Lava Pokémon","es":"Pokémon Lava","fr":"Pokémon Lave","it":"Pokémon Lava","ja":"ようがんポケモン"},"desc":{"en":"Slugma does not have any blood in its body. Instead, intensely hot magma circulates throughout this Pokémon’s body, carrying essential nutrients and oxygen to its organs.","es":"Slugma no tiene sangre en su organismo, sino ardiente magma que hace circular por todo el cuerpo los nutrientes y el oxígeno que necesitan sus órganos.","fr":"Les veines de Limagma ne contiennent pas de sang. Au lieu de ça, du magma en fusion circule dans le corps de ce Pokémon, apportant les nutriments et l’oxygène nécessaires à ses organes.","it":"Nel corpo di Slugma non scorre nemmeno una goccia di sangue, bensì magma rovente, che garantisce l’apporto di ossigeno e sostanze nutritive fondamentali per i suoi organi.","ja":"からだの なかでは けつえきの かわりに ひつような えいようと さんそを はこぶために しゃくねつの マグマが じゅんかんしている。"},"h":7,"w":350},{"n":219,"ja":"マグカルゴ","r":"Magcargot","en":"Magcargo","es":"Magcargo","fr":"Volcaropod","it":"Magcargo","pt":"","g":2,"t":[10,6],"cat":{"en":"Lava Pokémon","es":"Pokémon Lava","fr":"Pokémon Lave","it":"Pokémon Lava","ja":"ようがんポケモン"},"desc":{"en":"Magcargo’s body temperature is approximately 18,000 degrees Fahrenheit. Water is vaporized on contact. If this Pokémon is caught in the rain, the raindrops instantly turn into steam, cloaking the area in a thick fog.","es":"Magcargo tiene una temperatura corporal de 1000 °C aproximadamente. El agua se evapora al contacto con él. Si llueve, las gotas que le rozan se transforman en vapor al instante y crean una densa niebla.","fr":"La température de Volcaropod est d’environ 10 000 °C. L’eau s’évapore ed from the latter.","es":"Atrapa a sus enemigos con los tentáculos y después los golpea con su dura cabeza.","fr":"Il capture ses ennemis avec ses tentacules et les écrase ensuite avec sa tête dure comme la pierre.","it":"Cattura i nemici con le ventose dei tentacoli per poi colpirli con il suo capo duro come pietra.","ja":"がんじょうな いしあたま。 きゅうばんつきの あしを からませ ひたすら あたまで うちすえる。"},"h":9,"w":285},{"n":225,"ja":"デリバード","r":"Delibird","en":"Delibird","es":"Delibird","fr":"Cadoizo","it":"Delibird","pt":"","g":2,"t":[15,3],"cat":{"en":"Delivery Pokémon","es":"Pokémon Reparto","fr":"Pokémon Livraison","it":"Pokémon Consegna","ja":"はこびやポケモン"},"desc":{"en":"It has a generous habit of sharing its food with people and Pokémon, so it’s always scrounging around for more food.","es":"Tiene la costumbre de compartir su comida con todo el mundo, sea humano o Pokémon, por lo que está constantemente en busca de alimento.","fr":"Ce Pokémon partage facilement son repas avec d’autres Pokémon et avec des humains, ce qui l’oblige à constamment courir après la nourriture.","it":"È sempre alla ricerca di cibo, che ama condividere con esseri umani e Pokémon.","ja":"じぶんの エサを ひとや ポケモンに わける しゅうせいが あるため いつも エサを さがしまわっている。"},"h":9,"w":160},{"n":226,"ja":"マンタイン","r":"Mantain","en":"Mantine","es":"Mantine","fr":"Démanta","it":"Mantine","pt":"","g":2,"t":[11,3],"cat":{"en":"Kite Pokémon","es":"Pokémon Milano","fr":"Pokémon Cervolant","it":"Pokémon Aquilone","ja":"カイトポケモン"},"desc":{"en":"This calm and gentle Pokémon swims gracefully through the sea. After building speed, it can leap out of the water. It is often misidentified as a bird Pokémon due to this behavior.","es":"Mientras nada plácidamente, no le importa que los Remoraid se aferren a él para comerse sus sobras.","fr":"Il nage paisiblement, sans se soucier des Rémoraid qui s’agrippent à lui pour lui voler ses restes.","it":"Nuota placidamente nel mare. Non si cura dei Remoraid che gli si attaccano addosso per cibarsi dei suoi avanzi.","ja":"ゆうぜんと うみを およぐ。 たべのこしを ねらった テッポウオが くっついていても きにしていない。"},"h":21,"w":2200},{"n":227,"ja":"エアームド","r":"Airmd","en":"Skarmory","es":"Skarmory","fr":"Airmure","it":"Skarmory","pt":"","g":2,"t":[9,3],"cat":{"en":"Armor Bird Pokémon","es":"Pokémon Coraza Ave","fr":"Pokémon Armoiseau","it":"Pokémon Armuccello","ja":"よろいどりポケモン"},"desc":{"en":"People fashion swords from Skarmory’s shed feathers, so this Pokémon is a popular element in heraldic designs.","es":"Aparece a menudo en escudos heráldicos, pues se pueden forjar espadas a partir de las plumas que pierde.","fr":"Ce Pokémon orne souvent les blasons, car les plumes qu’il perd sont utilisées pour forger des épées.","it":"Le piume perse da Skarmory sono utilizzate per produrre spade. Per questo è molto apprezzato come motivo degli stemmi nobiliari.","ja":"ぬけおちた ハネから つるぎが つくられることから もんしょうの ずあんとして にんきが たかい。"},"h":17,"w":505},{"n":228,"ja":"デルビル","r":"Delvil","en":"Houndour","es":"Houndour","fr":"Malosse","it":"Houndour","pt":"","g":2,"t":[17,10],"cat":{"en":"Dark Pokémon","es":"Pokémon Siniestro","fr":"Pokémon Sombre","it":"Pokémon Buio","ja":"ダークポケモン"},"desc":{"en":"They make repeated eerie howls before dawn to call attention to their pack.","es":"Los escalofriantes aullidos que profiere justo antes del alba son para señalar la presencia de su manada.","fr":"Si ses congénères et lui poussent de sinistres hurlements avant l’aube, c’est pour signaler leur présence à tout le monde.","it":"Gli urli sinistri che emette prima dell’alba hanno la funzione di segnalare la presenza del suo branco.","ja":"よあけまえに ぶきみな とおぼえを くりかえし じぶんたちの むれの そんざいを アピール している。"},"h":6,"w":108},{"n":229,"ja":"ヘルガー","r":"Hellgar","en":"Houndoom","es":"Houndoom","fr":"Démolosse","it":"Houndoom","pt":"","g":2,"t":[17,10],"cat":{"en":"Dark Pokémon","es":"Pokémon Siniestro","fr":"Pokémon Sombre","it":"Pokémon Buio","ja":"ダークポケモン"},"desc":{"en":"Identifiable by its eerie howls, people a long time ago thought it was the grim reaper and feared it.","es":"Su rasgo distintivo son los escalofriantes aullidos que profiere. Antiguamente, era temido y considerado un emisario del inframundo.","fr":"Ceux qui le craignaient jadis lui ont donné le surnom de « messager de la Faucheuse » à cause de son hurlement sinistre si particulier.","it":"Le sue urla sinistre sono inconfondibili. Un tempo era ritenuto un messaggero degli inferi e tutti lo temevano.","ja":"ぶきみな とおぼえが とくちょう。 むかしの ひとは じごく からの つかいと かんがえ おそれていた。"},"h":14,"w":350},{"n":230,"ja":"キングドラ","r":"Kingdra","en":"Kingdra","es":"Kingdra","fr":"Hyporoi","it":"Kingdra","pt":"","g":2,"t":[11,16],"cat":{"en":"Dragon Pokémon","es":"Pokémon Dragón","fr":"Pokémon Dragon","it":"Pokémon Drago","ja":"ドラゴンポケモン"},"desc":{"en":"Scales shed by this Pokémon have such a splendorous gleam to them that they’ve been given to royalty as gifts.","es":"Las escamas que se le desprenden poseen una calidad tan excelsa y un resplandor tan intenso que han sido ofrecidas a la realeza como regalos.","fr":"Les écailles qui se détachent de son corps brillent d’un éclat si élégant et si intense qu’on les offre aux familles royales.","it":"Le scaglie che perde sono così pregiate e splendenti che vengono offerte in dono alle famiglie reali.","ja":"はがれた ウロコは おうぞくへ けんじょうされるほど じょうひんで ふかみのある かがやきを もつ。"},"h":18,"w":1520},{"n":231,"ja":"ゴマゾウ","r":"Gomazou","en":"Phanpy","es":"Phanpy","fr":"Phanpy","it":"Phanpy","pt":"","g":2,"t":[5],"cat":{"en":"Long Nose Pokémon","es":"Pokémon Narizotas","fr":"Pokémon Long-Nez","it":"Pokémon Nasone","ja":"ながはなポケモン"},"desc":{"en":"Phanpy uses its long nose to shower itself. When others gather around, they thoroughly douse each other with water. These Pokémon can be seen drying their soaking-wet bodies at the edge of water.","es":"Phanpy se vale de la trompa para ducharse. Cuando varios se agrupan, se dedican a echarse agua unos a otros. Es muy fácil ver a estos Pokémon secándose cerca del agua.","fr":"Phanpy utilise sa petite trompe pour se doucher. Quand plusieurs d’entre eux se réunissent, ils s’arrosent joyeusement. On peut souvent voir ces Pokémon se sécher au bord de l’eau.","it":"Phanpy usa la proboscide per farsi la doccia. Questi Pokémon sono soliti raggrupparsi per spruzzarsi d’acqua a vicenda. Poi, è frequente vederli mentre si asciugano il corpo fradicio a riva.","ja":"ながい はなを つかって みずあびを する。 なかまが あつまってくると みずを かけあう。 ずぶぬれの からだを みずべで かわかすよ。"},"h":5,"w":335},{"n":232,"ja":"ドンファン","r":"Donfan","en":"Donphan","es":"Donphan","fr":"Donphan","it":"Donphan","pt":"","g":2,"t":[5],"cat":{"en":"Armor Pokémon","es":"Pokémon Coraza","fr":"Pokémon Armure","it":"Pokémon Armatura","ja":"よろいポケモン"},"desc":{"en":"If Donphan were to tackle with its hard body, even a house could be destroyed. Using its massive strength, the Pokémon helps clear rock and mud slides that block mountain trails.","es":"Si Donphan tuviera que dar un golpe con todo el cuerpo, con lo robusto que es echaría abajo hasta una casa. Estos Pokémon usan su fuerza para ayudar a despejar pasos de montaña cuando hay piedras o lodo.","fr":"Si Donphan décidait de charger, il pourrait détruire une maison. Grâce à sa force étonnante, ce Pokémon peut aider à déplacer les rochers et les coulées de boue qui bloquent les chemins de montagne.","it":"Il massiccio corpo di Donphan dispone di una forza tale da poter abbattere persino una casa. La sua incredibile potenza aiuta a liberare i sentieri montani dopo una frana di massi o fango.","ja":"かたい からだで ぶつかれば いえも こわれる。 その ちからを つかって やまみちを ふさいだ どしゃくずれを どかす しごとを てつだうよ。"},"h":11,"w":1200},{"n":233,"ja":"ポリゴン２","r":"Porygon2","en":"Porygon2","es":"Porygon2","fr":"Porygon2","it":"Porygon2","pt":"","g":2,"t":[1],"cat":{"en":"Virtual Pokémon","es":"Pokémon Virtual","fr":"Pokémon Virtuel","it":"Pokémon Virtuale","ja":"バーチャルポケモン"},"desc":{"en":"A bizarre item caused this Pokémon to evolve. While it now exhibits many new gestures and expressions, its biology remains inscrutable.","es":"Al dotarlo de inteligencia artificial, desarrolló un misterioso lenguaje que solo los miembros de su especie son capaces de comprender.","fr":"Depuis qu’on l’a doté d’une intelligence artificielle, il parle un langage mystérieux que seuls ses congénères comprennent.","it":"Dopo essere stati dotati d’intelligenza artificiale, i Porygon2 hanno cominciato a parlare fra di loro utilizzando una lingua misteriosa.","ja":"ＡＩきのうを とうさいした けっか ポリゴン２ どうしにしか わからない なぞの げんごを はなし はじめた。"},"h":6,"w":325},{"n":234,"ja":"オドシシ","r":"Odoshishi","en":"Stantler","es":"Stantler","fr":"Cerfrousse","it":"Stantler","pt":"","g":2,"t":[1],"cat":{"en":"Big Horn Pokémon","es":"Pokémon Gran Cuerno","fr":"Pokémon Maxi Corne","it":"Pokémon Grancorno","ja":"おおツノポケモン"},"desc":{"en":"Its strangely shaped antlers have the power to bewitch those who see them. Medicine made by grinding up the black orbs from fallen antlers is an effective treatment for insomnia.","es":"Hace tiempo, se comerciaba con la magnífica cornamenta de Stantler. Se vendía como obra de arte a alto precio. Los interesados en cornamentas de valor incalculable empezaron a cazarlos y casi provocan su extinción.","fr":"Les superbes bois de Cerfrousse étaient vendus très cher comme œuvres d’art. Ce Pokémon fut chassé et l’espèce proche de l’extinction à cause des gens qui recherchaient leurs précieux bois.","it":"Le magnifiche corna ramificate di Stantler venivano vendute a caro prezzo come ornamenti preziosi. Questo ha causato una caccia indiscriminata di questo Pokémon fin quasi all’estinzione.","ja":"みごとな かたちの ツノは びじゅつひん として たかく うれた ために ぜつめつ すんぜんまで らんかくされた ことのある ポケモン。"},"h":14,"w":712},{"n":235,"ja":"ドーブル","r":"Doble","en":"Smeargle","es":"Smeargle","fr":"Queulorior","it":"Smeargle","pt":"","g":2,"t":[1],"cat":{"en":"Painter Pokémon","es":"Pokémon Pintor","fr":"Pokémon Peintre","it":"Pokémon Pittore","ja":"えかきポケモン"},"desc":{"en":"It draws symbols with the fluid that oozes from the tip of its tail. Depending on the symbol, Smeargle fanatics will pay big money for them.","es":"Dibuja marcas con el líquido que secreta por la cola. Algunos de sus admiradores han llegado a pagar auténticas fortunas por ellas.","fr":"Il se sert du liquide qui sort de sa queue pour dessiner sa marque. Ses fans s’arrachent ses plus beaux tracés à prix d’or.","it":"Traccia dei segni con il fluido prodotto dalla punta della coda. Gli appassionati comprano le sue opere a caro prezzo.","ja":"シッポの さきから でる たいえきで マークを えがく。 マークに よっては マニアに たかねで とりひきされる。"},"h":12,"w":580},{"n":236,"ja":"バルキー","r":"Balkie","en":"Tyrogue","es":"Tyrogue","fr":"Debugant","it":"Tyrogue","pt":"","g":2,"t":[2],"cat":{"en":"Scuffle Pokémon","es":"Pokémon Peleón","fr":"Pokémon Bagarreur","it":"Pokémon Baruffa","ja":"けんかポケモン"},"desc":{"en":"Even though it is small, it can’t be ignored because it will slug any handy target without warning.","es":"Su pequeño tamaño no debe ser motivo para subestimarlo, ya que se liará de inmediato a golpes con cualquier rival que estime oportuno.","fr":"Même s’il est petit, il vaut mieux ne pas l’ignorer : quand il trouve un adversaire à sa hauteur, il frappe fort et souvent sans prévenir.","it":"Anche se è piccolo, non bisogna abbassare la guardia: quando trova un avversario che fa al caso suo, inizia subito a tempestarlo di colpi.","ja":"てごろな あいてを みつけると すぐに なぐりかかってくるので ちいさくても ゆだんならない。"},"h":7,"w":210},{"n":237,"ja":"カポエラー","r":"Kapoerer","en":"Hitmontop","es":"Hitmontop","fr":"Kapoera","it":"Hitmontop","pt":"","g":2,"t":[2],"cat":{"en":"Handstand Pokémon","es":"Pokémon Boca Abajo","fr":"Pokémon Poirier","it":"Pokémon Verticale","ja":"さかだちポケモン"},"desc":{"en":"After doing a handstand to throw off the opponent’s timing, it presents its fancy kick moves.","es":"Tras hacer el pino para desconcertar a su rival, comienza a propinar sus espectaculares patadas.","fr":"Après avoir effectué un poirier visant à désorienter son adversaire, il lui assène des coups de pied furieux.","it":"Prima esegue una verticale per spiazzare il nemico, poi parte con i suoi calci spettacolari.","ja":"さかだちを することで あいての タイミングを くるわせ そのすきに はでな キックわざを おみまいする。"},"h":14,"w":480},{"n":238,"ja":"ムチュール","r":"Muchul","en":"Smoochum","es":"Smoochum","fr":"Lippouti","it":"Smoochum","pt":"","g":2,"t":[15,14],"cat":{"en":"Kiss Pokémon","es":"Pokémon Beso","fr":"Pokémon Bisou","it":"Pokémon Bacio","ja":"くちづけポケモン"},"desc":{"en":"This is a very curious Pokémon. Smoochum decides what it likes and dislikes by touching things with its lips.","es":"Este Pokémon rebosante de curiosidad lo toca todo con los labios para determinar qué cosas le gustan y cuáles no.","fr":"Ce Pokémon très curieux touche tout et n’importe quoi avec ses lèvres pour déterminer ce qu’il aime et ce qu’il déteste.","it":"È un Pokémon traboccante di curiosità. Stabilisce cosa gli piace e cosa no appoggiandovi le labbra.","ja":"こうきしんおうせいな ポケモン。 なんでも くちびるで ふれてみて すきか きらいかを きめている。"},"h":4,"w":60},{"n":239,"ja":"エレキッド","r":"Elekid","en":"Elekid","es":"Elekid","fr":"Élekid","it":"Elekid","pt":"","g":2,"t":[13],"cat":{"en":"Electric Pokémon","es":"Pokémon Eléctrico","fr":"Pokémon Électrique","it":"Pokémon Elettrico","ja":"でんきポケモン"},"desc":{"en":"They generate electricity by spinning their arms. During a thunderstorm, if one hears the lively voices of children out in the wilderness, what one is actually hearing are the voices of Elekid.","es":"No se le da bien acumular electricidad, por lo que se cuela en las casas en busca de enchufes para alimentarse.","fr":"Il a encore du mal à emmagasiner l’électricité. Pour s’en nourrir, il se faufile dans les maisons à la recherche de prises électriques.","it":"Non è ancora abile nell’immagazzinare elettricità. Si intrufola nelle abitazioni in cerca di prese di corrente, che sfrutta per nutrirsi.","ja":"まだ でんきを ためるのが へた。 でんきを たべるために みんかに しのびこみ コンセントを さがす。"},"h":6,"w":235},{"n":240,"ja":"ブビィ","r":"Buby","en":"Magby","es":"Magby","fr":"Magby","it":"Magby","pt":"","g":2,"t":[10],"cat":{"en":"Live Coal Pokémon","es":"Pokémon Ascuas","fr":"Pokémon Charbon","it":"Pokémon Carbonvivo","ja":"ひだねポケモン"},"desc":{"en":"This Pokémon lives in volcanic areas. With each breath, sparks spurt from its mouth and nose. When Magby is in good health, its flames gain a yellow tint.","es":"Vive en los alrededores de los volcanes. Al final del día, se baña en magma para aliviar el cansancio.","fr":"Il vit près des volcans. À la fin de la journée, il se détend dans un bon bain de magma.","it":"Vive nei pressi dei vulcani. Dopo una faticosa giornata, si gode un rilassante bagno nel magma.","ja":"かざんの まわりに すんでいる。 いちにちの おわりには マグマに つかり つかれを いやしている。"},"h":7,"w":214},{"n":241,"ja":"ミルタンク","r":"Miltank","en":"Miltank","es":"Miltank","fr":"Écrémeuh","it":"Miltank","pt":"","g":2,"t":[1],"cat":{"en":"Milk Cow Pokémon","es":"Pokémon Lechera","fr":"Pokémon Vachalait","it":"Pokémon Bovino","ja":"ちちうしポケモン"},"desc":{"en":"This Pokémon needs to be milked every day, or else it will fall ill. The flavor of Miltank milk changes with the seasons.","es":"Si no se ordeña a Miltank a diario, enferma. El sabor de la leche que produce cambia según la época del año.","fr":"Sa santé décline si on ne le trait pas tous les jours. Le goût de son lait varie selon la saison.","it":"Se non viene munto ogni giorno, la sua salute ne risente. Il sapore del suo latte può variare in base alla stagione.","ja":"まいにち ミルクを しぼらないと ぐあいが わるくなる。 ミルクの あじは きせつに よって かわるぞ。"},"h":12,"w":755},{"n":242,"ja":"ハピナス","r":"Happinas","en":"Blissey","es":"Blissey","fr":"Leuphorie","it":"Blissey","pt":"","g":2,"t":[1],"cat":{"en":"Happiness Pokémon","es":"Pokémon Felicidad","fr":"Pokémon Bonheur","it":"Pokémon Felicità","ja":"しあわせポケモン"},"desc":{"en":"A kindhearted Pokémon that will care for any sick person or Pokémon until their health improves. The eggs it lays are delicious and bring good fortune to those who eat them.","es":"Pone unos extraños huevos llenos de felicidad. Dicen que aquellos que los prueban se vuelven amables con todo el mundo.","fr":"Il pond d’étranges œufs remplis de bonheur. On raconte que quiconque en mange un devient aimable envers tout le monde.","it":"Le sue uova sono un magico concentrato di felicità. Si dice che rendano gentile chiunque le mangia.","ja":"しあわせが つまった ふしぎな タマゴを うむ。 たべた ひとは だれにでも やさしく なれるという。"},"h":15,"w":468},{"n":243,"ja":"ライコウ","r":"Raikou","en":"Raikou","es":"Raikou","fr":"Raikou","it":"Raikou","pt":"","g":2,"t":[13],"cat":{"en":"Thunder Pokémon","es":"Pokémon Trueno","fr":"Pokémon Foudre","it":"Pokémon Tuono","ja":"いかずちポケモン"},"desc":{"en":"Raikou embodies the speed of lightning. The roars of this Pokémon send shock waves shuddering through the air and shake the ground as if lightning bolts had come crashing down.","es":"Raikou tiene la velocidad del rayo. Los rugidos de este Pokémon emiten ondas de choque que se esparcen vibrando por el aire y sacuden el suelo como si fueran auténticas descargas de rayo.","fr":"Raikou incarne la vitesse de l’éclair. Les rugissements de ce Pokémon libèrent des ondes de choc provenant du ciel et frappant le sol avec la puissance de la foudre.","it":"Raikou rappresenta la velocità del fulmine. Il suo ruggito crea terrificanti onde d’urto nell’aria e scuote il suolo come se fosse percosso dalla furia di un fulmine durante il temporale.","ja":"かみなりの スピードを やどした ポケモン。 その とおぼえは かみなりが おちた ときの ように くうきを ふるわせ だいちを ゆるがす。"},"h":19,"w":1780},{"n":244,"ja":"エンテイ","r":"Entei","en":"Entei","es":"Entei","fr":"Entei","it":"Entei","pt":"","g":2,"t":[10],"cat":{"en":"Volcano Pokémon","es":"Pokémon Volcán","fr":"Pokémon Volcan","it":"Pokémon Vulcano","ja":"かざんポケモン"},"desc":{"en":"Entei embodies the passion of magma. This Pokémon is thought to have been born in the eruption of a volcano. It sends up massive bursts of fire that utterly consume all that they touch.","es":"Entei contiene el fulgor del magma en su interior. Se cree que este Pokémon nació de la erupción de un volcán. Escupe numerosas ráfagas de fuego que devoran y reducen a cenizas todo lo que tocan.","fr":"Entei incarne la colère du magma. On pense que ce Pokémon est né suite à l’éruption d’un volcan. Il peut envoyer d’énormes jets de flammes qui calcinent tout ce qu’ils touchent.","it":"Entei rappresenta l’ardore del magma. Si narra che questo Pokémon sia nato dall’eruzione di un vulcano. Emette lingue di fuoco così violente da incenerire tutto ciò che lambiscono.","ja":"マグマの じょうねつを やどした ポケモン。 かざんの ふんかから うまれたと かんがえられ すべてを やきつくす ほのおを ふきあげる。"},"h":21,"w":1980},{"n":245,"ja":"スイクン","r":"Suikun","en":"Suicune","es":"Suicune","fr":"Suicune","it":"Suicune","pt":"","g":2,"t":[11],"cat":{"en":"Aurora Pokémon","es":"Pokémon Aurora","fr":"Pokémon Aurore","it":"Pokémon Aurora","ja":"オーロラポケモン"},"desc":{"en":"Suicune embodies the compassion of a pure spring of water. It runs across the land with gracefulness. This Pokémon has the power to purify dirty water.","es":"Suicune emana la pureza de los manantiales. Suele corretear por el campo con gran elegancia. Este Pokémon tiene el poder de purificar el agua contaminada.","fr":"Suicune incarne la tranquillité d’une source d’eau pure. Il parcourt les plaines avec grâce. Ce Pokémon a le pouvoir de purifier l’eau.","it":"Suicune rappresenta la purezza delle sorgenti d’acqua dolce. Corre con grazia immerso nella natura. Questo Pokémon ha la facoltà di depurare le acque di scarico.","ja":"わきみずの やさしさを やどした ポケモン。 すべる ような みのこなしで だいちを はしり にごった みずを きよめる ちからを もつ。"},"h":20,"w":1870},{"n":246,"ja":"ヨーギラス","r":"Yogiras","en":"Larvitar","es":"Larvitar","fr":"Embrylex","it":"Larvitar","pt":"","g":2,"t":[6,5],"cat":{"en":"Rock Skin Pokémon","es":"Pokémon Piel Roca","fr":"Pokémon Peaupierre","it":"Pokémon Peldisasso","ja":"いわはだポケモン"},"desc":{"en":"It feeds on soil. After it has eaten a large mountain, it will fall asleep so it can grow.","es":"Se alimenta de tierra. Después de devorar el equivalente a una montaña, se duerme y empieza a crecer.","fr":"Il vit en se nourrissant de terre. Après avoir dévoré une montagne, il s’endort et entame sa croissance.","it":"Si nutre di terra. Dopo aver divorato una montagna intera, si addormenta per poter crescere.","ja":"つちを たべて いきている。 おおきな やまひとつ たべおわると せいちょうのため ねむりはじめる。"},"h":6,"w":720},{"n":247,"ja":"サナギラス","r":"Sanagiras","en":"Pupitar","es":"Pupitar","fr":"Ymphect","it":"Pupitar","pt":"","g":2,"t":[6,5],"cat":{"en":"Hard Shell Pokémon","es":"Pokémon Caparazón","fr":"Pokémon Carapadure","it":"Pokémon Guscioduro","ja":"だんがんポケモン"},"desc":{"en":"It will not stay still, even while it’s a pupa. It already has arms and legs under its solid shell.","es":"No se está quieto ni aun siendo una pupa. Sus extremidades ya se han formado bajo su robusta coraza.","fr":"Malgré son état de chrysalide, il ne reste pas immobile. Sous sa solide carapace, ses pattes sortent déjà.","it":"È una crisalide ma non sta mai fermo. Gli arti sono già formati sotto il duro guscio.","ja":"さなぎだが じっと していない。 がんじょうな カラの したでは すでに てあしが できている。"},"h":12,"w":1520},{"n":248,"ja":"バンギラス","r":"Bangiras","en":"Tyranitar","es":"Tyranitar","fr":"Tyranocif","it":"Tyranitar","pt":"","g":2,"t":[6,17],"cat":{"en":"Armor Pokémon","es":"Pokémon Coraza","fr":"Pokémon Armure","it":"Pokémon Armatura","ja":"よろいポケモン"},"desc":{"en":"The quakes caused when it walks make even great mountains crumble and change the surrounding terrain.","es":"Sus estrepitosos pasos derrumban montañas y hacen que el terreno a su alrededor cambie drásticamente.","fr":"Son pas est si lourd qu’il fait trembler le sol et s’écrouler même les plus grandes montagnes, ce qui altère la topographie de la zone.","it":"Può camminare a passi così pesanti da far crollare perfino le montagne più grosse, trasformando così il paesaggio circostante.","ja":"じひびきを ならしながら あるくと おおきな やまでさえ くずれ まわりの ちけいは かわってしまう。"},"h":20,"w":2020},{"n":249,"ja":"ルギア","r":"Lugia","en":"Lugia","es":"Lugia","fr":"Lugia","it":"Lugia","pt":"","g":2,"t":[14,3],"cat":{"en":"Diving Pokémon","es":"Pokémon Buceo","fr":"Pokémon Plongeon","it":"Pokémon Immersione","ja":"せんすいポケモン"},"desc":{"en":"Lugia’s wings pack devastating power—a light fluttering of its wings can blow apart regular houses. As a result, t
