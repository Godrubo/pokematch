iner avec précision la puissance de ses adversaires.","it":"Avendo affrontato lotte molto ardue, ha imparato a valutare con precisione la forza del nemico.","ja":"きびしい たたかいを くぐりぬけて あいての りきりょうを せいかくに はんだんする ちからが みについた。"},"h":8,"w":160},{"n":823,"ja":"アーマーガア","r":"Armorga","en":"Corviknight","es":"Corviknight","fr":"Corvaillus","it":"Corviknight","pt":"","g":8,"t":[3,9],"cat":{"en":"Raven Pokémon","es":"Pokémon Cuervo","fr":"Pokémon Corbeau","it":"Pokémon Corvo","ja":"カラスポケモン"},"desc":{"en":"With their great intellect and flying skills, these Pokémon very successfully act as the Galar region’s airborne taxi service.","es":"Debido a su excelente capacidad de vuelo y a su gran inteligencia, ejerce de taxi volador en Galar.","fr":"Grâce à son adresse remarquable en vol et sa grande intelligence, il travaille comme taxi volant de Galar.","it":"È dotato di eccellenti capacità di volo e di grande intelligenza. Nella regione di Galar si rende utile come taxi del cielo.","ja":"ひこう のうりょくに すぐれていて とても かしこいため ガラルちほうで そらの タクシーとして かつやく。"},"h":22,"w":750},{"n":824,"ja":"サッチムシ","r":"Sacchimushi","en":"Blipbug","es":"Blipbug","fr":"Larvadar","it":"Blipbug","pt":"","g":8,"t":[7],"cat":{"en":"Larva Pokémon","es":"Pokémon Pupa","fr":"Pokémon Larve","it":"Pokémon Coleolarva","ja":"ようちゅうポケモン"},"desc":{"en":"Often found in gardens, this Pokémon has hairs on its body that it uses to assess its surroundings.","es":"Es habitual verlo en el campo. Los pelos que tiene son sensores con los que percibe lo que ocurre a su alrededor.","fr":"On le voit souvent dans les champs. Les poils de son corps lui servent à capter ce qu’il se passe autour de lui.","it":"Si incontra spesso nei campi. Le setole che crescono sul suo corpo gli permettono di percepire ciò che accade attorno a lui.","ja":"はたけで よくみかける ポケモン。 からだに はえた けで まわりで おきていることを かんじとる。"},"h":4,"w":80},{"n":825,"ja":"レドームシ","r":"Redomushi","en":"Dottler","es":"Dottler","fr":"Coléodôme","it":"Dottler","pt":"","g":8,"t":[7,14],"cat":{"en":"Radome Pokémon","es":"Pokémon Radomo","fr":"Pokémon Radôme","it":"Pokémon Radome","ja":"レドームポケモン"},"desc":{"en":"As it grows inside its shell, it uses its psychic abilities to monitor the outside world and prepare for evolution.","es":"Está en constante crecimiento dentro del caparazón. Mientras se prepara para evolucionar, examina el exterior con sus poderes psíquicos.","fr":"Il se développe dans sa coquille et se prépare à évoluer en sondant les alentours grâce à ses pouvoirs psychiques.","it":"Continua a crescere dentro il suo guscio. In attesa dell’evoluzione, percepisce il mondo esterno grazie ai suoi poteri psichici.","ja":"からの なかで せいちょうちゅう。 サイコパワーで そとの ようすを うかがい しんかに そなえている。"},"h":4,"w":195},{"n":826,"ja":"イオルブ","r":"Eolb","en":"Orbeetle","es":"Orbeetle","fr":"Astronelle","it":"Orbeetle","pt":"","g":8,"t":[7,14],"cat":{"en":"Seven Spot Pokémon","es":"Pokémon Siete Puntos","fr":"Pokémon Sept Points","it":"Pokémon Settepunti","ja":"ななほしポケモン"},"desc":{"en":"It emits psychic energy to observe and study what’s around it—and what’s around it can include things over six miles away.","es":"Se sirve de sus poderes psíquicos, con los que es capaz de percibir lo que ocurre en un radio de 10 km, para examinar sus alrededores.","fr":"Il déploie ses pouvoirs psychiques pour sonder les alentours, sur un rayon pouvant atteindre 10 km.","it":"Grazie ai suoi poteri psichici è in grado di tenere sotto controllo la situazione in un’area di ben 10 km attorno a lui.","ja":"サイコパワーを はなち しゅういを しらべている。 かんそくはんいは しゅうい １０キロにも たっするぞ。"},"h":4,"w":408},{"n":827,"ja":"クスネ","r":"Kusune","en":"Nickit","es":"Nickit","fr":"Goupilou","it":"Nickit","pt":"","g":8,"t":[17],"cat":{"en":"Fox Pokémon","es":"Pokémon Zorro","fr":"Pokémon Renard","it":"Pokémon Volpe","ja":"きつねポケモン"},"desc":{"en":"Cunning and cautious, this Pokémon survives by stealing food from others. It erases its tracks with swipes of its tail as it makes off with its plunder.","es":"Prudente y astuto, borra con la cola las huellas que deja al huir tras robarle el alimento a otro Pokémon.","fr":"Rusé et vigilant, il prend la poudre d’escampette après avoir volé de la nourriture en prenant soin d’effacer ses traces de pas avec sa queue.","it":"È scaltro e molto prudente. Quando ruba il cibo, scappa cancellando le sue orme con la coda.","ja":"ようじん ぶかく ずるがしこい。 エサを ぬすむと しっぽで あしあとを けしながら にげるのだ。"},"h":6,"w":89},{"n":828,"ja":"フォクスライ","r":"Foxly","en":"Thievul","es":"Thievul","fr":"Roublenard","it":"Thievul","pt":"","g":8,"t":[17],"cat":{"en":"Fox Pokémon","es":"Pokémon Zorro","fr":"Pokémon Renard","it":"Pokémon Volpe","ja":"きつねポケモン"},"desc":{"en":"With a lithe body and sharp claws, it goes around stealing food and eggs. Boltund is its natural enemy.","es":"Un Pokémon ágil y de afiladas garras que se alimenta de huevos y comida robados. Los Boltund son su enemigo natural.","fr":"Grâce à son corps leste et ses griffes acérées, il va et vient en dérobant Œufs et nourriture. Son ennemi juré est Fulgudog.","it":"Se ne va in giro rubando Uova e cibo grazie al suo corpo agile e alle unghie affilate. Il suo nemico naturale è Boltund.","ja":"みがるな からだと するどい ツメで エサや タマゴを ぬすんで まわる。 パルスワンが てんてき。"},"h":12,"w":199},{"n":829,"ja":"ヒメンカ","r":"Himenka","en":"Gossifleur","es":"Gossifleur","fr":"Tournicoton","it":"Gossifleur","pt":"","g":8,"t":[12],"cat":{"en":"Flowering Pokémon","es":"Pokémon Adornofloral","fr":"Pokémon Chef-Fleur","it":"Pokémon Fiorfronzolo","ja":"はなかざりポケモン"},"desc":{"en":"It whirls around in the wind while singing a joyous song. This delightful display has charmed many into raising this Pokémon.","es":"Muchos los crían tras quedar prendados de lo adorables que resultan cuando cantan dando vueltas empujados por la brisa.","fr":"Nombreux sont ceux qui ont décidé d’en élever un après avoir été charmés par sa manière de chanter en virevoltant au gré de la brise.","it":"Canta felice girando su se stesso mentre si lascia trasportare dal vento. Molti ne allenano uno semplicemente perché lo trovano adorabile.","ja":"そよかぜで くるくる まわりながら たのしそうに うたう あいらしさに みせられ そだてる ひとが おおい。"},"h":4,"w":22},{"n":830,"ja":"ワタシラガ","r":"Watashiraga","en":"Eldegoss","es":"Eldegoss","fr":"Blancoton","it":"Eldegoss","pt":"","g":8,"t":[12],"cat":{"en":"Cotton Bloom Pokémon","es":"Pokémon Adornalgodón","fr":"Pokémon Chef-Coton","it":"Pokémon Cotofronzolo","ja":"わたかざりポケモン"},"desc":{"en":"The cotton on the head of this Pokémon can be spun into a glossy, gorgeous yarn—a Galar regional specialty.","es":"El hilo fabricado a partir de su algodón es muy bello y brillante; uno de los productos estrella de la región de Galar.","fr":"Les fils tissés à partir du duvet sur sa tête sont satinés et absolument somptueux. Le textile ainsi créé est typique de la région de Galar.","it":"I fili realizzati con la lanugine del suo capo sono particolarmente belli e lucenti. Sono un prodotto tipico di Galar.","ja":"あたまの わたげで つくった いとは こうたくがあり とても うつくしい。 ガラルちほうの めいさんひん。"},"h":5,"w":25},{"n":831,"ja":"ウールー","r":"Wooluu","en":"Wooloo","es":"Wooloo","fr":"Moumouton","it":"Wooloo","pt":"","g":8,"t":[1],"cat":{"en":"Sheep Pokémon","es":"Pokémon Oveja","fr":"Pokémon Mouton","it":"Pokémon Pecora","ja":"ひつじポケモン"},"desc":{"en":"If its fleece grows too long, Wooloo won’t be able to move. Cloth made with the wool of this Pokémon is surprisingly strong.","es":"Si le crece el pelo demasiado, no puede moverse. Las telas confeccionadas con lana de Wooloo son sorprendentemente resistentes.","fr":"Si ses poils poussent trop, il ne peut plus bouger. Les étoffes tissées avec son pelage sont étonnamment solides.","it":"Se gli cresce troppo il pelo, non riesce più a muoversi. Il tessuto fatto con la sua lana è sorprendentemente resistente.","ja":"けが のびすぎると うごけない。 ウールーの たいもうで おられた ぬのは おどろくほど じょうぶ。"},"h":6,"w":60},{"n":832,"ja":"バイウールー","r":"Baiwooluu","en":"Dubwool","es":"Dubwool","fr":"Moumouflon","it":"Dubwool","pt":"","g":8,"t":[1],"cat":{"en":"Sheep Pokémon","es":"Pokémon Oveja","fr":"Pokémon Mouton","it":"Pokémon Pecora","ja":"ひつじポケモン"},"desc":{"en":"Its majestic horns are meant only to impress the opposite gender. They never see use in battle.","es":"Sus espléndidos cuernos sirven de reclamo para atraer al sexo opuesto. No los utiliza como arma.","fr":"Ses splendides cornes lui servent à attirer les membres de l’autre sexe. Il ne s’en sert jamais pour se battre.","it":"Le sue magnifiche corna hanno la funzione di attirare gli individui di sesso opposto. Non le usa mai per attaccare.","ja":"りっぱに のびた ツノは いせいに アピールするために はえている。 ぶきとして つかうことはない。"},"h":13,"w":430},{"n":833,"ja":"カムカメ","r":"Kamukame","en":"Chewtle","es":"Chewtle","fr":"Khélocrok","it":"Chewtle","pt":"","g":8,"t":[11],"cat":{"en":"Snapping Pokémon","es":"Pokémon Mordedura","fr":"Pokémon Mordillage","it":"Pokémon Mordace","ja":"くいつきポケモン"},"desc":{"en":"It starts off battles by attacking with its rock-hard horn, but as soon as the opponent flinches, this Pokémon bites down and never lets go.","es":"El cuerno que tiene en la cabeza es duro como una roca. Lo usa para atacar al rival y, cuando este baja la guardia, lo muerde y no lo suelta.","fr":"La corne sur sa tête est aussi dure que la roche. Il s’en sert pour se battre et lorsque l’ennemi flanche, il le mord et ne le lâche plus.","it":"Per attaccare usa il corno sulla testa, che è duro come la pietra. Quando il nemico è indebolito, lo morde e non molla più la presa.","ja":"あたまの ツノは いわの かたさ。 ツノで たたかい ひるんだ すきに パクリと かみつき はなさない。"},"h":3,"w":85},{"n":834,"ja":"カジリガメ","r":"Kajirigame","en":"Drednaw","es":"Drednaw","fr":"Torgamord","it":"Drednaw","pt":"","g":8,"t":[11,6],"cat":{"en":"Bite Pokémon","es":"Pokémon Mordisco","fr":"Pokémon Morsure","it":"Pokémon Morso","ja":"かみつきポケモン"},"desc":{"en":"This Pokémon rapidly extends its retractable neck to sink its sharp fangs into distant enemies and take them down.","es":"Su cuello extensible le permite alcanzar a los rivales a distancia. Hundiendo sus afilados dientes, les da el golpe de gracia.","fr":"Son cou extensible lui permet d’atteindre des ennemis éloignés en un instant pour leur porter un coup décisif avec ses crocs aiguisés.","it":"Ha un collo retrattile. Tenendosi a distanza dal nemico, lo estende all’improvviso per dare il colpo di grazia con i denti aguzzi.","ja":"くびが のびちぢみする。 はなれた ところから くびを いっきに のばし するどい キバで てきを しとめる。"},"h":10,"w":1155},{"n":835,"ja":"ワンパチ","r":"Wanpachi","en":"Yamper","es":"Yamper","fr":"Voltoutou","it":"Yamper","pt":"","g":8,"t":[13],"cat":{"en":"Puppy Pokémon","es":"Pokémon Perrito","fr":"Pokémon Chiot","it":"Pokémon Cagnolino","ja":"こいぬポケモン"},"desc":{"en":"This gluttonous Pokémon only assists people with their work because it wants treats. As it runs, it crackles with electricity.","es":"Son muy glotones, por lo que ayudan a la gente a cambio de comida. Echan chispas al correr.","fr":"Ce glouton assiste les humains dans leur travail en échange de friandises. Il court sans arrêt, le corps enveloppé d’électricité.","it":"È un golosone e aiuta gli uomini in cambio di ghiottonerie. Corre di qua e di là emettendo scintille da tutto il corpo.","ja":"おやつに つられて ひとの しごとを てつだう くいしんぼう。 パチパチと でんきを まとって ひたはしる。"},"h":3,"w":135},{"n":836,"ja":"パルスワン","r":"Pulsewan","en":"Boltund","es":"Boltund","fr":"Fulgudog","it":"Boltund","pt":"","g":8,"t":[13],"cat":{"en":"Dog Pokémon","es":"Pokémon Perro","fr":"Pokémon Chien","it":"Pokémon Cane","ja":"いぬポケモン"},"desc":{"en":"It sends electricity through its legs to boost their strength. Running at top speed, it easily breaks 50 mph.","es":"La electricidad le confiere una enorme fuerza en las patas. Su velocidad punta puede superar los 90 km/h sin problema.","fr":"Il se sert de l’énergie électrique pour augmenter la puissance de ses membres. Sa vitesse maximale dépasse de peu les 90 km/h.","it":"La potenza delle sue zampe aumenta grazie all’energia elettrica. Quando corre a tutta velocità supera facilmente i 90 km/h.","ja":"でんきの ちからで きゃくりょくを ぞうきょう。 トップスピードは じそく ９０キロを かるく こえる。"},"h":10,"w":340},{"n":837,"ja":"タンドン","r":"Tandon","en":"Rolycoly","es":"Rolycoly","fr":"Charbi","it":"Rolycoly","pt":"","g":8,"t":[6],"cat":{"en":"Coal Pokémon","es":"Pokémon Carbón","fr":"Pokémon Charbon","it":"Pokémon Carbone","ja":"せきたんポケモン"},"desc":{"en":"It can race around like a unicycle, even on rough, rocky terrain. Burning coal sustains it.","es":"Recorre incluso los caminos más impracticables y pedregosos como si de un monociclo se tratase. La combustión de carbón es su fuente vital.","fr":"Il parcourt sans difficulté les sentiers rocheux accidentés à la manière d’un monocycle. Il a besoin de brûler du charbon pour vivre.","it":"Corre in lungo e in largo come un monociclo anche sulle strade sassose più accidentate. Vive grazie alla combustione del carbone.","ja":"いわだらけの あくろを ものともせず いちりんしゃのように はしりまわる。 せきたんを もやして いきている。"},"h":3,"w":120},{"n":838,"ja":"トロッゴン","r":"Toroggon","en":"Carkol","es":"Carkol","fr":"Wagomine","it":"Carkol","pt":"","g":8,"t":[6,10],"cat":{"en":"Coal Pokémon","es":"Pokémon Carbón","fr":"Pokémon Charbon","it":"Pokémon Carbone","ja":"せきたんポケモン"},"desc":{"en":"By rapidly rolling its legs, it can travel at over 18 mph. The temperature of the flames it breathes exceeds 1,800 degrees Fahrenheit.","es":"Gira las patas a gran velocidad para correr a unos 30 km/h. Emite llamas a una temperatura de 1000 °C.","fr":"Il peut faire tourner ses pattes très vite pour se déplacer à une vitesse de 30 km/h. Il peut aussi souffler des flammes à 1 000 °C.","it":"Corre a 30 km/h facendo girare velocemente le zampe. Emette fiamme a 1.000 ºC.","ja":"あしを こうそくで かいてんさせて じそく３０キロで はしる。 せっし １０００どの ほのおを ふきだす。"},"h":11,"w":780},{"n":839,"ja":"セキタンザン","r":"Sekitanzan","en":"Coalossal","es":"Coalossal","fr":"Monthracite","it":"Coalossal","pt":"","g":8,"t":[6,10],"cat":{"en":"Coal Pokémon","es":"Pokémon Carbón","fr":"Pokémon Charbon","it":"Pokémon Carbone","ja":"せきたんポケモン"},"desc":{"en":"While it’s engaged in battle, its mountain of coal will burn bright red, sending off sparks that scorch the surrounding area.","es":"Cuando se enzarza en un combate, la montaña de carbón arde al rojo vivo y esparce chispas que calcinan todo lo que le rodea.","fr":"Lorsqu’il s’engage dans un combat, son tas de charbon brûle et vire au rouge, ce qui répand de petites étincelles qui calcinent ce qui l’entoure.","it":"Quando lotta, la montagna di carbone brucia con bagliori rossastri e sparge scintille che anneriscono tutta l’area circostante.","ja":"たたかいになると せきたんの やまが まっかに もえあがり ひのこを まきちらして しゅういを こがす。"},"h":28,"w":3105},{"n":840,"ja":"カジッチュ","r":"Kajicchu","en":"Applin","es":"Applin","fr":"Verpom","it":"Applin","pt":"","g":8,"t":[12,16],"cat":{"en":"Apple Core Pokémon","es":"Pokémon Manzanido","fr":"Pokémon Nid Pomme","it":"Pokémon Pomicolo","ja":"りんごぐらしポケモン"},"desc":{"en":"As soon as it’s born, it burrows into an apple. Not only does the apple serve as its food source, but the flavor of the fruit determines its evolution.","es":"Nada más nacer se refugia en una manzana, cuyo interior va devorando a medida que crece. El sabor de la fruta determina la evolución.","fr":"À la naissance, il s’installe dans une pomme et grandit en se nourrissant de sa chair. Son évolution dépend de la saveur du fruit.","it":"Quando nasce si intrufola in un pomo e cresce mangiandone la polpa. Si evolve in modo diverso a seconda del gusto del frutto.","ja":"うまれると りんごに もぐりこむ。 なかみを たべながら せいちょうし りんごの あじが しんかを きめる。"},"h":2,"w":5},{"n":841,"ja":"アップリュー","r":"Appryu","en":"Flapple","es":"Flapple","fr":"Pomdrapi","it":"Flapple","pt":"","g":8,"t":[12,16],"cat":{"en":"Apple Wing Pokémon","es":"Pokémon Manzanala","fr":"Pokémon Ailes Pomme","it":"Pokémon Pomivolo","ja":"りんごはねポケモン"},"desc":{"en":"It flies on wings of apple skin and spits a powerful acid. It can also change its shape into that of an apple.","es":"Escupe una saliva sumamente ácida y vuela con sus alas compuestas por piel de manzana, cuyo aspecto es capaz de adoptar.","fr":"Il vole avec ses ailes faites de pelures de pomme et crache une substance très acide. Il peut aussi prendre la forme de ce fruit.","it":"Vola usando la buccia del pomo a mo’ di ali e sputa una saliva altamente acida. Può assumere l’aspetto di una mela.","ja":"りんごの かわの つばさで とんで きょうさんせいの だえきを とばす。 りんごの かたちに へんけいする。"},"h":3,"w":10},{"n":842,"ja":"タルップル","r":"Tarupple","en":"Appletun","es":"Appletun","fr":"Dratatin","it":"Appletun","pt":"","g":8,"t":[12,16],"cat":{"en":"Apple Nectar Pokémon","es":"Pokémon Manzanéctar","fr":"Pokémon Jus Pomme","it":"Pokémon Pomisucco","ja":"りんごじるポケモン"},"desc":{"en":"Its body is covered in sweet nectar, and the skin on its back is especially yummy. Children used to have it as a snack.","es":"Su cuerpo está recubierto de néctar. La piel de la espalda es tan dulce que los niños de antaño solían tomarla como merienda.","fr":"Son corps est recouvert de nectar. La peau de son dos, particulièrement sucrée, constituait jadis le goûter des enfants.","it":"È ricoperto di una specie di sciroppo. La buccia sulla sua schiena, particolarmente dolce, una volta veniva data ai bambini per merenda.","ja":"あまい みつで からだが おおわれ せなかの かわは とくに あまく むかしは こどもの おやつだった。"},"h":4,"w":130},{"n":843,"ja":"スナヘビ","r":"Sunahebi","en":"Silicobra","es":"Silicobra","fr":"Dunaja","it":"Silicobra","pt":"","g":8,"t":[5],"cat":{"en":"Sand Snake Pokémon","es":"Pokémon Serp. Arena","fr":"Pokémon Serpensable","it":"Pokémon Sabbiaserpe","ja":"すなへびポケモン"},"desc":{"en":"It spews sand from its nostrils. While the enemy is blinded, it burrows into the ground to hide.","es":"Expulsa arena por los orificios nasales. Una vez que aturde al enemigo, aprovecha la ocasión para ocultarse bajo tierra.","fr":"En expulsant du sable par les narines, il aveugle son adversaire et en profite pour se cacher sous terre.","it":"Espelle sabbia dalle narici accecando il nemico per distrarlo e ne approfitta per nascondersi sottoterra.","ja":"はなの あなから すなを ふんしゃ。 てきの めを くらました すきに ちちゅうに もぐって みを かくす。"},"h":22,"w":76},{"n":844,"ja":"サダイジャ","r":"Sadaija","en":"Sandaconda","es":"Sandaconda","fr":"Dunaconda","it":"Sandaconda","pt":"","g":8,"t":[5],"cat":{"en":"Sand Snake Pokémon","es":"Pokémon Serp. Arena","fr":"Pokémon Serpensable","it":"Pokémon Sabbiaserpe","ja":"すなへびポケモン"},"desc":{"en":"Its unique style of coiling allows it to blast sand out of its sand sac more efficiently.","es":"La manera tan particular que tiene de enrollarse sobre sí mismo le permite expulsar con mayor eficacia la arena que almacena en la bolsa.","fr":"S’il s’enroule d’une manière aussi particulière, c’est pour optimiser l’expulsion de sable par ses narines.","it":"Il modo particolare in cui si attorciglia su se stesso gli permette di espellere sabbia dalla sua sacca in modo più efficiente.","ja":"どくとくの とぐろの まきかたは すなぶくろの すなを より こうりつ よく ふんしゃ するため なのだ。"},"h":38,"w":655},{"n":845,"ja":"ウッウ","r":"Uu","en":"Cramorant","es":"Cramorant","fr":"Nigosier","it":"Cramorant","pt":"","g":8,"t":[3,11],"cat":{"en":"Gulp Pokémon","es":"Pokémon Tragón","fr":"Pokémon Avaltouron","it":"Pokémon Inghiottone","ja":"うのみポケモン"},"desc":{"en":"This hungry Pokémon swallows Arrokuda whole. Occasionally, it makes a mistake and tries to swallow a Pokémon other than its preferred prey.","es":"Traga Arrokuda enteros debido a su glotonería, tan notable que en ocasiones ingiere hasta otros Pokémon sin querer.","fr":"Très glouton, il avale les Embrochet d’une seule bouchée, mais il lui arrive de se tromper et de tenter de gober un autre Pokémon.","it":"È molto ingordo e ingoia tutti interi gli Arrokuda di cui si nutre. A volte ingoia anche altri Pokémon per sbaglio.","ja":"くいしんぼうで エサの サシカマスを まるのみするが たまに まちがえて ほかの ポケモンに くらいつく。"},"h":8,"w":180},{"n":846,"ja":"サシカマス","r":"Sasikamasu","en":"Arrokuda","es":"Arrokuda","fr":"Embrochet","it":"Arrokuda","pt":"","g":8,"t":[11],"cat":{"en":"Rush Pokémon","es":"Pokémon Arremetida","fr":"Pokémon Fonceur","it":"Pokémon Carica","ja":"とつげきポケモン"},"desc":{"en":"After it’s eaten its fill, its movements become extremely sluggish. That’s when Cramorant swallows it up.","es":"Cuando tiene el estómago lleno, le cuesta moverse y corre el riesgo de ser engullido por algún Cramorant.","fr":"Lorsqu’il a le ventre plein, il a beaucoup plus de mal à se déplacer, et c’est à ce moment précis qu’il se fait gober par les Nigosier.","it":"Quando ha la pancia piena i suoi movimenti si fanno estremamente lenti e rischia di finire inghiottito da un Cramorant.","ja":"はらいっぱいで きょくたんに うごきが にぶった ところを ウッウに まるのみに される。"},"h":5,"w":10},{"n":847,"ja":"カマスジョー","r":"Kamasujaw","en":"Barraskewda","es":"Barraskewda","fr":"Hastacuda","it":"Barraskewda","pt":"","g":8,"t":[11],"cat":{"en":"Skewer Pokémon","es":"Pokémon Ensarta","fr":"Pokémon Transperceur","it":"Pokémon Spiedo","ja":"くしざしポケモン"},"desc":{"en":"It spins its tail fins to propel itself, surging forward at speeds of over 100 knots before ramming prey and spearing into them.","es":"Hace girar su aleta caudal para impulsarse y arremeter contra la presa, a la que ensarta a una velocidad que supera los 100 nudos.","fr":"Il charge d’un coup en faisant tourner sa nageoire caudale. Il peut transpercer ses proies à une vitesse dépassant les 100 nœuds.","it":"Fa girare rapidamente la coda e carica a tutta forza, trafiggendo le sue prede a una velocità di 100 nodi.","ja":"おびれを かいてんさせ いっきに とつげき。 １００ノットを こえる そくどで えものを つらぬくぞ。"},"h":13,"w":300},{"n":848,"ja":"エレズン","r":"Eleson","en":"Toxel","es":"Toxel","fr":"Toxizap","it":"Toxel","pt":"","g":8,"t":[13,4],"cat":{"en":"Baby Pokémon","es":"Pokémon Retoño","fr":"Pokémon Poupon","it":"Pokémon Bebè","ja":"あかごポケモン"},"desc":{"en":"It manipulates the chemical makeup of its poison to produce electricity. The voltage is weak, but it can cause a tingling paralysis.","es":"Provoca una reacción química para generar energía eléctrica con sus toxinas. Aunque de bajo voltaje, puede causar entumecimiento.","fr":"Par un procédé chimique, il change son poison en électricité. L’intensité du courant est faible, mais peut engourdir un ennemi.","it":"Produce elettricità grazie a una reazione chimica delle sue tossine. Il voltaggio è debole, ma può intorpidire il nemico.","ja":"どくそを かがくへんか させて でんきを だす。 でんりょくは よわいが ビリビリと しびれる。"},"h":4,"w":110},{"n":849,"ja":"ストリンダー","r":"Strinder","en":"Toxtricity","es":"Toxtricity","fr":"Salarsen","it":"Toxtricity","pt":"","g":8,"t":[13,4],"cat":{"en":"Punk Pokémon","es":"Pokémon Punki","fr":"Pokémon Punk","it":"Pokémon Punk","ja":"パンクポケモン"},"desc":{"en":"This short-tempered and aggressive Pokémon chugs stagnant water to absorb any toxins it might contain.","es":"Posee un carácter belicoso e irascible. Bebe una gran cantidad de agua estancada para absorber sus toxinas.","fr":"Impatient et bagarreur, ce Pokémon avale de grandes gorgées d’eau croupie pour en absorber toute la toxicité.","it":"È litigioso e irascibile. Ingurgita acqua stagnante in grandi quantità per assorbire le tossine in essa contenute.","ja":"ケンカごしで きが みじかい。 よどんだ みずを ガブのみして すいちゅうの どくそを とりこむ。"},"h":16,"w":400},{"n":850,"ja":"ヤクデ","r":"Yakude","en":"Sizzlipede","es":"Sizzlipede","fr":"Grillepattes","it":"Sizzlipede","pt":"","g":8,"t":[10,7],"cat":{"en":"Radiator Pokémon","es":"Pokémon Radiador","fr":"Pokémon Calorifère","it":"Pokémon Termogeno","ja":"はつねつポケモン"},"desc":{"en":"It wraps prey up with its heated body, cooking them in its coils. Once they’re well-done, it will voraciously nibble them down to the last morsel.","es":"Oprime a sus presas con su cuerpo candente. Una vez bien tostadas, las devora con fruición.","fr":"Il enserre fermement ses proies avec son corps brûlant et, quand elles sont bien grillées, il les dévore.","it":"Stritola le prede con il suo corpo ardente e, quando sono belle abbrustolite, le divora.","ja":"はつねつした からだで えものを しめあげる。 こんがり やけたら むしゃむしゃ いただくのだ。"},"h":7,"w":10},{"n":851,"ja":"マルヤクデ","r":"Maruyakude","en":"Centiskorch","es":"Centiskorch","fr":"Scolocendre","it":"Centiskorch","pt":"","g":8,"t":[10,7],"cat":{"en":"Radiator Pokémon","es":"Pokémon Radiador","fr":"Pokémon Calorifère","it":"Pokémon Termogeno","ja":"はつねつポケモン"},"desc":{"en":"While its burning body is already dangerous on its own, this excessively hostile Pokémon also has large and very sharp fangs.","es":"Posee una naturaleza agresiva. El peligro que entraña su cuerpo candente es considerable, aunque sus afilados colmillos no le van a la zaga.","fr":"Il est de nature agressive. Non seulement son corps brûlant est dangereux, mais il possède en plus d’énormes crocs très pointus.","it":"Ha una natura aggressiva. Il suo corpo incandescente lo rende molto pericoloso, così come le sue lunghe zanne appuntite.","ja":"こうげきてきな せいしつ。 やけた からだも きけんだが おおきな キバも するどいぞ。"},"h":30,"w":1200},{"n":852,"ja":"タタッコ","r":"Tatakko","en":"Clobbopus","es":"Clobbopus","fr":"Poulpaf","it":"Clobbopus","pt":"","g":8,"t":[2],"cat":{"en":"Tantrum Pokémon","es":"Pokémon Malcriado","fr":"Pokémon Caprice","it":"Pokémon Bizze","ja":"だだっこポケモン"},"desc":{"en":"Its tentacles tear off easily, but it isn’t alarmed when that happens—it knows they’ll grow back. It’s about as smart as a three-year-old.","es":"Su inteligencia es similar a la de un niño de tres años. Sus tentáculos se desprenden a menudo, pero ni se inmuta, ya que se regeneran solos.","fr":"Il a l’intelligence d’un enfant de trois ans. Il perd souvent ses tentacules, mais comme ils repoussent, il ne s’en soucie guère.","it":"Ha l’intelligenza di un bambino di 3 anni. Gli si staccano spesso i tentacoli, ma poiché gli ricrescono naturalmente non se ne preoccupa.","ja":"３さいじ くらいの かしこさ。 しょくしゅは よくちぎれるが さいせいするので きにしない。"},"h":6,"w":40},{"n":853,"ja":"オトスパス","r":"Otosupus","en":"Grapploct","es":"Grapploct","fr":"Krakos","it":"Grapploct","pt":"","g":8,"t":[2],"cat":{"en":"Jujitsu Pokémon","es":"Pokémon Jiu-Jitsu","fr":"Pokémon Jujitsu","it":"Pokémon Jujitsu","ja":"じゅうじゅつポケモン"},"desc":{"en":"Searching for an opponent to test its skills against, it emerges onto land. Once the battle is over, it returns to the sea.","es":"Se aventura en tierra firme para buscar rivales contra los que luchar para medir su valía. Tras terminar el combate, regresa al mar.","fr":"Mû par le besoin de tester la force de ses bras, il se rend sur la terre ferme pour trouver un adversaire. Il retourne à l’eau après le combat.","it":"Si spinge sulla terraferma in cerca di avversari da sfidare per mettere alla prova la propria forza. Terminata la lotta, ritorna in mare.","ja":"おのれのうでを ためすべく りくに あがり たいせんあいてを さがす。 たたかいおえると うみに かえる。"},"h":16,"w":390},{"n":854,"ja":"ヤバチャ","r":"Yabacha","en":"Sinistea","es":"Sinistea","fr":"Théffroi","it":"Sinistea","pt":"","g":8,"t":[8],"cat":{"en":"Black Tea Pokémon","es":"Pokémon Té","fr":"Pokémon Thé Noir","it":"Pokémon Tè","ja":"こうちゃポケモン"},"desc":{"en":"The teacup in which this Pokémon makes its home is a famous piece of antique tableware. Many forgeries are in circulation.","es":"La taza de té donde se hospeda forma parte de una antigua y valiosa vajilla, de la que circulan numerosas falsificaciones.","fr":"Il élit domicile dans des tasses de thé anciennes de grand renom. Parmi celles-ci se trouvent de nombreuses contrefaçons.","it":"La tazza da tè in cui vive è un vero pezzo di antiquariato di cui circolano molte copie contraffatte.","ja":"すみかに している ティーカップは ゆうめいな アンティークの しょっき。 おおくの がんさくが でまわっている。"},"h":1,"w":2},{"n":855,"ja":"ポットデス","r":"Potdeath","en":"Polteageist","es":"Polteageist","fr":"Polthégeist","it":"Polteageist","pt":"","g":8,"t":[8],"cat":{"en":"Black Tea Pokémon","es":"Pokémon Té","fr":"Pokémon Thé Noir","it":"Pokémon Tè","ja":"こうちゃポケモン"},"desc":{"en":"Leaving leftover black tea unattended is asking for this Pokémon to come along and pour itself into it, turning the tea into a new Polteageist.","es":"Si avista una taza de té abandonada a su suerte, la rellena vertiendo parte de su propio cuerpo para generar otro Polteageist.","fr":"Dès qu’il voit un reste de thé noir, il se verse dedans pour donner naissance à un Polthégeist.","it":"Se trova una tazza di tè abbandonata, ci versa dentro un po’ del suo corpo per far nascere un Polteageist.","ja":"のこされた こうちゃを みかけると じぶんの からだを そそぎこむ。 その こうちゃは ポットデスになる。"},"h":2,"w":4},{"n":856,"ja":"ミブリム","r":"Mibrim","en":"Hatenna","es":"Hatenna","fr":"Bibichut","it":"Hatenna","pt":"","g":8,"t":[14],"cat":{"en":"Calm Pokémon","es":"Pokémon Calma","fr":"Pokémon Calme","it":"Pokémon Calma","ja":"おだやかポケモン"},"desc":{"en":"If this Pokémon senses a strong emotion, it will run away as fast as it can. It prefers areas without people.","es":"Siente predilección por los lugares despoblados. Si percibe una emoción intensa, emprende la huida a toda prisa.","fr":"Il aime les lieux inhabités. S’il perçoit des émotions trop fortes, il s’enfuit aussi vite que possible.","it":"Gli piacciono i luoghi disabitati. Se percepisce la presenza di emozioni forti, se la dà a gambe levate.","ja":"ひとけの ない ばしょが すき。 つよい かんじょうを かんじとると いちもくさんに にげだしてしまう。"},"h":4,"w":34},{"n":857,"ja":"テブリム","r":"Tebrim","en":"Hattrem","es":"Hattrem","fr":"Chapotus","it":"Hattrem","pt":"","g":8,"t":[14],"cat":{"en":"Serene Pokémon","es":"Pokémon Serenidad","fr":"Pokémon Serein","it":"Pokémon Quiete","ja":"せいしゅくポケモン"},"desc":{"en":"Using the braids on its head, it pummels foes to get them to quiet down. One blow from those braids would knock out a professional boxer.","es":"Silencia al objetivo atizándole con los mechones. Despliega una potencia devastadora capaz de noquear a un boxeador profesional.","fr":"Il frappe ses ennemis avec ses tresses pour les faire taire. Sa puissance est telle qu’il peut mettre K.O. un boxeur professionnel d’un seul coup.","it":"Zittisce gli avversari colpendoli con le nappe che ha ai lati della testa. È così forte da mandare KO con un colpo anche un pugile professionista.","ja":"あたまのフサで あいてを なぐり だまらせる。 プロボクサーさえ いっぱつ ＫＯの はかいりょく。"},"h":6,"w":48},{"n":858,"ja":"ブリムオン","r":"Brimuon","en":"Hatterene","es":"Hatterene","fr":"Sorcilence","it":"Hatterene","pt":"","g":8,"t":[14,18],"cat":{"en":"Silent Pokémon","es":"Pokémon Silencio","fr":"Pokémon Silencieux","it":"Pokémon Silenzio","ja":"せいじゃくポケモン"},"desc":{"en":"If you’re too loud around it, you risk being torn apart by the claws on its tentacle. This Pokémon is also known as the Forest Witch.","es":"Recibe el apodo de Hechicera del Bosque. Quienes arman demasiado barullo se exponen a ser despedazados por las garras de su tentáculo.","fr":"On l’appelle aussi la « sorcière de la forêt ». Ce Pokémon lacère quiconque fait trop de bruit avec les griffes de son tentacule.","it":"È conosciuto anche come “maga del bosco”. Se qualcuno fa troppo chiasso rischia di essere fatto a pezzettini dagli artigli sul suo tentacolo.","ja":"べつめいは もりの まじょ。 さわぎたてると しょくしゅのツメで ひきさかれるかも しれないぞ。"},"h":21,"w":51},{"n":859,"ja":"ベロバー","r":"Beroba","en":"Impidimp","es":"Impidimp","fr":"Grimalin","it":"Impidimp","pt":"","g":8,"t":[17,18],"cat":{"en":"Wily Pokémon","es":"Pokémon Astuto","fr":"Pokémon Malin","it":"Pokémon Scaltro","ja":"いじわるポケモン"},"desc":{"en":"It sneaks into people’s homes, stealing things and feasting on the negative energy of the frustrated occupants.","es":"Se infiltra en las casas para hurtar a sus anchas y, por si fuera poco, nutrirse de la energía negativa que liberan sus contrariados habitantes.","fr":"Il se glisse dans les foyers pour commettre un larcin et en profite pour se nourrir de l’énergie négative des habitants contrariés.","it":"Si intrufola nelle case, ruba, e come se non bastasse si nutre anche dell’energia negativa dei padroni di casa rattristati per il furto.","ja":"みんかに しのびこみ ぬすみを はたらき さらに くやしがる ひとの マイナスエネルギーも いただくのだ。"},"h":4,"w":55},{"n":860,"ja":"ギモー","r":"Gimoh","en":"Morgrem","es":"Morgrem","fr":"Fourbelin","it":"Morgrem","pt":"","g":8,"t":[17,18],"cat":{"en":"Devious Pokémon","es":"Pokémon Malicioso","fr":"Pokémon Scélérat","it":"Pokémon Furbizia","ja":"しょうわるポケモン"},"desc":{"en":"With sly cunning, it tries to lure people into the woods. Some believe it to have the power to make crops grow.","es":"De noche, atrae con astucia a su objetivo hasta el bosque. Al parecer, tiene la capacidad de hacer crecer productos agrícolas.","fr":"La nuit, il ruse pour attirer ses proies dans la forêt. On raconte qu’il a le pouvoir de faire pousser les cultures agricoles.","it":"Attira le prede nel bosco di notte con l’astuzia. Sembra che abbia il potere di far crescere ogni tipo di prodotto agricolo.","ja":"わるぢえを つかって よるの もりに さそいこもうとする。 のうさくもつを そだてる ちからを もつらしい。"},"h":8,"w":125},{"n":861,"ja":"オーロンゲ","r":"Ohlonge","en":"Grimmsnarl","es":"Grimmsnarl","fr":"Angoliath","it":"Grimmsnarl","pt":"","g":8,"t":[17,18],"cat":{"en":"Bulk Up Pokémon","es":"Pokémon Voluminoso","fr":"Pokémon Gonflette","it":"Pokémon Granfisico","ja":"ビルドアップポケモン"},"desc":{"en":"Its hairs work like muscle fibers. When its hairs unfurl, they latch on to opponents, ensnaring them as tentacles would.","es":"Su cabello desempeña una función similar a la de fibras musculares. Al soltárselo, su movimiento tentacular le permite reducir a su objetivo.","fr":"Ses cheveux sont comme des muscles filandreux qu’il peut détacher pour saisir ses adversaires, tels des tentacules.","it":"I sui capelli svolgono una funzione simile a quella delle fibre muscolari. Li può sciogliere e usare come dei tentacoli per avvinghiare il nemico.","ja":"かみのけは きんにくせんいの ように はたらき ほどけると しょくしゅの うごきで あいてを からめとる。"},"h":15,"w":610},{"n":862,"ja":"タチフサグマ","r":"Tachifusaguma","en":"Obstagoon","es":"Obstagoon","fr":"Ixon","it":"Obstagoon","pt":"","g":8,"t":[17,1],"cat":{"en":"Blocking Pokémon","es":"Pokémon Bloqueador","fr":"Pokémon Barrage","it":"Pokémon Bloccaggio","ja":"ていしポケモン"},"desc":{"en":"It evolved after experiencing numerous fights. While crossing its arms, it lets out a shout that would make any opponent flinch.","es":"Evoluciona tras haber librado numerosas peleas. El grito de guerra que profiere mientras pone los brazos en cruz atemoriza a cualquier rival.","fr":"Il a évolué après avoir enchaîné de nombreux combats. Le cri qu’il pousse lorsqu’il fait un « X » avec ses bras ébranle n’importe quel ennemi.","it":"Si è evoluto a forza di lottare. L’urlo di guerra che lancia mentre mette le braccia a X è in grado di terrorizzare qualsiasi avversario.","ja":"ケンカを くりかえし しんか。 うでをクロスし さけぶ おたけびは どんな あいても ひるませるぞ。"},"h":16,"w":460},{"n":863,"ja":"ニャイキング","r":"Nyaiking","en":"Perrserker","es":"Perrserker","fr":"Berserkatt","it":"Perrserker","pt":"","g":8,"t":[9],"cat":{"en":"Viking Pokémon","es":"Pokémon Vikingo","fr":"Pokémon Viking","it":"Pokémon Vichingo","ja":"バイキングポケモン"},"desc":{"en":"After many battles, it evolved dangerous claws that come together to form daggers when extended.","es":"Su devoción por la lucha ha propiciado que evolucionara y le ha conferido unas peligrosas garras que se convierten en dagas al extenderse.","fr":"Il s’est tant adonné au combat qu’il a évolué : il est désormais doté de griffes redoutables qui prennent la forme de dagues en s’allongeant.","it":"Si è evoluto dopo aver passato giorni interi a lottare e ha sviluppato degli artigli che, una volta sfoderati, diventano temibili pugnali.","ja":"たたかいに あけくれて しんかした けっか のばすと たんけんに かわる ぶっそうな ツメを てにいれた。"},"h":8,"w":280},{"n":864,"ja":"サニゴーン","r":"Sunigoon","en":"Cursola","es":"Cursola","fr":"Corayôme","it":"Cursola","pt":"","g":8,"t":[8],"cat":{"en":"Coral Pokémon","es":"Pokémon Coral","fr":"Pokémon Corail","it":"Pokémon Corallo","ja":"さんごポケモン"},"desc":{"en":"Be cautious of the ectoplasmic body surrounding its soul. You’ll become stiff as stone if you touch it.","es":"Conviene tener cuidado con el cuerpo espectral que recubre su alma, pues quien lo toque podría acabar inerte como una piedra.","fr":"Ceux qui ont le malheur de toucher le corps spirituel qui protège son noyau se retrouveront immobilisés, comme changés en pierre.","it":"Il corpo di ectoplasma che avvolge la sua anima è pericolosissimo: chi lo tocca si immobilizza come se fosse stato tramutato in pietra.","ja":"たましいを おおう れいたいの からだには ちゅうい。 ふれると いしのように うごけなく なるぞ。"},"h":10,"w":4},{"n":865,"ja":"ネギガナイト","r":"Negigaknight","en":"Sirfetch’d","es":"Sirfetch’d","fr":"Palarticho","it":"Sirfetch’d","pt":"","g":8,"t":[2],"cat":{"en":"Wild Duck Pokémon","es":"Pokémon Pato Salvaje","fr":"Pokémon Canard Fou","it":"Pokémon Selvanatra","ja":"かるがもポケモン"},"desc":{"en":"After deflecting attacks with its hard leaf shield, it strikes back with its sharp leek stalk. The leek stalk is both weapon and food.","es":"Repele ataques con las hojas de su duro puerro y contraataca con su tallo afilado. El puerro que le sirve de armamento sigue siendo comestible.","fr":"Il pare les attaques avec le tranchant de son solide poireau, et contre-attaque avec la pointe de la tige. Son arme est également comestible.","it":"Devia gli attacchi usando la dura foglia del porro e contrattacca con il gambo affilato. Usa il porro sia come arma che come cibo.","ja":"かたいネギの はで こうげきを いなし するどい クキで はんげき。 ネギは ぶぐで あり しょくざい。"},"h":8,"w":1170},{"n":866,"ja":"バリコオル","r":"Barrikohru","en":"Mr. Rime","es":"Mr. Rime","fr":"M. Glaquette","it":"Mr. Rime","pt":"","g":8,"t":[15,14],"cat":{"en":"Comedian Pokémon","es":"Pokémon Cómico","fr":"Pokémon Comédien","it":"Pokémon Comico","ja":"コメディアンポケモン"},"desc":{"en":"Its amusing movements make it very popular. It releases its psychic power from the pattern on its belly.","es":"Se ha granjeado la simpatía de todo el mundo por sus cómicos movimientos. Emite poderes psíquicos por el motivo de su barriga.","fr":"Ses gestes hilarants le rendent très populaire. Il peut libérer ses pouvoirs psychiques depuis le motif sur son ventre.","it":"Le sue comiche movenze lo rendono simpatico a tutti. Emette poteri psichici dal motivo che ha sul ventre.","ja":"ユーモラスな うごきで みんなの にんきもの。 おなかの もようから サイコパワーを ほうしゅつする。"},"h":15,"w":582},{"n":867,"ja":"デスバーン","r":"Deathbarn","en":"Runerigus","es":"Runerigus","fr":"Tutétékri","it":"Runerigus","pt":"","g":8,"t":[5,8],"cat":{"en":"Grudge Pokémon","es":"Pokémon Resquemor","fr":"Pokémon Rancune","it":"Pokémon Rancore","ja":"おんねんポケモン"},"desc":{"en":"Never touch its shadowlike body, or you’ll be shown the horrific memories behind the picture carved into it.","es":"Su cuerpo, similar a una sombra, no debe tocarse bajo ningún concepto o se visualizarán los horribles recuerdos impregnados en la imagen.","fr":"Quiconque touchera son corps semblable à une ombre devra endurer la vision des souvenirs effroyables gravés dans ses motifs.","it":"Non bisogna toccare il suo corpo simile a un’ombra, o si vedranno i propri ricordi più terribili imprigionati nel suo motivo.","ja":"かげの ような からだに ふれては いけない。 えに きざまれた おそろしい きおくを みせられるぞ。"},"h":16,"w":666},{"n":868,"ja":"マホミル","r":"Mahomil","en":"Milcery","es":"Milcery","fr":"Crèmy","it":"Milcery","pt":"","g":8,"t":[18],"cat":{"en":"Cream Pokémon","es":"Pokémon Nata","fr":"Pokémon Crème","it":"Pokémon Pannafresca","ja":"クリームポケモン"},"desc":{"en":"They say that any patisserie visited by Milcery is guaranteed success and good fortune.","es":"Se dice que las pastelerías donde ha aparecido Milcery tienen casi todas las papeletas para saborear las mieles del éxito.","fr":"Les pâtissiers connaissent tous ce vieil adage : Quand Crèmy apparaît, le succès est assuré.","it":"Si dice che le pasticcerie in cui è apparso un Milcery avranno un successo assicurato!","ja":"マホミルが すがたを みせた パティスリーは だいはんじょうが やくそく されると いわれている。"},"h":2,"w":3},{"n":869,"ja":"マホイップ","r":"Mawhip","en":"Alcremie","es":"Alcremie","fr":"Charmilly","it":"Alcremie","pt":"","g":8,"t":[18],"cat":{"en":"Cream Pokémon","es":"Pokémon Nata","fr":"Pokémon Crème","it":"Pokémon Pannafresca","ja":"クリームポケモン"},"desc":{"en":"When Alcremie is content, the cream it secretes from its hands becomes sweeter and richer.","es":"La nata que le brota de las manos es más dulce y sustanciosa cuando está feliz.","fr":"Quand il est heureux, la crème qu’il produit avec ses mains devient plus sucrée et plus onctueuse.","it":"La panna che Alcremie produce dalle mani è più dolce e gustosa quando è felice.","ja":"てから うみだす クリームは マホイップが しあわせなとき あまみと コクが ふかまる。"},"h":3,"w":5},{"n":870,"ja":"タイレーツ","r":"Tairetsu","en":"Falinks","es":"Falinks","fr":"Hexadron","it":"Falinks","pt":"","g":8,"t":[2],"cat":{"en":"Formation Pokémon","es":"Pokémon Formación","fr":"Pokémon Escadron","it":"Pokémon Schieramento","ja":"じんけいポケモン"},"desc":{"en":"The six of them work together as one Pokémon. Teamwork is also their battle strategy, and they constantly change their formation as they fight.","es":"Este Pokémon está formado por seis individuos que cambian de formación al luchar, haciendo gala de un notable espíritu de equipo.","fr":"À six, ils représentent un Pokémon unique. Ils peuvent changer de formation et comptent sur leur travail d’équipe en combat.","it":"Pokémon dallo spiccato spirito di squadra, è formato da 6 elementi che lottano assieme cambiando schieramento in base alla situazione.","ja":"６ぴきで １ぴきの ポケモン。 たいれつを くみかえながら チームワークで たたかうのだ。"},"h":30,"w":620},{"n":871,"ja":"バチンウニ","r":"Bachinuni","en":"Pincurchin","es":"Pincurchin","fr":"Wattapik","it":"Pincurchin","pt":"","g":8,"t":[13],"cat":{"en":"Sea Urchin Pokémon","es":"Pokémon Erizo de Mar","fr":"Pokémon Oursin","it":"Pokémon Echino","ja":"うにポケモン"},"desc":{"en":"It stores electricity in each spine. Even if one gets broken off, it still continues to emit electricity for at least three hours.","es":"Acumula electricidad en cada una de sus púas. Aunque estas se rompan, son capaces de seguir descargando energía durante 3 h.","fr":"Chacune de ses épines est chargée en électricité. S’il en perd une, celle-ci continue d’émettre un courant électrique pendant trois heures.","it":"Ogni singolo aculeo è carico di elettricità. Quando se ne rompe uno, continua a emettere scariche elettriche per tre ore.","ja":"トゲの １ぽん １ぽんに でんきを たくわえる。 おれた トゲでも ３じかんは ほうでんを つづけるぞ。"},"h":3,"w":10},{"n":872,"ja":"ユキハミ","r":"Yukihami","en":"Snom","es":"Snom","fr":"Frissonille","it":"Snom","pt":"","g":8,"t":[15,7],"cat":{"en":"Worm Pokémon","es":"Pokémon Gusano","fr":"Pokémon Ver","it":"Pokémon Baco","ja":"いもむしポケモン"},"desc":{"en":"It eats snow that piles up on the ground. The more snow it eats, the bigger and more impressive the spikes on its back grow.","es":"Se nutre de la nieve acumulada en el terreno. Cuanta más ingiere, más imponentes se vuelven las púas que presenta en el lomo.","fr":"Il se nourrit de la neige entassée sur le sol. Plus il en mange, plus les épines sur son dos grandissent.","it":"Si nutre della neve accumulatasi sul terreno. Più ne mangia, più gli aculei sul suo dorso diventano grandi.","ja":"じめんに つもった ゆきを たべる。 たくさん たべれば たべるほど せなかの トゲは りっぱに そだつ。"},"h":3,"w":38},{"n":873,"ja":"モスノウ","r":"Mothnow","en":"Frosmoth","es":"Frosmoth","fr":"Beldeneige","it":"Frosmoth","pt":"","g":8,"t":[15,7],"cat":{"en":"Frost Moth Pokémon","es":"Pokémon Polillahielo","fr":"Pokémon Mite Givre","it":"Pokémon Gelofalena","ja":"こおりがポケモン"},"desc":{"en":"It shows no mercy to any who desecrate fields and mountains. It will fly around on its icy wings, causing a blizzard to chase offenders away.","es":"No muestra la menor compasión con quien asole el campo: lo escarmienta batiendo sus gélidas alas para provocar una ventisca.","fr":"Sans pitié pour les vandales, il bat ses ailes gelées pour provoquer des blizzards et punir quiconque ose souiller les champs et les collines.","it":"Non ha alcuna pietà per chi danneggia la natura. Vola in ricognizione e punisce i malfattori con tempeste di neve che crea con le sue fredde ali.","ja":"のやまを あらすものには ようしゃ しない。 つめたいはねで とびまわり ふぶきを おこして こらしめる。"},"h":13,"w":420},{"n":874,"ja":"イシヘンジン","r":"Ishihengin","en":"Stonjourner","es":"Stonjourner","fr":"Dolman","it":"Stonjourner","pt":"","g":8,"t":[6],"cat":{"en":"Big Rock Pokémon","es":"Pokémon Megalito","fr":"Pokémon Mégalithe","it":"Pokémon Megalito","ja":"きょせきポケモン"},"desc":{"en":"Once a year, on a specific date and at a specific time, they gather out of nowhere and form up in a circle.","es":"Una vez al año y en una fecha concreta, tienen la costumbre de aparecer de la nada para reunirse y formar un círculo.","fr":"Tous les ans à la même date, ils arrivent de nulle part pour se réunir en cercle. C’est une de leurs coutumes.","it":"Ogni anno, in un giorno stabilito, hanno l’usanza di radunarsi giungendo da ogni dove per poi disporsi in cerchio.","ja":"１ねんに いちど きまった にちじに どこから ともなく あつまり わに なって ならぶ しゅうせいが ある。"},"h":25,"w":5200},{"n":875,"ja":"コオリッポ","r":"Korippo","en":"Eiscue","es":"Eiscue","fr":"Bekaglaçon","it":"Eiscue","pt":"","g":8,"t":[15],"cat":{"en":"Penguin Pokémon","es":"Pokémon Pingüino","fr":"Pokémon Pingouin","it":"Pokémon Pinguino","ja":"ペンギンポケモン"},"desc":{"en":"This Pokémon keeps its heat-sensitive head cool with ice. It fishes for its food, dangling its single hair into the sea to lure in prey.","es":"Se enfría constantemente la cara con hielo por su escasa resistencia al calor. Utiliza el pelo de la cabeza para pescar en el mar.","fr":"Ne supportant pas la chaleur, il se rafraîchit toujours la tête avec de la glace. Il pêche de quoi se nourrir à l’aide de son cheveu.","it":"Raffredda costantemente la testa con del ghiaccio perché non sopporta il caldo. Usa il pelo che ha sul capo per pescare le sue prede.","ja":"あつさに よわい かおを いつも こおりで ひやしている。 あたまの けを うみに たらして エサをつる。"},"h":14,"w":890},{"n":876,"ja":"イエッサン","r":"Yessan","en":"Indeedee","es":"Indeedee","fr":"Wimessir","it":"Indeedee","pt":"","g":8,"t":[14,1],"cat":{"en":"Emotion Pokémon","es":"Pokémon Sensorio","fr":"Pokémon Émotion","it":"Pokémon Emozione","ja":"かんじょうポケモン"},"desc":{"en":"Through its horns, it can pick up on the emotions of creatures around it. Positive emotions are the source of its strength.","es":"Con sus cuernos percibe las emociones de los seres vivos que se hallen cerca. Los sentimientos positivos constituyen su fuente de energía.","fr":"Avec ses cornes, il peut percevoir les émotions des êtres vivants alentour. Celles qui sont positives lui servent de source d’énergie.","it":"Percepisce lo stato d’animo di chi gli sta intorno grazie alle sue corna. I sentimenti positivi sono la sua fonte di energia.","ja":"ツノで ちかくの いきものの きもちを かんじとる。 ポジティブな かんじょうが ちからの みなもと。"},"h":9,"w":280},{"n":877,"ja":"モルペコ","r":"Morpeko","en":"Morpeko","es":"Morpeko","fr":"Morpeko","it":"Morpeko","pt":"","g":8,"t"   const la=a.length, lb=b.length;
  if(!la) return lb; if(!lb) return la;
  let prev=Array.from({length:lb+1},(_,i)=>i);
  for(let i=1;i<=la;i++){
    let cur=[i];
    for(let j=1;j<=lb;j++){
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]!==b[j-1]?1:0));
    }
    prev=cur;
  }
  return prev[lb];
}

// precompute normalized forms once
DEX.mons.forEach(m=>{ m._n1=normKana(m.ja,false); m._n2=normKana(m.ja,true); });

function findMon(text){
  const kt=toKata(text);
  const q1=normKana(text,false), q2=normKana(text,true);
  // 1. exact official spelling
  for(const m of DEX.mons){ if(m.ja===kt) return {m,corrected:false,how:'exact'}; }
  // 2. normalized (size + dakuten tolerant)
  for(const m of DEX.mons){ if(m._n1===q1) return {m,corrected:true,how:'norm1'}; }
  // 3. aggressive (visual confusables)
  for(const m of DEX.mons){ if(m._n2===q2) return {m,corrected:true,how:'norm2'}; }
  // 4. fuzzy fallback by edit distance
  let best=null, bd=Infinity;
  for(const m of DEX.mons){ const d=lev(q2,m._n2); if(d<bd){ bd=d; best=m; } }
  const thresh=Math.max(1, Math.floor(q2.length/3)+1);
  if(best && bd<=thresh) return {m:best,corrected:true,how:'fuzzy'};
  return null;
}

/* language metadata for building the answer in the active UI language */
const GEN_REGION = {
  en:["","Kanto","Johto","Hoenn","Sinnoh","Unova","Kalos","Alola","Galar","Paldea"],
  es:["","Kanto","Johto","Hoenn","Sinnoh","Teselia","Kalos","Alola","Galar","Paldea"],
  pt:["","Kanto","Johto","Hoenn","Sinnoh","Unova","Kalos","Alola","Galar","Paldea"],
  fr:["","Kanto","Johto","Hoenn","Sinnoh","Unys","Kalos","Alola","Galar","Paldea"],
  it:["","Kanto","Johto","Hoenn","Sinnoh","Unima","Kalos","Alola","Galar","Paldea"],
  jp:["","カントー","ジョウト","ホウエン","シンオウ","イッシュ","カロス","アローラ","ガラル","パルデア"]
};
const GEN_WORD = { en:"Gen.", es:"Gen.", pt:"Ger.", fr:"Gén.", it:"Gen.", jp:"第" };
const TYPE_LABEL = { en:"Type", es:"Tipo", pt:"Tipo", fr:"Type", it:"Tipo", jp:"タイプ" };
const SCRIPT_NAME = {
  en:"Japanese (Katakana)", es:"Japonés (Katakana)", pt:"Japonês (Katakana)",
  fr:"Japonais (Katakana)", it:"Giapponese (Katakana)", jp:"日本語（カタカナ）"
};

function typeNames(ids){
  return ids.map(id=>{
    const row=DEX.types[id]; if(!row) return '';
    return row[lang] || row.en || '';
  }).filter(Boolean);
}

function buildNote(m){
  const tl = TYPE_LABEL[lang]||TYPE_LABEL.en;
  const tnames = typeNames(m.t).join(lang==='jp'?'・':' / ');
  const region = (GEN_REGION[lang]||GEN_REGION.en)[m.g] || '';
  const gw = GEN_WORD[lang]||GEN_WORD.en;
  const genStr = lang==='jp' ? (gw+m.g+"世代") : (gw+" "+m.g);
  const regPart = region ? (lang==='jp' ? ("（"+region+"）") : (" · "+region)) : '';
  let hw='';
  if(m.h!=null && m.w!=null){ hw=' · '+(m.h/10).toFixed(1)+' m · '+(m.w/10).toFixed(1)+' kg'; }
  return tl+": "+tnames+" · "+genStr+regPart+hw;
}
function localField(obj){
  if(!obj) return '';
  return obj[lang] || obj.en || '';
}

async function identify(){
  const text=display(buffer).trim();
  if(!text){ return; }
  go.disabled=true; loading();
  // small delay so the "searching" animation is visible (purely cosmetic)
  await new Promise(r=>setTimeout(r, 320));
  try {
    const hit=findMon(text);
    if(!hit){
      render({found:false, reason:""});
    } else {
      const m=hit.m;
      const local = (m[lang] && m[lang].length) ? m[lang] : m.en;
      render({
        found:true,
        language: SCRIPT_NAME[lang]||SCRIPT_NAME.en,
        original: m.ja,
        corrected: hit.corrected,
        romaji: m.r,
        name_en: m.en,
        name_local: local,
        dex: String(m.n).padStart(3,'0'),
        id: m.n,
        category: localField(m.cat),
        desc: localField(m.desc),
        note: buildNote(m)
      });
    }
  } catch(e){
    showingPlaceholder=false;
    screen.innerHTML='<div class="err">'+T[lang].errRead+'</div>';
  } finally {
    go.disabled=false;
  }
}

function render(r){
  showingPlaceholder=false; const t=T[lang];
  if(!r.found){ screen.innerHTML='<div class="err">'+t.noMatch+'<br>'+esc(r.reason||'')+'</div>'; return; }
  const localDiff = r.name_local && r.name_local!==r.name_en && r.name_local!==r.original
    ? '<div class="result-line">'+lang.toUpperCase()+': <b>'+esc(r.name_local)+'</b></div>' : '';
  const fixed = r.corrected ? '<div class="result-line" style="color:var(--amber)">'+t.fixed+'</div>' : '';
  const cat = r.category ? '<div class="result-cat">'+esc(r.category)+'</div>' : '';
  const desc = r.desc ? '<div class="result-desc">'+esc(r.desc)+'</div>' : '';
  const sprite = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+r.id+'.png';
  const img = '<img class="result-sprite" src="'+sprite+'" alt="'+esc(r.name_en)+'" '+
    'onerror="this.style.display=\'none\'">';
  screen.innerHTML =
    '<div class="result-wrap">' +
      '<div class="result-text">' +
        '<div class="result-orig">'+esc(r.original)+'</div>' +
        '<div class="result-name">Nº<span class="result-num">'+esc(r.dex)+'</span> '+esc(r.name_en)+'</div>' +
        cat +
        localDiff +
        '<div class="result-line">'+esc(r.language)+' &middot; <b>'+esc(r.romaji)+'</b></div>' +
        fixed +
      '</div>' +
      img +
    '</div>' +
    '<div class="result-note">'+esc(r.note)+'</div>' +
    desc;
}

/* init */
applyLang();
showPlaceholder();
</script>
