émon","es":"Pokémon Renacuajo","fr":"Pokémon Têtard","it":"Pokémon Girino","ja":"おたまポケモン"},"desc":{"en":"It uses sound waves to communicate with others of its kind. People and other Pokémon species can’t hear its cries of warning.","es":"Se comunica con los suyos mediante ondas sonoras. Su grito de alerta es imperceptible para los humanos y el resto de los Pokémon.","fr":"Il communique avec ses compagnons en émettant des ondes. Son cri d’alerte est inaudible pour les humains et les autres Pokémon.","it":"Comunica con i suoi simili tramite onde sonore. Il suo grido d’allerta è impercettibile agli esseri umani e agli altri Pokémon.","ja":"おんぱで なかまと れんらくする。 けいかいの なきごえは ひとや ほかの ポケモンには きこえない。"},"h":5,"w":45},{"n":536,"ja":"ガマガル","r":"Gamagaru","en":"Palpitoad","es":"Palpitoad","fr":"Batracné","it":"Palpitoad","pt":"","g":5,"t":[11,5],"cat":{"en":"Vibration Pokémon","es":"Pokémon Vibrante","fr":"Pokémon Vibration","it":"Pokémon Vibrazione","ja":"しんどうポケモン"},"desc":{"en":"On occasion, their cries are sublimely pleasing to the ear. Palpitoad with larger lumps on their bodies can sing with a wider range of sounds.","es":"A veces emiten un bello canto. Cuanto mayores son las protuberancias del cuerpo, más extenso es su registro vocal.","fr":"Il lui arrive de pousser des cris ravissants. Plus ses protubérances sont grosses, plus le son porte loin.","it":"A volte emette un canto di notevole bellezza. Più grandi sono i bernoccoli che ha sul corpo, più ampio è il registro dei suoni che produce.","ja":"きれいな こえで なくこともある。 からだの とっきが おおきいほど ひろい おんいきで なけるのだ。"},"h":8,"w":170},{"n":537,"ja":"ガマゲロゲ","r":"Gamageroge","en":"Seismitoad","es":"Seismitoad","fr":"Crapustule","it":"Seismitoad","pt":"","g":5,"t":[11,5],"cat":{"en":"Vibration Pokémon","es":"Pokémon Vibrante","fr":"Pokémon Vibration","it":"Pokémon Vibrazione","ja":"しんどうポケモン"},"desc":{"en":"This Pokémon is popular among the elderly, who say the vibrations of its lumps are great for massages.","es":"Las vibraciones de sus bultos resultan perfectas para dar masajes, lo que lo ha hecho muy popular entre la tercera edad.","fr":"Ce Pokémon est un excellent masseur grâce aux vibrations de ses pustules. Les personnes âgées l’apprécient particulièrement.","it":"Particolarmente amato dagli anziani per via delle vibrazioni prodotte dalle protuberanze sui suoi pugni, perfette per fare massaggi.","ja":"コブが おこす バイブレーションが マッサージに よいと ろうじんに だいにんきの ポケモンだ。"},"h":15,"w":620},{"n":538,"ja":"ナゲキ","r":"Nageki","en":"Throh","es":"Throh","fr":"Judokrak","it":"Throh","pt":"","g":5,"t":[2],"cat":{"en":"Judo Pokémon","es":"Pokémon Judo","fr":"Pokémon Judo","it":"Pokémon Judo","ja":"じゅうどうポケモン"},"desc":{"en":"They train in groups of five. Any member that can’t keep up will discard its belt and leave the group.","es":"Entrenan en grupos de cinco individuos. Si alguno es incapaz de seguir el ritmo, arroja el cinturón y abandona la cuadrilla.","fr":"Ils s’entraînent intensément par groupes de cinq. Ceux qui ne peuvent pas suivre le rythme abandonnent leur ceinture et se retirent.","it":"Si allenano in gruppi di cinque. Se uno di loro non riesce a stare al passo con l’allenamento, getta via la cintura e abbandona il gruppo.","ja":"５ひきの むれで けいこに はげむ。 けいこに ついていけない ものは おびを すてて むれを さる。"},"h":13,"w":555},{"n":539,"ja":"ダゲキ","r":"Dageki","en":"Sawk","es":"Sawk","fr":"Karaclée","it":"Sawk","pt":"","g":5,"t":[2],"cat":{"en":"Karate Pokémon","es":"Pokémon Kárate","fr":"Pokémon Karaté","it":"Pokémon Karate","ja":"からてポケモン"},"desc":{"en":"The karate chops of a Sawk that’s trained itself to the limit can cleave the ocean itself.","es":"Cuando un Sawk ha entrenado duro, es capaz de separar las aguas del océano con la potencia de sus técnicas de kárate.","fr":"Après avoir suivi un entraînement intensif, la puissance du tranchant de sa main est telle qu’il peut fendre la mer en deux.","it":"Grazie al suo intenso allenamento, può infliggere micidiali colpi di karate capaci di dividere in due le acque dell’oceano.","ja":"きたえに きたえた ダゲキが くりだす ひっさつ からてチョップは うみも わるほどの はかいりょく。"},"h":14,"w":510},{"n":540,"ja":"クルミル","r":"Kurumiru","en":"Sewaddle","es":"Sewaddle","fr":"Larveyette","it":"Sewaddle","pt":"","g":5,"t":[7,12],"cat":{"en":"Sewing Pokémon","es":"Pokémon Sastre","fr":"Pokémon Couture","it":"Pokémon Grancucito","ja":"さいほうポケモン"},"desc":{"en":"Since this Pokémon makes its own clothes out of leaves, it is a popular mascot for fashion designers.","es":"Usa hojas como material para fabricar su propia ropa, por lo que los diseñadores más famosos los tienen como mascota.","fr":"La mascotte des créateurs de mode. Il découpe ses vêtements dans les feuilles qu’il trouve.","it":"Taglia le foglie per farne vestiti. Per questo motivo è la mascotte preferita di molti stilisti.","ja":"はっぱから ふくを つくるので ファッションデザイナーから マスコットとして にんきがある。"},"h":3,"w":25},{"n":541,"ja":"クルマユ","r":"Kurumayu","en":"Swadloon","es":"Swadloon","fr":"Couverdure","it":"Swadloon","pt":"","g":5,"t":[7,12],"cat":{"en":"Leaf-Wrapped Pokémon","es":"Pokémon Arropado","fr":"Pokémon Capefeuille","it":"Pokémon Coprifoglia","ja":"はごもりポケモン"},"desc":{"en":"It protects itself from the cold by wrapping up in leaves. It stays on the move, eating leaves in forests.","es":"Se guarece del frío envolviéndose en hojas. Se desplaza por el bosque comiendo a su paso las hojas caídas.","fr":"Il se protège du froid en s’emmitouflant dans une feuille. Il se déplace en forêt et mange les feuilles tombées par terre.","it":"Si protegge dal freddo avvolgendo il corpo nelle foglie, che ha l’abitudine di mangiare in giro per la foresta.","ja":"はっぱで からだを つつみこんで さむさを ふせぐ。てぢかな おちばを たべながら もりを いどうする。"},"h":5,"w":73},{"n":542,"ja":"ハハコモリ","r":"Hahakomori","en":"Leavanny","es":"Leavanny","fr":"Manternel","it":"Leavanny","pt":"","g":5,"t":[7,12],"cat":{"en":"Nurturing Pokémon","es":"Pokémon Cuidador","fr":"Pokémon Précepteur","it":"Pokémon Balia","ja":"こそだてポケモン"},"desc":{"en":"It keeps its eggs warm with heat from fermenting leaves. It also uses leaves to make warm wrappings for Sewaddle.","es":"Calienta sus huevos con el calor desprendido por el humus. Hace mantillas con las hojas para Sewaddle.","fr":"Il réchauffe les Œufs avec la chaleur de l’humus. Il fabrique des langes pour les Larveyette avec des feuilles.","it":"Sfrutta il calore dell’humus per covare le sue uova e fabbrica coperte di foglie per avvolgere Sewaddle.","ja":"おちばが はっこうする ねつで タマゴを あたためる。クルミルに はっぱで おくるみを つくる。"},"h":12,"w":205},{"n":543,"ja":"フシデ","r":"Fushide","en":"Venipede","es":"Venipede","fr":"Venipatte","it":"Venipede","pt":"","g":5,"t":[7,4],"cat":{"en":"Centipede Pokémon","es":"Pokémon Ciempiés","fr":"Pokémon Chilopode","it":"Pokémon Centipede","ja":"ムカデポケモン"},"desc":{"en":"Its fangs are highly venomous. If this Pokémon finds prey it thinks it can eat, it leaps for them without any thought of how things might turn out.","es":"Sus colmillos contienen un veneno letal. Si encuentra una presa que parece comestible, se abalanza sobre ella sin pensárselo dos veces.","fr":"Ses crocs sont extrêmement venimeux. Dès qu’il voit une proie à son goût, il bondit sur elle sans penser aux conséquences.","it":"Le sue zanne contengono un potente veleno. Se trova una preda che pensa di poter mangiare, la assale senza pensare alle conseguenze.","ja":"キバに もうどくを もっている。 くえそうな えものを みつけると あとさき かんがえず とびかかる。"},"h":4,"w":53},{"n":544,"ja":"ホイーガ","r":"Wheega","en":"Whirlipede","es":"Whirlipede","fr":"Scobolide","it":"Whirlipede","pt":"","g":5,"t":[7,4],"cat":{"en":"Curlipede Pokémon","es":"Pokémon Pupaciempiés","fr":"Pokémon Coconplopode","it":"Pokémon Rotopede","ja":"まゆムカデポケモン"},"desc":{"en":"Whirlipede protects itself with a sturdy shell and poisonous spikes while it stores up the energy it’ll need for evolution.","es":"Se defiende con su duro caparazón y sus púas venenosas mientras acumula la energía necesaria para evolucionar.","fr":"Il se protège avec sa solide carapace et ses épines empoisonnées tandis qu’il rassemble l’énergie nécessaire à son évolution.","it":"Mentre accumula l’energia necessaria per evolversi, si difende con il guscio resistente e le spine velenose.","ja":"かたいカラと どくのトゲで みを まもり しんかに ひつような エネルギーを ためているのだ。"},"h":12,"w":585},{"n":545,"ja":"ペンドラー","r":"Pendror","en":"Scolipede","es":"Scolipede","fr":"Brutapode","it":"Scolipede","pt":"","g":5,"t":[7,4],"cat":{"en":"Megapede Pokémon","es":"Pokémon Megaciempiés","fr":"Pokémon Mégaplopode","it":"Pokémon Megapede","ja":"メガムカデポケモン"},"desc":{"en":"Scolipede engage in fierce territorial battles with Centiskorch. At the end of one of these battles, the victor makes a meal of the loser.","es":"Las disputas territoriales con Centiskorch son extremadamente violentas. El perdedor se convierte en la presa del ganador.","fr":"Il défend son territoire avec acharnement contre son ennemi Scolocendre. Le perdant sert de dîner au vainqueur.","it":"Lotta ferocemente con Centiskorch per il controllo sul territorio. Il perdente diventa preda del vincitore.","ja":"なわばりを めぐり マルヤクデと はげしく あらそう。 まけたほうは そのまま えものに なるのだ。"},"h":25,"w":2005},{"n":546,"ja":"モンメン","r":"Monmen","en":"Cottonee","es":"Cottonee","fr":"Doudouvet","it":"Cottonee","pt":"","g":5,"t":[12,18],"cat":{"en":"Cotton Puff Pokémon","es":"Pokémon Bolalgodón","fr":"Pokémon Boule Coton","it":"Pokémon Cotonpalla","ja":"わたたまポケモン"},"desc":{"en":"Weaving together the cotton of both Cottonee and Eldegoss produces exquisite cloth that’s highly prized by many luxury brands.","es":"Combinando los algodones de los Cottonee y Eldegoss se obtiene una tela exquisita, que usan las marcas más exclusivas.","fr":"Les marques de luxe utilisent les étoffes splendides issues du mélange des cotons de Doudouvet et de Blancoton.","it":"Le case di alta moda utilizzano pregiati tessuti realizzati con il cotone prodotto da Cottonee ed Eldegoss.","ja":"モンメンと ワタシラガの ワタを まぜて おった きじは うつくしく こうきゅうブランドで つかわれる。"},"h":3,"w":6},{"n":547,"ja":"エルフーン","r":"Elfuun","en":"Whimsicott","es":"Whimsicott","fr":"Farfaduvet","it":"Whimsicott","pt":"","g":5,"t":[12,18],"cat":{"en":"Windveiled Pokémon","es":"Pokémon Vuelalviento","fr":"Pokémon Vole Vent","it":"Pokémon Spiffero","ja":"かぜかくれポケモン"},"desc":{"en":"As long as this Pokémon bathes in sunlight, its cotton keeps growing. If too much cotton fluff builds up, Whimsicott tears it off and scatters it.","es":"Su algodón se expande cuando recibe los rayos del sol, pero acaba desprendiéndose si se vuelve demasiado voluminoso.","fr":"Son coton se met à gonfler sous les rayons du soleil. Quand il est trop volumineux, il s’effiloche et se répand aux alentours.","it":"Il cotone sul suo corpo si gonfia con la luce del sole. Quando diventa eccessivamente voluminoso, si stacca disperdendosi ovunque.","ja":"ひのひかりを あびるたび ワタが ふくらんでいく。 ふくらみすぎると ちぎって あたりに まきちらす。"},"h":7,"w":66},{"n":548,"ja":"チュリネ","r":"Churine","en":"Petilil","es":"Petilil","fr":"Chlorobule","it":"Petilil","pt":"","g":5,"t":[12],"cat":{"en":"Bulb Pokémon","es":"Pokémon Bulbo","fr":"Pokémon Racine","it":"Pokémon Radice","ja":"ねっこポケモン"},"desc":{"en":"The leaves on its head are highly valued for medicinal purposes. Dry the leaves in the sun, boil them, and then drink the bitter decoction for remarkably effective relief from fatigue.","es":"Cuanto más sano está este Pokémon, más intenso se vuelve el color de sus hojas. A veces se asienta en huertos o jardines de flores bien cuidados.","fr":"Plus ses feuilles sont foncées, plus il est en bonne santé. Il s’installe parfois dans les champs ou les parterres de fleurs bien entretenus.","it":"Più il colore delle foglie è intenso, più è in salute. A volte si stabilisce in campi o aiuole ben curate.","ja":"はの いろが こいほど けんこう。 ていれの いきとどいた はたけや かだんに すみつくことも ある。"},"h":5,"w":66},{"n":549,"ja":"ドレディア","r":"Dredear","en":"Lilligant","es":"Lilligant","fr":"Fragilady","it":"Lilligant","pt":"","g":5,"t":[12],"cat":{"en":"Flowering Pokémon","es":"Pokémon Adornofloral","fr":"Pokémon Chef-Fleur","it":"Pokémon Fiorfronzolo","ja":"はなかざりポケモン"},"desc":{"en":"I suspect that its well-developed legs are the result of a life spent on mountains covered in deep snow. The scent it exudes from its flower crown heartens those in proximity.","es":"El aceite esencial que se extrae de su flor emana un aroma sublime, aunque su precio resulta desorbitado.","fr":"L’huile essentielle extraite de sa fleur dégage un parfum exceptionnel, mais elle coûte extrêmement cher.","it":"L’olio essenziale che si ottiene dal fiore ha un profumo sublime, ma costa un occhio della testa.","ja":"はなから つくられる せいゆは ごくじょうの かおりが するが めが とびでるほど こうかだ。"},"h":11,"w":163},{"n":550,"ja":"バスラオ","r":"Bassrao","en":"Basculin","es":"Basculin","fr":"Bargantua","it":"Basculin","pt":"","g":5,"t":[11],"cat":{"en":"Hostile Pokémon","es":"Pokémon Violento","fr":"Pokémon Violent","it":"Pokémon Irruenza","ja":"らんぼうポケモン"},"desc":{"en":"Though it differs from other Basculin in several respects, including demeanor—this one is gentle—I have categorized it as a regional form given the vast array of shared qualities.","es":"Un alimento básico de la dieta de antaño. A los jóvenes se les daba Basculin de raya roja por su alto contenido en ácidos grasos.","fr":"On l’utilisait autrefois en cuisine. La chair grasse des Bargantua à motif rouge était plutôt destinée aux jeunes.","it":"Utilizzati in passato in cucina, i Basculin Forma Linearossa erano ritenuti adatti ai giovani per la loro carne ad alto contenuto di grassi.","ja":"むかしは しょくたくに のぼった。 あかすじの バスラオの みは あぶらが おおく わかものむき。"},"h":10,"w":180},{"n":551,"ja":"メグロコ","r":"Meguroco","en":"Sandile","es":"Sandile","fr":"Mascaïman","it":"Sandile","pt":"","g":5,"t":[5,17],"cat":{"en":"Desert Croc Pokémon","es":"Pokémon Desierdrilo","fr":"Pokémon Croco Sable","it":"Pokémon Sabbiadrillo","ja":"さばくワニポケモン"},"desc":{"en":"Sandile is small, but its legs and lower body are powerful. Pushing sand aside as it goes, Sandile moves through the desert as if it’s swimming.","es":"Es pequeño, pero cuenta con un tren inferior fuerte. Se desplaza por el desierto abriéndose paso entre la arena, como si nadase.","fr":"Malgré son petit gabarit, il a beaucoup de force dans les pattes arrière. Il parcourt le désert comme s’il nageait dans le sable.","it":"Nonostante la corporatura minuta, ha zampe robuste. Si fa strada nel deserto come nuotando nella sabbia.","ja":"ちいさいが あしこしの ちからは つよい。 すなを かきわけて さばくを およぐように いどう。"},"h":7,"w":152},{"n":552,"ja":"ワルビル","r":"Waruvile","en":"Krokorok","es":"Krokorok","fr":"Escroco","it":"Krokorok","pt":"","g":5,"t":[5,17],"cat":{"en":"Desert Croc Pokémon","es":"Pokémon Desierdrilo","fr":"Pokémon Croco Sable","it":"Pokémon Sabbiadrillo","ja":"さばくワニポケモン"},"desc":{"en":"Although this Pokémon has specialized eyes that allow it to see in the dark, Krokorok won’t move much at night—the desert gets cold after sunset.","es":"Tiene unos ojos especiales que le permiten ver en la oscuridad, pero suele permanecer inmóvil en las frías noches del desierto.","fr":"Bien que ses yeux particuliers lui permettent de voir dans l’obscurité, les nuits sont si froides dans le désert qu’il ne se déplace presque pas.","it":"È dotato di occhi particolari che gli permettono di vedere anche al buio, ma poiché le notti nel deserto sono fredde non è molto attivo di notte.","ja":"くらやみでも みえる とくしゅな りょうめを もつが さばくのよるは さむいので あまり うごかない。"},"h":10,"w":334},{"n":553,"ja":"ワルビアル","r":"Waruvial","en":"Krookodile","es":"Krookodile","fr":"Crocorible","it":"Krookodile","pt":"","g":5,"t":[5,17],"cat":{"en":"Intimidation Pokémon","es":"Pokémon Amenazador","fr":"Pokémon Intimidation","it":"Pokémon Minaccia","ja":"いかくポケモン"},"desc":{"en":"While terribly aggressive, Krookodile also has the patience to stay hidden under sand for days, lying in wait for prey.","es":"Es de naturaleza violenta, pero también tiene la paciencia necesaria para esperar a su presa oculto en la arena durante varios días.","fr":"Il aime la violence, mais sait aussi se montrer patient lorsqu’il doit passer plusieurs jours dans le sable à attendre une proie.","it":"È un Pokémon molto feroce. Quando si tratta di catturare le prede è in grado di aspettare pazientemente nella sabbia per giorni.","ja":"きょうぼうだが えものの ために すなのなかで なんにちも まつ にんたいづよさも もっているぞ。"},"h":15,"w":963},{"n":554,"ja":"ダルマッカ","r":"Darumakka","en":"Darumaka","es":"Darumaka","fr":"Darumarond","it":"Darumaka","pt":"","g":5,"t":[10],"cat":{"en":"Zen Charm Pokémon","es":"Pokémon Daruma","fr":"Pokémon Daruma","it":"Pokémon Daruma","ja":"だるまポケモン"},"desc":{"en":"This popular symbol of good fortune will never fall over in its sleep, no matter how it’s pushed or pulled.","es":"Cuando duerme es imposible tumbarlo por más que lo zarandeen. Es muy popular como amuleto de la suerte.","fr":"On a beau le pousser ou le tirer, quand il dort, rien ne le fait vaciller. Cette qualité lui a valu de devenir un emblème pour les porte-bonheurs.","it":"Quando dorme è impossibile buttarlo giù, per quanto lo si spinga. I portafortuna che lo rappresentano sono molto popolari.","ja":"ねているときは おしても ひいても けっして たおれない。 えんぎものの モチーフとして にんきが たかい。"},"h":6,"w":375},{"n":555,"ja":"ヒヒダルマ","r":"Hihidaruma","en":"Darmanitan","es":"Darmanitan","fr":"Darumacho","it":"Darmanitan","pt":"","g":5,"t":[10],"cat":{"en":"Blazing Pokémon","es":"Pokémon Candente","fr":"Pokémon Enflammé","it":"Pokémon Altefiamme","ja":"えんじょうポケモン"},"desc":{"en":"This Pokémon’s power level rises along with the temperature of its fire, which can reach 2,500 degrees Fahrenheit.","es":"Su fuerza aumenta cuanto más se aviva su fuego interior, que puede alcanzar temperaturas superiores a los 1400 °C.","fr":"Sa puissance augmente à mesure que la flamme de son corps s’intensifie. La température de celle-ci peut parfois dépasser les 1 400 °C.","it":"La sua fiamma interna può raggiungere temperature di oltre 1.400 ºC. Più intensamente arde, più la potenza del Pokémon aumenta.","ja":"たいないの ほのおが もえさかるほど パワーが たかまる。 その おんどは １４００どを こえる ことも。"},"h":13,"w":929},{"n":556,"ja":"マラカッチ","r":"Maracacchi","en":"Maractus","es":"Maractus","fr":"Maracachi","it":"Maractus","pt":"","g":5,"t":[12],"cat":{"en":"Cactus Pokémon","es":"Pokémon Cactus","fr":"Pokémon Cactus","it":"Pokémon Cactus","ja":"サボテンポケモン"},"desc":{"en":"Once each year, this Pokémon scatters its seeds. They’re jam-packed with nutrients, making them a precious food source out in the desert.","es":"Una vez al año, esparce sus semillas, cuyo alto valor nutritivo las convierte en una inestimable fuente de alimento en el desierto.","fr":"Il sème les graines de ses fleurs une fois par an. Celles-ci abondent en nutriments et représentent une denrée précieuse dans le désert.","it":"Una volta all’anno i suoi fiori rilasciano semi ricchissimi di sostanze nutritive, che li rendono un prezioso alimento nel deserto.","ja":"いちねんに いちど タネを まく。 はなの タネは えいようまんてんで さばくの きちょうな しょくりょう。"},"h":10,"w":280},{"n":557,"ja":"イシズマイ","r":"Ishizumai","en":"Dwebble","es":"Dwebble","fr":"Crabicoque","it":"Dwebble","pt":"","g":5,"t":[7,6],"cat":{"en":"Rock Inn Pokémon","es":"Pokémon Casapiedra","fr":"Pokémon Lithicole","it":"Pokémon Pietracasa","ja":"いしやどポケモン"},"desc":{"en":"It first tries to find a rock to live in, but if there are no suitable rocks to be found, Dwebble may move in to the ports of a Hippowdon.","es":"Si no encuentra una piedra que sea idónea como morada, se instala en los orificios de algún Hippowdon.","fr":"S’il ne trouve pas de bon caillou à creuser pour s’y loger, il élit domicile dans un des trous du corps d’Hippodocus.","it":"A volte, quando non riesce a trovare una pietra adatta, usa come sua dimora i pori di Hippowdon.","ja":"いえに ちょうどいい こいしが みつからないと カバルドンの あなに すんでしまうことも。"},"h":3,"w":145},{"n":558,"ja":"イワパレス","r":"Iwapalace","en":"Crustle","es":"Crustle","fr":"Crabaraque","it":"Crustle","pt":"","g":5,"t":[7,6],"cat":{"en":"Stone Home Pokémon","es":"Pokémon Casarroca","fr":"Pokémon Lapidicole","it":"Pokémon Scogliocasa","ja":"いわやどポケモン"},"desc":{"en":"Its thick claws are its greatest weapons. They’re mighty enough to crack Rhyperior’s carapace.","es":"Su arma más potente son sus gruesas pinzas, tan duras que pueden abrir una brecha incluso en el Protector de Rhyperior.","fr":"Ses meilleures armes sont ses pinces. Elles sont si dures qu’elles peuvent ébrécher les Protecteurs de Rhinastoc.","it":"Le spesse chele sono la sua arma più potente. Sono talmente dure da poter perfino aprire brecce nella Copertura dei Rhyperior.","ja":"ふとい ツメが さいだいの ぶき。 ドサイドンの プロテクターにさえ ひびを いれるほど かたいぞ。"},"h":14,"w":2000},{"n":559,"ja":"ズルッグ","r":"Zuruggu","en":"Scraggy","es":"Scraggy","fr":"Baggiguane","it":"Scraggy","pt":"","g":5,"t":[17,2],"cat":{"en":"Shedding Pokémon","es":"Pokémon Mudapiel","fr":"Pokémon Mue","it":"Pokémon Mutapelle","ja":"だっぴポケモン"},"desc":{"en":"It protects itself with its durable skin. It’s thought that this Pokémon will evolve once its skin has completely stretched out.","es":"Su robusta piel le sirve de protección. Cuando ya no puede estirarse más, es señal de que va a evolucionar pronto.","fr":"Il se protège grâce à sa peau robuste. On dit que quand celle-ci ne peut plus s’étirer davantage, c’est qu’il est sur le point d’évoluer.","it":"Il suo corpo è protetto da una pelle robustissima. Si dice che quando questa raggiunge il limite dell’elasticità, Scraggy sia sul punto di evolversi.","ja":"じょうぶな かわで みを まもる。 かわが のびきるとき しんかを むかえると いわれる。"},"h":6,"w":118},{"n":560,"ja":"ズルズキン","r":"Zuruzukin","en":"Scrafty","es":"Scrafty","fr":"Baggaïd","it":"Scrafty","pt":"","g":5,"t":[17,2],"cat":{"en":"Hoodlum Pokémon","es":"Pokémon Gamberro","fr":"Pokémon Gang","it":"Pokémon Furfante","ja":"あくとうポケモン"},"desc":{"en":"While mostly known for having the temperament of an aggressive ruffian, this Pokémon takes very good care of its family, friends, and territory.","es":"A pesar de su carácter agresivo, se muestra muy protector con sus allegados y su territorio.","fr":"Il est de nature violente, mais au fond de lui, il tient à sa famille, à ses amis et à son territoire.","it":"Ha un’indole estremamente aggressiva, ma se si tratta della sua famiglia, dei suoi compagni e del suo territorio, diventa molto protettivo.","ja":"とても あらっぽい せいかくだが かぞくや なかまや なわばりは たいせつにする ところがある。"},"h":11,"w":300},{"n":561,"ja":"シンボラー","r":"Symboler","en":"Sigilyph","es":"Sigilyph","fr":"Cryptéro","it":"Sigilyph","pt":"","g":5,"t":[14,3],"cat":{"en":"Avianoid Pokémon","es":"Pokémon Pseudopájaro","fr":"Pokémon Similoiseau","it":"Pokémon Pseuduccello","ja":"とりもどきポケモン"},"desc":{"en":"A discovery was made in the desert where Sigilyph fly. The ruins of what may have been an ancient city were found beneath the sands.","es":"Explorando la zona desértica que sobrevuela, se han descubierto los vestigios de lo que parece ser una antigua ciudad.","fr":"En fouillant sous le sable du désert survolé par Cryptéro, on a retrouvé les vestiges de ce que l’on croit être une ville antique.","it":"Nella zona desertica sorvolata da questi Pokémon sono stati disseppelliti i resti di un’antica città.","ja":"シンボラーが とぶ さばくのしたを ちょうさすると こだいの としと おもわれる なごりが みつかった。"},"h":14,"w":140},{"n":562,"ja":"デスマス","r":"Desumasu","en":"Yamask","es":"Yamask","fr":"Tutafeh","it":"Yamask","pt":"","g":5,"t":[8],"cat":{"en":"Spirit Pokémon","es":"Pokémon Espíritu","fr":"Pokémon Âme","it":"Pokémon Fatuanima","ja":"たましいポケモン"},"desc":{"en":"The spirit of a person from a bygone age became this Pokémon. It rambles through ruins, searching for someone who knows its face.","es":"Surgió del alma de una persona que vivió en tiempos remotos. Merodea por las ruinas en busca de alguien que reconozca su rostro.","fr":"Il est né de l’âme d’un être humain d’un peuple antique. Il erre dans les ruines à la recherche de quiconque reconnaîtra son visage.","it":"Spirito di un uomo dell’antichità divenuto Pokémon. Vaga tra le rovine in cerca di qualcuno che riconosca il suo volto.","ja":"こだいじんの たましいが ポケモンに なった。 じぶんの かおを しる ひとを さがし いせきを さまよう。"},"h":5,"w":15},{"n":563,"ja":"デスカーン","r":"Desukarn","en":"Cofagrigus","es":"Cofagrigus","fr":"Tutankafer","it":"Cofagrigus","pt":"","g":5,"t":[8],"cat":{"en":"Coffin Pokémon","es":"Pokémon Sepultura","fr":"Pokémon Cercueil","it":"Pokémon Bara","ja":"かんおけポケモン"},"desc":{"en":"There are many depictions of Cofagrigus decorating ancient tombs. They’re symbols of the wealth that kings of bygone eras had.","es":"Aparece representado en los muros de antiguas sepulturas como símbolo de riqueza de reyes de antaño.","fr":"On le voit souvent représenté sur les murs des vieilles sépultures des rois en tant que symbole de leur richesse.","it":"Viene spesso raffigurato sulle pareti di antichi sepolcri come simbolo dell’opulenza dei re.","ja":"ふるい おはかの かべに おうさまの とみの しょうちょう として えがかれて いることが おおい。"},"h":17,"w":765},{"n":564,"ja":"プロトーガ","r":"Protoga","en":"Tirtouga","es":"Tirtouga","fr":"Carapagos","it":"Tirtouga","pt":"","g":5,"t":[11,6],"cat":{"en":"Prototurtle Pokémon","es":"Pokémon Pretortuga","fr":"Pokémon Tortantique","it":"Pokémon Ancestruga","ja":"こだいがめポケモン"},"desc":{"en":"Tirtouga is considered to be the ancestor of many turtle Pokémon. It was restored to life from a fossil.","es":"Se piensa que es el antepasado de numerosos Pokémon tortuga. Fue regenerado a partir de un fósil.","fr":"Ancêtre présumé de nombreuses espèces de Pokémon tortues, il a été restauré à partir d’un fossile.","it":"Si ritiene sia l’antenato di molti Pokémon con carapace. È stato rigenerato da un fossile.","ja":"おおくの かめポケモンの せんぞと かんがえられている ポケモン。 かせきから ふくげん された。"},"h":7,"w":165},{"n":565,"ja":"アバゴーラ","r":"Abagoura","en":"Carracosta","es":"Carracosta","fr":"Mégapagos","it":"Carracosta","pt":"","g":5,"t":[11,6],"cat":{"en":"Prototurtle Pokémon","es":"Pokémon Pretortuga","fr":"Pokémon Tortantique","it":"Pokémon Ancestruga","ja":"こだいがめポケモン"},"desc":{"en":"This Pokémon emerges from the water in search of prey despite the fact that it moves more slowly on land.","es":"Aunque se mueva con mayor lentitud sobre la superficie terrestre que en el agua, emerge a tierra en busca de presas.","fr":"Bien qu’il soit moins à l’aise sur terre que dans l’eau, il s’aventure sur le rivage pour se nourrir.","it":"Quando va in cerca di prede sale anche sulla terraferma, nonostante i suoi movimenti siano più impacciati rispetto a quando è in acqua.","ja":"みずのなかと くらべて うごきは にぶいが えものを さがしもとめ りくじょうでも かつどうするぞ。"},"h":12,"w":810},{"n":566,"ja":"アーケン","r":"Archen","en":"Archen","es":"Archen","fr":"Arkéapti","it":"Archen","pt":"","g":5,"t":[6,3],"cat":{"en":"First Bird Pokémon","es":"Pokémon Protopájaro","fr":"Pokémon Oisancien","it":"Pokémon Paleouccello","ja":"さいこどりポケモン"},"desc":{"en":"Archen is said to be the ancestor of bird Pokémon. It lived in treetops, eating berries and bug Pokémon.","es":"Se dice que es el antepasado de los Pokémon pájaro. Vivía en las copas de los árboles y se alimentaba de bayas y Pokémon insecto.","fr":"On dit que c’est l’ancêtre des Pokémon oiseaux. Il vivait à la cime des arbres et se nourrissait de Baies et de Pokémon Insecte.","it":"Si dice sia l’antenato dei Pokémon alati. Viveva sugli alberi, nutrendosi di bacche e Pokémon di tipo Coleottero.","ja":"とりポケモンの そせんと いわれる。 きのうえで くらし きのみや むしポケモンを くっていた。"},"h":5,"w":95},{"n":567,"ja":"アーケオス","r":"Archeos","en":"Archeops","es":"Archeops","fr":"Aéroptéryx","it":"Archeops","pt":"","g":5,"t":[6,3],"cat":{"en":"First Bird Pokémon","es":"Pokémon Protopájaro","fr":"Pokémon Oisancien","it":"Pokémon Paleouccello","ja":"さいこどりポケモン"},"desc":{"en":"Though capable of flight, Archeops was apparently better at hunting on the ground.","es":"Si bien era capaz de volar, parece ser que se le daba mucho mejor cazar presas en tierra firme que en el aire.","fr":"Il savait voler, mais il semble qu’il était beaucoup plus doué pour chasser ses proies sur la terre ferme.","it":"Si sa che questo Pokémon era in grado di volare, ma pare che fosse molto più abile nel cacciare le prede a terra.","ja":"とぶことも できるが ちじょうで えものを かることの ほうが ずっと とくい だったようだ。"},"h":14,"w":320},{"n":568,"ja":"ヤブクロン","r":"Yabukuron","en":"Trubbish","es":"Trubbish","fr":"Miamiasme","it":"Trubbish","pt":"","g":5,"t":[4],"cat":{"en":"Trash Bag Pokémon","es":"Pokémon Bolsa Basura","fr":"Pokémon Sac Poubelle","it":"Pokémon Spazzatura","ja":"ゴミぶくろポケモン"},"desc":{"en":"This Pokémon was born from a bag stuffed with trash. Galarian Weezing relish the fumes belched by Trubbish.","es":"Nació a partir de una rebosante bolsa de basura. Los gases nocivos que eructa son un manjar para los Weezing de Galar.","fr":"Il est né d’un sac poubelle rempli d’ordures. Le gaz empoisonné qu’il exhale est très apprécié des Smogogo de Galar.","it":"È nato da un sacchetto pieno di spazzatura. I Weezing di Galar sono ghiotti del gas tossico che esala.","ja":"ゴミの つまった ゴミぶくろから うまれた。 はきだす どくガスは ガラルの マタドガスの こうぶつ。"},"h":6,"w":310},{"n":569,"ja":"ダストダス","r":"Dustdas","en":"Garbodor","es":"Garbodor","fr":"Miasmax","it":"Garbodor","pt":"","g":5,"t":[4],"cat":{"en":"Trash Heap Pokémon","es":"Pokémon Vertedero","fr":"Pokémon Dépotoir","it":"Pokémon Discarica","ja":"ゴミすてばポケモン"},"desc":{"en":"The toxic liquid it launches from its right arm is so virulent that it can kill a weakened creature instantly.","es":"El veneno líquido que brota de su brazo derecho es tan nocivo que puede acabar con una criatura ya débil al menor contacto.","fr":"Le liquide qu’il projette de son bras droit est si toxique que si une créature fragile en est aspergée, elle succombe sur-le-champ.","it":"Il veleno che spruzza dall’arto destro è talmente tossico da risultare istantaneamente letale per le creature già debilitate.","ja":"みぎうでから だす どくえきは よわった せいぶつが あびれば そくしするほど きけんな シロモノ。"},"h":19,"w":1073},{"n":570,"ja":"ゾロア","r":"Zorua","en":"Zorua","es":"Zorua","fr":"Zorua","it":"Zorua","pt":"","g":5,"t":[17],"cat":{"en":"Tricky Fox Pokémon","es":"Pokémon Zorro Pillo","fr":"Pokémon Sombrenard","it":"Pokémon Malavolpe","ja":"わるぎつねポケモン"},"desc":{"en":"A once-departed soul, returned to life in Hisui. Derives power from resentment, which rises as energy atop its head and takes on the forms of foes. In this way, Zorua vents lingering malice.","es":"Suele transformarse en personas, sobre todo en niños, y se adentra en pueblos buscando comida.","fr":"Il lui arrive de se changer en être humain, surtout en enfant, pour venir chercher de la nourriture en ville.","it":"Quando è in cerca di cibo, capita persino che appaia in città assumendo sembianze umane. Si trasforma principalmente in bambini.","ja":"エサを もとめて ひとに ばけ まちに あらわれることも あるぞ。 おもに こどもに ばけている。"},"h":7,"w":125},{"n":571,"ja":"ゾロアーク","r":"Zoroark","en":"Zoroark","es":"Zoroark","fr":"Zoroark","it":"Zoroark","pt":"","g":5,"t":[17],"cat":{"en":"Illusion Fox Pokémon","es":"Pokémon Disfrazorro","fr":"Pokémon Polymorfox","it":"Pokémon Mutevolpe","ja":"ばけぎつねポケモン"},"desc":{"en":"With its disheveled white fur, it looks like an embodiment of death. Heedless of its own safety, Zoroark attacks its nemeses with a bitter energy so intense, it lacerates Zoroark's own body.","es":"Los Entrenadores solitarios le piden a Zoroark que les muestre ilusiones con las que combatir la desazón de la soledad.","fr":"Les Dresseurs en manque de compagnie ordonnent à Zoroark de leur montrer une illusion pour tromper leur solitude.","it":"Gli Allenatori tristi e soli chiedono a Zoroark di mostrare loro dei miraggi che allevino la loro solitudine.","ja":"こどくなトレーナーは ゾロアークに まぼろしを みせるように めいじて ひとりの さみしさを まぎらわす。"},"h":16,"w":811},{"n":572,"ja":"チラーミィ","r":"Chillarmy","en":"Minccino","es":"Minccino","fr":"Chinchidou","it":"Minccino","pt":"","g":5,"t":[1],"cat":{"en":"Chinchilla Pokémon","es":"Pokémon Chinchilla","fr":"Pokémon Chinchilla","it":"Pokémon Cincillà","ja":"チンチラポケモン"},"desc":{"en":"They pet each other with their tails as a form of greeting. Of the two, the one whose tail is fluffier is a bit more boastful.","es":"Se saludan entre sí frotándose la cola. Cuanto más voluminosa es, más orgullosos se muestran.","fr":"Les Chinchidou se saluent en se frottant la queue. Celui qui a la plus volumineuse en tire une certaine fierté.","it":"Si salutano strofinando le proprie code tra loro. Gli esemplari che ne hanno una particolarmente voluminosa tendono a darsi delle arie.","ja":"しっぽで なであって あいさつ。 しっぽの けが おおきな ほうが すこし いばっているぞ。"},"h":4,"w":58},{"n":573,"ja":"チラチーノ","r":"Chillaccino","en":"Cinccino","es":"Cinccino","fr":"Pashmilla","it":"Cinccino","pt":"","g":5,"t":[1],"cat":{"en":"Scarf Pokémon","es":"Pokémon Estola","fr":"Pokémon Écharpe","it":"Pokémon Sciarpa","ja":"スカーフポケモン"},"desc":{"en":"A special oil that seeps through their fur helps them avoid attacks. The oil fetches a high price at market.","es":"Su pelaje está recubierto por una grasa especial que repele los ataques enemigos y por la que se llegan a pagar auténticas fortunas.","fr":"La sécrétion huileuse de ses poils lui permet de dévier les attaques. Elle s’arrache à prix d’or sur les marchés.","it":"Il grasso speciale che ricopre la sua pelliccia può deviare gli attacchi ed è venduto a caro prezzo sul mercato.","ja":"とくべつな あぶらの しみた けは こうげきを うけながす。 あぶらは たかねで とりひき されている。"},"h":5,"w":75},{"n":574,"ja":"ゴチム","r":"Gothimu","en":"Gothita","es":"Gothita","fr":"Scrutella","it":"Gothita","pt":"","g":5,"t":[14],"cat":{"en":"Fixation Pokémon","es":"Pokémon Inquisitivo","fr":"Pokémon Dévisageur","it":"Pokémon Fissosguardo","ja":"ぎょうしポケモン"},"desc":{"en":"Even when nobody seems to be around, Gothita can still be heard making a muted cry. Many believe it’s speaking to something only it can see.","es":"A veces susurra aunque no haya nadie alrededor. Por eso se cree que tal vez hable con alguien o algo imperceptible para los demás.","fr":"Parfois, ce Pokémon chuchote alors qu’il n’y a personne aux alentours. On raconte qu’il parle à une entité que personne ne peut voir.","it":"A volte emette versi anche se non c’è nessuno nei paraggi. Per questo si dice che parli con esseri che nessun altro può vedere.","ja":"だれもいないのに ボソッと なく。 ゴチムにしか みえていない なにかと はなしている らしい。"},"h":4,"w":58},{"n":575,"ja":"ゴチミル","r":"Gothimiru","en":"Gothorita","es":"Gothorita","fr":"Mesmérella","it":"Gothorita","pt":"","g":5,"t":[14],"cat":{"en":"Manipulate Pokémon","es":"Pokémon Manipulador","fr":"Pokémon Magouilleur","it":"Pokémon Raggiro","ja":"あやつりポケモン"},"desc":{"en":"On nights when the stars shine, this Pokémon’s psychic power is at its strongest. It’s unknown just what link Gothorita has to the greater universe.","es":"Sus poderes psíquicos alcanzan su apogeo en las noches estrelladas, aunque su posible vínculo con el espacio está envuelto en misterio.","fr":"Ses pouvoirs psychiques semblent atteindre leur paroxysme pendant les nuits étoilées, mais nul ne sait s’il a un rapport avec l’espace.","it":"Si dice che accumuli energia psichica soprattutto nelle notti stellate, ma la sua connessione con l’universo rimane un mistero.","ja":"ほしの かがやく ばんに もっとも サイコパワーが たかまるらしい。 うちゅうとの かんけいは ふめい。"},"h":7,"w":180},{"n":576,"ja":"ゴチルゼル","r":"Gothiruselle","en":"Gothitelle","es":"Gothitelle","fr":"Sidérella","it":"Gothitelle","pt":"","g":5,"t":[14],"cat":{"en":"Astral Body Pokémon","es":"Pokémon Astro","fr":"Pokémon Cosmique","it":"Pokémon Corpoceleste","ja":"てんたいポケモン"},"desc":{"en":"A criminal who was shown his fate by a Gothitelle went missing that same day and was never seen again.","es":"Los malhechores a los que revela sus últimos momentos pierden la vida el mismo día.","fr":"Les criminels à qui Sidérella a révélé les derniers instants de leur vie ont tous été portés disparus le jour même.","it":"Pare che un malfattore non si sia più fatto vedere dopo che Gothitelle gli aveva rivelato i suoi ultimi momenti.","ja":"ゴチルゼルに じぶんの さいごを みせられた あくにんは そのひを さいごに ゆくえを たった。"},"h":15,"w":440},{"n":577,"ja":"ユニラン","r":"Uniran","en":"Solosis","es":"Solosis","fr":"Nucléos","it":"Solosis","pt":"","g":5,"t":[14],"cat":{"en":"Cell Pokémon","es":"Pokémon Célula","fr":"Pokémon Cellule","it":"Pokémon Cellula","ja":"さいぼうポケモン"},"desc":{"en":"Many say that the special liquid covering this Pokémon’s body would allow it to survive in the vacuum of space.","es":"Se cree que la sustancia viscosa que lo envuelve le permite sobrevivir en el espacio exterior.","fr":"On raconte que le curieux fluide qui entoure le corps de ce Pokémon lui permet de survivre dans l’espace.","it":"Si dice che il liquido speciale in cui è immerso il suo corpo gli permetta di vivere persino nello spazio.","ja":"とくしゅな えきたいに からだを つつんでいるので うちゅうでも いきられるとも いわれている。"},"h":3,"w":10},{"n":578,"ja":"ダブラン","r":"Doublan","en":"Duosion","es":"Duosion","fr":"Méios","it":"Duosion","pt":"","g":5,"t":[14],"cat":{"en":"Mitosis Pokémon","es":"Pokémon Mitosis","fr":"Pokémon Divisé","it":"Pokémon Scissione","ja":"ぶんかつポケモン"},"desc":{"en":"Its brain has split into two, and the two halves rarely think alike. Its actions are utterly unpredictable.","es":"Las dos partes de su cerebro casi nunca piensan lo mismo, por lo que es imposible predecir sus intenciones.","fr":"Étant donné que ses deux cerveaux sont rarement sur la même longueur d’onde, il est impossible de prédire son comportement.","it":"È un Pokémon piuttosto imprevedibile. I suoi due cervelli, separati e indipendenti, raramente sono sulla stessa lunghezza onda.","ja":"ぶんれつした ２つの のうみその かんがえは ほぼ いっちせず まるで こうどうが よめない。"},"h":6,"w":80},{"n":579,"ja":"ランクルス","r":"Lanculus","en":"Reuniclus","es":"Reuniclus","fr":"Symbios","it":"Reuniclus","pt":"","g":5,"t":[14],"cat":{"en":"Multiplying Pokémon","es":"Pokémon Ampliación","fr":"Pokémon Multiplié","it":"Pokémon Espansione","ja":"ぞうふくポケモン"},"desc":{"en":"It’s said that drinking the liquid surrounding Reuniclus grants wisdom. Problem is, the liquid is highly toxic to anything besides Reuniclus itself.","es":"Al parecer, beber su líquido especial otorga un intelecto sin par, pero resulta muy venenoso, excepto para los propios Reuniclus.","fr":"S’il ne s’agissait pas d’un poison violent que seul Symbios peut boire, son curieux fluide pourrait, selon les dires, rendre plus intelligent.","it":"Si dice che il suo liquido speciale doni intelligenza a chi lo beve, ma è velenosissimo per tutti tranne che per Reuniclus.","ja":"とくしゅな えきたいを のむと ちえを さずかると いわれるが ランクルスいがいには もうどく。"},"h":10,"w":201},{"n":580,"ja":"コアルヒー","r":"Koaruhie","en":"Ducklett","es":"Ducklett","fr":"Couaneton","it":"Ducklett","pt":"","g":5,"t":[11,3],"cat":{"en":"Water Bird Pokémon","es":"Pokémon Ave Agua","fr":"Pokémon Oiseaudo","it":"Pokémon Alacquatico","ja":"みずどりポケモン"},"desc":{"en":"They are better at swimming than flying, and they happily eat their favorite food, peat moss, as they dive underwater.","es":"Nada a mayor velocidad de la que puede volar. Se sumerge en el agua para buscar musgo acuático, su comida favorita.","fr":"Un Pokémon doué pour la plongée qui passe son temps sous l’eau à chercher des sphaignes, son plat préféré.","it":"È più ferrato nel nuoto che nel volo. Si immerge nell’acqua per mangiare i licheni marini di cui va matto.","ja":"とぶよりも およぐのが とくいで すいちゅうに もぐっては だいすきな みずゴケを うれしそうに たべる。"},"h":5,"w":55},{"n":581,"ja":"スワンナ","r":"Swanna","en":"Swanna","es":"Swanna","fr":"Lakmécygne","it":"Swanna","pt":"","g":5,"t":[11,3],"cat":{"en":"White Bird Pokémon","es":"Pokémon Cisne","fr":"Pokémon Cygne","it":"Pokémon Biancuccello","ja":"しらとりポケモン"},"desc":{"en":"Swanna start to dance at dusk. The one dancing in the middle is the leader of the flock.","es":"Comienzan a danzar al amanecer. El líder de la bandada se sitúa en el centro.","fr":"Ils se mettent à danser à la tombée de la nuit. Le Lakmécygne qui danse au centre est le chef de la troupe.","it":"Gli Swanna iniziano a ballare quando sorge il sole. Il capo del gruppo balla sempre al centro.","ja":"よあけと ともに スワンナたちは おどりはじめる。まんなかで おどる スワンナが むれの リーダー。"},"h":13,"w":242},{"n":582,"ja":"バニプッチ","r":"Vanipeti","en":"Vanillite","es":"Vanillite","fr":"Sorbébé","it":"Vanillite","pt":"","g":5,"t":[15],"cat":{"en":"Fresh Snow Pokémon","es":"Pokémon Nieve Fresca","fr":"Pokémon Poudreuse","it":"Pokémon Nevefresca","ja":"しんせつポケモン"},"desc":{"en":"Supposedly, this Pokémon was born from an icicle. It spews out freezing air at −58 degrees Fahrenheit to make itself more comfortable.","es":"Este Pokémon nació a partir de un carámbano. Exhala un vaho a -50 °C con el que congela el ambiente para adaptarlo a sus necesidades.","fr":"On raconte qu’il est né de stalactites. Il gèle les alentours en soufflant de l’air à - 50 °C pour améliorer son confort.","it":"Si dice che sia nato da una stalattite di ghiaccio. Per crearsi un habitat adatto, congela l’ambiente intorno con il suo fiato a -50 ºC.","ja":"つららから うまれたと いわれる。 マイナス５０どの れいきを はいて あたりを こおらせ すみやすくする。"},"h":4,"w":57},{"n":583,"ja":"バニリッチ","r":"Vanirich","en":"Vanillish","es":"Vanillish","fr":"Sorboul","it":"Vanillish","pt":"","g":5,"t":[15],"cat":{"en":"Icy Snow Pokémon","es":"Pokémon Nieve Helada","fr":"Pokémon Grêle","it":"Pokémon Geloneve","ja":"ひょうせつポケモン"},"desc":{"en":"It blasts enemies with cold air reaching −148 degrees Fahrenheit, freezing them solid. But it spares their lives afterward—it’s a kind Pokémon.","es":"Congela a sus enemigos con un vaho a -100 °C, pero no llega a arrebatarles la vida debido a su carácter benévolo.","fr":"Bien qu’il gèle ses ennemis en soufflant de l’air à - 100 °C, sa gentillesse l’empêche de leur ôter la vie.","it":"Congela i nemici con il suo fiato a -100 ºC, ma la sua indole gentile gli impedisce di infliggere loro danni letali.","ja":"マイナス１００どの れいきで てきを こおらせるが いのちまでは うばわない やさしい きしつ。"},"h":11,"w":410},{"n":584,"ja":"バイバニラ","r":"Baivanilla","en":"Vanilluxe","es":"Vanilluxe","fr":"Sorbouboul","it":"Vanilluxe","pt":"","g":5,"t":[15],"cat":{"en":"Snowstorm Pokémon","es":"Pokémon Nieve Gélida","fr":"Pokémon Congère","it":"Pokémon Bufera","ja":"ブリザードポケモン"},"desc":{"en":"People believe this Pokémon formed when two Vanillish stuck together. Its body temperature is roughly 21 degrees Fahrenheit.","es":"Su temperatura corporal ronda los -6 °C. Se dice que nace de la fusión de dos Vanillish.","fr":"La température de son corps est d’environ - 6 °C. On raconte que ce Pokémon naît lorsque deux Sorboul se collent l’un à l’autre.","it":"La sua temperatura corporea si aggira intorno ai -6 ºC. Si dice che sia nato dall’unione di due Vanillish.","ja":"たいおんは マイナス６ど ぜんご。 ２ひきの バニリッチが くっつき うまれたと いわれている。"},"h":13,"w":575},{"n":585,"ja":"シキジカ","r":"Shikijika","en":"Deerling","es":"Deerling","fr":"Vivaldaim","it":"Deerling","pt":"","g":5,"t":[1,12],"cat":{"en":"Season Pokémon","es":"Pokémon Estacional","fr":"Pokémon Saison","it":"Pokémon Stagione","ja":"きせつポケモン"},"desc":{"en":"The turning of the seasons changes the color and scent of this Pokémon’s fur. People use it to mark the seasons.","es":"Durante los cambios de estación, su pelaje y olor cambian. Esto anuncia el comienzo de una estación.","fr":"Quand la saison change, il change de pelage et d’odeur. Un Pokémon qui annonce le passage des saisons.","it":"Al cambio di stagione, muta la pelliccia e l’odore. È un Pokémon che annuncia il passaggio delle stagioni.","ja":"きせつの かわりめに なると たいもうと においが へんかする。 きせつを つげる ポケモン。"},"h":6,"w":195},{"n":586,"ja":"メブキジカ","r":"Mebukijika","en":"Sawsbuck","es":"Sawsbuck","fr":"Haydaim","it":"Sawsbuck","pt":"","g":5,"t":[1,12],"cat":{"en":"Season Pokémon","es":"Pokémon Estacional","fr":"Pokémon Saison","it":"Pokémon Stagione","ja":"きせつポケモン"},"desc":{"en":"They migrate according to the seasons, so some people call Sawsbuck the harbingers of spring.","es":"Migra con el cambio de estación, por lo que hay quien considera a Sawsbuck el heraldo de la primavera.","fr":"Il change d’habitat selon les saisons. Certains disent même qu’il est celui qui apporte le printemps.","it":"Si spostano da un luogo all’altro al mutare delle stagioni. Per questo alcuni dicono che portano con sé la primavera.","ja":"きせつの うつりかわりと ともに すみかを かえるので メブキジカが はるをはこぶと いう ひともいる。"},"h":19,"w":925},{"n":587,"ja":"エモンガ","r":"Emonga","en":"Emolga","es":"Emolga","fr":"Emolga","it":"Emolga","pt":"","g":5,"t":[13,3],"cat":{"en":"Sky Squirrel Pokémon","es":"Pokémon Vuelardilla","fr":"Pokémon Pteromys","it":"Pokémon Petauro","ja":"モモンガポケモン"},"desc":{"en":"This Pokémon absolutely loves sweet berries. Sometimes it stuffs its cheeks full of so much food that it can’t fly properly.","es":"Le encantan las bayas dulces. A veces almacena tanta comida en los carrillos que no puede volar bien.","fr":"Les Baies sucrées sont son péché mignon. Il lui arrive d’en conserver beaucoup trop dans ses bajoues, ce qui l’empêche de bien planer.","it":"Va ghiotto di bacche dolci. A volte accumula troppo cibo nelle guance e fa fatica a volare.","ja":"あまい きのみが だいこうぶつ。 ほおぶくろに エサを ためすぎ うまく とべないときも ある。"},"h":4,"w":50},{"n":588,"ja":"カブルモ","r":"Kaburumo","en":"Karrablast","es":"Karrablast","fr":"Carabing","it":"Karrablast","pt":"","g":5,"t":[7],"cat":{"en":"Clamping Pokémon","es":"Pokémon Bocado","fr":"Pokémon Carabe","it":"Pokémon Addentatore","ja":"かぶりつきポケモン"},"desc":{"en":"It spits a liquid from its mouth to melt through Shelmet’s shell. Karrablast doesn’t eat the shell— it eats only the contents.","es":"Escupe un líquido corrosivo con el que disuelve el caparazón de los Shelmet para luego devorar el contenido.","fr":"Il crache un liquide qui dissout les coquilles des Escargaume pour se régaler de leur contenu.","it":"Scioglie la conchiglia di Shelmet con il liquido che spruzza dalla bocca e ne mangia il contenuto.","ja":"くちから はきだす えきたいで チョボマキの からを とかす。 なかみ だけを いただくのだ。"},"h":5,"w":59},{"n":589,"ja":"シュバルゴ","r":"Chevargo","en":"Escavalier","es":"Escavalier","fr":"Lançargot","it":"Escavalier","pt":"","g":5,"t":[7,9],"cat":{"en":"Cavalry Pokémon","es":"Pokémon Soldado","fr":"Pokémon Chevalier","it":"Pokémon Cavaliere","ja":"きへいポケモン"},"desc":{"en":"It charges its enemies, lances at the ready. An image of one of its duels is captured in a famous painting of Escavalier clashing with Sirfetch’d.","es":"Ataca a los enemigos con sus lanzas. Aparece representado en pleno duelo contra un Sirfetch’d en un famoso cuadro.","fr":"Il charge ses ennemis en brandissant ses lances. Il existe un célèbre tableau représentant la joute entre un Lançargot et un Palarticho.","it":"Carica il nemico con le sue lance. Un famoso dipinto lo ritrae durante un duello con Sirfetch’d.","ja":"やりを かまえ てきへ とつげき。 ネギガナイトとの けっとうを えがいた かいがが ゆうめい。"},"h":10,"w":330},{"n":590,"ja":"タマゲタケ","r":"Tamagetake","en":"Foongus","es":"Foongus","fr":"Trompignon","it":"Foongus","pt":"","g":5,"t":[12,4],"cat":{"en":"Mushroom Pokémon","es":"Pokémon Hongo","fr":"Pokémon Champignon","it":"Pokémon Fungo","ja":"きのこポケモン"},"desc":{"en":"The spores released from this Pokémon’s hands are highly poisonous, but when thoroughly dried, the spores can be used as stomach medicine.","es":"Las esporas que expulsa por las extremidades son altamente tóxicas, pero, si se secan bien, sirven como remedio estomacal.","fr":"Les spores qu’il libère de ses mains sont très toxiques, mais si on les sèche bien, elles peuvent soulager les maux de ventre.","it":"Le spore che rilascia dalle mani sono molto velenose, ma se sono essiccate pare che possano essere usate come farmaco gastrointestinale.","ja":"りょうてから ふきだす ほうしは もうどくだが よく かわかせば おなかの くすりに なると いう。"},"h":2,"w":10},{"n":591,"ja":"モロバレル","r":"Morobareru","en":"Amoonguss","es":"Amoonguss","fr":"Gaulet","it":"Amoonguss","pt":"","g":5,"t":[12,4],"cat":{"en":"Mushroom Pokémon","es":"Pokémon Hongo","fr":"Pokémon Champignon","it":"Pokémon Fungo","ja":"きのこポケモン"},"desc":{"en":"Amoonguss generally doesn’t move much. It tends to stand still near Poké Balls that have been dropped on the ground.","es":"Por lo general no se mueve demasiado. Suele permanecer quieto al lado de Poké Balls que haya por el suelo.","fr":"Ce Pokémon a tendance à très peu se déplacer. Quand il voit une Poké Ball abandonnée au sol, il reste immobile à côté.","it":"Generalmente non si muove molto. Di solito si limita a stare immobile vicino a qualche Poké Ball caduta.","ja":"ふだんは あんまり うごかない。 おちている モンスターボールの そばで ただじっと している。"},"h":6,"w":105},{"n":592,"ja":"プルリル","r":"Pururill","en":"Frillish","es":"Frillish","fr":"Viskuse","it":"Frillish","pt":"","g":5,"t":[11,8],"cat":{"en":"Floating Pokémon","es":"Pokémon Ingrávido","fr":"Pokémon Flottaison","it":"Pokémon Fluttuante","ja":"ふゆうポケモン"},"desc":{"en":"Legend has it that the residents of a sunken ancient city changed into these Pokémon.","es":"Cuenta la leyenda que los Frillish son en realidad los habitantes de una antigua ciudad sumergida convertidos en Pokémon.","fr":"Certaines légendes racontent que les Viskuse sont les habitants d’une ancienne cité engloutie qui ont été changés en Pokémon.","it":"La leggenda narra che i Frillish siano in realtà gli abitanti di un’antica città sommersa che si sono trasformati in Pokémon.","ja":"かいていに しずんだ こだいとしの じゅうみんが ポケモンに なったと いう いいつたえが のこされている。"},"h":12,"w":330},{"n":593,"ja":"ブルンゲル","r":"Burungel","en":"Jellicent","es":"Jellicent","fr":"Moyade","it":"Jellicent","pt":"","g":5,"t":[11,8],"cat":{"en":"Floating Pokémon","es":"Pokémon Ingrávido","fr":"Pokémon Flottaison","it":"Pokémon Fluttuante","ja":"ふゆうポケモン"},"desc":{"en":"Whenever a full moon hangs in the night sky, schools of Jellicent gather near the surface of the sea, waiting for their prey to appear.","es":"Las noches de luna llena, bancos enteros de Jellicent emergen a la superficie y aguardan la llegada de alguna presa incauta.","fr":"Les nuits de pleine lune, ils se réunissent à la surface de la mer pour attendre leurs proies.","it":"Nelle notti di luna piena emergono in massa, rendendosi visibili sulla superficie del mare, in attesa di prede.","ja":"まんげつに なると むれを ひきつれ かいめんに すがたを みせる。 えものが くるのを まっているのだ。"},"h":22,"w":1350},{"n":594,"ja":"ママンボウ","r":"Mamanbou","en":"Alomomola","es":"Alomomola","fr":"Mamanbo","it":"Alomomola","pt":"","g":5,"t":[11],"cat":{"en":"Caring Pokémon","es":"Pokémon Socorrista","fr":"Pokémon Soigneur","it":"Pokémon Assistenza","ja":"かいほうポケモン"},"desc":{"en":"The reason it helps Pokémon in a weakened condition is that any Pokémon coming after them may also attack Alomomola.","es":"Se cree que ayuda a los Pokémon heridos y debilitados de forma que los depredadores naturales de estos no le ataquen a él también.","fr":"On pense qu’il protège les Pokémon affaiblis parce qu’il partage avec eux les mêmes prédateurs.","it":"Sembra che aiuti i Pokémon indeboliti per non rischiare di essere attaccato da eventuali loro predatori.","ja":"よわった ポケモンを たすけるのは それを ねらう ポケモンに じぶんも おそわれるから らしい。"},"h":12,"w":316},{"n":595,"ja":"バチュル","r":"Bachuru","en":"Joltik","es":"Joltik","fr":"Statitik","it":"Joltik","pt":"","g":5,"t":[7,13],"cat":{"en":"Attaching Pokémon","es":"Pokémon Lapa","fr":"Pokémon Crampon","it":"Pokémon Appiccicante","ja":"くっつきポケモン"},"desc":{"en":"Joltik latch on to other Pokémon and suck out static electricity. They’re often found sticking to Yamper’s hindquarters.","es":"Se agarra a otros Pokémon para absorber su electricidad estática. Es muy común verlo aferrado a las posaderas de un Yamper.","fr":"Il s’accroche aux autres Pokémon pour aspirer leur électricité statique. On en trouve souvent collés au postérieur de Voltoutou.","it":"Si attacca ad altri Pokémon per assorbirne l’energia elettrostatica. Non è raro trovarne uno sul posteriore di Yamper.","ja":"ほかの ポケモンに とりついて せいでんきを すいとる。 ワンパチの おしりに よく くっついている。"},"h":1,"w":6},{"n":596,"ja":"デンチュラ","r":"Dentula","en":"Galvantula","es":"Galvantula","fr":"Mygavolt","it":"Galvantula","pt":"","g":5,"t":[7,13],"cat":{"en":"EleSpider Pokémon","es":"Pokémon Electroaraña","fr":"Pokémon Araclectrik","it":"Pokémon Elettroragno","ja":"でんきグモポケモン"},"desc":{"en":"It lays traps of electrified threads near the nests of bird Pokémon, aiming to snare chicks that are not yet good at flying.","es":"Teje una tela con hilo electrificado junto a los nidos de Pokémon pájaro para atrapar a los polluelos que aún no saben volar bien.","fr":"Il piège les oisillons qui ne savent pas encore voler en tissant une toile électrique près des nids des Pokémon oiseaux.","it":"Tesse trappole di fili elettrizzati vicino ai nidi di Pokémon alati per catturare i piccoli che non sanno ancora volare.","ja":"とぶのが ヘタな ヒナを ねらい とりポケモンの すの ちかくに でんきの いとで ワナを はるぞ。"},"h":8,"w":143},{"n":597,"ja":"テッシード","r":"Tesseed","en":"Ferroseed","es":"Ferroseed","fr":"Grindur","it":"Ferroseed","pt":"","g":5,"t":[12,9],"cat":{"en":"Thorn Seed Pokémon","es":"Pokémon Fruto Espina","f ismo de engranaje.","fr":"Les humains auraient inventé les mécanismes à engrenages il y a fort longtemps, en observant ce Pokémon.","it":"Si dice che gli uomini del passato abbiano inventato gli ingranaggi dopo aver visto questo Pokémon.","ja":"おおむかしに ギアルを みた にんげんが はぐるまの こうぞうを おもいついたと いわれている。"},"h":3,"w":210},{"n":600,"ja":"ギギアル","r":"Gigiaru","en":"Klang","es":"Klang","fr":"Clic","it":"Klang","pt":"","g":5,"t":[9],"cat":{"en":"Gear Pokémon","es":"Pokémon Engranaje","fr":"Pokémon Engrenage","it":"Pokémon Ingranaggio","ja":"はぐるまポケモン"},"desc":{"en":"Many companies in the Galar region choose Klang as their logo. This Pokémon is considered the symbol of industrial technology.","es":"Muchas empresas de Galar usan su imagen en sus logotipos como símbolo de tecnología industrial.","fr":"Ce Pokémon symbolisant la technologie industrielle est souvent utilisé dans le logo des entreprises de Galar.","it":"Molte imprese di Galar lo usano come logo in quanto simbolo della tecnologia industriale.","ja":"こうぎょうぎじゅつの シンボルとして おおくの ガラルの かいしゃで きぎょうロゴに さいよう される。"},"h":6,"w":510},{"n":601,"ja":"ギギギアル","r":"Gigigiaru","en":"Klinklang","es":"Klinklang","fr":"Cliticlic","it":"Klinklang","pt":"","g":5,"t":[9],"cat":{"en":"Gear Pokémon","es":"Pokémon Engranaje","fr":"Pokémon Engrenage","it":"Pokémon Ingranaggio","ja":"はぐるまポケモン"},"desc":{"en":"The three gears that compose this Pokémon spin at high speed. Its new spiked gear isn’t a living creature.","es":"Las tres ruedas dentadas giran a gran velocidad. El aro metálico dotado de púas no es materia viva.","fr":"Bien que son nouveau rouage à pointes ne soit pas doué de vie, il parvient à le faire tourner à grande vitesse avec les deux autres.","it":"I suoi tre ingranaggi girano ad altissima velocità. Quello con gli spuntoni, apparso dopo l’evoluzione, è inanimato.","ja":"３つの ギアを こうそくかいてん。 あらたに ふえた トゲの ついた ギアは いきものでは ないのだ。"},"h":6,"w":810},{"n":602,"ja":"シビシラス","r":"Shibishirasu","en":"Tynamo","es":"Tynamo","fr":"Anchwatt","it":"Tynamo","pt":"","  de vuelta al mar.","fr":"Il peut sortir de l’eau à la force de ses bras pour attraper des proies sur la rive. Il retourne à l’eau en un instant.","it":"Striscia fuori dal mare con la sola forza dei propri arti. Poi attacca la preda a riva e con un guizzo la trascina con sé.","ja":"うでの ちからで うみから はいだし みずべの えものに おそいかかる。 いっしゅんで うみへ ひきずりこむ。"},"h":21,"w":805},{"n":605,"ja":"リグレー","r":"Ligray","en":"Elgyem","es":"Elgyem","fr":"Lewsor","it":"Elgyem","pt":"","g":5,"t":[14],"cat":{"en":"Cerebral Pokémon","es":"Pokémon Cerebro","fr":"Pokémon Cerveau","it":"Pokémon Cervello","ja":"ブレインポケモン"},"desc":{"en":"This Pokémon was discovered about 50 years ago. Its highly developed brain enables it to exert its psychic powers.","es":"Fue descubierto hace aproximadamente 50 años. Posee un cerebro muy desarrollado que le otorga poderes psíquicos.","fr":"Ce Pokémon a été découvert il y a environ 50 ans. Son cerveau surdéveloppé lui permet d’utiliser ses pouvoirs psychiques avec aisance.","it":"È stato scoperto circa 50 anni fa. Il suo cervello molto sviluppato gli permette di usare poteri psichici.","ja":"５０ねん ほど まえに みつかった ポケモン。 おおきく はったつした のうで サイコパワーを あやつるぞ。"},"h":5,"w":90},{"n":606,"ja":"オーベム","r":"Ohbem","en":"Beheeyem","es":"Beheeyem","fr":"Neitram","it":"Beheeyem","pt":"","g":5,"t":[14],"cat":{"en":"Cerebral Pokémon","es":"Pokémon Cerebro","fr":"Pokémon Cerveau","it":"Pokémon Cervello","ja":"ブレインポケモン"},"desc":{"en":"Sometimes found drifting above wheat fields, this Pokémon can control the memories of its opponents.","es":"Es capaz de manipular los recuerdos del rival. Se lo avista en ocasiones vagando por campos de trigo.","fr":"Il peut manipuler les souvenirs de son adversaire à loisir. Parfois, on l’aperçoit en train de vagabonder au-dessus des champs de blé.","it":"Può manipolare la memoria dell’avversario. A volte lo si vede vagare sopra i campi di grano.","ja":"あいての きおくを そうさできる。 むぎばたけの うえを さまよう すがたが ときおり もくげきされる。"},"h":10,"w":345},{"n":607,"ja":"ヒトモシ","r":"Hitomoshi","en":"Litwick","es":"Litwick","fr":"Funécire","it":"Litwick","pt":"","g":5,"t":[8,10],"cat":{"en":"Candle Pokémon","es":"Pokémon Vela","fr":"Pokémon Chandelle","it":"Pokémon Candela","ja":"ろうそくポケモン"},"desc":{"en":"The younger the life this Pokémon absorbs, the brighter and eerier the flame on its head burns.","es":"Cuanto más joven sea la energía vital que ha absorbido, mayor tamaño tendrá la llama de la cabeza y más siniestro será su brillo.","fr":"Plus les victimes dont il aspire l’énergie vitale sont jeunes, plus sa flamme grandit et luit lugubrement.","it":"Più giovane è la vittima da cui ha assorbito l’energia vitale, più grande e sinistra è la fiamma che gli brilla sul capo.","ja":"すいとる いのちが わかければ わかいほど あたまの ほのおは おおきく あやしく もえあがる。"},"h":3,"w":31},{"n":608,"ja":"ランプラー","r":"Lampler","en":"Lampent","es":"Lampent","fr":"Mélancolux","it":"Lampent","pt":"","g":5,"t":[8,10],"cat":{"en":"Lamp Pokémon","es":"Pokémon Farolillo","fr":"Pokémon Lampe","it":"Pokémon Lanterna","ja":"ランプポケモン"},"desc":{"en":"It lurks in cities, pretending to be a lamp. Once it finds someone whose death is near, it will trail quietly after them.","es":"Se oculta en entornos urbanos haciéndose pasar por una lámpara corriente. Si se topa con alguien moribundo, lo sigue en silencio.","fr":"Il se cache en ville en se faisant passer pour un lampadaire. Lorsqu’il repère une personne dont l’heure est proche, il la suit en catimini.","it":"Si mimetizza nel paesaggio cittadino fingendosi una lampada. Quando incontra una persona prossima alla morte, la segue silenzioso.","ja":"ランプの ふりをして まちなかに ひそむ。 しきが ちかい ひとを みつけると そっと あとを つける。"},"h":6,"w":130},{"n":609,"ja":"シャンデラ","r":"Chandela","en":"Chandelure","es":"Chandelure","fr":"Lugulabre","it":"Chandelure","pt":"","g":5,"t":[8,10],"cat":{"en":"Luring Pokémon","es":"Pokémon Señuelo","fr":"Pokémon Invitation","it":"Pokémon Attiranime","ja":"いざないポケモン"},"desc":{"en":"In homes illuminated by Chandelure instead of lights, funerals were a constant occurrence— or so it’s said.","es":"Cuentan que, en las mansiones donde se usaba para la iluminación, los funerales se sucedían de forma incesante.","fr":"On raconte que dans les manoirs éclairés par des Lugulabre, les funérailles s’enchaînent sans discontinuer.","it":"Si dice che nelle ville in cui i Chandelure erano utilizzati al posto dei lampadari i funerali si susseguissero senza sosta.","ja":"シャンデラを あかりの かわりに していた やしきでは そうしきが たえることが なかった という。"},"h":10,"w":343},{"n":610,"ja":"キバゴ","r":"Kibago","en":"Axew","es":"Axew","fr":"Coupenotte","it":"Axew","pt":"","g":5,"t":[16],"cat":{"en":"Tusk Pokémon","es":"Pokémon Colmillo","fr":"Pokémon Crocs","it":"Pokémon Zanna","ja":"キバポケモン"},"desc":{"en":"They play with each other by knocking their large tusks together. Their tusks break sometimes, but they grow back so quickly that it isn’t a concern.","es":"Juega con sus congéneres chocando sus enormes colmillos con la tranquilidad de saber que, si se le rompen, se regenerarán enseguida.","fr":"Il joue avec ses congénères à se donner de grands coups de crocs. Peu importe s’ils se cassent : ils repousseront aussitôt.","it":"Giocano tra di loro facendo cozzare le zanne. Se si spezzano non è un problema, perché ricrescono subito.","ja":"おおきな キバを うちつけ なかまと じゃれあう。 キバは おれても すぐ はえてくるから へっちゃらだ。"},"h":6,"w":180},{"n":611,"ja":"オノンド","r":"Onondo","en":"Fraxure","es":"Fraxure","fr":"Incisache","it":"Fraxure","pt":"","g":5,"t":[16],"cat":{"en":"Axe Jaw Pokémon","es":"Pokémon Boca Hacha","fr":"Pokémon Hachomenton","it":"Pokémon Mascellascia","ja":"あごオノポケモン"},"desc":{"en":"Its skin is as hard as a suit of armor. Fraxure’s favorite strategy is to tackle its opponents, stabbing them with its tusks at the same time.","es":"Su piel es dura como una coraza. Su técnica predilecta consiste en embestir al rival para hincarle los colmillos.","fr":"Son épiderme est dur comme une armure. Il est passé maître dans l’art de charger l’ennemi tout en le transperçant de ses crocs.","it":"La sua pelle è dura quanto una corazza. La sua specialità è lanciarsi sull’avversario e infilzarlo con le zanne.","ja":"よろいの ように かたい ひふ。 たいあたりと どうじに キバを つきさす せんぽうが とくい だぞ。"},"h":10,"w":360},{"n":612,"ja":"オノノクス","r":"Ononokus","en":"Haxorus","es":"Haxorus","fr":"Tranchodon","it":"Haxorus","pt":"","g":5,"t":[16],"cat":{"en":"Axe Jaw Pokémon","es":"Pokémon Boca Hacha","fr":"Pokémon Hachomenton","it":"Pokémon Mascellascia","ja":"あごオノポケモン"},"desc":{"en":"While usually kindhearted, it can be terrifying if angered. Tusks that can slice through steel beams are how Haxorus deals with its adversaries.","es":"Amable por naturaleza, infunde auténtico pavor al enfadarse. Su mayor baza son los colmillos, con los que puede cortar un armazón de acero.","fr":"D’un naturel doux, il est cependant redoutable lorsqu’il se fâche. Il est très fier de ses crocs qui peuvent même découper des poutres d’acier.","it":"È di natura mite, ma se si arrabbia sono guai. Le zanne, di cui va fiero, possono fare a pezzi anche il cemento armato.","ja":"おんこうな せいしつだが おこると こわい。 てっこつをも きりさく じまんの キバを おみまい するぞ。"},"h":18,"w":1055},{"n":613,"ja":"クマシュン","r":"Kumasyun","en":"Cubchoo","es":"Cubchoo","fr":"Polarhume","it":"Cubchoo","pt":"","g":5,"t":[15],"cat":{"en":"Chill Pokémon","es":"Pokémon Congelación","fr":"Pokémon Gelé","it":"Pokémon Freddo","ja":"ひょうけつポケモン"},"desc":{"en":"It sniffles before performing a move, using its frosty snot to provide an icy element to any move that needs it.","es":"Antes de ejecutar un movimiento, se sorbe los mocos. El frío intenso de estos constituye la base de sus movimientos de tipo Hielo.","fr":"Il renifle avant d’utiliser une capacité. Le froid intense contenu dans sa morve lui permet de lancer les capacités de type Glace.","it":"Prima di sferrare una mossa, tira su con il naso. Il freddo intenso contenuto nel suo muco è alla base delle sue mosse di tipo Ghiaccio.","ja":"わざを だすまえに はなを すする。 はなみずに ふくまれる つよい れいきが こおりの わざの もとだ。"},"h":5,"w":85},{"n":614,"ja":"ツンベアー","r":"Tunbear","en":"Beartic","es":"Beartic","fr":"Polagriffe","it":"Beartic","pt":"","g":5,"t":[15],"cat":{"en":"Freezing Pokémon","es":"Pokémon Glaciación","fr":"Pokémon Congelé","it":"Pokémon Glaciale","ja":"とうけつポケモン"},"desc":{"en":"It swims energetically through frigid seas. When it gets tired, it freezes the seawater with its breath so it can rest on the ice.","es":"Nada plácidamente en mares fríos. Cuando se cansa, congela el agua con su aliento y reposa sobre el hielo.","fr":"Il sillonne les mers glaciales avec aisance. Quand il est fatigué, il gèle l’eau de mer d’un souffle et se repose sur l’iceberg improvisé.","it":"Nuota tranquillo nelle acque gelide del mare. Se è stanco, congela l’acqua con il suo soffio glaciale creando una piattaforma su cui riposare.","ja":"つめたい うみを げんきに およぐ。 つかれたときは といきで かいすいを こおらせて そのうえで やすむぞ。"},"h":26,"w":2600},{"n":615,"ja":"フリージオ","r":"Freegeo","en":"Cryogonal","es":"Cryogonal","fr":"Hexagel","it":"Cryogonal","pt":"","g":5,"t":[15],"cat":{"en":"Crystallizing Pokémon","es":"Pokémon Cristal","fr":"Pokémon Cristal","it":"Pokémon Cristallo","ja":"けっしょうポケモン"},"desc":{"en":"When the weather gets hot, these Pokémon turn into water vapor. Cryogonal are almost never seen during summer.","es":"Cuando aumenta su temperatura corporal, se convierte en vapor, por lo que es muy difícil de avistar durante el verano.","fr":"Lorsqu’il fait trop chaud, il s’évapore, ce qui explique pourquoi on ne le voit presque pas en été.","it":"Quando fa caldo si dissolve in una nuvola di vapore acqueo. Per questo è molto raro vederlo in estate.","ja":"あつくなると すいじょうきに かわる。 なつばに すがたを みることは ほとんどない。"},"h":11,"w":1480},{"n":616,"ja":"チョボマキ","r":"Chobomaki","en":"Shelmet","es":"Shelmet","fr":"Escargaume","it":"Shelmet","pt":"","g":5,"t":[7],"cat":{"en":"Snail Pokémon","es":"Pokémon Caracol","fr":"Pokémon Escargot","it":"Pokémon Lumachina","ja":"マイマイポケモン"},"desc":{"en":"It has a strange physiology that responds to electricity. When together with Karrablast, Shelmet evolves for some reason.","es":"Debido a su peculiar constitución, reacciona ante la energía eléctrica. Por alguna misteriosa razón, evoluciona en presencia de Karrablast.","fr":"Il a l’étrange faculté de réagir à l’énergie électrique. On ne sait trop pourquoi, mais quand il se trouve aux côtés de Carabing, il évolue.","it":"Il suo corpo reagisce misteriosamente all’energia elettrica. Pare che si evolva se si trova in presenza di Karrablast.","ja":"でんき エネルギーに はんのうする ふしぎな たいしつ。 カブルモと ともに いると なぜか しんかする。"},"h":4,"w":77},{"n":617,"ja":"アギルダー","r":"Agilder","en":"Accelgor","es":"Accelgor","fr":"Limaspeed","it":"Accelgor","pt":"","g":5,"t":[7],"cat":{"en":"Shell Out Pokémon","es":"Pokémon Sincaparazón","fr":"Pokémon Exuviateur","it":"Pokémon Sgusciato","ja":"からぬけポケモン"},"desc":{"en":"Discarding its shell made it nimble. To keep itself from dehydrating, it wraps its body in bands of membrane.","es":"Tras deshacerse del caparazón, su agilidad ha aumentado. Las membranas que le recubren el cuerpo evitan que se deshidrate.","fr":"Il est bien plus agile sans sa coquille. La membrane en forme de bandelettes qui l’entoure l’empêche de se dessécher.","it":"Si è liberato della conchiglia, diventando più leggero. Le membrane a forma di fasce che ricoprono il suo corpo evitano che si secchi.","ja":"カラを ぬぎすて みがるに なった。 おびじょうの ねんまくを からだに まきつけ かんそうを ふせぐ。"},"h":8,"w":253},{"n":618,"ja":"マッギョ","r":"Maggyo","en":"Stunfisk","es":"Stunfisk","fr":"Limonde","it":"Stunfisk","pt":"","g":5,"t":[5,13],"cat":{"en":"Trap Pokémon","es":"Pokémon Trampa","fr":"Pokémon Piège","it":"Pokémon Trappola","ja":"トラップポケモン"},"desc":{"en":"For some reason, this Pokémon smiles slightly when it emits a strong electric current from the yellow markings on its body.","es":"Se desconoce la razón, pero esboza una leve sonrisa al liberar potentes descargas eléctricas a través de las zonas amarillentas de su cuerpo.","fr":"Lorsque les parties jaunes de son corps envoient une puissante décharge électrique, il ébauche un sourire. Personne ne sait pourquoi.","it":"Per qualche strano motivo accenna sempre un sorriso quando rilascia una forte scarica elettrica dai motivi gialli sul suo corpo.","ja":"からだの きいろい もようから つよい でんきを はなつとき なぜか すこし ほほえんでいる。"},"h":7,"w":110},{"n":619,"ja":"コジョフー","r":"Kojofu","en":"Mienfoo","es":"Mienfoo","fr":"Kungfouine","it":"Mienfoo","pt":"","g":5,"t":[2],"cat":{"en":"Martial Arts Pokémon","es":"Pokémon Arte Marcial","fr":"Pokémon Art Martial","it":"Pokémon Marziale","ja":"ぶじゅつポケモン"},"desc":{"en":"Though small, Mienfoo’s temperament is fierce. Any creature that approaches Mienfoo carelessly will be greeted with a flurry of graceful attacks.","es":"Su apariencia menuda contrasta con su carácter poco afable. Abruma a los rivales que se acercan a él con gráciles oleadas de ataques sucesivos.","fr":"De nature brutale malgré sa petite taille, il inflige une série de coups majestueux aux inconscients qui s’approchent trop près de lui.","it":"Ha un temperamento turbolento, malgrado le dimensioni ridotte. Sferra eleganti raffiche di colpi contro chi gli si avvicina incautamente.","ja":"ちいさくても きしょうは あらい。 ゆだんして ちかづく あいてには かれいな れんだを おみまいする。"},"h":9,"w":200},{"n":620,"ja":"コジョンド","r":"Kojondo","en":"Mienshao","es":"Mienshao","fr":"Shaofouine","it":"Mienshao","pt":"","g":5,"t":[2],"cat":{"en":"Martial Arts Pokémon","es":"Pokémon Arte Marcial","fr":"Pokémon Art Martial","it":"Pokémon Marziale","ja":"ぶじゅつポケモン"},"desc":{"en":"Delivered at blinding speeds, kicks from this Pokémon can shatter massive boulders into tiny pieces.","es":"Sus veloces patadas, que escapan al ojo humano, son capaces de reducir a escombros incluso rocas de gran tamaño.","fr":"Ses coups de pied ultrarapides et invisibles à l’œil nu peuvent réduire un énorme rocher en poussière.","it":"I suoi calci, talmente veloci da risultare invisibili, sono in grado di sbriciolare anche massi enormi.","ja":"めにも とまらぬ スピードで くりだす けりは きょだいな いわも こっぱみじんに くだく。"},"h":14,"w":355},{"n":621,"ja":"クリムガン","r":"Crimgan","en":"Druddigon","es":"Druddigon","fr":"Drakkarmin","it":"Druddigon","pt":"","g":5,"t":[16],"cat":{"en":"Cave Pokémon","es":"Pokémon Cueva","fr":"Pokémon Caverne","it":"Pokémon Grotta","ja":"ほらあなポケモン"},"desc":{"en":"Druddigon are vicious and cunning. They take up residence in nests dug out by other Pokémon, treating the stolen nests as their own lairs.","es":"Posee una personalidad despiadada y ladina. Se apropia de los túneles excavados por otros Pokémon y los habita.","fr":"Féroce et perfide, Drakkarmin s’approprie les terriers creusés par d’autres Pokémon pour en faire son antre.","it":"Brutale e scaltro, si appropria delle tane scavate da altri Pokémon facendone la propria dimora.","ja":"きょうぼうで ずるがしこい。 ほかの ポケモンが ほった すあなを うばって すみかにする。"},"h":16,"w":1390},{"n":622,"ja":"ゴビット","r":"Gobit","en":"Golett","es":"Golett","fr":"Gringolem","it":"Golett","pt":"","g":5,"t":[5,8],"cat":{"en":"Automaton Pokémon","es":"Pokémon Autómata","fr":"Pokémon Golem Ancien","it":"Pokémon Statuanimata","ja":"ゴーレムポケモン"},"desc":{"en":"This Pokémon was created from clay. It received orders from its master many thousands of years ago, and it still follows those orders to this day.","es":"Fue creado a partir del barro para emplearlo como sirviente. Todavía acata las órdenes que le dio su amo hace milenios.","fr":"Ce Pokémon fait d’argile continue de respecter les ordres que son maître lui a donnés il y a quelques millénaires.","it":"È stato creato modellando dell’argilla. Segue ancora gli ordini che il suo padrone gli ha impartito molti secoli or sono.","ja":"ねんどから つくられた ポケモン。 なんぜんねんも まえの あるじの めいれいを いまも まもっている。"},"h":10,"w":920},{"n":623,"ja":"ゴルーグ","r":"Goloog","en":"Golurk","es":"Golurk","fr":"Golemastoc","it":"Golurk","pt":"","g":5,"t":[5,8],"cat":{"en":"Automaton Pokémon","es":"Pokémon Autómata","fr":"Pokémon Golem Ancien","it":"Pokémon Statuanimata","ja":"ゴーレムポケモン"},"desc":{"en":"There’s a theory that inside Golurk is a perpetual motion machine that produces limitless energy, but this belief hasn’t been proven.","es":"Se dice que su cuerpo alberga un móvil perpetuo que genera energía, pero no se ha constatado la veracidad de tamaña afirmación.","fr":"Son énergie viendrait d’un mécanisme à mouvement perpétuel interne, mais jusqu’à présent, personne n’en a la preuve.","it":"Si dice che all’interno del corpo abbia un motore perpetuo che produce energia, ma a tutt’oggi non è ancora chiaro se sia così.","ja":"たいないに エネルギーを うみだす えいきゅうきかんが あると いうが いまだ かいめいは されていない。"},"h":28,"w":3300},{"n":624,"ja":"コマタナ","r":"Komatana","en":"Pawniard","es":"Pawniard","fr":"Scalpion","it":"Pawniard","pt":"","g":5,"t":[17,9],"cat":{"en":"Sharp Blade Pokémon","es":"Pokémon Tajo","fr":"Pokémon Coupant","it":"Pokémon Lamaffilata","ja":"はものポケモン"},"desc":{"en":"A pack of these Pokémon forms to serve a Bisharp boss. Each Pawniard trains diligently, dreaming of one day taking the lead.","es":"Forman grupos encabezados por un Bisharp. Se entrenan a diario soñando con llegar a liderar el grupo algún día.","fr":"Il vit en meute, sous les ordres d’un Scalproie. Il s’entraîne sans relâche en rêvant du jour où il sera chef de meute à son tour.","it":"Con i suoi simili forma gruppi capeggiati da un Bisharp. Si allena quotidianamente sognando un giorno di diventare il capo del gruppo.","ja":"キリキザンを ボスとした むれを つくる。 むれを ひきいる ことを ゆめみて ひび たんれんを つむ。"},"h":5,"w":102},{"n":625,"ja":"キリキザン","r":"Kirikizan","en":"Bisharp","es":"Bisharp","fr":"Scalproie","it":"Bisharp","pt":"","g":5,"t":[17,9],"cat":{"en":"Sword Blade Pokémon","es":"Pokémon Filo","fr":"Pokémon Tranchant","it":"Pokémon Fildilama","ja":"とうじんポケモン"},"desc":{"en":"Violent conflicts erupt between Bisharp and Fraxure over places where sharpening stones can be found.","es":"Libra encarnizados combates con los Fraxure por el control de los emplazamientos donde se hallan las piedras con las que afila sus cuchillas.","fr":"Sa recherche des meilleurs endroits où trouver des pierres pour affûter ses lames le conduit souvent à affronter des Incisache.","it":"Affronta spesso Fraxure in violenti scontri per il controllo dei territori in cui si trovano le pietre che usa per affilare le sue lame.","ja":"やいばを とぐ いしが ある ばしょを めぐって オノンドと はげしい あらそいを くりひろげる。"},"h":16,"w":700},{"n":626,"ja":"バッフロン","r":"Buffron","en":"Bouffalant","es":"Bouffalant","fr":"Frison","it":"Bouffalant","pt":"","g":5,"t":[1],"cat":{"en":"Bash Buffalo Pokémon","es":"Pokémon Torocabezazo","fr":"Pokémon Coup d’Bœuf","it":"Pokémon Sfondatoro","ja":"ずつきうしポケモン"},"desc":{"en":"These Pokémon live in herds of about 20 individuals. Bouffalant that betray the herd will lose the hair on their heads for some reason.","es":"Forman manadas de unos veinte individuos. Se desconoce el motivo, pero los que traicionan la confianza del grupo pierden la melena.","fr":"Les Frison vivent en troupeau d’une vingtaine d’individus. Pour une raison inconnue, si l’un d’eux trahit le groupe, il perd sa crinière.","it":"Vive in mandrie di circa 20 esemplari. Per qualche motivo, i Bouffalant che tradiscono il gruppo perdono la chioma.","ja":"２０ぴきていどの むれで くらす。 むれを うらぎった バッフロンは なぜか あたまの けが ぬける。"},"h":16,"w":946},{"n":627,"ja":"ワシボン","r":"Washibon","en":"Rufflet","es":"Rufflet","fr":"Furaiglon","it":"Rufflet","pt":"","g":5,"t":[1,3],"cat":{"en":"Eaglet Pokémon","es":"Pokémon Aguilucho","fr":"Pokémon Aiglon","it":"Pokémon Aquilotto","ja":"ヒナわしポケモン"},"desc":{"en":"Its chick-like looks belie its hotheadedness. It challenges its parents at every opportunity, desperate to prove its strength.","es":"Es capaz de partir hasta la baya más dura gracias a la fuerza de sus extremidades. Belicoso por naturaleza, planta cara a cualquiera.","fr":"Sa poigne est telle qu’il peut réduire en miettes les plus dures des Baies. Belliqueux de nature, il n’hésite pas à défier tout le monde.","it":"La sua stretta riduce in frantumi anche le bacche più dure. È un attaccabrighe e sfida chiunque gli capiti a tiro.","ja":"かたい きのみも こなごなに くだく あくりょく。 ケンカっぱやく だれにでも しょうぶを しかける。"},"h":5,"w":105},{"n":628,"ja":"ウォーグル","r":"Warrgle","en":"Braviary","es":"Braviary","fr":"Gueriaigle","it":"Braviary","pt":"","g":5,"t":[1,3],"cat":{"en":"Valiant Pokémon","es":"Pokémon Aguerrido","fr":"Pokémon Vaillant","it":"Pokémon Baldanza","ja":"ゆうもうポケモン"},"desc":{"en":"Screaming a bloodcurdling battle cry, this huge and ferocious bird Pokémon goes out on the hunt. It blasts lakes with shock waves, then scoops up any prey that float to the water's surface.","es":"Su carácter agresivo e irascible le ha hecho perder su puesto como transportista en Galar en favor de los Corviknight.","fr":"Son caractère agressif et violent lui a valu de perdre son rôle de transporteur à Galar au profit de Corvaillus.","it":"A causa del suo carattere irruente e violento ha perso il posto di corriere a Galar, che gli è stato rubato da Corviknight.","ja":"ちのけが おおく あらっぽいので ガラルの はこびやの ざは アーマーガアに うばわれた。"},"h":15,"w":410},{"n":629,"ja":"バルチャイ","r":"Valchai","en":"Vullaby","es":"Vullaby","fr":"Vostourno","it":"Vullaby","pt":"","g":5,"t":[17,3],"cat":{"en":"Diapered Pokémon","es":"Pokémon Pañal","fr":"Pokémon Couche","it":"Pokémon Pannolino","ja":"おむつポケモン"},"desc":{"en":"Vullaby grow quickly. Bones that have gotten too small for older Vullaby to wear often get passed down to younger ones in the nest.","es":"Deja en el nido las calaveras que va descartando a medida que crece con celeridad para que las reutilicen futuras generaciones.","fr":"Il grandit vite. Au sein du nid, les petits Vostourno héritent des couches en crâne de leurs aînés.","it":"Cresce così velocemente che il teschio gli va presto stretto. I teschi smessi restano nel nido e vengono usati dalle generazioni successive.","ja":"すぐに おおきく そだつので おしりの ガイコツは すの なかで おさがりとして つかいまわされる。"},"h":5,"w":90},{"n":630,"ja":"バルジーナ","r":"Vulgina","en":"Mandibuzz","es":"Mandibuzz","fr":"Vaututrice","it":"Mandibuzz","pt":"","g":5,"t":[17,3],"cat":{"en":"Bone Vulture Pokémon","es":"Pokémon Buitre Hueso","fr":"Pokémon Vostour","it":"Pokémon Ossaquila","ja":"ほねわしポケモン"},"desc":{"en":"They adorn themselves with bones. There seem to be fashion trends among the  una schiuma delicata. Nonostante l’aria spensierata, scruta sempre l’ambiente circostante con molta attenzione.","ja":"せんさいな あわで からだを つつみ はだを まもる。のんきに みせかけて ぬけめなく しゅういを うかがう。"},"h":3,"w":70},{"n":657,"ja":"ゲコガシラ","r":"Gekogashira","en":"Frogadier","es":"Frogadier","fr":"Croâporal","it":"Frogadier","pt":"","g":6,"t":[11],"cat":{"en":"Bubble Frog Pokémon","es":"Pokémon Burburrana","fr":"Pokémon Crapobulle","it":"Pokémon Schiumorana","ja":"あわがえるポケモン"},"desc":{"en":"Its swiftness is unparalleled. It can scale a tower of more than 2,000 feet in a minute’s time.","es":"Su agilidad no tiene parangón. De hecho, es capaz de escalar una torre de más de 600 metros en tan solo un minuto.","fr":"Son agilité est incomparable. Il peut gravir une tour de 600 m de haut en moins d’une minute.","it":"Grazie alla sua straordinaria agilità, è in grado di scalare una torre alta più di 600 m in meno di un minuto.","ja":"みがるさは だれにも まけない。 ６００メートルを こえる タワーの てっぺんまで １ぷんで のぼりきる。"},"h":6,"w":109},{"n":658,"ja":"ゲッコウガ","r":"Gekkouga","en":"Greninja","es":"Greninja","fr":"Amphinobi","it":"Greninja","pt":"","g":6,"t":[11,17],"cat":{"en":"Ninja Pokémon","es":"Pokémon Ninja","fr":"Pokémon Ninja","it":"Pokémon Ninja","ja":"しのびポケモン"},"desc":{"en":"It appears and vanishes with a ninja’s grace. It toys with its enemies using swift movements, while slicing them with throwing stars of sharpest water.","es":"Aparece y desaparece de improvisto, cual ninja. Marea al oponente con su soberbia agilidad y lo hace trizas con sus Shuriken de Agua.","fr":"Aussi insaisissable qu’un ninja, il se joue de ses ennemis grâce à sa célérité, et les tranche de ses Sheauriken.","it":"Agile e sfuggente come un ninja, si fa beffe dei nemici grazie alla sua velocità e li bersaglia di shuriken d’acqua.","ja":"にんじゃのように しんしゅつきぼつ。 すばやい うごきで ほんろうしつつ みずの しゅりけんで きりさく。"},"h":15,"w":400},{"n":659,"ja":"ホルビー","r":"Horubee","en":"Bunnelby","es":"Bunnelby","fr":"Sapereau","it":"Bunnelby","pt":"","g":6,"t":[1],"cat":{"en":"Digging Pokémon",
